const QuotaTimeline = ({ todayCount, plan }) => {
  const [now, setNow] = useState(Date.now());
  const [zoomHours, setZoomHours] = useState(12); // Default 12h window

  useEffect(() => {
    const i = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(i);
  }, []);

  const windowStart = now - (zoomHours / 2) * 3600000;
  const windowEnd = now + (zoomHours / 2) * 3600000;
  const totalWidth = zoomHours * 3600000;

  const getPos = (ts) => ((ts - windowStart) / totalWidth) * 100;

  const events = [
    ...(todayCount.recentResets || []).map(r => ({ ts: r.ts, type: "recent" })),
    ...(todayCount.upcomingResets || []).map(r => ({ ts: r.ts, type: "upcoming" })),
  ].filter(e => e.ts >= windowStart && e.ts <= windowEnd)
   .sort((a, b) => a.ts - b.ts);

  // Pinch-to-zoom support
  const touchStartDist = useRef(null);
  const handleTouchStart = (e) => {
    if (e.touches.length === 2) {
      touchStartDist.current = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );
    }
  };
  const handleTouchMove = (e) => {
    if (e.touches.length === 2 && touchStartDist.current) {
      const dist = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );
      const ratio = touchStartDist.current / dist;
      const nextZoom = Math.max(1, Math.min(24, zoomHours * ratio));
      setZoomHours(nextZoom);
      touchStartDist.current = dist;
    }
  };

  // Smart Collision Avoidance (Staggered Height)
  const labelSlots = events.map(e => ({ ...e, pos: getPos(e.ts) }));
  labelSlots.forEach((e, i) => {
    const isNearNow = Math.abs(e.pos - 50) < 12;
    const prev = labelSlots[i-1];

    // Base offsets: Stagger top/bottom unless near NOW (where we only stack bottom)
    let v = isNearNow ? 20 : (i % 2 === 0 ? -18 : 18);

    if (prev && Math.abs(e.pos - prev.pos) < 15) {
      // Collision detected with previous label
      if (isNearNow) {
        // Near center 'NOW' marker: Stack deeply downwards
        // Hierarchical offsets: 20, 38, 56...
        let collisionCount = 0;
        for (let j = i - 1; j >= 0; j--) {
          if (Math.abs(e.pos - labelSlots[j].pos) < 15 && Math.abs(labelSlots[j].pos - 50) < 12) collisionCount++;
          else break;
        }
        v = 20 + (collisionCount * 20);
      } else {
        // Outside center: Try to flip or push further
        if (Math.sign(v) === Math.sign(prev.vOffset)) {
          v = prev.vOffset + (20 * Math.sign(v));
        }
      }
    }
    e.vOffset = v;
  });

  const zoomH = Math.round(zoomHours);

  return (
    <div style={{ marginTop: 24, marginBottom: 24 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10, fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.dim, fontWeight: 800, letterSpacing: "0.05em" }}>
        <span>-{zoomH/2}H</span>
        <span style={{ color: T.brand, opacity: 0.8 }}>NOW</span>
        <span>+{zoomH/2}H</span>
      </div>

      <div
        style={{ position: "relative", height: 60, display: "flex", alignItems: "center", touchAction: "none" }}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
      >
        {/* Track */}
        <div style={{ position: "absolute", left: 0, right: 0, height: 2, background: T.border, borderRadius: 1 }} />
        <div style={{ position: "absolute", left: 0, width: "50%", height: 2, background: `linear-gradient(to right, transparent, ${T.brand}40)`, borderRadius: 1 }} />

        {/* Graduation Markers */}
        {Array.from({ length: zoomH + 1 }).map((_, h) => (
          <div key={h} style={{
            position: "absolute", left: `${(h / zoomH) * 100}%`, top: "50%",
            width: 1, height: h % (zoomH > 12 ? 4 : 2) === 0 ? 8 : 4, background: T.border,
            transform: "translateY(-50%)", opacity: 0.5
          }} />
        ))}

        {/* Events */}
        {labelSlots.map((e, i) => {
          const color = e.type === "recent" ? T.brand : T.amber;
          const labelDir = e.vOffset > 0 ? "top" : "bottom";

          return (
            <div key={i} style={{
              position: "absolute", left: `${e.pos}%`, top: "50%",
              transform: "translate(-50%, -50%)",
              display: "flex", flexDirection: "column", alignItems: "center",
              zIndex: 2, transition: "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)"
            }}>
              <div style={{
                width: 6, height: 6, borderRadius: "50%", background: color,
                boxShadow: `0 0 10px ${color}80`, border: `1.5px solid ${T.bg}`
              }} />
              <div style={{
                position: "absolute", [labelDir]: Math.abs(e.vOffset),
                whiteSpace: "nowrap",
                fontFamily: "'JetBrains Mono',monospace", fontSize: 7, color: color, fontWeight: 800,
                opacity: 0.95, letterSpacing: "0.02em",
                background: T.bg, padding: "2px 4px", borderRadius: 3,
                boxShadow: `0 0 6px ${T.bg}`, border: `1px solid ${color}30`
              }}>
                {fmtTime(e.ts)}
              </div>
            </div>
          );
        })}

        {/* Current Time Marker */}
        <div style={{
          position: "absolute", left: "50%", top: "50%",
          transform: "translate(-50%, -50%)", zIndex: 10,
          display: "flex", flexDirection: "column", alignItems: "center"
        }}>
          <div style={{
            width: 12, height: 12, borderRadius: "50%", background: T.brand,
            boxShadow: `0 0 20px ${T.brand}`, animation: "dot 1.5s infinite",
            border: `2px solid ${T.bg}`, cursor: "help"
          }} title="Current Time" />
          <div style={{
            position: "absolute", bottom: 18, whiteSpace: "nowrap",
            fontFamily: "'JetBrains Mono',monospace", fontSize: 10, color: T.brand, fontWeight: 900,
            background: T.bg, padding: "2px 6px", borderRadius: 4, border: `1px solid ${T.brand}`,
            boxShadow: `0 0 10px ${T.brand}30`
          }}>
            {fmtTime(now)}
          </div>
        </div>
      </div>

      <div style={{ marginTop: 24, display: "flex", alignItems: "center", gap: 20 }}>
        <div style={{ flex: 1, display: "flex", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: T.brand }} />
            <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.dim, fontWeight: 700 }}>RECOVERED</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: T.amber }} />
            <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.dim, fontWeight: 700 }}>UPCOMING</span>
          </div>
        </div>

        {/* Zoom Control */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, background: T.surfaceHi, padding: "4px 8px", borderRadius: 20, border: `1px solid ${T.border}` }}>
          <button onClick={() => setZoomHours(h => Math.min(24, h + 2))} title="Zoom out" style={{ background: "none", border: "none", color: T.muted, cursor: "pointer", display: "flex" }}>
             <Ic n="plus" s={10} c={T.muted} style={{ transform: "rotate(45deg)" }} />
          </button>
          <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.brand, fontWeight: 800, minWidth: 24, textAlign: "center" }}>
            {Math.round(zoomHours)}H
          </span>
          <button onClick={() => setZoomHours(h => Math.max(1, h - 2))} title="Zoom in" style={{ background: "none", border: "none", color: T.muted, cursor: "pointer", display: "flex" }}>
             <Ic n="plus" s={10} c={T.muted} />
          </button>
        </div>
      </div>
      {todayCount.upcomingResets?.length > 0 && (
        <div style={{ marginTop: 16, textAlign: "center", fontFamily: "'JetBrains Mono',monospace", fontSize: 8, color: T.amber, fontWeight: 700, letterSpacing: "0.03em", opacity: 0.8 }}>
          NEXT RECOVERY IN {fmtDuration(todayCount.upcomingResets[0].ts - now).toUpperCase()}
        </div>
      )}
    </div>
  );
};

      {isAdding && (
        <Modal
          title="ADD CUSTOM PERSONA"

            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};


// ─── Session List ─────────────────────────────────────────────────────────────
const FILTERS = ["ALL","QUEUED","PLANNING","AWAITING_PLAN_APPROVAL","IN_PROGRESS","COMPLETED","FAILED","HAS_DRAFT"];
const FILTER_LABELS = { AWAITING_PLAN_APPROVAL:"APPROVE", ALL:"ALL", HAS_DRAFT:"HAS DRAFT" };

const SessionList = ({ sessions, onSelect, onRefresh, refreshing, justRefreshed, selectedId, isDesktop, onNew, onDrafts, onSettings, pollInterval, sessionLimit, countdown, plan, todayCount, searchQuery, setSearchQuery, archivedIds, showArchived, setShowArchived, activitiesMap = {}, activityStatsMap = {}, error, clearError, isBoosted, readMap, draftsMap = {} }) => {
  const [filter,setFilter] = useState("ALL");
  const [scrolled, handleScroll] = useScrollThreshold();
  const [searchOpen, setSearchOpen] = useState(false);
  const baseFiltered = useMemo(() => {
    let list = sessions.filter(s => archivedIds.has(s.id) === showArchived);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s => (s.title||"").toLowerCase().includes(q) || (s.prompt||"").toLowerCase().includes(q) || (s.id||"").toLowerCase().includes(q));
    }
    return list;
  }, [sessions, archivedIds, showArchived, searchQuery]);
  const filtered = useMemo(() => {
    if (filter === "ALL") return baseFiltered;
    if (filter === "HAS_DRAFT") return baseFiltered.filter(s => draftsMap[s.id]);
    return baseFiltered.filter(s => s.state === filter);
  }, [filter, baseFiltered, draftsMap]);
  const active = useMemo(() => sessions.filter(s=>ACTIVE_STATES.has(s.state)).length, [sessions]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      <div style={{padding:scrolled?"8px 16px 8px":"12px 16px 0",background:T.surface,borderBottom:`1px solid ${T.border}33`,flexShrink:0,transition:"padding .2s cubic-bezier(0.4, 0, 0.2, 1), background .2s cubic-bezier(0.4, 0, 0.2, 1)",zIndex: 5, contain: "layout"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:scrolled?0:10}}>
          <div style={{width:scrolled?20:32,height:scrolled?20:32,borderRadius:6,background:T.brand,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:scrolled?11:18,fontWeight:900,color:"#000",boxShadow:scrolled?"none":`0 0 12px ${T.brandDark}40`,flexShrink:0,transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)"}}>J</div>
          <div style={{minWidth:0, transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:scrolled?12:14,fontWeight:700,color:T.text}}>JULES</div>
            {!scrolled && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:active>0?T.amber:T.muted}}>{active>0?`⚡ ${active} ACTIVE`:"AGENT CLIENT"}</div>}
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
            <button onClick={() => setSearchOpen(!searchOpen)} title="Search sessions" style={{width:30,height:30,borderRadius:5,background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic n="search" s={15} c={searchOpen||searchQuery?T.blue:T.muted}/></button>
            {isDesktop&&<button onClick={onNew} title="New Session" style={{width:30,height:30,borderRadius:5,background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic n="plus" s={15} c={T.brand}/></button>}
            <button onClick={onDrafts} title="Drafts Box" style={{width:30,height:30,borderRadius:5,background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic n="layers" s={15} c={T.muted}/></button>
            <button onClick={onSettings} title="Settings" style={{width:30,height:30,borderRadius:5,background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic n="settings" s={15} c={T.muted}/></button>
            <div style={{display:"flex", alignItems:"center", gap:4}}>
              {countdown > 0 && !refreshing && (
                <div style={{
                  fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:900,
                  color:isBoosted?T.amber:T.brand, opacity:0.6, animation:"fadeIn .3s ease",
                  display:"flex", alignItems:"center", gap:3, marginRight:2

                  {isBoosted && <span style={{width:3, height:3, borderRadius:"50%", background:T.amber, animation:"dot 1s infinite"}}/>}

              <button

                  background:refreshing?T.brandDim:"transparent",
                  position:"relative",

                }}
                onMouseDown={e => e.currentTarget.style.transform = "scale(0.9)"}
                onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
              >
                {countdown > 0 && !refreshing && (
                  <svg style={{ position: "absolute", inset: 0, transform: "rotate(-90deg)", width: "100%", height: "100%", pointerEvents: "none" }}>
                    <circle
                      cx="50%" cy="50%" r="42%"
                      fill="none" stroke={T.brand} strokeWidth="2"
                      strokeDasharray="100%"
                      strokeDashoffset={`${100 - (countdown / (pollInterval / 1000 || 1)) * 100}%`}

                <div style={{ display: "flex", animation: refreshing ? "spin 1s linear infinite" : "none" }}>

              </button>
            </div>

        </div>
        {error && (
          <div style={{
            background:T.redDim, border:`1px solid ${T.red}40`, borderRadius:6,

        {(searchOpen || searchQuery) && (
          <div style={{height:scrolled?0:42, overflow:"hidden", opacity:scrolled?0:1, transition:"all .25s cubic-bezier(0.4, 0, 0.2, 1)", marginBottom:scrolled?0:8, padding:scrolled?0:"4px 2px", pointerEvents:scrolled?"none":"auto"}}>
            <div style={{position:"relative", display:"flex", alignItems:"center"}}>
              <div style={{position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", pointerEvents:"none"}}><Ic n="search" s={14} c={T.blue}/></div>
              <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search by title, prompt or ID..." style={{...inputSt, paddingLeft:34, paddingRight:34, borderColor:T.blue+"40", background:T.surfaceHi}} autoFocus />
              {searchQuery && <button onClick={() => setSearchQuery("")} style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", padding:4}}><Ic n="x" s={14} c={T.muted}/></button>}
            </div>
          </div>
        )}
        {isDesktop && (
          <div style={{display:"flex", gap:4, alignItems:"center", height:scrolled?0:22, overflow:"hidden", opacity:scrolled?0:1, marginBottom:scrolled?0:8, padding:scrolled?0:"4px 2px", transition:"all .25s cubic-bezier(0.4, 0, 0.2, 1)", pointerEvents:scrolled?"none":"auto"}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.textDim, letterSpacing:"0.08em", flexShrink:0, paddingRight:2}}>SESSIONS</span>
            <button onClick={() => setShowArchived(false)} style={{flexShrink:0, padding:"3px 9px", borderRadius:20, border:"none", background:!showArchived ? T.brandDim : "transparent", outline:`1px solid ${!showArchived ? T.brand+"60" : T.border}`, color:!showArchived ? T.brand : T.muted, fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:!showArchived?700:400, letterSpacing:"0.05em", cursor:"pointer", transition:"all .12s cubic-bezier(0.4, 0, 0.2, 1)"}}>ACTIVE</button>
            <button onClick={() => setShowArchived(true)} style={{flexShrink:0, padding:"3px 9px", borderRadius:20, border:"none", background:showArchived ? T.purpleDim : "transparent", outline:`1px solid ${showArchived ? T.purple+"60" : T.border}`, color:showArchived ? T.purple : T.muted, fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:showArchived?700:400, letterSpacing:"0.05em", cursor:"pointer", transition:"all .12s cubic-bezier(0.4, 0, 0.2, 1)"}}>ARCHIVED</button>
          </div>
        )}
        <div style={{position: "relative", maxHeight:scrolled?0:60, opacity:scrolled?0:1, transition:"all .25s cubic-bezier(0.4, 0, 0.2, 1)", pointerEvents:scrolled?"none":"auto"}}>
          {!scrolled && <div style={{position:"absolute", right:0, top:0, bottom:10, width:40, background:`linear-gradient(to left, ${T.bg}, transparent)`, pointerEvents:"none", zIndex:2}}/>}
          <div style={{overflowX:"auto", padding:scrolled?0:"4px 2px 10px", scrollbarWidth:"none", WebkitOverflowScrolling:"touch"}}>
            <div style={{display:"flex",gap:5,minWidth:"max-content",padding:"4px 0", alignItems:"center"}}>
              <div
                title={`QUOTA USAGE\nStarted: ${todayCount.total} of ${plan?.daily || 15}\nPRs Created: ${todayCount.done}\nIn Progress: ${todayCount.total - todayCount.done}\nNext Recovery: ${todayCount.nextResetTs ? fmtTime(todayCount.nextResetTs) : "N/A"} (${todayCount.resetIn})`}
                style={{
                  display:"flex", alignItems:"center", gap:9, padding:"6px 14px", borderRadius:22,
                  background:`linear-gradient(135deg, ${T.surfaceHi}, ${T.bg})`,
                  border:`1px solid ${T.borderHi}`, marginRight:10, flexShrink:0, cursor:"help",
                  boxShadow:`0 4px 12px rgba(0,0,0,0.3), inset 0 0 10px ${T.brand}05`,
                  transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)", position:"relative", overflow:"hidden"
                }}
                onMouseEnter={e => {
                  e.currentTarget.style.transform = "translateY(-1px)";
                  e.currentTarget.style.borderColor = T.brandDark;
                  e.currentTarget.style.boxShadow = `0 6px 16px rgba(0,0,0,0.4), inset 0 0 15px ${T.brand}10`;
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.transform = "none";
                  e.currentTarget.style.borderColor = T.borderHi;
                  e.currentTarget.style.boxShadow = `0 4px 12px rgba(0,0,0,0.3), inset 0 0 10px ${T.brand}05`;
                }}
              >
                {/* Visual indicator bar */}
                <div style={{
                  position:"absolute", bottom:0, left:0, height:2,
                  width:`${Math.min(100, (todayCount.total / (plan?.daily || 15)) * 100)}%`,
                  background:todayCount.total >= (plan?.daily||15) ? T.red : todayCount.total / (plan?.daily||15) > 0.8 ? T.amber : T.brand,
                  opacity:0.6, transition:"width .5s cubic-bezier(0.4, 0, 0.2, 1)"
                }}/>

                <div style={{
                  width:7, height:7, borderRadius:"50%",
                  background:todayCount.total >= (plan?.daily||15) ? T.red : todayCount.total / (plan?.daily||15) > 0.8 ? T.amber : T.brandLight,
                  boxShadow:`0 0 10px ${todayCount.total / (plan?.daily||15) > 0.8 ? T.amber : T.brandLight}80`,
                  animation: todayCount.total >= (plan?.daily||15) ? "dot 1s infinite" : "none"
                }}/>

                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 1 }}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:13, fontWeight:800, color:T.text, letterSpacing:"-0.03em"}}>
                      {todayCount.total}
                    </span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, color:T.dim, fontWeight:500}}>/</span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.dim, fontWeight:700}}>
                      {plan?.daily || 15}
                    </span>
                  </div>

                  <div style={{ width: 1, height: 12, background: T.border, margin: "0 4px" }} />

                  <div style={{ display: "flex", alignItems: "center", gap: 3, background:T.brandDim, padding:"2px 6px", borderRadius:4, border:`1px solid ${T.brand}20` }}>
                    <Ic n="git_pull" s={11} c={T.brandLight}/>
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:900, color:T.brandLight}}>
                      {todayCount.done}
                    </span>
                  </div>
                </div>
              </div>
              {FILTERS.map(f => {
                const cnt = f==="ALL" ? sessions.length : (f === "HAS_DRAFT" ? sessions.filter(s => draftsMap[s.id]).length : sessions.filter(s=>s.state===f).length);
                if (cnt===0 && f!=="ALL") return null;
                const isAct = f===filter;
                const ac = STATUS_META[f]?.color || T.brand;
                return (
                  <button key={f} onClick={()=>setFilter(f)} style={{flexShrink:0,padding:"4px 10px",borderRadius:20,border:"none",background:isAct?`${ac}20`:"transparent",outline:`1px solid ${isAct?`${ac}80`:T.border}`,color:isAct?ac:T.muted,fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:"0.06em",cursor:"pointer",transition:"background .12s cubic-bezier(0.4, 0, 0.2, 1), color .12s cubic-bezier(0.4, 0, 0.2, 1)"}}>{FILTER_LABELS[f]||f} {cnt>0?cnt:""}</button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      <div onScroll={handleScroll} style={{flex:1,overflowY:"auto",padding:"10px 12px",WebkitOverflowScrolling:"touch",minHeight:200}}>
        {refreshing&&sessions.length===0&&<div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.textDim}}>Loading sessions…</div>}
        {!refreshing&&filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.textDim}}>{filter==="ALL"?"No sessions yet":"No sessions with this status"}</div>}
        {filtered.map((s,i)=><SessionCard key={s.id||s.name} index={i+1} s={s} onPress={()=>onSelect(s)} isSelected={s.id===selectedId} activities={activitiesMap[s.id] || []} stats={activityStatsMap[s.id]} lastReadTs={readMap[s.id]} allSessions={sessions} hasFollowupDraft={!!draftsMap[s.id]}/>)}
      </div>
    </div>
  );
};

// ─── Main App ─────────────────────────────────────────────────────────────────
function JulesClient() {
  const [apiKey,setApiKey]     = useState(() => { try { return localStorage.getItem("jac_key")||""; } catch (e) { return ""; } });
  const [sessions,setSessions] = useState([]);
  const lastStates = useRef(new Map()); // id -> state
  const [activitiesMap, setActivitiesMap] = useState(() => {
    try { return JSON.parse(localStorage.getItem(ACT_MAP_KEY)) || {}; } catch { return {}; }
  });
  const [activityStatsMap, setActivityStatsMap] = useState(() => {
    try { return JSON.parse(localStorage.getItem(ACT_STATS_KEY)) || {}; } catch { return {}; }
  });
  const [selected,setSelected] = useState(null);
  const [mobileScreen,setMobileRaw] = useState("list");
  const [lastSessionScreen, setLastSessionScreen] = useState("list");
  const [justRefreshed, setJustRefreshed] = useState(false);
  const [supplementalSessions, setSupplementalSessions] = useState([]);
  const allSessions = useMemo(() => {
    const map = new Map();
    [...sessions, ...supplementalSessions].forEach(s => map.set(s.id, s));
    return Array.from(map.values()).sort((a, b) => {
      const aTime = new Date(a.updateTime || a.createTime).getTime();
      const bTime = new Date(b.updateTime || b.createTime).getTime();
      return bTime - aTime;
    });
  }, [sessions, supplementalSessions]);
  const [desktopView,setDesktop]   = useState("empty");
  const [selectedDraft, setSelectedDraft] = useState(null);

  const [draftsMap, setDraftsMap] = useState(() => {
    const map = {};
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("jac_draft_") && !key.startsWith("jac_drafts_box")) {
          const val = localStorage.getItem(key);
          if (val && val.trim()) {
            const id = key.slice("jac_draft_".length);
            map[id] = true;
          }
        }
      }
    } catch (e) {
      console.error("Error scanning follow-up drafts", e);
    }
    return map;
  });

  const handleDraftChange = useCallback((id, hasDraft) => {
    setDraftsMap(prev => {
      if (prev[id] === hasDraft) return prev;
      return { ...prev, [id]: hasDraft };
    });
  }, []);

  const setMobile = useCallback(s => {
    setMobileRaw(s);
    if (s === "list" || s === "detail") setLastSessionScreen(s);
  }, []);
  const [refreshing,setRefreshing] = useState(false);
  const [netSnap,setNetSnap]       = useState(NET.snapshot());
  const [pollInterval,setPollIntervalRaw] = useState(loadPollMs);
  const [actPollInterval,setActPollIntervalRaw] = useState(loadActPollMs);
  const [activePollInterval,setActivePollIntervalRaw] = useState(loadActivePollMs);
  const [sessionLimit,setSessionLimitRaw] = useState(loadLimit);
  const [activityLimit, setActivityLimitRaw] = useState(loadActivityLimit);
  const [cacheLimit, setCacheLimitRaw] = useState(loadCacheLimit);
  const [notifications, setNotificationsRaw] = useState(loadNotify);

  const [sessionRegistry, setSessionRegistry] = useState(() => {
    try {
      const reg = JSON.parse(localStorage.getItem("jac_session_registry") || "{}");
      // Prune old entries on load (older than 48h)
      const now = Date.now();
      const cutoff = now - 48 * 3600000;
      let changed = false;
      const pruned = {};
      Object.entries(reg).forEach(([id, time]) => {
        if (new Date(time).getTime() > cutoff) pruned[id] = time;
        else changed = true;
      });
      return pruned;
    } catch { return {}; }
  });

  const [planId,setPlanIdRaw]      = useState(loadPlan);
  const [customDaily,setCustomDailyRaw] = useState(loadCustomDaily);
  const todayCount = useMemo(() => {
    // Rolling 24h Window Logic using SessionRegistry for accuracy
    const now = Date.now();
    const windowStart = now - 24 * 3600000;

    const allKnown = Object.entries(sessionRegistry).map(([id, time]) => ({
      id, ts: new Date(time).getTime()
    })).filter(s => s.ts >= windowStart);

    allKnown.sort((a, b) => a.ts - b.ts);

    let resetIn = "24h 0m";
    let nextResetTs = null;
    const upcomingResets = [];
    const recentResets = [];

    if (allKnown.length > 0) {
      nextResetTs = allKnown[0].ts + 24 * 3600000;
      const msLeft = nextResetTs - now;
      const h = Math.floor(msLeft / 3600000);
      const m = Math.floor((msLeft % 3600000) / 60000);
      resetIn = `${h}h ${m}m`;

      allKnown.slice(0, 4).forEach(s => {
        const rTs = s.ts + 24 * 3600000;
        const diff = rTs - now;
        upcomingResets.push({
          ts: rTs,
          in: `${Math.floor(diff / 3600000)}h ${Math.floor((diff % 3600000) / 60000)}m`
        });
      });
    }

    // ── Find the last 2 resets that happened ───────────────────────────
    const windowEnd = now - 24 * 3600000;
    const recentlyDone = Object.entries(sessionRegistry)
      .map(([id, time]) => ({ id, ts: new Date(time).getTime() }))
      .filter(s => s.ts < windowEnd)
      .sort((a, b) => b.ts - a.ts); // sort descending (newest reset first)

    recentlyDone.slice(0, 2).forEach(s => {
      const resetTs = s.ts + 24 * 3600000;
      recentResets.push({ ts: resetTs, ago: fmtAgo(resetTs) });
    });

    const windowIds = new Set(allKnown.map(s => s.id));
    const prCreated = sessions.filter(s => windowIds.has(s.id) && !!getPR(s)).length;

    // Sort upcoming by ts
    upcomingResets.sort((a, b) => a.ts - b.ts);

    return { total: allKnown.length, done: prCreated, resetIn, nextResetTs, upcomingResets, recentResets };
  }, [sessions, sessionRegistry]);
  const lastFetchTime = useRef(null);

  const [archivedIds, setArchivedIds] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("jac_archived") || "[]")); }
    catch { return new Set(); }
  });
  const [showArchived, setShowArchived] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [globalErr, setGlobalErr] = useState(null);
  const [personas, setPersonas] = useState(loadPersonas);
  const [readMap, setReadMap] = useState(() => {
    try { return JSON.parse(localStorage.getItem("jac_read_map") || "{}"); }
    catch { return {}; }
  });

  const isDesktop = useIsDesktop();

  const setPlanId = useCallback(id => { savePlan(id); setPlanIdRaw(id); }, []);
  const setCustomDaily = useCallback(v => { saveCustomDaily(v); setCustomDailyRaw(v); }, []);
  const plan = useMemo(() => {
    const p = PLANS.find(p=>p.id===planId)||PLANS[0];
    if (p.id === "custom") return { ...p, daily: customDaily };
    return p;
  }, [planId, customDaily]);

  useEffect(() => NET.subscribe(s=>setNetSnap(s)), []);

  useEffect(() => {
    const handleStorage = (e) => {
      if (e.key === "jac_key") setApiKey(e.newValue || "");
      if (e.key === "jac_archived") {
        try { setArchivedIds(new Set(JSON.parse(e.newValue || "[]"))); } catch {}
      }
      if (e.key === ACT_STATS_KEY) {
        try { setActivityStatsMap(JSON.parse(e.newValue || "{}")); } catch {}
      }
    };
    const handleCustomStats = (e) => {
      if (e.detail) setActivityStatsMap(e.detail);
    };
    window.addEventListener("storage", handleStorage);
    window.addEventListener("jac_stats_updated", handleCustomStats);
    return () => {
      window.removeEventListener("storage", handleStorage);
      window.removeEventListener("jac_stats_updated", handleCustomStats);
    };
  }, []);

  useEffect(() => {
    cleanupActivityStats(allSessions.map(s => s.id));
  }, [allSessions]);

  useEffect(() => {
    try { localStorage.setItem("jac_archived", JSON.stringify(Array.from(archivedIds))); }
    catch {}
  }, [archivedIds]);

  useEffect(() => {
    try { localStorage.setItem("jac_read_map", JSON.stringify(readMap)); }
    catch {}
  }, [readMap]);

  useEffect(() => {
    try { localStorage.setItem("jac_session_registry", JSON.stringify(sessionRegistry)); }
    catch {}
  }, [sessionRegistry]);

  const handleArchive = useCallback(id => {
    setArchivedIds(prev => {
      const next = new Set(prev);
      next.add(id);
      return next;
    });
  }, []);

  const handleUnarchive = useCallback(id => {
    setArchivedIds(prev => {
      const next = new Set(prev);
      next.delete(id);
      return next;
    });
  }, []);

  const setPollInterval = useCallback(ms => {
    savePollMs(ms);
    setPollIntervalRaw(ms);
  }, []);

  const setActPollInterval = useCallback(ms => {
    saveActPollMs(ms);
    setActPollIntervalRaw(ms);
  }, []);

  const setActivePollInterval = useCallback(ms => {
    saveActivePollMs(ms);
    setActivePollIntervalRaw(ms);
  }, []);

  const setSessionLimit = useCallback(v => {
    saveLimit(v);
    setSessionLimitRaw(v);
    lastFetchTime.current = null; // Force full fetch with new limit
  }, []);

  const setActivityLimit = useCallback(v => {
    saveActivityLimit(v);
    setActivityLimitRaw(v);
  }, []);

  const setCacheLimit = useCallback(v => {
    saveCacheLimit(v);
    setCacheLimitRaw(v);
  }, []);

  const setNotifications = useCallback(async v => {
    if (v) {
      const ok = await requestNotificationPermission();
      if (!ok) { alert("Please enable notifications in your browser settings."); return; }
    }
    saveNotify(v);
    setNotificationsRaw(v);
  }, []);

  const fetchSupplemental = useCallback(async (ids) => {
    if (!apiKey || ids.length === 0) return;
    try {
      const missing = ids.filter(id => !sessions.some(s => s.id === id) && !supplementalSessions.some(s => s.id === id));
      if (missing.length === 0) return;

      const results = await Promise.all(missing.map(id =>
        apiCall(apiKey, `/sessions/${id}`, { _label: `Supp ${id.slice(0,6)}` }).catch(() => null)
      ));
      const valid = results.filter(Boolean);
      if (valid.length > 0) setSupplementalSessions(prev => [...prev, ...valid]);
    } catch {}
  }, [apiKey, sessions, supplementalSessions]);

  useEffect(() => {
    if (archivedIds.size > 0) fetchSupplemental(Array.from(archivedIds));
  }, [archivedIds, fetchSupplemental]);

  const fetchSessions = useCallback(async (quiet=false, forceFull=false) => {
    if (!apiKey) return;
    const isFull = !lastFetchTime.current || forceFull;
    if (!quiet) setRefreshing(true);
    try {
      let incoming = [];
      let pageToken = null;
      let iterations = 0;
      const quotaNeeded = plan.daily || 50;

      do {
        const qs = `pageSize=${sessionLimit}${pageToken ? `&pageToken=${pageToken}` : ""}`;
        const d = await apiCall(apiKey, `/sessions?${qs}`, { _label:`Sessions ${isFull?"full":"Δ"} p${iterations+1}` });
        const batch = d.sessions || [];
        incoming = [...incoming, ...batch];
        pageToken = d.nextPageToken;
        iterations++;

        const windowStart = new Date(Date.now() - 24 * 3600000);
        const hasOlderThanWindow = batch.length > 0 && new Date(batch[batch.length-1].createTime) < windowStart;

        if (!isFull) break;
        if (hasOlderThanWindow) break;
        if (incoming.length >= Math.max(sessionLimit, quotaNeeded * 2)) break;
        if (iterations > 15) break;
      } while (pageToken);

      setGlobalErr(null); // Clear error on success

      if (incoming.length > 0) {
        setSessionRegistry(prev => {
          const next = { ...prev };
          let changed = false;
          incoming.forEach(s => {
            if (!next[s.id]) {
              next[s.id] = s.createTime;
              changed = true;
            }
          });
          return changed ? next : prev;
        });
      }

      setSessions(prev => {
        let merged = [];
        if (isFull) {
          merged = incoming;
        } else {
          const incomingIds = new Set(incoming.map(s => s.id));
          merged = [
            ...incoming,
            ...prev.filter(s => !incomingIds.has(s.id))
          ];
        }

        // Sort: Active first, then by latest update/create time
        const sorted = [...merged].sort((a, b) => {
          const aActive = ACTIVE_STATES.has(a.state);
          const bActive = ACTIVE_STATES.has(b.state);
          if (aActive && !bActive) return -1;
          if (!aActive && bActive) return 1;
          const aTime = new Date(a.updateTime || a.createTime).getTime();
          const bTime = new Date(b.updateTime || b.createTime).getTime();
          return bTime - aTime;
        });

        // ── Status Notifications ──
        if (loadNotify()) {
          incoming.forEach(s => {
            const lastState = lastStates.current.get(s.id);
            if (lastState && lastState !== s.state) {
              const label = s.title || s.prompt || s.id;
              if (s.state === "AWAITING_PLAN_APPROVAL") sendNotification("PLAN READY", `Session: ${label}`, s.id);
              else if (s.state === "AWAITING_USER_FEEDBACK") sendNotification("INPUT NEEDED", `Session: ${label}`, s.id);
              else if (s.state === "COMPLETED") sendNotification("SESSION DONE", `Session: ${label}`, s.id);
              else if (s.state === "FAILED") sendNotification("SESSION FAILED", `Session: ${label}`, s.id);
            }
            lastStates.current.set(s.id, s.state);
          });
        }

        return sorted;
      });

      // Update lastFetchTime with the latest timestamp from the incoming results
      if (incoming.length > 0) {
        const latestTs = incoming.reduce((max, s) => {
          const ts = s.updateTime || s.createTime;
          return ts > max ? ts : max;
        }, incoming[0].updateTime || incoming[0].createTime);
        lastFetchTime.current = latestTs;
      } else if (forceFull) {
        lastFetchTime.current = null;
      }

      if (!quiet) {
        setJustRefreshed(true);
        setTimeout(() => setJustRefreshed(false), 2000);
      }
    } catch (err) {
      console.error("[FetchSessions] Error:", err);
      if (!quiet) setGlobalErr(err.message);
    } finally { if (!quiet) setRefreshing(false); }
  }, [apiKey, sessionLimit, plan.daily]);

  useEffect(() => { if (apiKey) fetchSessions(); }, [apiKey, fetchSessions]);

  // Combined polling: use activePollInterval if any session is in progress, else pollInterval
  const isBoosted = useMemo(() => sessions.some(s => ACTIVE_STATES.has(s.state)) && activePollInterval > 0, [sessions, activePollInterval]);
  const effectivePollInterval = useMemo(() => {
    if (!apiKey) return 0;
    return isBoosted ? activePollInterval : pollInterval;
  }, [apiKey, isBoosted, activePollInterval, pollInterval]);

  const countdown = useAutoPoll(effectivePollInterval, useCallback(() => fetchSessions(true), [fetchSessions]));

  const handleSessionUpdate = useCallback(updated => {
    const lastState = lastStates.current.get(updated.id);
    if (loadNotify() && lastState && lastState !== updated.state) {
      const label = updated.title || updated.prompt || updated.id;
      if (updated.state === "AWAITING_PLAN_APPROVAL") sendNotification("PLAN READY", `Session: ${label}`, updated.id);
      else if (updated.state === "AWAITING_USER_FEEDBACK") sendNotification("INPUT NEEDED", `Session: ${label}`, updated.id);
      else if (updated.state === "COMPLETED") sendNotification("SESSION DONE", `Session: ${label}`, updated.id);
      else if (updated.state === "FAILED") sendNotification("SESSION FAILED", `Session: ${label}`, updated.id);
    }
    lastStates.current.set(updated.id, updated.state);
    setSessions(prev => prev.map(s=>s.id===updated.id?updated:s));
  }, []);

  const handleStatsUpdate = useCallback((id, stats) => {
    setActivityStatsMap(prev => ({ ...prev, [id]: stats }));
  }, []);

  const handleDelete = useCallback(id => {
    lastStates.current.delete(id);
    setSessions(prev => prev.filter(s=>s.id!==id));
    try { localStorage.removeItem(`jac_draft_${id}`); } catch {}
    setDraftsMap(prev => {
      if (!prev[id]) return prev;
      const next = { ...prev };
      delete next[id];
      return next;
    });
    setSelected(null);
    setDesktop("empty");
    setMobile("list");
  }, []);

  const handleSelect = useCallback(s => {
    setSelected(s);
    // If selected from supplemental, ensure it doesn't duplicate if primary list updates
    const ts = s.updateTime || s.createTime;
    setReadMap(prev => ({ ...prev, [s.id]: ts }));
    if (isDesktop) setDesktop("detail"); else setMobile("detail");
  }, [isDesktop]);

  const handleCreate = useCallback(s => {
    setSessionRegistry(prev => ({ ...prev, [s.id]: s.createTime }));
    lastStates.current.set(s.id, s.state);
    setSessions(prev => [s, ...prev]);
    setSelected(s);
    if (isDesktop) setDesktop("detail"); else setMobile("list");
  }, [isDesktop]);

  const saveKey = k => {
    try { localStorage.setItem("jac_key", k); } catch {}
    lastFetchTime.current = null;
    setApiKey(k);
  };

  if (!apiKey) {
    return (
      <Shell>
        <SetupScreen onSave={saveKey}/>
      </Shell>
    );
  }

  // ── Desktop layout: sidebar + main ──────────────────────────────────────────
  if (isDesktop) {
    return (
      <Shell desktop>
        {/* Sidebar */}
        <div style={{width:320,flexShrink:0,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
          <SessionList
            onSelect={handleSelect} onRefresh={()=>fetchSessions(false, true)}
            refreshing={refreshing} justRefreshed={justRefreshed} selectedId={selected?.id}
            isDesktop onNew={()=>setDesktop("new")}
            onDrafts={()=>setDesktop("drafts")}
            onSettings={()=>setDesktop("settings")}
            pollInterval={effectivePollInterval}
            sessionLimit={sessionLimit}
            countdown={countdown}
            plan={plan} todayCount={todayCount}
            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
            archivedIds={archivedIds} showArchived={showArchived} setShowArchived={setShowArchived}
            activitiesMap={{...activitiesMap}}
            activityStatsMap={activityStatsMap}
            sessions={allSessions}
            error={globalErr} clearError={() => setGlobalErr(null)}
            isBoosted={isBoosted}
            readMap={readMap}
            draftsMap={draftsMap}
          />
        </div>
        {/* Main panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",minWidth:0}}>
          {desktopView==="empty"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:32}}>
              <div style={{width:48,height:48,borderRadius:11,background:T.brandDim,border:`1px solid ${T.brand}25`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:900,color:T.brand}}>J</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.textDim,textAlign:"center",lineHeight:2}}>
                SELECT A SESSION ←{"\u00A0"}{"\u00A0"}OR{"\u00A0"}{"\u00A0"}NEW ↖
              </div>
            </div>
          )}
          {desktopView==="detail"&&selected&&(
            <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
              personas={personas}
              allSessions={allSessions}
              activitiesMap={activitiesMap}
              onBack={()=>setDesktop("empty")} onDelete={handleDelete}
              onSessionUpdate={handleSessionUpdate}
              onStatsUpdate={handleStatsUpdate}
              isDesktop
              pollInterval={actPollInterval} setPollInterval={setActPollInterval}
              cacheLimit={cacheLimit} activityLimit={activityLimit}
              isArchived={archivedIds.has(selected.id)}
              onArchive={handleArchive} onUnarchive={handleUnarchive}
              onDraftChange={handleDraftChange}/>
          )}
          {desktopView==="new"&&(
            <NewSession
              apiKey={apiKey} personas={personas}
              onBack={()=>setDesktop("empty")}
              onCreate={handleCreate}
              isDesktop plan={plan} todayCount={todayCount}
              allSessions={allSessions} activitiesMap={activitiesMap}
              initialDraft={selectedDraft}
              onDraftSaved={() => { setSelectedDraft(null); if (desktopView === "new") setDesktop("drafts"); }}
            />
          )}

          {desktopView==="drafts"&&(
            <DraftsBox
              onBack={()=>setDesktop("empty")}
              isDesktop
              allSessions={allSessions}
              activitiesMap={activitiesMap}
              draftsMap={draftsMap}
              onDraftChange={handleDraftChange}
              onSelectSession={handleSelect}
              onResume={(d) => { setSelectedDraft(d); setDesktop("new"); }}
              onCreate={async (d) => {
                setSelectedDraft(d);
                setDesktop("new");
                // The actual creation happens inside NewSession but we can also trigger a direct create here if we want.
                // Resuming into NewSession is safer to allow final tweaks.
              }}
            />
          )}

          {desktopView==="network"&&( <NetworkMonitor onBack={()=>setDesktop("empty")} isDesktop/> )} {desktopView==="settings"&&(
            <SettingsView onBack={()=>setDesktop("empty")} isDesktop
              pollInterval={pollInterval} setPollInterval={setPollInterval}
              actPollInterval={actPollInterval} setActPollInterval={setActPollInterval}
              activePollInterval={activePollInterval} setActivePollInterval={setActivePollInterval}
              sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
              activityLimit={activityLimit} setActivityLimit={setActivityLimit}
              cacheLimit={cacheLimit} setCacheLimit={setCacheLimit}
              personas={personas} setPersonas={setPersonas}
              planId={planId} setPlanId={setPlanId}
              customDaily={customDaily} setCustomDaily={setCustomDaily}
              plan={plan} todayCount={todayCount}
              notifications={notifications} setNotifications={setNotifications} />
          )}
        </div>
      </Shell>
    );
  }

  // ── Mobile layout: single panel + bottom nav ──────────────────────────────
  return (
    <Shell>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {mobileScreen==="list"&&(
          <SessionList sessions={allSessions} onSelect={handleSelect} onRefresh={()=>fetchSessions(false, true)}
            refreshing={refreshing} justRefreshed={justRefreshed} selectedId={selected?.id} isDesktop={false}
            onDrafts={()=>setMobile("drafts")}
            onSettings={()=>setMobile("settings")}
            pollInterval={effectivePollInterval}
            sessionLimit={sessionLimit}
            countdown={countdown}
            plan={plan} todayCount={todayCount}
            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
            archivedIds={archivedIds} showArchived={showArchived} setShowArchived={setShowArchived}
            activitiesMap={activitiesMap}
            activityStatsMap={activityStatsMap}
            error={globalErr} clearError={() => setGlobalErr(null)}

            isBoosted={isBoosted}
            readMap={readMap}
            draftsMap={draftsMap} />
        )}
        {mobileScreen==="detail"&&selected&&(
          <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
            personas={personas}
            allSessions={allSessions}
            activitiesMap={activitiesMap}
            onBack={()=>{ setMobile("list"); fetchSessions(true); }}
            onDelete={handleDelete} onSessionUpdate={handleSessionUpdate}
            onStatsUpdate={handleStatsUpdate}
            isDesktop={false}
            pollInterval={actPollInterval} setPollInterval={setActPollInterval}
            cacheLimit={cacheLimit} activityLimit={activityLimit}
            isArchived={archivedIds.has(selected.id)}
            onArchive={handleArchive} onUnarchive={handleUnarchive}
            onDraftChange={handleDraftChange}/>
        )}
        {mobileScreen==="new"&&(
          <NewSession
            apiKey={apiKey} personas={personas}
            onBack={()=>setMobile("list")}
            onCreate={s=>{ setSessions(prev=>[s,...prev]); setMobile("list"); }}
            isDesktop={false} plan={plan} todayCount={todayCount}
            allSessions={allSessions} activitiesMap={activitiesMap}
            initialDraft={selectedDraft}
            onDraftSaved={() => { setSelectedDraft(null); if (mobileScreen === "new") setMobile("drafts"); }}
          />
        )}

        {mobileScreen==="drafts"&&(
          <DraftsBox
            onBack={()=>setMobile("list")}
            isDesktop={false}
            allSessions={allSessions}
            activitiesMap={activitiesMap}
            draftsMap={draftsMap}
            onDraftChange={handleDraftChange}
            onSelectSession={handleSelect}
            onResume={(d) => { setSelectedDraft(d); setMobile("new"); }}
            onCreate={async (d) => {
              setSelectedDraft(d);
              setMobile("new");
            }}
          />
        )}

        {mobileScreen==="network"&&( <NetworkMonitor onBack={()=>setMobile("list")} isDesktop={false}/> )} {mobileScreen==="settings"&&(
          <SettingsView onBack={()=>setMobile("list")} isDesktop={false}
            pollInterval={pollInterval} setPollInterval={setPollInterval}
            actPollInterval={actPollInterval} setActPollInterval={setActPollInterval}
            activePollInterval={activePollInterval} setActivePollInterval={setActivePollInterval}
            sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
            activityLimit={activityLimit} setActivityLimit={setActivityLimit}
            cacheLimit={cacheLimit} setCacheLimit={setCacheLimit}
            personas={personas} setPersonas={setPersonas}
            planId={planId} setPlanId={setPlanId}
            customDaily={customDaily} setCustomDaily={setCustomDaily}
            plan={plan} todayCount={todayCount}
            notifications={notifications} setNotifications={setNotifications} />
        )}
      </div>
      <nav style={{display:"flex",borderTop:`1px solid ${T.border}`,background:T.surface,transform:"translateZ(0)",flexShrink:0}}>
        {[
          {id:"list",    n:"tasks", label:"SESSIONS", onClick:() => {
            const wasDetail = lastSessionScreen === "detail" && selected && !archivedIds.has(selected.id);
            setShowArchived(false);
            setMobile(wasDetail ? "detail" : "list");
          }},
          {id:"archive", n:"archive", label:"ARCHIVE", onClick:() => {
            const wasDetail = lastSessionScreen === "detail" && selected && archivedIds.has(selected.id);
            setShowArchived(true);
            setMobile(wasDetail ? "detail" : "list");
          }},
          {id:"new",     n:"plus",  label:"NEW", onClick:() => { setSelectedDraft(null); setMobile("new"); }},
          {id:"drafts",  n:"layers", label:"DRAFTS", onClick:() => setMobile("drafts")},
          {id:"settings",n:"settings", label:"SETTINGS", onClick:() => setMobile("settings")},
        ].map(({id,n,label,onClick})=>{
          const isAct = (id === "list" && !showArchived && (mobileScreen === "list" || mobileScreen === "detail")) ||
                        (id === "archive" && showArchived && (mobileScreen === "list" || mobileScreen === "detail")) ||
                        (mobileScreen === id && id !== "list" && id !== "archive");

          const hasAlert = id==="list"&&sessions.some(s=>["AWAITING_PLAN_APPROVAL","AWAITING_USER_FEEDBACK"].includes(s.state));
          return (
            <button key={id} onClick={onClick} style={{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{position:"relative"}}>
                <Ic n={n} s={22} c={isAct?T.brand:T.muted}/>
                {hasAlert&&<div style={{position:"absolute",top:-2,right:-4,width:7,height:7,borderRadius:"50%",background:T.purple,border:`1.5px solid ${T.surface}`,animation:"dot 1.5s ease-in-out infinite"}}/>}
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:isAct?T.brand:T.muted,fontWeight:isAct?700:400,letterSpacing:"0.07em"}}>{label}</span>
            </button>
          );
        })}
      </nav>
    </Shell>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { console.error("Uncaught component error:", error, errorInfo); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ height: "100vh", background: "#07090c", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
          <div style={{ width: 60, height: 60, background: T.redDim, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
            <Ic n="x" s={30} c={T.red} />
          </div>
          <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 18, fontWeight: 900, color: "#fff", marginBottom: 10 }}>APPLICATION CRASHED</div>
          <div style={{ fontFamily: "'IBM Plex Sans',sans-serif", fontSize: 14, color: T.textDim, marginBottom: 30, maxWidth: 400 }}>
            An unexpected error occurred in the UI. You can try to reload or perform a hard reset if the issue persists.
          </div>
          <div style={{ background: "#040507", border: `1px solid ${T.border}`, borderRadius: 8, padding: 12, marginBottom: 30, width: "100%", maxWidth: 500, overflow: "auto", maxHeight: 200 }}>
            <pre style={{ margin: 0, fontFamily: "'JetBrains Mono',monospace", fontSize: 12, color: T.red, textAlign: "left" }}>
              {this.state.error?.toString()}
            </pre>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <Btn onClick={() => location.reload()} sm>RELOAD APP</Btn>
            <Btn onClick={() => handleEmergencyReset()} sm color={T.red} outline>HARD RESET</Btn>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// ─── Shell ────────────────────────────────────────────────────────────────────
function Shell({ children, desktop=false }) {
  // Dismiss the pre-React splash screen on first paint
  useEffect(() => {
    const splash = document.getElementById("splash");
    if (!splash) return;
    // Fast-complete the progress bar then fade out
    const bar = document.getElementById("splash-bar");
    if (bar) { bar.style.animation = "none"; bar.style.width = "100%"; bar.style.transition = "width .18s ease"; }
    const hint = document.getElementById("splash-hint");
    if (hint) hint.textContent = "READY";
    const t = setTimeout(() => { splash.classList.add("hidden"); }, 180);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      width:"100%",background:T.bg,display:"flex",isolation:"isolate",
      fontFamily:"'IBM Plex Sans',sans-serif",overflow:"hidden",
      ...(desktop
        ? { minHeight:"100vh", flexDirection:"row" }
        : { width:"100%", height:"100dvh", flexDirection:"column" }
      ),
    }}>
      <style>{`
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        select,input,textarea{color-scheme:dark;}
        option{background:${T.surface};color:${T.text};}
        @keyframes dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
        @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes zoomIn{from{transform:scale(0.95);opacity:0;}to{transform:scale(1);opacity:1;}}
        @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
        @keyframes shimmerPulse {
          0% { opacity: 0.7; transform: translateY(4px); }
          50% { opacity: 1; transform: translateY(-2px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes barShimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
        @keyframes barIndeterminate {
          0% { left: -35%; }
          100% { left: 100%; }
        }
        @keyframes pulseRepo {
          0% { border-color: ${T.brand}40; box-shadow: 0 0 0 ${T.brand}00; }
          50% { border-color: ${T.brand}; box-shadow: 0 0 25px ${T.brand}80; transform: scale(1.02); }
          100% { border-color: ${T.brand}40; box-shadow: 0 0 0 ${T.brand}00; }
        }
        @media (prefers-reduced-motion: reduce) {
          *, ::before, ::after {
            animation-delay: -1ms !important;
            animation-duration: 1ms !important;
            animation-iteration-count: 1 !important;
            background-attachment: initial !important;
            scroll-behavior: auto !important;
            transition-duration: 0s !important;
            transition-delay: 0s !important;
          }
        }
        ::selection{background:${T.brandDim};color:${T.brand};}
        textarea::placeholder,input::placeholder{color:${T.muted};}
        @media screen and (min-width: 768px) and (max-width: 1366px) and (orientation: portrait) {
          body { display: flex; align-items: center; justify-content: center; text-align: center; }
          body > #root { display: none; }
          body::after {
            content: "PLEASE ROTATE YOUR TABLET TO LANDSCAPE MODE";
            font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: ${T.brand};
            padding: 40px; letter-spacing: 0.1em; line-height: 1.6;
          }
        }
        @media screen and (max-width: 767px) and (orientation: landscape) {
          body { display: flex; align-items: center; justify-content: center; text-align: center; }
          body > #root { display: none; }
          body::after {
            content: "PLEASE ROTATE YOUR PHONE TO PORTRAIT MODE";
            font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: ${T.brand};
            padding: 40px; letter-spacing: 0.1em; line-height: 1.6;
          }
        }
      `}</style>
      <PWABanner/>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <JulesClient/>
  </ErrorBoundary>
);
</script>
</body>
