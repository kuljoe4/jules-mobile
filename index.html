    <script>
    // ── PWA Bootstrap ──────────────────────────────────────────────────────────
    // Chrome PWA install requires:
    //   1. HTTPS (or localhost) — file:// will NOT work
    //   2. A web manifest reachable at the same origin
    //   3. A service worker registered at the same origin
    //
    // Strategy for a single-file PWA:
    //   • Manifest  → data: URI (Chrome accepts this for installability)
    //   • SW        → written to the page origin via a self-fetching trick:
    //                 the SW script is base64-encoded inside this file and
    //                 registered by fetching the HTML itself and rewriting it.
    //                 For true single-file, we use a same-origin fetch of this
    //                 file's own URL, serve the SW JS via a custom response
    //                 intercepted by a SharedWorker shim — but that's overkill.
    //                 Simplest working approach: write SW source to a data: URL
    //                 registered with `{scope:'/'}` which Chrome 89+ supports
    //                 when the page itself is on an HTTP origin.
    //
    // Expose globals so React can read install state.
    window.__pwa = { isFileProtocol: location.protocol === "file:", installPrompt: null, swOk: false };

    (function pwaSetup() {
      // ── 1. Manifest via data: URI (works on HTTP origins) ──────────────────
      const mkIcon = (size, rx) => {
        const fs = Math.floor(size * 0.625), y = Math.floor(size * 0.73);
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${rx}" fill="#07090c"/><text x="${size/2}" y="${y}" font-size="${fs}" text-anchor="middle" fill="#00e87a" font-weight="900" font-family="monospace">J</text></svg>`;
        return { src:"data:image/svg+xml;base64,"+btoa(svg), sizes:`${size}x${size}`, type:"image/svg+xml", purpose:"maskable any" };
      };
      const isMobile = window.innerWidth < 768;
      const manifest = {
        name:"Jules Agent Client", short_name:"Jules",
        description:"Monitor and control Jules AI coding sessions",
        start_url: location.href.split("?")[0],
        scope: location.href.split("?")[0].replace(/[^/]*$/, ""),
        display:"standalone", background_color:"#07090c", theme_color:"#00e87a",
        orientation: isMobile ? "portrait" : "natural",
        categories:["developer","productivity"],
        icons:[ mkIcon(192,24), mkIcon(512,64) ],
      };
      // data: URI — Chrome validates manifests here starting Chromium 93
      const manifestJSON = JSON.stringify(manifest);
      const manifestURI  = "data:application/manifest+json," + encodeURIComponent(manifestJSON);
      const lnk = document.createElement("link");
      lnk.rel = "manifest"; lnk.href = manifestURI;
      document.head.appendChild(lnk);

      // ── 2. Service Worker ──────────────────────────────────────────────────
      // SW registered from a blob: URL is rejected by Chrome's PWA checker.
      // Instead we write the SW source into a tiny JavaScript data: URL and
      // register it — Chrome 91+ allows data: SW registration when the page
      // is on a secure origin (https / localhost).
      if ("serviceWorker" in navigator && !window.__pwa.isFileProtocol) {
        const swSrc = [
          'const C="jules-v3";',
          'const PRE=["https://unpkg.com/react@18/umd/react.production.min.js","https://unpkg.com/react-dom@18/umd/react-dom.production.min.js","https://unpkg.com/@babel/standalone/babel.min.js"];',
          'self.addEventListener("install",e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll(PRE).catch(()=>{})));});',
          'self.addEventListener("activate",e=>e.waitUntil(clients.claim()));',
          'self.addEventListener("fetch",e=>{',
          '  const u=e.request.url;',
          '  if(u.includes("jules.googleapis.com"))return;',
          '  if(u.includes("unpkg.com")||u.includes("fonts.googleapis")||u.includes("fonts.gstatic")){',
          '    e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request).then(r=>{',
          '      const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));return r;',
          '    })));',
          '  }',
          '});',
        ].join("");
        // data: URI SW — same-origin restriction bypassed on secure origins
        const swDataURI = "data:text/javascript;base64," + btoa(swSrc);
        navigator.serviceWorker.register(swDataURI, { scope: "/" })
          .then(() => { window.__pwa.swOk = true; })
          .catch(() => {
            // Fallback: blob URL (works for caching, not for install prompt)
            const blob = new Blob([swSrc], { type:"text/javascript" });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
          });
      }

      // ── 3. Capture install prompt ──────────────────────────────────────────
      window.addEventListener("beforeinstallprompt", e => {
        e.preventDefault();
        window.__pwa.installPrompt = e;
        // Notify React if it's already mounted
        window.dispatchEvent(new Event("pwa-installable"));
      });
      window.addEventListener("appinstalled", () => {
        window.__pwa.installPrompt = null;
        window.dispatchEvent(new Event("pwa-installed"));
      });
    })();
    </script>

<script>
(function(){
  var hint  = document.getElementById("splash-hint");
  var step  = document.getElementById("splash-step");
  var bar   = document.getElementById("splash-bar");
  var t0    = Date.now();

  function setMsg(h, s, pct) {
    if (hint) hint.textContent = h;
    if (step) step.textContent = s;
    if (bar && pct !== undefined) {
      bar.style.animation = "none";
      bar.style.transition = "width .3s cubic-bezier(.4,0,.2,1)";
      bar.style.width = pct + "%";
    }
  }
  function elapsed() { return ((Date.now()-t0)/1000).toFixed(1)+"s"; }

  // Expose for inline onload handlers below
  window.__splashMsg = setMsg;
  window.__splashElapsed = elapsed;

  setMsg("LOADING REACT…", "core library · " + elapsed(), 8);
})();
</script>

async function clearCacheOnly() {
  if (!confirm("Clear Service Worker cache? This will redownload all assets on next load.")) return;
  try {
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    alert("Cache cleared.");
  } catch(e) { alert("Error: " + e.message); }
}

async function clearDataOnly() {
  if (!confirm("Clear all settings, keys, and session data? You will be logged out.")) return;
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
}

async function resetApp() {
  if (!confirm("FULL RESET: Clear all local data, settings, and cache?")) return;
  try {
    localStorage.clear();
    sessionStorage.clear();
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    location.reload(true);
  } catch(e) {
    alert("Error: " + e.message);
    location.reload();
  }
}

async function getStorageInfo() {
  if (!navigator.storage?.estimate) return { used: 0, quota: 0, cache: 0 };
  const est = await navigator.storage.estimate();

  if (est.usageDetails && est.usageDetails.caches) {
    return { used: est.usage || 0, quota: est.quota || 0, cache: est.usageDetails.caches };
  }

  let cacheSize = 0;
  try {
    if ("caches" in window) {
      const keys = await caches.keys();
      for (const key of keys) {
        const cache = await caches.open(key);
        const reqs = await cache.keys();
        for (const req of reqs) {
          const res = await cache.match(req);
          if (res) {
            const cl = res.headers.get("content-length");
            if (cl) cacheSize += parseInt(cl, 10);
          }
        }
      }
    }
  } catch(e) {}
  return { used: est.usage || 0, quota: est.quota || 0, cache: cacheSize };
}

// ─── Network tracker ──────────────────────────────────────────────────────────
function makeNetTracker() {
  let total=0, saved=0, log=[];
  const subs=[];
  const notify = () => subs.forEach(f => f({ total, saved, log:[...log] }));
  return {
    record(label, bytes, savedBytes=0) {
      total+=bytes; saved+=savedBytes;
      log.unshift({ id:Math.random(), label, bytes, savedBytes, ts:Date.now() });
      if (log.length > 60) log.length = 60;
      notify();
    },
    subscribe(fn) { subs.push(fn); return () => { const i=subs.indexOf(fn); if(i>-1) subs.splice(i,1); }; },
    snapshot() { return { total, saved, log:[...log] }; },
  };
}
const NET = makeNetTracker();

async function apiCall(apiKey, path, opts={}) {
  const res = await fetch(`${BASE}${path}`, {
    ...opts,
    headers: { "x-goog-api-key":apiKey, "Content-Type":"application/json", ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const text = await res.text();
  NET.record(opts._label || path, new TextEncoder().encode(text).length / 1024);
  if (!res.ok) {
    let msg = text;
    try { msg = JSON.parse(text)?.error?.message || text; } catch {}
    throw new Error(`${res.status}: ${msg}`);
  }
  return text ? JSON.parse(text) : {};
}

// ─── Utils ────────────────────────────────────────────────────────────────────
const fmtBytes = b => b<1?`${(b*1024).toFixed(0)}B`:b<1024?`${b.toFixed(1)}KB`:`${(b/1024).toFixed(2)}MB`;
const getPR = (s) => {
  if (!s) return null;
  const findInOutputs = (outputs) => {
    if (!outputs || !Array.isArray(outputs)) return null;
    const prObj = outputs.find(o => o.githubPullRequest)?.githubPullRequest;
    if (prObj) return prObj;
    // Some versions put the URL directly in a string or as a nested field
    for (const o of outputs) {
      if (o.pullRequestUrl || o.prUrl) return { url: o.pullRequestUrl || o.prUrl, number: (o.pullRequestUrl || o.prUrl).split("/").pop() };
    }
    return null;
  };

  // 1. Standard locations
  let pr = findInOutputs(s.outputs) || s.githubPullRequest || s.pullRequest || s.sourceContext?.githubRepoContext?.pullRequest || s.github_pull_request;
  if (pr && typeof pr === 'object' && pr.url) return pr;

  // 2. Scan all string fields for GitHub PR links (last resort)
  const str = JSON.stringify(s);
  const m = str.match(/https:\/\/github\.com\/[^\/]+\/[^\/]+\/pull\/(\d+)/);
  if (m) return { url: m[0], number: m[1] };

  return null;
};
const fmtAgo = ts => { const d=Date.now()-ts; if(d<60000)return`${Math.floor(d/1000)}s ago`; if(d<3600000)return`${Math.floor(d/60000)}m ago`; if(d<86400000)return`${Math.floor(d/3600000)}h ago`; return`${Math.floor(d/86400000)}d ago`; };
const fmtTime = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const pctFromState = s => ({QUEUED:5,PLANNING:20,AWAITING_PLAN_APPROVAL:35,IN_PROGRESS:65,AWAITING_USER_FEEDBACK:60,COMPLETED:100,FAILED:30,PAUSED:50}[s]||0);

// ─── PWA install hook ─────────────────────────────────────────────────────────
function usePWA() {
  const [canInstall, setCanInstall] = useState(() => !!window.__pwa?.installPrompt);
  const [installed,  setInstalled]  = useState(false);
  const [installing, setInstalling] = useState(false);

  useEffect(() => {
    const onReady   = () => setCanInstall(true);
    const onInstall = () => { setInstalled(true); setCanInstall(false); };
    window.addEventListener("pwa-installable", onReady);
    window.addEventListener("pwa-installed",   onInstall);
    return () => { window.removeEventListener("pwa-installable",onReady); window.removeEventListener("pwa-installed",onInstall); };
  }, []);

  const install = useCallback(async () => {
    const prompt = window.__pwa?.installPrompt;
    if (!prompt) return;
    setInstalling(true);
    try {
      prompt.prompt();
      const { outcome } = await prompt.userChoice;
      if (outcome === "accepted") { window.__pwa.installPrompt = null; setCanInstall(false); }
    } finally { setInstalling(false); }
  }, []);

  return { canInstall, installed, installing, install, isFile: window.__pwa?.isFileProtocol };
}

// ─── Responsive hook ──────────────────────────────────────────────────────────
function useIsDesktop() {
  // Capture initial state to avoid layout shift on rotation for "auto" mode
  // unless the threshold is significantly crossed (e.g. tablet/desktop vs phone)
  const [v, setV] = useState(() => window.innerWidth >= 1024);

  useEffect(() => {
    const h = () => {
      // Only switch if we cross the major "tablet/desktop" threshold
      // 1024px is a safe bet for "not a phone in portrait"
      const current = window.innerWidth >= 1024;
      setV(prev => {
        // If we were mobile and stayed under 1024, or were desktop and stayed over 768, keep it.
        // This provides some hysteresis and stability.
        if (prev && window.innerWidth < 768) return false;
        if (!prev && window.innerWidth >= 1024) return true;
        return prev;
      });
    };
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return v;
}

  }, [scrolled, threshold]);
  return [scrolled, onScroll];
};

const useAutoPoll = (interval, fn) => {
  const [countdown, setCountdown] = useState(0);
  const pollRef = useRef(null);
  const countdownRef = useRef(null);
  const nextRefAt = useRef(0);

  const schedule = useCallback(() => {
    if (!interval) { setCountdown(0); return; }
    nextRefAt.current = Date.now() + interval;
    setCountdown(Math.ceil(interval / 1000));
    pollRef.current = setTimeout(async () => {
      try { await fn(); } catch(e) { console.error("Poll failed", e); }
      finally { schedule(); }
    }, interval);
  }, [interval, fn]);

  useEffect(() => {
    clearTimeout(pollRef.current);
    clearInterval(countdownRef.current);
    if (!interval) return;
    schedule();
    countdownRef.current = setInterval(() => {
      setCountdown(Math.max(0, Math.ceil((nextRefAt.current - Date.now()) / 1000)));
    }, 1000);
    return () => { clearTimeout(pollRef.current); clearInterval(countdownRef.current); };
  }, [interval, schedule]);

  return countdown;
};

const Markdown = memo(({ text }) => {
  if (!text) return null;
  const parts = text.split(/```/g);
  return parts.map((part, i) => {
    if (i % 2 === 1) { // Code block
      const lines = part.split("\n");
      let lang = lines[0].trim();
      let content = lines.slice(1).join("\n").trim();
      if (!content && lines.length > 0) { content = lines.join("\n").trim(); lang = ""; }

      return (
        <div key={i} style={{

    }
    return <span key={i} style={{whiteSpace:"pre-wrap", overflowWrap:"break-word", wordBreak:"break-word"}}>{part}</span>;
  });
});

            <div key={st.id||i} style={{display:"flex",gap:8,marginBottom:12,alignItems:"flex-start"}}>
              <div style={{
                width:20,height:20,borderRadius:3,flexShrink:0,
                background:T.purpleDim,border:`1px solid ${T.purple}40`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.purple,
                marginTop: 1,
              }}>{i+1}</div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{fontSize:14,color:T.text,fontWeight:700,lineHeight:1.5,wordBreak:"break-word",marginBottom:4}}>{st.title}</div>
                {st.description&&<div style={{fontSize:13,color:T.muted,lineHeight:1.6,wordBreak:"break-word"}}>{st.description}</div>}
              </div>
            </div>
          ))}
        </div>
      );
      break;
    }
    case "progressUpdated": {
      const p = act.progressUpdated;
      const lowerT = (p?.title || "").toLowerCase();
      const isReview = lowerT.includes("review");
      const isMerge = lowerT.includes("merge");
      title = p?.title || "Progress";
      detail = act.progressUpdated?.description && (
        <div style={{
          fontSize:13, color:isReview?T.text:T.muted, marginTop:6,
          lineHeight:1.6, padding:isReview?"12px 14px":"0",
          background:isReview?`${T.blue}0a`:"transparent",
          border:isReview?`1px solid ${T.blue}15`:"none", borderRadius:isReview?8:0,
          boxShadow:isReview?"inset 0 0 12px rgba(77,166,255,0.02)":"none",
          fontFamily:"'IBM Plex Sans',sans-serif",
        }}>
          {(isReview || isMerge) && (
            <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:10}}>
              <span style={{
                padding:"2px 6px", borderRadius:3,
                background:isReview?T.blueDim:T.purpleDim,
                color:isReview?T.blue:T.purple,
                fontSize:10, fontWeight:700, letterSpacing:"0.05em"
              }}>{isReview?"REVIEW":"MERGE"}</span>
              <div style={{height:1, flex:1, background:`linear-gradient(90deg, ${isReview?T.blue:T.purple}30, transparent)`}}/>
            </div>
          )}
          <Markdown text={act.progressUpdated.description}/>
          {(() => {
            const m = act.progressUpdated.description?.match(/https:\/\/github\.com\/[^\/]+\/[^\/]+\/pull\/(\d+)/);
            if (m) return (
              <div style={{marginTop:12}}>
                <a href={m[0]} target="_blank" rel="noopener" style={{
                  display:"inline-flex", alignItems:"center", gap:6, padding:"6px 12px",
                  background:T.greenDim, border:`1px solid ${T.green}40`, borderRadius:6,
                  color:T.green, textDecoration:"none", fontFamily:"'JetBrains Mono',monospace",
                  fontSize:12, fontWeight:800
                }}>
                  <Ic n="git_pull" s={14} c={T.green}/>
                  OPEN PULL REQUEST #{m[1]} ↗
                </a>
              </div>
            );
          })()}
        </div>
      );
      if (isReview) ic.c = T.blue;
      if (isMerge) { ic.c = T.purple; ic.n = "git_merge"; }
      break;
    }
    case "sessionCompleted":
      title = "Session completed";
      const pr = act.sessionCompleted?.outputs?.find(o => o.githubPullRequest)?.githubPullRequest;
      detail = pr && (
        <div style={{marginTop:8}}>
          <a href={pr.url} target="_blank" rel="noopener" style={{
            display:"inline-flex", alignItems:"center", gap:6, padding:"6px 12px",
            background:T.greenDim, border:`1px solid ${T.green}40`, borderRadius:6,
            color:T.green, textDecoration:"none", fontFamily:"'JetBrains Mono',monospace",
            fontSize:12, fontWeight:700
          }}>
            <Ic n="git_pull" s={14} c={T.green}/>
            VIEW PULL REQUEST #{pr.number}
          </a>
        </div>
      );
      break;
    case "sessionFailed":
      title = "Session failed";
      detail = act.sessionFailed?.reason && (
        <div style={{fontSize:13,color:T.red,marginTop:6,fontFamily:"'IBM Plex Sans',sans-serif",lineHeight:1.5}}>{act.sessionFailed.reason}</div>
      );
      break;
    case "planApproved": title = "Plan approved"; break;
    default: title = act.description || "System event"; break;
  }

  return (
    <div style={{
      display:"flex",gap:12,marginBottom:16,alignItems:"stretch",
      padding:isMajor?"14px":"4px 12px", borderRadius:8,
      background:isMajor?T.surfaceHi:"transparent",
      border:isMajor?`1px solid ${T.border}`:"none",
    }}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0,flexShrink:0,width:24}}>
        <div style={{width:24,height:24,borderRadius:6,background:`${ic.c}18`,border:`1px solid ${ic.c}40`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 2px 6px rgba(0,0,0,0.15)`}}>
          <Ic n={ic.n} s={13} c={ic.c}/>
        </div>
        {detail&&<div style={{width:1,flex:1,background:T.border,marginTop:3}}/>}
      </div>
      <div style={{flex:1,paddingBottom:detail?12:0,minWidth:0,marginTop:1}}>
        <div style={{display:"flex",gap:10,alignItems:"center",height:22,marginBottom:detail?12:0}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:800,color:ic.c,flex:1,lineHeight:1.3,letterSpacing:"0.02em"}}>{title}</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,fontWeight:600,flexShrink:0}}>{time}</span>
        </div>
        {detail}
        <MediaArtifacts artifacts={act.artifacts} ts={act.createTime} onMediaClick={onMediaClick}/>
      </div>
    </div>
  );
});

// ─── Activity Feed ────────────────────────────────────────────────────────────
const COLLAPSE_THRESHOLD = 35;
const COLLAPSE_SHOW      = 25;

const ActivityFeed = memo(({ activities, showAll, onShowAll, onMediaClick }) => {
  const collapse  = !showAll && activities.length > COLLAPSE_THRESHOLD;
  const visible   = collapse ? activities.slice(activities.length - COLLAPSE_SHOW) : activities;
  const hidden    = activities.length - visible.length;

  return (
    <>
      {collapse && (
        <button onClick={onShowAll} style={{
          display:"block",width:"100%",marginBottom:14,
          background:T.surfaceHi,border:`1px solid ${T.border}`,
          borderRadius:6,padding:"8px 12px",cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",fontSize:11,
          color:T.muted,textAlign:"center",letterSpacing:"0.08em",
        }}>
          ↑ SHOW {hidden} EARLIER {hidden===1?"EVENT":"EVENTS"}
        </button>
      )}
      {visible.map(act => {
        const type = getActType(act);
        const key  = getActKey(act);
        if (type === "userMessaged" || type === "agentMessaged") {
          return <ChatBubble key={key} act={act} type={type} onMediaClick={onMediaClick}/>;
        }
        return <TimelineEvent key={key} act={act} onMediaClick={onMediaClick}/>;
      })}
    </>
  );
});

// ─── Interactive Plan View ────────────────────────────────────────────────────
// Lets the user review steps, annotate individual ones, compose a revision
// request via sendMessage, or approve the plan directly.
const PlanView = memo(({ activities, session, apiKey, onApprove, onSendFeedback, busy }) => {
  const [stepNotes, setStepNotes]     = useState({}); // stepId → note string
  const [activeNote, setActiveNote]   = useState(null); // stepId currently expanded
  const [globalNote, setGlobalNote]   = useState("");
  const [sending, setSending]         = useState(false);
  const [sent, setSent]               = useState(false);

  // Find the most recent planGenerated activity
  const planAct = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i];
    }
    return null;
  }, [activities]);

  const plan  = planAct?.planGenerated?.plan;
  const steps = plan?.steps || [];

  // Check if plan already approved in activity history (must be after the plan was generated)
  const approved = useMemo(() => {
    if (!planAct) return false;
    const planTs = new Date(planAct.createTime).getTime();
    return activities.some(a => a.planApproved && new Date(a.createTime).getTime() >= planTs);
  }, [activities, planAct]);

  const hasFeedback = globalNote.trim() || Object.values(stepNotes).some(n => n.trim());

  const buildFeedbackMessage = () => {
    const parts = ["Please revise the plan based on my feedback:"];
    const stepFeedback = steps
      .filter(st => stepNotes[st.id]?.trim())
      .map((st, i) => `Step ${i + 1} (${st.title}): ${stepNotes[st.id].trim()}`);
    if (stepFeedback.length) parts.push(...stepFeedback);
    if (globalNote.trim()) parts.push("Overall: " + globalNote.trim());
    return parts.join("\n");
  };

  const handleRequestRevision = async () => {
    if (!hasFeedback || sending) return;
    setSending(true);
    try {
      await onSendFeedback(buildFeedbackMessage());
      setStepNotes({});
      setGlobalNote("");
      setActiveNote(null);
      setSent(true);
      setTimeout(() => setSent(false), 3000);
    } finally { setSending(false); }
  };

  if (!plan) return (
    <div style={{textAlign:"center",padding:"50px 24px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>
      {session.state === "PLANNING" ? "Jules is generating a plan…" : "No plan available"}
    </div>
  );

  const pendingApproval = session.state === "AWAITING_PLAN_APPROVAL";
  const annotatedCount  = Object.values(stepNotes).filter(n=>n.trim()).length;

  return (
    <div style={{paddingBottom:16}}>
      {/* Plan header */}
      <div style={{
        marginBottom:14,padding:"10px 14px",borderRadius:7,
        background:approved?T.greenDim:pendingApproval?T.purpleDim:T.surfaceHi,
        border:`1px solid ${approved?T.green+"40":pendingApproval?T.purple+"40":T.border}`,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:approved||!pendingApproval?0:8}}>
          <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
            color:approved?T.green:pendingApproval?T.purple:T.muted,letterSpacing:"0.06em"}}>
            {approved?"✓ PLAN APPROVED":pendingApproval?"PLAN READY FOR REVIEW":"PLAN PREVIEW"}
          </div>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
            {steps.length} step{steps.length!==1?"s":""}
          </span>
        </div>
        {pendingApproval&&!approved&&(
          <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,color:T.muted,lineHeight:1.5}}>
            Review each step below. Tap a step to add feedback, then request a revision or approve.
          </div>
        )}
      </div>

      {/* Steps */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
        {steps.map((st, i) => {
          const note     = stepNotes[st.id] || "";
          const isOpen   = activeNote === st.id;
          const hasNote  = note.trim().length > 0;

          return (
            <div key={st.id||i} style={{
              background:T.surface,border:`1px solid ${hasNote?T.amber+"50":T.border}`,
              borderLeft:`2px solid ${hasNote?T.amber:T.purple+"60"}`,
              borderRadius:6,overflow:"hidden",transition:"border-color .15s",
            }}>
              {/* Step row */}
              <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px"}}>
                <div style={{
                  width:24,height:24,borderRadius:4,flexShrink:0,marginTop:1,
                  background:hasNote?T.amberDim:T.purpleDim,
                  border:`1px solid ${hasNote?T.amber+"50":T.purple+"40"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,
                  color:hasNote?T.amber:T.purple,
                }}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:15,fontWeight:500,
                    color:T.text,lineHeight:1.35,marginBottom:st.description?3:0}}>
                    {st.title}
                  </div>
                  {st.description&&(
                    <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,color:T.muted,lineHeight:1.45}}>
                      {st.description}
                    </div>
                  )}
                  {hasNote&&!isOpen&&(
                    <div style={{marginTop:5,padding:"4px 8px",borderRadius:4,
                      background:T.amberDim,border:`1px solid ${T.amber}30`,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,color:T.amber,lineHeight:1.4}}>
                      📝 {note}
                    </div>
                  )}
                </div>
                {pendingApproval&&!approved&&(
                  <button onClick={()=>setActiveNote(isOpen?null:st.id)} style={{
                    flexShrink:0,padding:"4px 8px",borderRadius:4,border:"none",cursor:"pointer",
                    background:isOpen?(hasNote?T.amberDim:T.purpleDim):"transparent",
                    outline:`1px solid ${isOpen?(hasNote?T.amber+"40":T.purple+"40"):T.border}`,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,
                    color:isOpen?(hasNote?T.amber:T.purple):T.muted,
                    transition:"all .12s",letterSpacing:"0.06em",
                  }}>{hasNote?"EDIT":"NOTE"}</button>
                )}
              </div>

              {/* Per-step feedback textarea */}
              {isOpen&&pendingApproval&&!approved&&(
                <div style={{padding:"0 12px 12px",borderTop:`1px solid ${T.border}`}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.amber,
                    letterSpacing:"0.08em",marginBottom:5,marginTop:8}}>FEEDBACK FOR STEP {i+1}</div>
                  <textarea
                    value={note}
                    onChange={e=>setStepNotes(prev=>({...prev,[st.id]:e.target.value}))}
                    placeholder={`What should change about this step? (e.g. "Use TypeScript instead of JS", "Skip this — not needed")`}
                    rows={2}
                    style={{
                      width:"100%",background:T.surfaceHi,border:`1px solid ${T.amber}40`,
                      borderRadius:5,padding:"8px 10px",color:T.text,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,lineHeight:1.4,
                      resize:"vertical",outline:"none",boxSizing:"border-box",
                    }}
                    autoFocus
                  />
                  <button onClick={()=>setActiveNote(null)} style={{
                    marginTop:5,padding:"4px 10px",borderRadius:4,border:`1px solid ${T.border}`,
                    background:"transparent",cursor:"pointer",color:T.muted,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                  }}>DONE</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Global feedback + actions — only when pending approval */}
      {pendingApproval&&!approved&&(
        <div style={{
          background:T.surface,border:`1px solid ${T.border}`,
          borderRadius:7,padding:"12px 14px",
        }}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted,
            letterSpacing:"0.08em",marginBottom:6}}>OVERALL FEEDBACK (optional)</div>
          <textarea
            value={globalNote}
            onChange={e=>setGlobalNote(e.target.value)}
            placeholder="Any overall comments before approving? (e.g. 'Make sure to run tests', 'Keep changes minimal')"
            rows={2}
            style={{
              width:"100%",background:T.surfaceHi,border:`1px solid ${T.border}`,
              borderRadius:5,padding:"8px 10px",color:T.text,
              fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,lineHeight:1.4,
              resize:"vertical",outline:"none",boxSizing:"border-box",
              transition:"border-color .18s",marginBottom:10,
            }}
          />

          {sent&&(
            <div style={{marginBottom:8,padding:"6px 10px",borderRadius:4,
              background:T.greenDim,border:`1px solid ${T.green}40`,
              fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.green}}>
              ✓ Revision request sent — Jules will update the plan
            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <Btn
              onClick={handleRequestRevision}
              disabled={!hasFeedback||sending||busy}
              color={T.amber} outline sm
              style={{flex:1}}
            >
              {sending?"SENDING…":`REVISE${annotatedCount>0?` (${annotatedCount} step${annotatedCount>1?"s":""})`:globalNote.trim()?" +note":""}`}
            </Btn>
            <Btn
              onClick={onApprove}
              disabled={busy||sending}
              color={T.purple} sm
              style={{flex:1}}
            >
              <Ic n="approve" s={11} c="#000"/>
              {busy?"APPROVING…":"APPROVE PLAN"}
            </Btn>
          </div>
          <div style={{marginTop:7,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,textAlign:"center",lineHeight:1.6}}>
            Revise → Jules rewrites the plan · Approve → Jules starts executing
          </div>
        </div>
      )}
    </div>
  );
});

// ─── Diff Viewer ──────────────────────────────────────────────────────────────
const DiffViewer = ({ patch }) => {
  const [collapsed, setCollapsed] = useState(new Set());

  const groups = useMemo(() => {
    if (!patch) return [];
    const lines = patch.split("\n");
    const grps = [];
    let currentGroup = null;

    lines.forEach((line) => {
      if (line.startsWith("--- ") || line.startsWith("diff --git")) return;
      if (line.startsWith("+++ ")) {
        const file = line.slice(4).replace(/^b\//, "");
        currentGroup = { file, hunks: [] };
        grps.push(currentGroup);
        return;
      }
      if (!currentGroup) return;

      if (line.startsWith("@@")) {
        currentGroup.hunks.push({ header: line, lines: [] });
      } else if (currentGroup.hunks.length > 0) {
        currentGroup.hunks[currentGroup.hunks.length - 1].lines.push(line);
      }
    });
    return grps;
  }, [patch]);

  if (!patch || groups.length === 0) return (
    <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>
      No diff available yet
    </div>
  );

  const toggleFile = (idx) => {
    const next = new Set(collapsed);
    if (next.has(idx)) next.delete(idx);
    else next.add(idx);
    setCollapsed(next);
  };

  const toggleAll = (doCollapse) => {
    if (doCollapse) setCollapsed(new Set(groups.map((_, i) => i)));
    else setCollapsed(new Set());
  };

  return (
    <div style={{display:"flex", flexDirection:"column", gap:16}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 4px"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:700, color:T.muted, letterSpacing:"0.05em"}}>
          {groups.length} FILE{groups.length!==1?'S':''} CHANGED
        </div>
        <div style={{display:"flex", gap:8}}>
          <PickerBtn label="EXPAND ALL" isAct={collapsed.size === 0} onClick={() => toggleAll(false)} />
          <PickerBtn label="COLLAPSE ALL" isAct={collapsed.size === groups.length} onClick={() => toggleAll(true)} />
        </div>
      </div>

      {groups.map((g, gi) => {
        const isCollapsed = collapsed.has(gi);
        return (
          <div key={gi} style={{background:"#040507", border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden"}}>
            <div
              role="button"
              tabIndex={0}
              aria-expanded={!isCollapsed}
              onClick={() => toggleFile(gi)}
              onKeyDown={e => (e.key === "Enter" || e.key === " ") && toggleFile(gi)}
              style={{
                padding:"8px 12px", background:T.surface, borderBottom:isCollapsed? "none" : `1px solid ${T.border}`,
                display:"flex", alignItems:"center", gap:8, cursor:"pointer", userSelect:"none", outline:"none"
              }}
            >
              <Ic n={isCollapsed ? "chevron_right" : "chevron_down"} s={16} c={T.muted}/>
              <Ic n="code" s={14} c={T.green}/>

                    {h.header}
                  </div>
                  {h.lines.map((line, li) => {
                    const isAdd = line.startsWith("+");
                    const isRem = line.startsWith("-");

                    const bg = isAdd ? "rgba(0,232,122,.05)" : isRem ? "rgba(255,68,85,.05)" : "transparent";
                    const symbol = isAdd ? "+" : isRem ? "-" : " ";
                    const content = (isAdd || isRem) ? line.slice(1) : line;

                    return (
                      <div key={li} style={{display:"flex", background:bg, minHeight:20, borderLeft:`2px solid ${isAdd?T.green+'40':isRem?T.red+'40':'transparent'}`}}>
                        <div style={{width:22, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", color:c, opacity:0.6, fontSize:12, userSelect:"none", fontWeight:700, fontFamily:"monospace"}}>
                          {symbol}
                        </div>
                        <div style={{padding:"2px 10px", color:isAdd?T.green:isRem?T.red:T.text, whiteSpace:"pre-wrap", wordBreak:"break-all", flex:1, opacity: (isAdd||isRem)?1:0.7}}>
                          {content || " "}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
};

// ─── Session Detail ───────────────────────────────────────────────────────────
const SessionDetail = ({ session:initSession, apiKey, onBack, onDelete, onSessionUpdate, isDesktop, pollInterval, setPollInterval, isArchived, onArchive, onUnarchive }) => {
  const [session,setSession]     = useState(initSession);
  const [activities,setActivities] = useState([]);
  const [showAll,setShowAll]     = useState(false);
  const [tab,setTab]             = useState("activity");
  const [msg,setMsg]             = useState(() => {
    try { return localStorage.getItem(`jac_draft_${initSession.id}`) || ""; }
    catch { return ""; }
  });
  const [selectedPersonas, setSelectedPersonas] = useState(new Set());
  const [busy,setBusy]           = useState(false);
  const [err,setErr]             = useState(null);
  const [activeMedia,setActiveMedia] = useState(null);
  const [scrolled, handleScrollBase] = useScrollThreshold();
  const [composerVisible, setComposerVisible] = useState(true);
  const [showScrollTop, setShowScrollTop] = useState(false);
  const [showScrollBottom, setShowScrollBottom] = useState(false);
  const lastScrollY = useRef(0);
  const scrollDir = useRef(0); // 1 = down, -1 = up

  const contentRef = useRef(null);

  const handleScroll = useCallback(e => {
    handleScrollBase(e);
    const y = e.target.scrollTop;
    const h = e.target.scrollHeight;
    const vh = e.target.offsetHeight;
    const diff = y - lastScrollY.current;

    if (Math.abs(diff) > 5) {
      scrollDir.current = diff > 0 ? 1 : -1;
    }

    // Smart visibility logic:
    // 1. Always show if near bottom (within 80px - more strict for stability)
    // 2. Hide if scrolling down deep (> 300px)
    // 3. Show if scrolling up
    if (h - y - vh < 80) {
      setComposerVisible(true);
    } else if (y > 300) {
      if (scrollDir.current === 1) setComposerVisible(false);
      else if (scrollDir.current === -1) setComposerVisible(true);
    } else {
      setComposerVisible(true);
    }

    setShowScrollTop(y > 300);
    setShowScrollBottom(h - y - vh > 300);

    lastScrollY.current = y;
  }, [handleScrollBase]);

  const txtRef       = useRef(null);
  const feedEndRef   = useRef(null);
  const actMapRef    = useRef(new Map());      // id → activity (dedup)
  const prevLenRef   = useRef(0);

  // ── Optimized activity loader: createTime cursor + Map dedup ──────────────
  // First load fetches all; subsequent loads fetch only new (createTime filter)
  const lastTsRef = useRef(null);
  const loadActivities = useCallback(async (sinceTs=null) => {
    try {
      let pageToken = null;
      let changed = false;
      let latestTs = lastTsRef.current;

      do {
        const qs = sinceTs
          ? `createTime=${encodeURIComponent(sinceTs)}&pageSize=50`
          : `pageSize=100${pageToken ? `&pageToken=${pageToken}` : ""}`;

        const d = await apiCall(apiKey, `/sessions/${session.id}/activities?${qs}`, {
          _label:`Acts ${sinceTs?"Δ":"full"} ${session.id?.slice(0,6)}`
        });

        const incoming = d.activities || [];
        for (const act of incoming) {
          const k = getActKey(act);
          if (!actMapRef.current.has(k)) {
            actMapRef.current.set(k, act);
            changed = true;
            if (!latestTs || act.createTime > latestTs) latestTs = act.createTime;
          }
        }
        pageToken = d.nextPageToken;

        // On incremental loads (sinceTs), we don't need to follow tokens as new
        // activities are added to the end of the history.
        if (sinceTs) break;

      } while (pageToken);

      if (latestTs) lastTsRef.current = latestTs;
      if (changed) {
        const sorted = Array.from(actMapRef.current.values())
          .filter(a => !a._temp)
          .sort((a,b) => new Date(a.createTime) - new Date(b.createTime));
        setActivities(sorted);
      }
    } catch {}
  }, [apiKey, session.id]);

  const loadSession = useCallback(async () => {
    try {
      const d = await apiCall(apiKey, `/sessions/${session.id}`, { _label:`Session ${session.id?.slice(0,6)}` });
      setSession(d);
      onSessionUpdate?.(d);
    } catch {}
  }, [apiKey, session.id, onSessionUpdate]);

  // On mount (keyed by session.id, so fresh per-session)
  useEffect(() => {
    actMapRef.current = new Map();
    lastTsRef.current = null;
    prevLenRef.current = 0;
    setActivities([]);
    setShowAll(false);
    setErr(null);
    loadActivities(null); // full load on first open
    loadSession();
  }, []); // intentional: component is keyed by session.id

  const countdown = useAutoPoll(pollInterval, useCallback(() => Promise.all([loadSession(), loadActivities(lastTsRef.current)]), [loadSession, loadActivities]));

  // Auto-scroll to bottom when new messages arrive
  useEffect(() => {
    const len = activities.length;
    if (len > prevLenRef.current && tab === "activity" && feedEndRef.current) {
      feedEndRef.current.scrollIntoView({ behavior: len - prevLenRef.current > 8 ? "instant" : "smooth" });
    }
    prevLenRef.current = len;
  }, [activities, tab]);

  const togglePersona = (id) => {
    const next = new Set(selectedPersonas);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedPersonas(next);
  };

  // Persist draft follow-up message
  const draftRef = useRef(null);
  useEffect(() => {
    clearTimeout(draftRef.current);
    draftRef.current = setTimeout(() => {
      try {
        if (msg.trim()) localStorage.setItem(`jac_draft_${session.id}`, msg);
        else localStorage.removeItem(`jac_draft_${session.id}`);
      } catch {}
    }, 400);
    return () => clearTimeout(draftRef.current);
  }, [msg, session.id]);

  // ── Actions ─────────────────────────────────────────────────────────────────
  const handleSend = async () => {
    if (!msg.trim() || busy) return;
    let text = msg.trim();
    if (selectedPersonas.size > 0) {
      const personaPrompts = Array.from(selectedPersonas)
        .map(id => PERSONAS.find(p => p.id === id)?.prompt)
        .filter(Boolean);
      if (personaPrompts.length > 0) {
        const personaText = `(Roles: ${Array.from(selectedPersonas).map(id => PERSONAS.find(p => p.id === id)?.label).join(", ")})\n\n${personaPrompts.join("\n\n")}`;
        text = text ? `${text}\n\n${personaText}` : personaText;
      }
    }
    setMsg("");
    setBusy(true); setErr(null);

    // Optimistic: add temp bubble immediately
    const tempKey = `_temp_${Date.now()}`;
    const tempAct = {
      id:tempKey,
      createTime:new Date().toISOString(),
      userMessaged:{ userMessage:text },
      _temp:true
    };
    actMapRef.current.set(tempKey, tempAct);
    setActivities(prev => [...prev, tempAct]);

    try {
      await apiCall(apiKey, `/sessions/${session.id}:sendMessage`, {
        method:"POST",
        body:{
          prompt:text,
        },
        _label:`Message → ${session.id?.slice(0,6)}`,
      });
      // Success: clear local draft
      try { localStorage.removeItem(`jac_draft_${session.id}`); } catch {}
      // Remove temp, fetch real activities
      actMapRef.current.delete(tempKey);
      setTimeout(() => { loadActivities(); loadSession(); }, 1200);
    } catch(e) {
      setErr(e.message);
      setMsg(text);
      actMapRef.current.delete(tempKey);
      setActivities(prev => prev.filter(a => a.id !== tempKey));
    } finally { setBusy(false); }
  };

  const handleApprove = async () => {
    setBusy(true); setErr(null);
    try {
      await apiCall(apiKey, `/sessions/${session.id}:approvePlan`, { method:"POST", body:{}, _label:`Approve ${session.id?.slice(0,6)}` });
      await loadSession(); await loadActivities(lastTsRef.current);
    } catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  };

  useEffect(() => {
    const el = contentRef.current;
    if (el) {
      const check = () => {
        setShowScrollTop(el.scrollTop > 300);
        setShowScrollBottom(el.scrollHeight - el.scrollTop - el.offsetHeight > 300);
      };
      check();
      window.addEventListener("resize", check);
      return () => window.removeEventListener("resize", check);
    }
  }, [activities, tab]);

  // Used by PlanView to send revision requests
  const handleSendFeedback = useCallback(async (prompt, stayOnTab = false) => {
    let text = prompt;
    if (selectedPersonas.size > 0) {
      const personaPrompts = Array.from(selectedPersonas)
        .map(id => PERSONAS.find(p => p.id === id)?.prompt)
        .filter(Boolean);
      if (personaPrompts.length > 0) {
        const personaText = `(Roles: ${Array.from(selectedPersonas).map(id => PERSONAS.find(p => p.id === id)?.label).join(", ")})\n\n${personaPrompts.join("\n\n")}`;
        text = text ? `${text}\n\n${personaText}` : personaText;
      }
    }
    const tempKey = `_temp_${Date.now()}`;
    const tempAct = { id:tempKey, createTime:new Date().toISOString(), userMessaged:{ userMessage:text }, _temp:true };
    actMapRef.current.set(tempKey, tempAct);
    setActivities(prev => [...prev, tempAct]);
    try {
      await apiCall(apiKey, `/sessions/${session.id}:sendMessage`, {
        method:"POST", body:{ prompt:text }, _label:`Message → ${session.id?.slice(0,6)}`,
      });
      actMapRef.current.delete(tempKey);
      if (keepTab !== true) setTab("activity"); // switch back to chat to show Jules' response
      setTimeout(() => { loadActivities(lastTsRef.current); loadSession(); }, 1500);
    } catch(e) {
      setErr(e.message);
      actMapRef.current.delete(tempKey);
      setActivities(prev => prev.filter(a => a.id !== tempKey));
      throw e;
    }
  }, [apiKey, session.id, loadActivities, loadSession]);

  const handleDelete = async () => {
    setBusy(true);
    try {
      await apiCall(apiKey, `/sessions/${session.id}`, { method:"DELETE", _label:`Delete ${session.id?.slice(0,6)}` });
      onDelete(session.id);
    } catch(e) { setErr(e.message); setBusy(false); }
  };

  const handleRefresh = async () => {
    setBusy(true); setErr(null);
    try {
      await Promise.all([loadSession(), loadActivities(null)]);
    } catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  };

  const diffArtifact = useMemo(() => {
    for (const a of activities) {
      if (a.artifacts) for (const art of a.artifacts) if (art.changeSet?.gitPatch?.unidiffPatch) return art.changeSet.gitPatch;
    }
    return null;
  }, [activities]);

  const mediaArtifacts = useMemo(() =>
    activities.flatMap(a => (a.artifacts||[]).filter(x=>x.media?.data).map(x=>({...x.media,ts:a.createTime})))
  , [activities]);

  const summary = session.outputs?.find(o=>o.sessionSummary)?.sessionSummary;
  const pr = useMemo(() => {
    // 1. Check session object directly
    const spr = getPR(session);
    if (spr) return spr;
    // 2. Scan activities for PRs
    for (const a of activities) {
      const apr = getPR(a) || getPR(a.sessionCompleted) || getPR(a.progressUpdated);
      if (apr) return apr;
      // Deep scan artifacts
      if (a.artifacts) {
        for (const art of a.artifacts) {
          const arpr = getPR(art);
          if (arpr) return arpr;
        }
      }
    }
    return null;
  }, [session, activities]);
  const m       = STATUS_META[session.state] || STATUS_META.QUEUED;
  const pct     = pctFromState(session.state);
  const canSend = true; // Always allow follow-up messages

  const latestPlan = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i].planGenerated.plan;
    }
    return null;
  }, [activities]);

  // Auto-switch to PLAN tab when AWAITING_PLAN_APPROVAL
  useEffect(() => {
    if (session.state === "AWAITING_PLAN_APPROVAL" && latestPlan) setTab("plan");
  }, [session.state, latestPlan]);

  const TABS = [
    { id:"activity", label:"CHAT" },
    ...(latestPlan?[{ id:"plan", label:"PLAN" }]:[]),
    { id:"diff",     label:"DIFF" },
    ...(mediaArtifacts.length>0?[{ id:"media", label:"MEDIA" }]:[]),
  ];


  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0,position:"relative"}}>
      {/* ── Header ── */}
      <div style={{
        padding:scrolled?"8px 16px 6px":"12px 16px 0",
        borderBottom:`1px solid ${T.border}`,
        background:T.surface,
        flexShrink:0,
        transition:"all .25s cubic-bezier(0.4, 0, 0.2, 1)",
        zIndex: 5,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:scrolled?0:8}}>
          {!isDesktop&&(
            <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",padding:3,display:"flex",flexShrink:0}}>
              <Ic n="back" s={18} c={T.text}/>
            </button>
          )}
          <div style={{flex:1,minWidth:0,transition:"all .2s ease"}}>
            <div style={{
              fontFamily:"'IBM Plex Sans',sans-serif",
              fontSize:scrolled?13:17,
              fontWeight:700,
              color:T.textHi,
              lineHeight:scrolled?1.6:1.4,
              overflow:"hidden",
              textOverflow:"ellipsis",
              display:"-webkit-box",
              WebkitLineClamp:scrolled?1:2,
              WebkitBoxOrient:"vertical",
              transition:"all .2s ease",
              opacity:scrolled?0.8:1,
            }}>
              {session.title||session.prompt}
            </div>
          </div>

          <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
            <button onClick={handleRefresh} disabled={busy} title="Refresh activity" style={{background:"none",border:"none",cursor:busy?"default":"pointer",display:"flex",padding:4,opacity:.8,animation:busy?"spin 1s linear infinite":"none"}}>
              <Ic n="refresh" s={scrolled?14:15} c={T.text}/>
            </button>
            {!scrolled && (
              <>
                <button
                  onClick={() => isArchived ? onUnarchive(session.id) : onArchive(session.id)}
                  title={isArchived ? "Unarchive session" : "Archive session"}
                  style={{
                    background:isArchived ? T.purpleDim : T.surfaceHi,
                    border:`1px solid ${isArchived ? T.purple+"40" : T.borderHi}`,
                    borderRadius:4, cursor:"pointer", display:"flex", alignItems:"center", padding:4, transition:"all .2s"
                  }}
                >
                  <Ic n={isArchived ? "unarchive" : "archive"} s={14} c={isArchived ? T.purple : T.muted}/>
                </button>
                <button onClick={() => { if(confirm("Delete this session?")) handleDelete(); }} disabled={busy} title="Delete session" style={{background:T.redDim, border:`1px solid ${T.red}30`, borderRadius:4, cursor:"pointer", display:"flex", alignItems:"center", padding:4, transition:"opacity .2s"}}>
                  <Ic n="trash" s={14} c={T.red}/>

            {pr && (
              <a href={pr.url} target="_blank" rel="noopener" style={{

                color:T.green, textDecoration:"none", fontFamily:"'JetBrains Mono',monospace",
                fontSize:scrolled?10:11, fontWeight:900, transition:"all .2s",
                boxShadow:`0 2px 8px ${T.green}20`,
              }}>
                <Ic n="git_pull" s={scrolled?12:13} c={T.green}/>

            )}
            <Pill status={session.state} small/>
          </div>
        </div>

        <div style={{
          height:scrolled?0:2, overflow:"hidden", transition:"all .25s ease",
          marginBottom:scrolled?0:5, opacity:scrolled?0:1,
          pointerEvents:scrolled?"none":"auto",
        }}>
          <Bar pct={pct} status={session.state}/>
        </div>

        <div style={{
          display:"flex",gap:10,
          height:scrolled?0:16,
          marginTop:0,
          marginBottom:scrolled?0:10,
          opacity:scrolled?0:1,
          overflow:"hidden",
          fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted,flexWrap:"nowrap",alignItems:"center",
          transition:"all .25s ease",
          pointerEvents:scrolled?"none":"auto",
        }}>
          <span>{session.id?.slice(0,10)}</span>
          {session.sourceContext?.source&&(
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>

          )}
          {session.url && <a href={session.url} target="_blank" rel="noopener" style={{color:T.muted,textDecoration:"none",flexShrink:0,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>WEB↗</a>}
        </div>


        {session.state==="AWAITING_PLAN_APPROVAL"&&(
          <div style={{marginBottom:8,padding:"7px 10px",background:T.purpleDim,border:`1px solid ${T.purple}40`,borderRadius:5,display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setTab("plan")}>
            <span style={{width:6,height:6,borderRadius:"50%",background:T.purple,animation:"dot 1.2s ease-in-out infinite",flexShrink:0}}/>
            <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:T.purple,fontWeight:700}}>PLAN READY — tap to review & approve</div>

        {session.state==="AWAITING_USER_FEEDBACK"&&(
          <div style={{marginBottom:10,padding:"8px 10px",background:T.amberDim,border:`1px solid ${T.amber}40`,borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:T.amber}}>
            ⚡ Jules needs your input — reply below

        {err&&<div style={{marginBottom:8,padding:"6px 10px",borderRadius:4,background:T.redDim,border:`1px solid ${T.red}40`,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.red}}>{err}</div>}

        {summary && (
          <div style={{
            maxHeight:scrolled?0:500, overflow:"hidden", opacity:scrolled?0:1,
            marginBottom:scrolled?0:12, padding:scrolled?0:"12px 16px",
            background:T.surfaceHi, border:`${scrolled?0:1}px solid ${T.borderHi}`,

            pointerEvents:scrolled?"none":"auto",
            boxShadow:`0 4px 16px rgba(0,0,0,0.3)`,
          }}>
            <div style={{
              fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.green,
              fontWeight:800, letterSpacing:"0.1em", marginBottom:8,
            }}>SESSION SUMMARY</div>
            <div style={{
              fontFamily:"'IBM Plex Sans',sans-serif", fontSize:14, color:T.text,
              lineHeight:1.55, whiteSpace:"pre-wrap",

            {pr && (
              <a href={pr.url} target="_blank" rel="noopener" style={{
                display:"inline-flex", alignItems:"center", gap:6, marginTop:12,
                color:T.green, textDecoration:"none", fontFamily:"'JetBrains Mono',monospace",
                fontSize:12, fontWeight:700, borderBottom:`1px solid ${T.green}40`
              }}>
                <Ic n="git_pull" s={13} c={T.green}/>
                VIEW PULL REQUEST #{pr.number}
              </a>

        <div style={{display:"flex", paddingBottom:scrolled?6:0, transition:"all .2s ease"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:"8px 0",background:"none",border:"none",
              borderBottom:`2px solid ${tab===t.id?T.green:"transparent"}`,
              color:tab===t.id?T.green:T.muted,cursor:"pointer",
              fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:"0.07em",
              transition:"color .15s, border-color .15s",
