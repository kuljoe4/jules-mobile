    <script>
    // ── Global Error Handling ──────────────────────────────────────────────────
    function handleBootError(msg, error) {
      console.error('CRITICAL BOOT ERROR:', msg, error);
      const splash = document.getElementById('splash');
      if (splash) {
        const hint = document.getElementById('splash-hint');
        const step = document.getElementById('splash-step');
        if (hint) {
          hint.textContent = 'BOOT ERROR';
          hint.style.color = '#fb7185';
        }
        if (step) {
          step.textContent = (msg || 'Unknown error').toUpperCase();
          step.style.color = '#fb7185';
          step.style.opacity = '1';
        }
        const resetBtn = document.getElementById('emergency-reset');
        if (resetBtn) resetBtn.style.display = 'block';
      }
    }

    window.onerror = function(msg, url, lineNo, columnNo, error) {
      const diag = [
        msg,
        url ? 'at ' + url : '',
        lineNo ? 'line ' + lineNo : '',
        columnNo ? 'col ' + columnNo : ''
      ].filter(Boolean).join(' ');
      handleBootError(diag, error);
      return false;
    };

    window.onunhandledrejection = function(event) {
      const reason = event.reason;
      const msg = reason?.message || reason?.toString() || 'Unknown promise rejection';
      handleBootError('Async error: ' + msg, reason);
    };

    // ── PWA Bootstrap ──────────────────────────────────────────────────────────
    // Chrome PWA install requires:
    //   1. HTTPS (or localhost) — file:// will NOT work
    //   2. A web manifest reachable at the same origin
    //   3. A service worker registered at the same origin
    //
    // Strategy for a single-file PWA:
    //   • Manifest  → data: URI (Chrome accepts this for installability)
    //   • SW        → written to the page origin via a self-fetching trick:
    //                 the SW script is base64-encoded inside this file and
    //                 registered by fetching the HTML itself and rewriting it.
    //                 For true single-file, we use a same-origin fetch of this
    //                 file's own URL, serve the SW JS via a custom response
    //                 intercepted by a SharedWorker shim — but that's overkill.
    //                 Simplest working approach: write SW source to a data: URL
    //                 registered with `{scope:'/'}` which Chrome 89+ supports
    //                 when the page itself is on an HTTP origin.
    //
    // Expose globals so React can read install state.
    window.__pwa = { isFileProtocol: location.protocol === "file:", installPrompt: null, swOk: false };

    (function pwaSetup() {
      const base = location.pathname.replace(/\/[^/]*$/, "/") || "/";
      const origin = location.origin;
      const fullBase = origin + base;

      // ── 1. Manifest via data: URI (works on HTTP origins) ──────────────────
      const mkIcon = (size, rx) => {
        const fs = Math.floor(size * 0.625), y = Math.floor(size * 0.73);
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${rx}" fill="#07090c"/><text x="${size/2}" y="${y}" font-size="${fs}" text-anchor="middle" fill="#06b6d4" font-weight="900" font-family="monospace">J</text></svg>`;
        return { src:"data:image/svg+xml;base64,"+btoa(svg), sizes:`${size}x${size}`, type:"image/svg+xml", purpose:"maskable any" };
      };
      const isMobile = window.innerWidth < 768;
      const manifest = {
        name:"Jules Agent Client", short_name:"Jules",
        description:"Monitor and control Jules AI coding sessions",
        start_url: fullBase,
        scope: base,
        display:"standalone", background_color:"#07090c", theme_color:"#0891b2",
        orientation: isMobile ? "portrait" : "landscape",
        categories:["developer","productivity"],
        icons:[ mkIcon(192,24), mkIcon(512,64) ],
      };
      // data: URI — Chrome validates manifests here starting Chromium 93
      const manifestJSON = JSON.stringify(manifest);
      const manifestURI  = "data:application/manifest+json," + encodeURIComponent(manifestJSON);
      const lnk = document.createElement("link");
      lnk.rel = "manifest"; lnk.href = manifestURI;
      document.head.appendChild(lnk);

      // ── 2. Service Worker ──────────────────────────────────────────────────
      // SW registered from a blob: URL is rejected by Chrome's PWA checker.
      // Instead we write the SW source into a tiny JavaScript data: URL and
      // register it — Chrome 91+ allows data: SW registration when the page
      // is on a secure origin (https / localhost).
      // Try to lock orientation if in standalone mode
      if (window.matchMedia('(display-mode: standalone)').matches && screen.orientation && screen.orientation.lock) {
        screen.orientation.lock(isMobile ? "portrait" : "landscape").catch(() => {});
      }

      if ("serviceWorker" in navigator && !window.__pwa.isFileProtocol) {
        const swSrc = [
          'const C="jules-v5";',
          'const PRE=["https://unpkg.com/react@18/umd/react.production.min.js","https://unpkg.com/react-dom@18/umd/react-dom.production.min.js","https://unpkg.com/@babel/standalone/babel.min.js"];',
          'self.addEventListener("install",e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll(PRE).catch(()=>{})));});',
          'self.addEventListener("activate",e=>e.waitUntil(clients.claim()));',
          'self.addEventListener("fetch",e=>{',
          '  const u=e.request.url;',
          '  if(u.includes("jules.googleapis.com"))return;',
          '  if(u.includes("unpkg.com")||u.includes("fonts.googleapis")||u.includes("fonts.gstatic")){',
          '    e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request).then(r=>{',
          '      const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));return r;',
          '    })));',
          '  }',
          '});',
        ].join("");
        // data: URI SW — same-origin restriction bypassed on secure origins
        const swDataURI = "data:text/javascript;base64," + btoa(swSrc);
        navigator.serviceWorker.register(swDataURI, { scope: base })
          .then(() => { window.__pwa.swOk = true; })
          .catch(() => {
            // Fallback: blob URL (works for caching, not for install prompt)
            const blob = new Blob([swSrc], { type:"text/javascript" });
            navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: base }).catch(()=>{});
          });
      }

      // ── 3. Capture install prompt ──────────────────────────────────────────
      window.addEventListener("beforeinstallprompt", e => {
        e.preventDefault();
        window.__pwa.installPrompt = e;
        // Notify React if it's already mounted
        window.dispatchEvent(new Event("pwa-installable"));
      });
      window.addEventListener("appinstalled", () => {
        window.__pwa.installPrompt = null;
        window.dispatchEvent(new Event("pwa-installed"));
      });
    })();
    </script>

<script>
  async function handleEmergencyReset() {
    if (!confirm("This will clear all local data, settings, and cache. Proceed?")) return;
    localStorage.clear();
    sessionStorage.clear();
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    location.reload(true);
  }
</script>

<!-- ── Progress tracker — updates splash as each dep loads ─────────────── -->
<script>
(function(){
  var hint  = document.getElementById("splash-hint");
  var step  = document.getElementById("splash-step");
  var bar   = document.getElementById("splash-bar");
  var t0    = Date.now();

  function setMsg(h, s, pct) {
    if (hint) hint.textContent = h;
    if (step) step.textContent = s;
    if (bar && pct !== undefined) {
      bar.style.animation = "none";
      bar.style.transition = "width .3s cubic-bezier(.4,0,.2,1)";
      bar.style.width = pct + "%";
    }
  }
  function elapsed() { return ((Date.now()-t0)/1000).toFixed(1)+"s"; }

  // Expose for inline onload handlers below
  window.__splashMsg = setMsg;
  window.__splashElapsed = elapsed;

  // Global error handler to catch failures during boot
  window.addEventListener("error", function(e) {
    var msg = e.message || "Unknown runtime error";
    if (window.__splashMsg) window.__splashMsg("BOOT ERROR", msg.toUpperCase(), 0);
  });

  setMsg("LOADING REACT…", "core library · " + elapsed(), 8);
})();
</script>

// ─── Browser Notifications ───────────────────────────────────────────────────
const NOTIFY_KEY = "jac_notifications";
function loadNotify() { try { return localStorage.getItem(NOTIFY_KEY)==="1"; } catch { return false; } }
function saveNotify(v) { try { localStorage.setItem(NOTIFY_KEY,v?"1":"0"); } catch {} }

function requestNotificationPermission() {
  if (!("Notification" in window)) return Promise.resolve(false);
  if (Notification.permission === "granted") return Promise.resolve(true);
  return Notification.requestPermission().then(p => p === "granted");
}

async function sendNotification(title, body, tag) {
  if (!loadNotify() || !("Notification" in window) || Notification.permission !== "granted") return;
  const icon = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2307090c%22/><text y=%22.9em%22 x=%2250%25%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22%2306b6d4%22 font-family=%22monospace%22 font-weight=%22900%22>J</text></svg>";

  // Try SW notification first (more robust in mobile/background)
  if ("serviceWorker" in navigator) {
    try {
      const reg = await navigator.serviceWorker.ready;
      if (reg && reg.showNotification) {
        await reg.showNotification(title, { body, tag, icon });
        return;
      }
    } catch (e) { console.warn("[Notify] SW notification failed, falling back", e); }
  }

  // Fallback to standard Notification constructor
  try {
    new Notification(title, { body, tag, icon });
  } catch (e) {
    console.error("[Notify] Notification constructor failed", e);
  }
}

async function clearCacheOnly() {
  if (!confirm("Clear Service Worker cache? This will redownload all assets on next load.")) return;
  try {
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    alert("Cache cleared.");
  } catch (err) { alert("Error: " + err.message); }
}

  if (!confirm("FULL RESET: Clear all local data, settings, and cache?")) return;
  try {

    sessionStorage.clear();
    if ("caches" in window) {
      const keys = await caches.keys();

async function getStorageInfo() {
  let used = 0, quota = 0, cache = 0, local = 0;

  // 1. LocalStorage Estimation
  try {
    let str = "";
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      str += k + localStorage.getItem(k);
    }
    local = str.length * 2; // UTF-16 characters are 2 bytes
  } catch (err) { console.warn("[Storage] LocalStorage estimate failed", err); }

  // 2. Navigator Storage API
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const est = await navigator.storage.estimate();
      used = est.usage || 0;
      quota = est.quota || 0;
      if (est.usageDetails && est.usageDetails.caches) {
        cache = est.usageDetails.caches;
      }
    }
  } catch (err) { console.warn("[Storage] Estimate API failed", err); }

  // 3. Manual Cache Fallback (for browsers without usageDetails)
  if (cache === 0 && "caches" in window) {
    try {
      const keys = await caches.keys();
      for (const key of keys) {
        const c = await caches.open(key);
        const reqs = await c.keys();
        for (const r of reqs) {
          const res = await c.match(r);
          if (res) {
            const cl = res.headers.get("content-length");
            if (cl) cache += parseInt(cl, 10);
            // Note: Opaque responses will have 0 content-length and cannot be measured here.
          }
        }
      }
    } catch (err) { console.warn("[Storage] Manual cache scan failed", err); }
  }

  // Final adjusted total (API used often doesn't include localStorage)
  const totalUsed = Math.max(used, cache) + local;

  return { used: totalUsed, quota, cache, local };
}

function loadPersonas() {
  try {
    const saved = JSON.parse(localStorage.getItem(PERSONA_PROMPTS_KEY) || "{}");
    const custom = JSON.parse(localStorage.getItem(CUSTOM_PERSONAS_KEY) || "[]");
    const mergedDefaults = DEFAULT_PERSONAS.map(p => ({
      ...p,
      prompt: saved[p.id] || p.prompt
    }));
    return [...mergedDefaults, ...custom.map(c => ({ ...c, isCustom: true }))];
  } catch { return DEFAULT_PERSONAS; }
}

function savePersonaPrompt(id, prompt) {
  try {
    const saved = JSON.parse(localStorage.getItem(PERSONA_PROMPTS_KEY) || "{}");
    saved[id] = prompt;
    localStorage.setItem(PERSONA_PROMPTS_KEY, JSON.stringify(saved));
  } catch {}
}

function saveCustomPersona(persona) {
  try {
    const custom = JSON.parse(localStorage.getItem(CUSTOM_PERSONAS_KEY) || "[]");
    const index = custom.findIndex(p => p.id === persona.id);
    if (index >= 0) {
      custom[index] = { ...custom[index], ...persona };
    } else {
      custom.push(persona);
    }
    localStorage.setItem(CUSTOM_PERSONAS_KEY, JSON.stringify(custom));
  } catch {}
}

function deleteCustomPersona(id) {
  try {
    const custom = JSON.parse(localStorage.getItem(CUSTOM_PERSONAS_KEY) || "[]");
    const filtered = custom.filter(p => p.id !== id);
    localStorage.setItem(CUSTOM_PERSONAS_KEY, JSON.stringify(filtered));
  } catch {}
}

function resetPersonas() {
  try {
    localStorage.removeItem(PERSONA_PROMPTS_KEY);
    localStorage.removeItem(CUSTOM_PERSONAS_KEY);
    return DEFAULT_PERSONAS;
  } catch { return DEFAULT_PERSONAS; }
}

// ─── Network tracker ──────────────────────────────────────────────────────────
function makeNetTracker() {
  const STATS_KEY = "jac_net_stats";
  const initial = (() => {
    try { return JSON.parse(localStorage.getItem(STATS_KEY)) || { overall: { in: 0, out: 0 }, daily: {} }; }
    catch { return { overall: { in: 0, out: 0 }, daily: {} }; }
  })();

  const sessionStart = Date.now();
  let sessionUsage = { in: 0, out: 0 };
  let stats = initial;
  let log = [];
  const subs = [];

  const save = () => {
    try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch {}
  };

  const getUsage = () => {
    const now = new Date();
    const todayKey = now.toISOString().split("T")[0];
    const monthKey = todayKey.slice(0, 7);

    const today = stats.daily[todayKey] || { in: 0, out: 0 };
    const month = { in: 0, out: 0 };
    Object.entries(stats.daily).forEach(([date, val]) => {
      if (date.startsWith(monthKey)) {
        month.in += val.in;
        month.out += val.out;
      }
    });

    const sessionDurationMs = now.getTime() - sessionStart;
    const h = Math.floor(sessionDurationMs / 3600000);
    const m = Math.floor((sessionDurationMs % 3600000) / 60000);
    const s = Math.floor((sessionDurationMs % 60000) / 1000);
    const duration = h > 0 ? `${h}h ${m}m ${s}s` : m > 0 ? `${m}m ${s}s` : `${s}s`;

    return { today, month, overall: stats.overall, session: sessionUsage, duration };
  };

  const notify = () => {
    const usage = getUsage();
    subs.forEach(f => f({
      ...usage,
      total: usage.overall.in + usage.overall.out,
      totalIn: usage.overall.in,
      totalOut: usage.overall.out,
      log: [...log]
    }));
  };

  return {
    record(label, bytesIn, bytesOut, status) {
      const now = new Date();
      const todayKey = now.toISOString().split("T")[0];

      if (!stats.daily[todayKey]) stats.daily[todayKey] = { in: 0, out: 0 };
      stats.daily[todayKey].in += bytesIn;
      stats.daily[todayKey].out += bytesOut;
      stats.overall.in += bytesIn;
      stats.overall.out += bytesOut;
      sessionUsage.in += bytesIn;
      sessionUsage.out += bytesOut;

      // Keep only last 60 days of daily stats to prevent bloat
      const dailyKeys = Object.keys(stats.daily).sort();
      if (dailyKeys.length > 60) delete stats.daily[dailyKeys[0]];

      log.unshift({ id: Math.random(), label, bytesIn, bytesOut, status, ts: now.getTime() });
      if (log.length > 80) log.length = 80;

      save();
      notify();
    },
    subscribe(fn) { subs.push(fn); return () => { const i = subs.indexOf(fn); if (i > -1) subs.splice(i, 1); }; },
    snapshot() {
      const usage = getUsage();
      return {
        ...usage,
        total: usage.overall.in + usage.overall.out,
        totalIn: usage.overall.in,
        totalOut: usage.overall.out,
        log: [...log]
      };
    },
  };
}
const NET = makeNetTracker();

async function apiCall(apiKey, path, opts={}) {
  const url = `${BASE}${path}`;
  const headers = { "x-goog-api-key":apiKey, "Content-Type":"application/json", ...(opts.headers||{}) };
  const body = opts.body ? JSON.stringify(opts.body) : undefined;

  // Estimate outgoing bytes (method + url + headers + body)
  const outBytes = (opts.method || "GET").length + url.length + JSON.stringify(headers).length + (body?.length || 0);

  const res = await fetch(url, { ...opts, headers, body });

  let text = "";
  let headerSize = 0;
  res.headers.forEach((v, k) => headerSize += k.length + v.length + 4);

  if (opts.onProgress && res.body) {
    const reader = res.body.getReader();
    const contentLength = +res.headers.get("Content-Length") || 0;
    let receivedLength = 0;
    const chunks = [];

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      chunks.push(value);
      receivedLength += value.length;
      opts.onProgress({ loaded: receivedLength, total: contentLength });
    }

    const all = new Uint8Array(receivedLength);
    let pos = 0;
    for (let c of chunks) { all.set(c, pos); pos += c.length; }
    text = new TextDecoder().decode(all);
  } else {
    text = await res.text();
  }

  const inBytes = headerSize + new TextEncoder().encode(text).length;
  NET.record(opts._label || path, inBytes / 1024, outBytes / 1024, res.status);

  if (!res.ok) {
    let msg = text;
    try { msg = JSON.parse(text)?.error?.message || text; } catch {}
    throw new Error(`${res.status}: ${msg}`);
  }
  return text ? JSON.parse(text) : {};
}

const fmtBytes = b => b<1?`${(b*1024).toFixed(0)}B`:b<1024?`${b.toFixed(1)}KB`:`${(b/1024).toFixed(2)}MB`;

const PR_CACHE = new Map();
const GH_PR_RE = /https:\/\/github\.com\/[^\/]+\/[^\/]+\/pull\/(\d+)/;

const getPR = (s) => {
  if (!s) return null;
  const sid = s.id || s.name || "temp";
  if (PR_CACHE.has(sid)) return PR_CACHE.get(sid);

  const findInOutputs = (outputs) => {
    if (!outputs || !Array.isArray(outputs)) return null;
    for (let i = 0; i < outputs.length; i++) {
      const o = outputs[i];
      if (o.githubPullRequest) return o.githubPullRequest;
      const u = o.pullRequestUrl || o.prUrl;
      if (u) return { url: u, number: u.split("/").pop() };
    }
    return null;
  };

  let pr = findInOutputs(s.outputs) || s.githubPullRequest || s.pullRequest || s.sourceContext?.githubRepoContext?.pullRequest || s.github_pull_request;
  if (pr && typeof pr === 'object' && pr.url) {
    const res = { ...pr, number: pr.number || pr.url.split("/").pop() };
    if (sid !== "temp") PR_CACHE.set(sid, res);
    return res;
  }

  const str = JSON.stringify(s);
  const m = str.match(GH_PR_RE);
  if (m) {
    const res = { url: m[0], number: m[1] };
    if (sid !== "temp") PR_CACHE.set(sid, res);
    return res;
  }

  if (sid !== "temp") PR_CACHE.set(sid, null);
  return null;
};

const getPRInfo = (s, activities = []) => {
  let pr = getPR(s);

  // If not found in session object, scan activities (crucial for recent sessions)
  if (!pr && activities && activities.length > 0) {
    for (let i = activities.length - 1; i >= 0; i--) {
      const a = activities[i];
      const actPR = a.sessionCompleted?.outputs?.find(o => o.githubPullRequest)?.githubPullRequest ||
                    a.progressUpdated?.outputs?.find(o => o.githubPullRequest)?.githubPullRequest;
      if (actPR && actPR.url) {
        pr = { ...actPR, number: actPR.number || actPR.url.split("/").pop() };
        break;
      }
      const str = JSON.stringify(a);
      const m = str.match(GH_PR_RE);
      if (m) {
        pr = { url: m[0], number: m[1] };
        break;
      }
    }
  }

  if (!pr) return null;

  let state = "open";
  // Deep scan activities for merge or close events
  for (const a of activities) {
    const desc = (a.progressUpdated?.description || "").toLowerCase();
    const title = (a.progressUpdated?.title || "").toLowerCase();
    if (desc.includes("merged pull request") || title.includes("merged pull request") || a.sessionCompleted) {
      state = "merged";
      break;
    }
    if (desc.includes("closed pull request") || title.includes("closed pull request")) {
      state = "closed";
    }
  }

  return { ...pr, state };
};

const CHECK_URL_RE = /https:\/\/github\.com\/[^\/]+\/[^\/]+\/(?:actions\/runs|deployments|actions)\/\d*/;

const getCheckStatus = (activities = []) => {
  let status = null;
  for (let i = 0; i < activities.length; i++) {
    const a = activities[i];
    const pu = a.progressUpdated;
    if (!pu) continue;
    const desc = (pu.description || "").toLowerCase();
    const title = (pu.title || "").toLowerCase();

    const isSignal = desc.includes("check") || desc.includes("workflow") || desc.includes("deploy") || desc.includes("action") ||
                     title.includes("check") || title.includes("workflow") || title.includes("deploy");

    if (isSignal) {
      if (desc.includes("passed") || desc.includes("success") || desc.includes("completed") || desc.includes("verified")) {
        status = { state: "success", label: desc.includes("deploy") ? "DEPLOYED" : "CHECKS PASSED" };
      } else if (desc.includes("failed") || desc.includes("failure") || desc.includes("error")) {
        status = { state: "failure", label: desc.includes("deploy") ? "DEPLOY FAILED" : "CHECKS FAILED" };
      } else if (desc.includes("running") || desc.includes("pending") || desc.includes("started") || desc.includes("progress")) {
        status = { state: "pending", label: desc.includes("deploy") ? "DEPLOYING" : "CHECKS RUNNING" };
      }

      const urlMatch = (pu.description || "").match(CHECK_URL_RE);
      if (urlMatch && status) status.url = urlMatch[0];
    }
  }
  return status;
};

const BRANCH_INFO_CACHE = new Map();
const PUSH_RE = /push(?:ing|ed).* to (?:the |a )?([^\s\.\(\)\`]+)/i;
const BRANCH_RE = /branch (?:named )?([^\s\.\(\)\`]+)/i;
const CREATE_BRANCH_RE = /created.* branch ([^\s\.\(\)\`]+)/i;
const TREE_LINK_RE = /https:\/\/github\.com\/[^\/]+\/[^\/]+\/tree\/([a-zA-Z0-9\-_]+)/;
const BRANCH_LINK_RE = /https:\/\/github\.com\/[^\/]+\/[^\/]+\/branches\/([a-zA-Z0-9\-_]+)/;
const COMPARE_LINK_RE = /https:\/\/github\.com\/[^\/]+\/[^\/]+\/compare\/[^\.]+\.\.\.([a-zA-Z0-9\-_]+)/;
const PR_REPO_RE = /https:\/\/github\.com\/([^\/]+\/[^\/]+)\/pull/;

const getBranchInfo = (s, activities = []) => {
  if (!s) return null;
  const sid = s.id || s.name || "temp";
  const actLen = activities.length;
  const cacheKey = sid + ":" + actLen;
  if (sid !== "temp" && BRANCH_INFO_CACHE.has(cacheKey)) return BRANCH_INFO_CACHE.get(cacheKey);

  const context = s.sourceContext?.githubRepoContext;
  const base = context?.startingBranch || "main";

  let working = null;
  for (let i = 0; i < activities.length; i++) {
    const a = activities[i];
    const desc = a.progressUpdated?.description || "";
    const m = desc.match(PUSH_RE) || desc.match(BRANCH_RE) || desc.match(CREATE_BRANCH_RE);
    if (m) {
      const bname = m[1].replace(/['"`\.]/g, "");
      if (bname !== "main" && bname !== "master") working = bname;
    }
  }

  if (!working) {
    const str = JSON.stringify(s) + JSON.stringify(activities);
    const m = str.match(TREE_LINK_RE);
    if (m) working = m[1];
    if (!working) {
      const bm = str.match(BRANCH_LINK_RE) || str.match(COMPARE_LINK_RE);
      if (bm) working = bm[1];
    }
  }

  let repo = s.sourceContext?.source?.replace("sources/github/","");
  if (!repo || repo.startsWith("sources/")) {
    const pr = getPR(s);
    if (pr && pr.url) {
      const m = pr.url.match(PR_REPO_RE);
      if (m) repo = m[1];
    }
  }

  const repoUrl = repo && !repo.startsWith("sources/") ? `https://github.com/${repo}` : null;
  const res = { base, working: working || base, repo: repoUrl ? repo : null, repoUrl, isNew: working && working !== base };
  if (sid !== "temp") {
    if (BRANCH_INFO_CACHE.size > 500) BRANCH_INFO_CACHE.clear();
    BRANCH_INFO_CACHE.set(cacheKey, res);
  }
  return res;
};

const WORKING_SET_CACHE = new Map();
const FILE_MENTION_RE = /`([^`\s]+\.[a-z0-9]+)`/gi;

const getWorkingSet = (s, activities = []) => {
  if (!s) return [];
  const sid = s.id || s.name || "temp";
  const actLen = activities.length;
  const promptLen = s.prompt?.length || 0;
  const cacheKey = `${sid}:${actLen}:${promptLen}`;

  if (WORKING_SET_CACHE.has(cacheKey)) return WORKING_SET_CACHE.get(cacheKey);

  const files = new Set();

  // 1. Scan activities for patches
  for (let i = 0; i < activities.length; i++) {
    const a = activities[i];
    if (a.artifacts) {
      for (let j = 0; j < a.artifacts.length; j++) {
        const art = a.artifacts[j];
        const patch = art.changeSet?.gitPatch?.unidiffPatch;
        if (patch) {
          const lines = patch.split("\n");
          for (let k = 0; k < lines.length; k++) {
            const line = lines[k];
            if (line.startsWith("+++ ")) {
              const file = line.slice(4).replace(/^b\//, "");
              if (file && file !== "/dev/null") files.add(file);
            }
          }
        }
      }
    }

    // 2. Scan planGenerated for file mentions
    if (a.planGenerated?.plan?.steps) {
      const steps = a.planGenerated.plan.steps;
      for (let j = 0; j < steps.length; j++) {
        const st = steps[j];
        const text = st.title + " " + (st.description || "");
        let match;
        FILE_MENTION_RE.lastIndex = 0;
        while ((match = FILE_MENTION_RE.exec(text)) !== null) {
          const f = match[1];
          if (f.includes("/") || f.includes(".")) files.add(f);
        }
      }
    }
  }

  // 3. Fallback: Scan prompt for file mentions if it's a new session
  if (files.size === 0 && s.prompt) {
    let match;
    FILE_MENTION_RE.lastIndex = 0;
    while ((match = FILE_MENTION_RE.exec(s.prompt)) !== null) {
      const f = match[1];
      if (f.includes("/") || f.includes(".")) files.add(f);
    }
  }

  const result = Array.from(files);
  if (WORKING_SET_CACHE.size > 500) WORKING_SET_CACHE.clear();
  WORKING_SET_CACHE.set(cacheKey, result);
  return result;
};

const HASH_RE = /\b[a-f0-9]{7,40}\b/g;
const COMMIT_COUNT_RE = /(?:pushed|committed|applied)\s+(\d+)\s+(?:commit|change|fix|update)/i;

const getAheadCount = (activities = []) => {
  let count = 0;
  const pushHashes = new Set();

  for (let i = 0; i < activities.length; i++) {
    const a = activities[i];
    const pu = a.progressUpdated;
    if (!pu) continue;
    const rawDesc = pu.description || "";
    const desc = rawDesc.toLowerCase();
    const hashes = rawDesc.match(HASH_RE);
    if (hashes) {
      for (let j = 0; j < hashes.length; j++) {
        const h = hashes[j];
        if (h.length >= 7 && !h.includes("-")) pushHashes.add(h);
      }
    }

    const m = desc.match(COMMIT_COUNT_RE);
    if (m) {
      if (!hashes) count += parseInt(m[1], 10);
    } else if (desc.includes("pushed a commit") || desc.includes("pushed 1 commit") || desc.includes("pushed the changes") || desc.includes("committed changes")) {
      if (!hashes) count += 1;
    } else if (desc.includes("pushed") && (desc.includes("change") || desc.includes("fix") || desc.includes("update"))) {
      if (!hashes) count += 1;
    }
  }
  return Math.max(count, pushHashes.size);
};

  if (d < 86400000) return `${Math.floor(d / 3600000)}h ${Math.floor((d % 3600000) / 60000)}m`;
  return `${Math.floor(d / 86400000)}d`;
};

// ─── PWA install hook ─────────────────────────────────────────────────────────
function usePWA() {
  const [canInstall, setCanInstall] = useState(() => !!window.__pwa?.installPrompt);
  const [installed,  setInstalled]  = useState(false);
  const [installing, setInstalling] = useState(false);

  useEffect(() => {
    const onReady   = () => setCanInstall(true);
    const onInstall = () => { setInstalled(true); setCanInstall(false); };
    window.addEventListener("pwa-installable", onReady);
    window.addEventListener("pwa-installed",   onInstall);
    return () => { window.removeEventListener("pwa-installable",onReady); window.removeEventListener("pwa-installed",onInstall); };
  }, []);

  const install = useCallback(async () => {
    const prompt = window.__pwa?.installPrompt;
    if (!prompt) return;
    setInstalling(true);
    try {
      prompt.prompt();
      const { outcome } = await prompt.userChoice;
      if (outcome === "accepted") { window.__pwa.installPrompt = null; setCanInstall(false); }
    } finally { setInstalling(false); }
  }, []);

  return { canInstall, installed, installing, install, isFile: window.__pwa?.isFileProtocol };
}

// ─── Responsive hook ──────────────────────────────────────────────────────────
function useIsDesktop() {
  // Capture initial state to avoid layout shift on rotation for "auto" mode
  // unless the threshold is significantly crossed (e.g. tablet/desktop vs phone)
  const [v, setV] = useState(() => window.innerWidth >= 1024);

  useEffect(() => {
    const h = () => {
      // Only switch if we cross the major "tablet/desktop" threshold
      // 1024px is a safe bet for "not a phone in portrait"
      const current = window.innerWidth >= 1024;
      setV(prev => {
        // If we were mobile and stayed under 1024, or were desktop and stayed over 768, keep it.
        // This provides some hysteresis and stability.
        if (prev && window.innerWidth < 768) return false;
        if (!prev && window.innerWidth >= 1024) return true;
        return prev;
      });
    };
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return v;
}

const useScrollThreshold = (threshold = 40) => {
  const [scrolled, setScrolled] = useState(false);
  const onScroll = useCallback(e => {
    const s = e.target.scrollTop > threshold;
    if (s !== scrolled) setScrolled(s);
  }, [scrolled, threshold]);
  return [scrolled, onScroll];
};

const useAutoPoll = (interval, fn) => {
  const [countdown, setCountdown] = useState(0);
  const nextRefAt = useRef(0);
  const fnRef = useRef(fn);
  fnRef.current = fn;

  useEffect(() => {
    if (!interval || interval <= 0) {
      setCountdown(0);
      return;
    }

    let active = true;
    let timer = null;
    let intv = null;

    const run = async () => {
      if (!active) return;

      const nextAt = Date.now() + interval;
      nextRefAt.current = nextAt;
      setCountdown(Math.ceil(interval / 1000));

      timer = setTimeout(async () => {
        if (!active) return;
        try { await fnRef.current(); } catch (err) { console.error("Poll failed", err); }
        if (active) run();
      }, interval);
    };

    run();

    intv = setInterval(() => {
      if (active) {
        const remaining = Math.max(0, Math.ceil((nextRefAt.current - Date.now()) / 1000));
        setCountdown(remaining);
      }
    }, 1000);

    return () => {
      active = false;
      clearTimeout(timer);
      clearInterval(intv);
    };
  }, [interval]);

  return countdown;
};

const ExpandableContent = memo(({ text, limit = 300, showCopy = false, forceExpanded = false }) => {
  const [expanded, setExpanded] = useState(false);
  const [showToggle, setShowToggle] = useState(false);
  const [copied, setCopied] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const isOverScroll = ref.current && ref.current.scrollHeight > limit;
    const isOverLength = text && text.length > limit;
    if (isOverScroll || isOverLength) setShowToggle(true);
  }, [text, limit]);

  useEffect(() => {
    if (forceExpanded) {
      setExpanded(true);
    }
  }, [forceExpanded]);

  const handleCopy = () => {
    if (copied) return;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div style={{position:"relative"}}>
      <div ref={ref} style={{
        maxHeight: expanded ? "none" : limit,

const Markdown = memo(({ text }) => {
  if (!text) return null;
  const parts = text.split(/```/g);
  return parts.map((part, i) => {
    if (i % 2 === 1) { // Code block
      const lines = part.split("\n");
      let lang = lines[0].trim();
      let content = lines.slice(1).join("\n").trim();
      if (!content && lines.length > 0) { content = lines.join("\n").trim(); lang = ""; }

      return (
        <div key={i} style={{
          margin:"10px 0", background:"#040507", border:`1px solid ${T.border}`,
          borderRadius:6, overflow:"hidden", fontFamily:"'JetBrains Mono',monospace", fontSize:13,
        }}>
          {lang && (
            <div style={{padding:"4px 10px", background:T.surface, borderBottom:`1px solid ${T.border}33`, fontSize:11, color:T.textDim, textTransform:"uppercase", letterSpacing:"0.05em"}}>
              {lang}
            </div>
          )}
          <div style={{padding:"12px", color:T.text, whiteSpace:"pre-wrap", overflowWrap:"break-word", wordBreak:"break-word"}}>
            {content}
          </div>
        </div>
      );
    }

    // Process lists and bold text in standard text parts
    const lines = part.split("\n");
    return (
      <span key={i} style={{whiteSpace:"pre-wrap", overflowWrap:"break-word", wordBreak:"break-word"}}>
        {lines.map((line, li) => {
          const trimmed = line.trim();
          if (!trimmed && li > 0 && li < lines.length - 1) return <div key={li} style={{height: 12}} />;
          if (!trimmed) return <div key={li} />;

          const isListItem = trimmed.startsWith("- ") || trimmed.startsWith("* ");
          const isNumItem = /^\d+\.\s/.test(trimmed);
          const isHeader = trimmed.endsWith(":") && !isListItem && !isNumItem && trimmed.length < 80;

          // Support for **bold** text
          const processBold = (txt) => {
            if (typeof txt !== 'string' || !txt.includes("**")) return txt;
            const segments = txt.split("**");
            return segments.map((seg, si) => si % 2 === 1 ? <strong key={si} style={{color:T.textHi, fontWeight:700}}>{seg}</strong> : seg);
          };

          let content = line;

          if (isListItem) {
            const bullet = trimmed.startsWith("- ") ? "- " : "* ";
            const rest = trimmed.substring(bullet.length);
            content = (
              <div style={{display:"flex", gap:12, marginBottom:8, paddingLeft:4, alignItems:"flex-start"}}>
                <div style={{width:6, height:6, borderRadius:"50%", background:T.brand, marginTop:7, flexShrink:0, boxShadow:`0 0 10px ${T.brand}60`}}/>
                <span style={{flex:1, color:T.text, lineHeight:1.6}}>{processBold(rest)}</span>
              </div>
            );
          } else if (isNumItem) {
            const match = trimmed.match(/^(\d+\.\s)(.*)/);
            const num = match[1];
            const rest = match[2];
            content = (
              <div style={{display:"flex", gap:8, marginBottom:8, paddingLeft:2, alignItems:"flex-start"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:900, color:T.brandLight, flexShrink:0, width:22}}>{num}</span>
                <span style={{flex:1, color:T.text, lineHeight:1.6}}>{processBold(rest)}</span>
              </div>
            );
          } else if (isHeader) {
            content = (
              <div style={{
                fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:900,
                color:T.brandLight, letterSpacing:"0.08em", marginTop:li===0?0:22, marginBottom:12,
                textTransform:"uppercase", borderBottom:`2px solid ${T.brand}25`,
                display:"inline-block", paddingBottom:4
              }}>{processBold(trimmed)}</div>
            );
          } else {
            content = <div style={{lineHeight:1.6, color:T.textDim, marginBottom:4}}>{processBold(line)}</div>;
          }

          return <div key={li}>{content}</div>;
        })}
      </span>
    );
  });
});

// ─── Activity Feed ────────────────────────────────────────────────────────────
const COLLAPSE_THRESHOLD = 35;
const COLLAPSE_SHOW      = 25;

const ActivityFeed = memo(({ activities, showAll, onShowAll, onMediaClick, onEditMessage, onReply, driftSessions = [], justUpdated = false, scrolledActivityId = null }) => {
  const collapse  = !showAll && activities.length > COLLAPSE_THRESHOLD;
  const visible   = collapse ? activities.slice(activities.length - COLLAPSE_SHOW) : activities;
  const hidden    = activities.length - visible.length;

  const deduped = useMemo(() => {
    const list = [];
    let lastPKey = null;
    let lastType = null;
    for (const a of visible) {
      const type = getActType(a);
      if (type === "planApproved" && lastType === "planApproved") continue;
      if (type === "sessionCompleted" && lastType === "sessionCompleted") continue;

      if (a.progressUpdated) {
        const p = a.progressUpdated;
        const pKey = `${p.title || ""}:${p.description || ""}`;
        if (lastPKey === pKey) continue;
        lastPKey = pKey;
      } else {
        lastPKey = null;
      }
      list.push(a);
      lastType = type;
    }
    return list;
  }, [visible]);

  const combined = useMemo(() => {
    const list = [...deduped.map(a => ({ type: "activity", data: a, ts: new Date(a.createTime).getTime() }))];
    driftSessions.forEach(s => {
      list.push({ type: "drift", data: s, ts: new Date(s.updateTime || s.createTime).getTime() });
    });
    return list.sort((a, b) => a.ts - b.ts);
  }, [deduped, driftSessions]);

  return (
    <>
      {collapse && (
        <button onClick={onShowAll} style={{
          display:"block",width:"100%",marginBottom:14,
          background:T.surfaceHi,border:`1px solid ${T.border}`,
          borderRadius:6,padding:"8px 12px",cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",fontSize:11,
          color:T.textDim,textAlign:"center",letterSpacing:"0.08em",
        }}>
          ↑ SHOW {hidden} EARLIER {hidden===1?"EVENT":"EVENTS"}
        </button>
      )}
      {combined.map((item, idx) => {
        if (item.type === "drift") {
          return (
            <div key={`drift-${item.data.id}-${idx}`} style={{
              margin: "12px 0 20px", padding: "10px 14px", background: "rgba(252, 211, 77, 0.03)",
              border: `1px dashed ${T.amber}30`, borderRadius: 8, display: "flex", gap: 10, alignItems: "center"
            }}>
              <div style={{ width: 20, height: 20, borderRadius: "50%", background: T.amberDim, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${T.amber}40` }}>
                <Ic n="wifi" s={11} c={T.amber}/>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono',monospace", fontSize: 10, fontWeight: 800, color: T.amber, letterSpacing: "0.05em",
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                }} title={item.data.title || item.data.prompt}>
                  BASE DRIFT · {item.data.title || item.data.prompt}
                </div>
                <div style={{ fontFamily: "'IBM Plex Sans',sans-serif", fontSize: 11, color: T.dim }}>
                  Merged {fmtAgo(item.ts)}
                </div>
              </div>
            </div>
          );
        }
        const act = item.data;
        const type = getActType(act);
        const key  = getActKey(act);
        if (type === "userMessaged" || type === "agentMessaged") {
          return <ChatBubble key={key} act={act} type={type} onMediaClick={onMediaClick} onEdit={onEditMessage} onReply={onReply} forceExpanded={scrolledActivityId === key}/>;
        }
        return (
          <div key={key} id={`chat-activity-${key}`} style={{
            animation: justUpdated && idx >= combined.length - 5 ? "shimmerPulse 0.8s ease-out" : "none"
          }}>
            <TimelineEvent act={act} onMediaClick={onMediaClick} onReply={onReply}/>
          </div>
        );
      })}
    </>
  );
});

// ─── Interactive Plan View ────────────────────────────────────────────────────
// Lets the user review steps, annotate individual ones, compose a revision
// request via sendMessage, or approve the plan directly.
const PlanView = memo(({ activities, session, apiKey, onApprove, onSendFeedback, busy, allSessions = [], activitiesMap = {} }) => {
  const [stepNotes, setStepNotes]     = useState({}); // stepId → note string
  const [activeNote, setActiveNote]   = useState(null); // stepId currently expanded
  const [globalNote, setGlobalNote]   = useState("");
  const [sending, setSending]         = useState(false);
  const [sent, setSent]               = useState(false);

  // Find the most recent planGenerated activity
  const planAct = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i];
    }
    return null;
  }, [activities]);

  const plan  = planAct?.planGenerated?.plan;
  const steps = plan?.steps || [];

  // Check if plan already approved in activity history (must be after the plan was generated)
  const approved = useMemo(() => {
    if (!planAct) return false;
    const planTs = new Date(planAct.createTime).getTime();
    return activities.some(a => a.planApproved && new Date(a.createTime).getTime() >= planTs);
  }, [activities, planAct]);

  const hasFeedback = globalNote.trim() || Object.values(stepNotes).some(n => n.trim());

  const buildFeedbackMessage = () => {
    const parts = ["Please revise the plan based on my feedback:"];
    const stepFeedback = steps
      .filter(st => stepNotes[st.id]?.trim())
      .map((st, i) => `Step ${i + 1} (${st.title}): ${stepNotes[st.id].trim()}`);
    if (stepFeedback.length) parts.push(...stepFeedback);
    if (globalNote.trim()) parts.push("Overall: " + globalNote.trim());
    return parts.join("\n");
  };

  const handleRequestRevision = async () => {
    if (!hasFeedback || sending) return;
    setSending(true);
    try {
      await onSendFeedback(buildFeedbackMessage());
      setStepNotes({});
      setGlobalNote("");
      setActiveNote(null);
      setSent(true);
      setTimeout(() => setSent(false), 3000);
    } finally { setSending(false); }
  };

  if (!plan) return (
    <div style={{textAlign:"center",padding:"50px 24px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.textDim}}>
      {session.state === "PLANNING" ? "Jules is generating a plan…" : "No plan available"}
    </div>
  );

  const pendingApproval = session.state === "AWAITING_PLAN_APPROVAL";
  const annotatedCount  = Object.values(stepNotes).filter(n=>n.trim()).length;

  return (
    <div style={{paddingBottom:16}}>
      <ConflictRadar
        currentSource={session.sourceContext?.source}
        currentBranch={session.sourceContext?.githubRepoContext?.startingBranch}
        currentPrompt={session.prompt}
        allSessions={allSessions}
        activitiesMap={activitiesMap}
        currentSessionId={session.id}
        startTime={new Date(session.createTime).getTime()}
      />

      {/* Plan header */}
      <div style={{
        marginBottom:14,padding:"10px 14px",borderRadius:7,
        background:approved?T.brandDim:pendingApproval?T.purpleDim:T.surfaceHi,
        border:`1px solid ${approved?T.brand+"40":pendingApproval?T.purple+"40":T.border}`,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:approved||!pendingApproval?0:8}}>
          <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
            color:approved?T.brand:pendingApproval?T.purple:T.muted,letterSpacing:"0.06em"}}>
            {approved?"✓ PLAN APPROVED":pendingApproval?"PLAN READY FOR REVIEW":"PLAN PREVIEW"}
          </div>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.textDim}}>
            {steps.length} step{steps.length!==1?"s":""}
          </span>
        </div>
        {pendingApproval&&!approved&&(
          <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,color:T.textDim,lineHeight:1.5}}>
            Review each step below. Tap a step to add feedback, then request a revision or approve.
          </div>
        )}
      </div>

      {/* Steps */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
        {steps.map((st, i) => {
          const note     = stepNotes[st.id] || "";
          const isOpen   = activeNote === st.id;
          const hasNote  = note.trim().length > 0;

          return (
            <div key={st.id||i} style={{
              background:T.surface,border:`1px solid ${hasNote?T.amber+"50":T.border}`,
              borderLeft:`2px solid ${hasNote?T.amber:T.purple+"60"}`,
              borderRadius:6,overflow:"hidden",transition:"border-color .15s cubic-bezier(0.4, 0, 0.2, 1)",
            }}>
              {/* Step row */}
              <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px"}}>
                <div style={{
                  width:24,height:24,borderRadius:4,flexShrink:0,marginTop:1,
                  background:hasNote?T.amberDim:T.purpleDim,
                  border:`1px solid ${hasNote?T.amber+"50":T.purple+"40"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,
                  color:hasNote?T.amber:T.purple,
                }}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:15,fontWeight:500,
                    color:T.text,lineHeight:1.35,marginBottom:st.description?10:0}}>
                    {st.title}
                  </div>
                  {st.description&&(
                    <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,color:T.textDim,lineHeight:1.45}}>
                      {st.description}
                    </div>
                  )}
                  {hasNote&&!isOpen&&(
                    <div style={{marginTop:5,padding:"4px 8px",borderRadius:4,
                      background:T.amberDim,border:`1px solid ${T.amber}30`,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,color:T.amber,lineHeight:1.4}}>
                      📝 {note}
                    </div>
                  )}
                </div>
                {pendingApproval&&!approved&&(
                  <button onClick={()=>setActiveNote(isOpen?null:st.id)} style={{
                    flexShrink:0,padding:"4px 8px",borderRadius:4,border:"none",cursor:"pointer",
                    background:isOpen?(hasNote?T.amberDim:T.purpleDim):"transparent",
                    outline:`1px solid ${isOpen?(hasNote?T.amber+"40":T.purple+"40"):T.border}`,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,
                    color:isOpen?(hasNote?T.amber:T.purple):T.muted,
                    transition:"all .12s cubic-bezier(0.4, 0, 0.2, 1)",letterSpacing:"0.06em",
                  }}>{hasNote?"EDIT":"NOTE"}</button>
                )}
              </div>

              {/* Per-step feedback textarea */}
              {isOpen&&pendingApproval&&!approved&&(
                <div style={{padding:"0 12px 12px",borderTop:`1px solid ${T.border}`}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.amber,
                    letterSpacing:"0.08em",marginBottom:5,marginTop:8}}>FEEDBACK FOR STEP {i+1}</div>
                  <textarea
                    value={note}
                    onChange={e=>setStepNotes(prev=>({...prev,[st.id]:e.target.value}))}
                    placeholder={`What should change about this step? (e.g. "Use TypeScript instead of JS", "Skip this — not needed")`}
                    rows={2}
                    style={{
                      width:"100%",background:T.surfaceHi,border:`1px solid ${T.amber}40`,
                      borderRadius:5,padding:"8px 10px",color:T.text,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,lineHeight:1.4,
                      resize:"vertical",outline:"none",boxSizing:"border-box",
                    }}
                    autoFocus
                  />
                  <button onClick={()=>setActiveNote(null)} style={{
                    marginTop:5,padding:"4px 10px",borderRadius:4,border:`1px solid ${T.border}`,
                    background:"transparent",cursor:"pointer",color:T.textDim,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                  }}>DONE</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Global feedback + actions — only when pending approval */}
      {pendingApproval&&!approved&&(
        <div style={{
          background:T.surface,border:`1px solid ${T.border}`,
          borderRadius:7,padding:"12px 14px",
        }}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.textDim,
            letterSpacing:"0.08em",marginBottom:6}}>OVERALL FEEDBACK (optional)</div>
          <textarea
            value={globalNote}
            onChange={e=>setGlobalNote(e.target.value)}
            placeholder="Any overall comments before approving? (e.g. 'Make sure to run tests', 'Keep changes minimal')"
            rows={2}
            style={{
              width:"100%",background:T.surfaceHi,border:`1px solid ${T.border}`,
              borderRadius:5,padding:"8px 10px",color:T.text,
              fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,lineHeight:1.4,
              resize:"vertical",outline:"none",boxSizing:"border-box",
              transition:"border-color .18s cubic-bezier(0.4, 0, 0.2, 1)",marginBottom:10,
            }}
          />

          {sent&&(
            <div style={{marginBottom:8,padding:"6px 10px",borderRadius:4,
              background:T.brandDim,border:`1px solid ${T.brand}40`,
              fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.brand}}>
              ✓ Revision request sent — Jules will update the plan
            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <Btn
              onClick={handleRequestRevision}
              disabled={!hasFeedback||sending||busy}
              color={T.amber} outline sm
              style={{flex:1}}
            >
              {sending?"SENDING…":`REVISE${annotatedCount>0?` (${annotatedCount} step${annotatedCount>1?"s":""})`:globalNote.trim()?" +note":""}`}
            </Btn>
            <Btn
              onClick={onApprove}
              disabled={busy||sending}
              color={T.purple} sm
              style={{flex:1}}
            >
              <Ic n="approve" s={11} c="#000"/>
              {busy?"APPROVING…":"APPROVE PLAN"}
            </Btn>
          </div>
          <div style={{marginTop:7,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.textDim,textAlign:"center",lineHeight:1.6}}>
            Revise → Jules rewrites the plan · Approve → Jules starts executing
          </div>
        </div>
      )}
    </div>
  );
});

// ─── Diff Viewer ──────────────────────────────────────────────────────────────
const DiffViewer = ({ activities = [] }) => {
  const [collapsed, setCollapsed] = useState(null); // null = auto-collapse all on first load

  const latestPatch = useMemo(() => {
    // Find only the most recent patch artifact
    for (let i = activities.length - 1; i >= 0; i--) {
      const a = activities[i];
      if (a.artifacts) {
        for (const art of a.artifacts) {
          if (art.changeSet?.gitPatch?.unidiffPatch) {
            return {
              patch: art.changeSet.gitPatch.unidiffPatch,
              ts: a.createTime,
              id: a.id || i
            };
          }
        }
      }
    }
    return null;
  }, [activities]);

  const groups = useMemo(() => {
    if (!latestPatch) return [];
    const { patch, ts } = latestPatch;
    const allGroups = [];
    const lines = patch.split("\n");
    let currentGroup = null;

    lines.forEach((line) => {
      if (line.startsWith("--- ") || line.startsWith("diff --git")) return;
      if (line.startsWith("+++ ")) {
        const file = line.slice(4).replace(/^b\//, "");
        currentGroup = { file, hunks: [], adds: 0, rems: 0, ts };
        allGroups.push(currentGroup);
        return;
      }
      if (!currentGroup) return;

      if (line.startsWith("@@")) {
        currentGroup.hunks.push({ header: line, lines: [] });
      } else if (currentGroup.hunks.length > 0) {
        currentGroup.hunks[currentGroup.hunks.length - 1].lines.push(line);
        if (line.startsWith("+")) currentGroup.adds++;
        else if (line.startsWith("-")) currentGroup.rems++;
      }
    });
    return allGroups;
  }, [latestPatch]);

  const safeCollapsed = useMemo(() => {
    if (collapsed !== null) return collapsed;
    return new Set(groups.map((_, i) => i));
  }, [collapsed, groups]);

  const totalAdds = useMemo(() => groups.reduce((acc, g) => acc + g.adds, 0), [groups]);
  const totalRems = useMemo(() => groups.reduce((acc, g) => acc + g.rems, 0), [groups]);

  if (groups.length === 0) return (
    <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.textDim}}>
      No diff available yet
    </div>
  );

  const toggleFile = (idx) => {
    const next = new Set(safeCollapsed);
    if (next.has(idx)) next.delete(idx);
    else next.add(idx);
    setCollapsed(next);
  };

  const toggleAll = (doCollapse) => {
    if (doCollapse) setCollapsed(new Set(groups.map((_, i) => i)));
    else setCollapsed(new Set());
  };

  return (
    <div style={{display:"flex", flexDirection:"column", gap:12}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 4px"}}>
        <div style={{display:"flex", alignItems:"center", gap:10}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:800, color:T.dim, letterSpacing:"0.08em"}}>
            {groups.length} FILE{groups.length!==1?'S':''}
          </div>
          <div style={{display:"flex", alignItems:"center", gap:6, fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:800}}>
            <span style={{color:T.brand}}>+{totalAdds}</span>
            <span style={{color:T.red}}>-{totalRems}</span>
          </div>
        </div>
        <div style={{display:"flex", gap:6}}>
          <PickerBtn label="EXPAND" isAct={safeCollapsed.size === 0} onClick={() => toggleAll(false)} />
          <PickerBtn label="COLLAPSE" isAct={safeCollapsed.size === groups.length} onClick={() => toggleAll(true)} />
        </div>
      </div>

      {groups.map((g, gi) => {
        const isCollapsed = safeCollapsed.has(gi);
        const parts = g.file.split("/");
        const base = parts.pop();
        const dir = parts.join("/");

        return (
          <div key={gi} style={{
            background:T.surface, border:`1px solid ${isCollapsed ? T.border : T.borderHi}`,
            borderRadius:8, overflow:"hidden", marginBottom: 4,
            boxShadow: isCollapsed ? "none" : "0 4px 20px rgba(0,0,0,0.2), inset 0 0 1px rgba(255,255,255,0.05)",
            transition: "all .2s cubic-bezier(0.4, 0, 0.2, 1)"
          }}>
            <div
              role="button"
              tabIndex={0}
              aria-expanded={!isCollapsed}
              onClick={() => toggleFile(gi)}
              onKeyDown={e => (e.key === "Enter" || e.key === " ") && toggleFile(gi)}
              style={{
                padding:"8px 12px", background: isCollapsed ? "transparent" : T.surfaceHi,
                borderBottom:isCollapsed? "none" : `1px solid ${T.border}`,
                display:"flex", alignItems:"center", gap:10, cursor:"pointer", userSelect:"none", outline:"none",
                transition: "background .2s cubic-bezier(0.4, 0, 0.2, 1)"
              }}
            >
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"center",
                width:20, height:20, borderRadius:4, background: isCollapsed ? "transparent" : `${T.brand}15`,
                transition: "all .2s cubic-bezier(0.4, 0, 0.2, 1)"
              }}>
                <Ic n={isCollapsed ? "chevron_right" : "chevron_down"} s={14} c={isCollapsed ? T.dim : T.brand}/>
              </div>
              <div style={{flex:1, minWidth:0, display:"flex", flexDirection:"column", gap:0}}>
                {dir && <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.dim, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", opacity: 0.8, letterSpacing:"0.02em"}}>{dir}/</div>}
                <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:12, fontWeight:700, color:isCollapsed ? T.textDim : T.textHi, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginTop: dir ? -1 : 0}}>{base}</div>
              </div>
              <div style={{display:"flex", alignItems:"center", gap:6, fontFamily:"'JetBrains Mono',monospace", fontSize:9, fontWeight:800}}>
                <div style={{padding:"2px 6px", borderRadius:4, background:`${T.brand}10`, color:T.brandLight, border:`1px solid ${T.brand}20`}}>+{g.adds}</div>
                <div style={{padding:"2px 6px", borderRadius:4, background:`${T.red}10`, color:T.redLight, border:`1px solid ${T.red}20` }}>-{g.rems}</div>
              </div>
            </div>

            <div style={{
              maxHeight: isCollapsed ? 0 : 20000,
              opacity: isCollapsed ? 0 : 1,
              overflow: "hidden",
              transition: "all .4s cubic-bezier(0.4, 0, 0.2, 1)",
              fontFamily:"'JetBrains Mono',monospace", fontSize:11, lineHeight:1.4
            }}>
              {g.hunks.map((h, hi) => (
                <div key={hi} style={{ borderTop: hi > 0 ? `1px solid ${T.border}40` : "none" }}>
                  <div style={{
                    padding:"3px 12px", background:"rgba(30,41,59,0.5)", color:T.blue, fontSize:10,
                    fontWeight:700, borderBottom:`1px solid ${T.border}20`, display:"flex", alignItems:"center", gap:6
                  }}>
                    <div style={{ width:4, height:4, borderRadius:"50%", background:T.blue, opacity:0.5 }}/>
                    {h.header}
                  </div>
                  {h.lines.map((line, li) => {

// ─── Session Card ─────────────────────────────────────────────────────────────
const SessionCard = memo(({ s, onPress, isSelected, index, activities = [], stats, lastReadTs, allSessions = [], hasFollowupDraft }) => {
  const cardRef = useRef(null);

  useEffect(() => {
    if (isSelected && cardRef.current) {
      cardRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, [isSelected]);

  const isActuallyDone = useMemo(() => {
    if (ACTIVE_STATES.has(s.state)) return false;
    if (s.state === "COMPLETED") return true;
    let lastComp = -1, lastUser = -1;
    for (let i = activities.length - 1; i >= 0; i--) {
      const type = getActType(activities[i]);
      if (lastComp === -1 && type === "sessionCompleted") lastComp = i;
      if (lastUser === -1 && type === "userMessaged") lastUser = i;
      if (lastComp !== -1 && lastUser !== -1) break;
    }
    return lastComp !== -1 && lastComp > lastUser;
  }, [activities, s.state]);
  const currentState = isActuallyDone ? "COMPLETED" : s.state;

  const driftDetected = useMemo(() => {
    if (currentState === "COMPLETED") return false;
    const repo = s.sourceContext?.source;
    if (!repo) return false;
    const currentStart = new Date(s.createTime).getTime();

    return allSessions.some(other => {
      if (other.id === s.id || other.state !== "COMPLETED") return false;
      if (other.sourceContext?.source !== repo) return false;
      const completionTime = new Date(other.updateTime || other.createTime).getTime();
      return completionTime > currentStart;
    });
  }, [s, allSessions, currentState]);

  const isWorking = ACTIVE_STATES.has(currentState);
  const isFinished = currentState === "COMPLETED" || currentState === "FAILED";
  const updateTs = s.updateTime || s.createTime;
  const isUnread = isFinished && (!lastReadTs || updateTs > lastReadTs);

  const pct  = pctFromState(currentState);
  const m    = STATUS_META[currentState] || STATUS_META.QUEUED;
  const repo = s.sourceContext?.githubRepoContext ? s.sourceContext.source?.replace("sources/github/","") : null;
  const pri  = useMemo(() => getPRInfo(s, activities), [s, activities]);
  const b    = useMemo(() => getBranchInfo(s, activities), [s, activities]);
  const ahead = useMemo(() => getAheadCount(activities), [activities]);
  const checks = useMemo(() => getCheckStatus(activities), [activities]);

  const activityStats = useMemo(() => {
    if (stats) return stats;
    const count = activities.length;
    const rawData = JSON.stringify(activities);
    const size = new TextEncoder().encode(rawData).length;
    return { count, size };
  }, [activities, stats]);

  const [flash, setFlash] = useState(false);
  useEffect(() => {
    if (activityStats.count > 0) {
      setFlash(true);
      const t = setTimeout(() => setFlash(false), 20000);
      return () => clearTimeout(t);
    }
  }, [activityStats.count, activityStats.size]);

  const isVHighActivity = activityStats.count >= 300 || activityStats.size >= 5 * 1024 * 1024;
  const isHighActivity = activityStats.count >= 200 || activityStats.size >= 1 * 1024 * 1024;
  const highActivityStyle = isVHighActivity ? { color: T.red, fontWeight: 900 } : isHighActivity ? { color: T.amber, fontWeight: 900 } : {};

  const bg = isSelected
    ? `${T.brand}20`
    : isUnread ? `${T.indigo}0a` : isWorking ? `${T.blue}06` : T.surface;

  const borderColor = isSelected ? `${T.brand}30` : isUnread ? `${T.indigo}20` : isWorking ? `${T.blue}20` : `${T.border}66`;

  return (
    <button ref={cardRef} onClick={onPress}
      aria-label={`Session ${index}: ${s.title || s.prompt}. Status: ${m.label}. ${isUnread ? "New activity." : ""}`}
      style={{
        width:"100%", background:bg, textAlign:"left", cursor:"pointer",
        border:`1px solid ${borderColor}`,
        borderLeft:`2px solid ${isUnread ? T.indigo : (isSelected ? T.brand : T.border)}`,
        borderRadius:6, padding:"8px 12px", marginBottom:4, transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)",
        position:"relative",
        transform:isSelected?"translateX(4px) scale(1.005)":"none",
        outline:"none",
        boxShadow: "none",
        zIndex: isSelected ? 2 : 1,
      }}
      onFocus={e => e.currentTarget.style.borderColor = T.brand}
      onBlur={e => e.currentTarget.style.borderColor = borderColor}
    >
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
        <div style={{width:16,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,fontWeight:800,opacity:0.6}}>{index}</div>
        <div
          title={m.label}
          aria-label={`Status: ${m.label}`}
          style={{display:"flex",alignItems:"center",justifyContent:"center",width:18,height:18,background:"transparent",flexShrink:0}}
        >
          <div style={{ display: "flex", animation: currentState === "IN_PROGRESS" ? "spin 3s linear infinite" : "none" }}>
            <Ic n={m.icon} s={11} c={m.color}/>
          </div>
        </div>
        <div style={{flex:1,minWidth:0,fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,fontWeight:600,color:isSelected?T.textHi:T.textDim,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {s.title||s.prompt}
        </div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,fontWeight:500,flexShrink:0}}>
          {fmtAgo(new Date(s.updateTime||s.createTime).getTime())}
        </div>
      </div>

      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4, marginLeft:26, flexWrap:"wrap"}}>
        {repo && (
          <div style={{display:"flex", alignItems:"center", gap:4, opacity:0.7}}>
            <Ic n="code" s={10} c={T.muted}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,fontWeight:700}}>{repo}</span>
          </div>
        )}
        {pri && (
          <div style={{display:"flex", alignItems:"center", gap:4, color:pri.state==="merged"?T.purple:T.brand, opacity:0.9}}>
            <Ic n={pri.state==="merged"?"git_merge":"git_pull"} s={10} c={pri.state==="merged"?T.purple:T.brand}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:900}}>#{pri.number}</span>
          </div>
