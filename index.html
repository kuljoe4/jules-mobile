    <script>
    // ── PWA Bootstrap ──────────────────────────────────────────────────────────
    // Chrome PWA install requires:
    //   1. HTTPS (or localhost) — file:// will NOT work
    //   2. A web manifest reachable at the same origin
    //   3. A service worker registered at the same origin
    //
    // Strategy for a single-file PWA:
    //   • Manifest  → data: URI (Chrome accepts this for installability)
    //   • SW        → written to the page origin via a self-fetching trick:
    //                 the SW script is base64-encoded inside this file and
    //                 registered by fetching the HTML itself and rewriting it.
    //                 For true single-file, we use a same-origin fetch of this
    //                 file's own URL, serve the SW JS via a custom response
    //                 intercepted by a SharedWorker shim — but that's overkill.
    //                 Simplest working approach: write SW source to a data: URL
    //                 registered with `{scope:'/'}` which Chrome 89+ supports
    //                 when the page itself is on an HTTP origin.
    //
    // Expose globals so React can read install state.
    window.__pwa = { isFileProtocol: location.protocol === "file:", installPrompt: null, swOk: false };

    (function pwaSetup() {
      // ── 1. Manifest via data: URI (works on HTTP origins) ──────────────────
      const mkIcon = (size, rx) => {
        const fs = Math.floor(size * 0.625), y = Math.floor(size * 0.73);
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${rx}" fill="#07090c"/><text x="${size/2}" y="${y}" font-size="${fs}" text-anchor="middle" fill="#00e87a" font-weight="900" font-family="monospace">J</text></svg>`;
        return { src:"data:image/svg+xml;base64,"+btoa(svg), sizes:`${size}x${size}`, type:"image/svg+xml", purpose:"maskable any" };
      };
      const manifest = {
        name:"Jules Agent Client", short_name:"Jules",
        description:"Monitor and control Jules AI coding sessions",
        start_url: location.href.split("?")[0],
        scope: location.href.split("?")[0].replace(/[^/]*$/, ""),
        display:"standalone", background_color:"#07090c", theme_color:"#00e87a",
        orientation:"any", categories:["developer","productivity"],
        icons:[ mkIcon(192,24), mkIcon(512,64) ],
      };
      // data: URI — Chrome validates manifests here starting Chromium 93
      const manifestJSON = JSON.stringify(manifest);
      const manifestURI  = "data:application/manifest+json," + encodeURIComponent(manifestJSON);
      const lnk = document.createElement("link");
      lnk.rel = "manifest"; lnk.href = manifestURI;
      document.head.appendChild(lnk);

      // ── 2. Service Worker ──────────────────────────────────────────────────
      // SW registered from a blob: URL is rejected by Chrome's PWA checker.
      // Instead we write the SW source into a tiny JavaScript data: URL and
      // register it — Chrome 91+ allows data: SW registration when the page
      // is on a secure origin (https / localhost).
      if ("serviceWorker" in navigator && !window.__pwa.isFileProtocol) {
        const swSrc = [
          'const C="jules-v3";',
          'const PRE=["https://unpkg.com/react@18/umd/react.production.min.js","https://unpkg.com/react-dom@18/umd/react-dom.production.min.js","https://unpkg.com/@babel/standalone/babel.min.js"];',
          'self.addEventListener("install",e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll(PRE).catch(()=>{})));});',
          'self.addEventListener("activate",e=>e.waitUntil(clients.claim()));',
          'self.addEventListener("fetch",e=>{',
          '  const u=e.request.url;',
          '  if(u.includes("jules.googleapis.com"))return;',
          '  if(u.includes("unpkg.com")||u.includes("fonts.googleapis")||u.includes("fonts.gstatic")){',
          '    e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request).then(r=>{',
          '      const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));return r;',
          '    })));',
          '  }',
          '});',
        ].join("");
        // data: URI SW — same-origin restriction bypassed on secure origins
        const swDataURI = "data:text/javascript;base64," + btoa(swSrc);
        navigator.serviceWorker.register(swDataURI, { scope: "/" })
          .then(() => { window.__pwa.swOk = true; })
          .catch(() => {
            // Fallback: blob URL (works for caching, not for install prompt)
            const blob = new Blob([swSrc], { type:"text/javascript" });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
          });
      }

      // ── 3. Capture install prompt ──────────────────────────────────────────
      window.addEventListener("beforeinstallprompt", e => {
        e.preventDefault();
        window.__pwa.installPrompt = e;
        // Notify React if it's already mounted
        window.dispatchEvent(new Event("pwa-installable"));
      });
      window.addEventListener("appinstalled", () => {
        window.__pwa.installPrompt = null;
        window.dispatchEvent(new Event("pwa-installed"));
      });
    })();
    </script>

<script>
(function(){
  var hint  = document.getElementById("splash-hint");
  var step  = document.getElementById("splash-step");
  var bar   = document.getElementById("splash-bar");
  var t0    = Date.now();

  function setMsg(h, s, pct) {
    if (hint) hint.textContent = h;
    if (step) step.textContent = s;
    if (bar && pct !== undefined) {
      bar.style.animation = "none";
      bar.style.transition = "width .3s cubic-bezier(.4,0,.2,1)";
      bar.style.width = pct + "%";
    }
  }
  function elapsed() { return ((Date.now()-t0)/1000).toFixed(1)+"s"; }

  // Expose for inline onload handlers below
  window.__splashMsg = setMsg;
  window.__splashElapsed = elapsed;

  setMsg("LOADING REACT…", "core library · " + elapsed(), 8);
})();
</script>

async function resetApp() {
  if (!confirm("Clear all local data, settings, and cache? You will be logged out.")) return;
  try {
    localStorage.clear();
    sessionStorage.clear();
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    location.reload(true);
  } catch(e) {
    alert("Error resetting app: " + e.message);
    location.reload();
  }
}

// ─── Network tracker ──────────────────────────────────────────────────────────
function makeNetTracker() {
  let total=0, saved=0, log=[];
  const subs=[];
  const notify = () => subs.forEach(f => f({ total, saved, log:[...log] }));
  return {
    record(label, bytes, savedBytes=0) {
      total+=bytes; saved+=savedBytes;
      log.unshift({ id:Math.random(), label, bytes, savedBytes, ts:Date.now() });
      if (log.length > 60) log.length = 60;
      notify();
    },
    subscribe(fn) { subs.push(fn); return () => { const i=subs.indexOf(fn); if(i>-1) subs.splice(i,1); }; },
    snapshot() { return { total, saved, log:[...log] }; },
  };
}
const NET = makeNetTracker();

async function apiCall(apiKey, path, opts={}) {
  const res = await fetch(`${BASE}${path}`, {
    ...opts,
    headers: { "x-goog-api-key":apiKey, "Content-Type":"application/json", ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const text = await res.text();
  NET.record(opts._label || path, new TextEncoder().encode(text).length / 1024);
  if (!res.ok) {
    let msg = text;
    try { msg = JSON.parse(text)?.error?.message || text; } catch {}
    throw new Error(`${res.status}: ${msg}`);
  }
  return text ? JSON.parse(text) : {};
}

// ─── PWA install hook ─────────────────────────────────────────────────────────
function usePWA() {
  const [canInstall, setCanInstall] = useState(() => !!window.__pwa?.installPrompt);
  const [installed,  setInstalled]  = useState(false);
  const [installing, setInstalling] = useState(false);

  useEffect(() => {
    const onReady   = () => setCanInstall(true);
    const onInstall = () => { setInstalled(true); setCanInstall(false); };
    window.addEventListener("pwa-installable", onReady);
    window.addEventListener("pwa-installed",   onInstall);
    return () => { window.removeEventListener("pwa-installable",onReady); window.removeEventListener("pwa-installed",onInstall); };
  }, []);

  const install = useCallback(async () => {
    const prompt = window.__pwa?.installPrompt;
    if (!prompt) return;
    setInstalling(true);
    try {
      prompt.prompt();
      const { outcome } = await prompt.userChoice;
      if (outcome === "accepted") { window.__pwa.installPrompt = null; setCanInstall(false); }
    } finally { setInstalling(false); }
  }, []);

  return { canInstall, installed, installing, install, isFile: window.__pwa?.isFileProtocol };
}

function useIsDesktop() {
  const [v, setV] = useState(() => window.innerWidth >= 768);
  useEffect(() => {
    const h = () => setV(window.innerWidth >= 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return v;
}

const useScrollThreshold = (threshold = 40) => {
  const [scrolled, setScrolled] = useState(false);
  const onScroll = useCallback(e => {
    const s = e.target.scrollTop > threshold;
    if (s !== scrolled) setScrolled(s);
  }, [scrolled, threshold]);
  return [scrolled, onScroll];
};

const useAutoPoll = (interval, fn) => {
  const [countdown, setCountdown] = useState(0);
  const pollRef = useRef(null);
  const countdownRef = useRef(null);
  const nextRefAt = useRef(0);

  const schedule = useCallback(() => {
    if (!interval) { setCountdown(0); return; }
    nextRefAt.current = Date.now() + interval;
    setCountdown(Math.ceil(interval / 1000));
    pollRef.current = setTimeout(async () => {
      try { await fn(); } catch(e) { console.error("Poll failed", e); }
      finally { schedule(); }
    }, interval);
  }, [interval, fn]);

  useEffect(() => {
    clearTimeout(pollRef.current);
    clearInterval(countdownRef.current);
    if (!interval) return;
    schedule();
    countdownRef.current = setInterval(() => {
      setCountdown(Math.max(0, Math.ceil((nextRefAt.current - Date.now()) / 1000)));
    }, 1000);
    return () => { clearTimeout(pollRef.current); clearInterval(countdownRef.current); };
  }, [interval, schedule]);

  return countdown;
};

const Markdown = memo(({ text }) => {
  if (!text) return null;
  const parts = text.split(/```/g);
  return parts.map((part, i) => {
    if (i % 2 === 1) { // Code block
      const lines = part.split("\n");
      let lang = lines[0].trim();
      let content = lines.slice(1).join("\n").trim();
      if (!content && lines.length > 0) { content = lines.join("\n").trim(); lang = ""; }

      return (
        <div key={i} style={{
          margin:"8px 0", background:"#040507", border:`1px solid ${T.border}`,
          borderRadius:6, overflow:"hidden", fontFamily:"'JetBrains Mono',monospace", fontSize:13,
        }}>
          {lang && (
            <div style={{padding:"3px 10px", background:T.surface, borderBottom:`1px solid ${T.border}`, fontSize:11, color:T.muted, textTransform:"uppercase", letterSpacing:"0.05em"}}>
              {lang}
            </div>
          )}
          <div style={{padding:"10px", color:T.text, whiteSpace:"pre-wrap", wordBreak:"break-all"}}>
            {content}
          </div>
        </div>
      );
    }
    return <span key={i} style={{whiteSpace:"pre-wrap", wordBreak:"break-word"}}>{part}</span>;
  });
});

const MediaArtifacts = memo(({ artifacts, ts, onMediaClick }) => {
  const mediaItems = (artifacts || []).filter(a => a.media?.data);
  if (mediaItems.length === 0) return null;

  return (
    <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:8 }}>
      {mediaItems.map((a, i) => {
        const isVideo = (a.media.mimeType || "").includes("video") || (a.media.mimeType || "").includes("webm");
        return (
          <button
            key={i}
            onClick={() => onMediaClick?.({ ...a.media, ts })}
            style={{
              padding:0, border:`1px solid ${T.border}`, borderRadius:6,
              background:T.surfaceHi, cursor:"pointer", overflow:"hidden",
              width:100, height:70, display:"flex", alignItems:"center",
              justifyContent:"center", transition:"border-color .15s",
            }}
            onMouseEnter={e => e.currentTarget.style.borderColor = T.green}
            onMouseLeave={e => e.currentTarget.style.borderColor = T.border}
          >
            {isVideo ? (
              <video
                src={`data:${a.media.mimeType};base64,${a.media.data}`}
                muted autoPlay loop playsInline
                style={{ width:"100%", height:"100%", objectFit:"cover" }}
              />
            ) : (
              <img
                src={`data:${a.media.mimeType};base64,${a.media.data}`}
                alt="artifact-thumb"
                style={{ width:"100%", height:"100%", objectFit:"cover" }}
              />
            )}
          </button>
        );
      })}
    </div>
  );
});

const TimelineEvent = memo(({ act, onMediaClick }) => {
  const type = getActType(act);
  const isMajor = ["sessionCompleted", "sessionFailed", "planGenerated", "planApproved"].includes(type);
  const IC_MAP = {
    planGenerated:{n:"plan",c:T.purple},
    planApproved:{n:"approve",c:T.green},
    progressUpdated:{n:"refresh",c:T.muted},
    sessionCompleted:{n:"check",c:T.green},
    sessionFailed:{n:"x",c:T.red},
    system:{n:"code",c:T.muted},
  };
  const ic  = { ...(IC_MAP[type] || IC_MAP.system) };
  const time = fmtTime(new Date(act.createTime).getTime());

  let title = "", detail = null;
  switch (type) {
    case "planGenerated": {
      const plan = act.planGenerated?.plan;
      title = "Plan generated";
      detail = plan?.steps && (
        <div style={{marginTop:7}}>
          {plan.steps.map((st,i) => (
            <div key={st.id||i} style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}>
              <div style={{
                width:20,height:20,borderRadius:3,flexShrink:0,
                background:T.purpleDim,border:`1px solid ${T.purple}40`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.purple,
              }}>{i+1}</div>
              <div>
                <div style={{fontSize:14,color:T.text,fontWeight:500,lineHeight:1.35}}>{st.title}</div>
                {st.description&&<div style={{fontSize:13,color:T.muted,marginTop:1}}>{st.description}</div>}
              </div>
            </div>
          ))}
        </div>
      );
      break;
    }
    case "progressUpdated": {
      const isReview = (act.progressUpdated?.title || "").toLowerCase().includes("review");
      title = act.progressUpdated?.title || "Progress";
      detail = act.progressUpdated?.description && (
        <div style={{
          fontSize:13, color:isReview?T.text:T.muted, marginTop:3,
          lineHeight:1.5, padding:isReview?"10px 14px":"0",
          background:isReview?`${T.blue}0a`:"transparent",
          border:isReview?`1px solid ${T.blue}15`:"none", borderRadius:isReview?8:0,
          boxShadow:isReview?"inset 0 0 12px rgba(77,166,255,0.02)":"none",
          fontFamily:"'IBM Plex Sans',sans-serif",
        }}>
          {isReview && (
            <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:8}}>
              <span style={{padding:"2px 6px", borderRadius:3, background:T.blueDim, color:T.blue, fontSize:10, fontWeight:700, letterSpacing:"0.05em"}}>REVIEW</span>
              <div style={{height:1, flex:1, background:`linear-gradient(90deg, ${T.blue}30, transparent)`}}/>
            </div>
          )}
          <Markdown text={act.progressUpdated.description}/>
        </div>
      );
      if (isReview) ic.c = T.blue;
      break;
    }
    case "sessionCompleted": title = "Session completed"; break;
    case "sessionFailed":
      title = "Session failed";
      detail = act.sessionFailed?.reason && (
        <div style={{fontSize:13,color:T.red,marginTop:3,fontFamily:"'IBM Plex Sans',sans-serif"}}>{act.sessionFailed.reason}</div>
      );
      break;
    case "planApproved": title = "Plan approved"; break;
    default: title = act.description || "System event"; break;
  }

  return (
    <div style={{
      display:"flex",gap:12,marginBottom:16,alignItems:"stretch",
      padding:isMajor?"14px":"4px 12px", borderRadius:8,
      background:isMajor?T.surfaceHi:"transparent",
      border:isMajor?`1px solid ${T.border}`:"none",
    }}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0,flexShrink:0,width:20}}>
        <div style={{width:20,height:20,borderRadius:4,background:`${ic.c}15`,border:`1px solid ${ic.c}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Ic n={ic.n} s={12} c={ic.c}/>
        </div>
        {detail&&<div style={{width:1,flex:1,background:T.border,marginTop:3}}/>}
      </div>
      <div style={{flex:1,paddingBottom:detail?10:0,minWidth:0}}>
        <div style={{display:"flex",gap:8,alignItems:"center",height:20}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:ic.c,flex:1}}>{title}</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,flexShrink:0}}>{time}</span>
        </div>
        {detail}
        <MediaArtifacts artifacts={act.artifacts} ts={act.createTime} onMediaClick={onMediaClick}/>
      </div>
    </div>
  );
});

// ─── Activity Feed ────────────────────────────────────────────────────────────
const COLLAPSE_THRESHOLD = 35;
const COLLAPSE_SHOW      = 25;

const ActivityFeed = memo(({ activities, showAll, onShowAll, onMediaClick }) => {
  const collapse  = !showAll && activities.length > COLLAPSE_THRESHOLD;
  const visible   = collapse ? activities.slice(activities.length - COLLAPSE_SHOW) : activities;
  const hidden    = activities.length - visible.length;

  return (
    <>
      {collapse && (
        <button onClick={onShowAll} style={{
          display:"block",width:"100%",marginBottom:14,
          background:T.surfaceHi,border:`1px solid ${T.border}`,
          borderRadius:6,padding:"8px 12px",cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",fontSize:11,
          color:T.muted,textAlign:"center",letterSpacing:"0.08em",
        }}>
          ↑ SHOW {hidden} EARLIER {hidden===1?"EVENT":"EVENTS"}
        </button>
      )}
      {visible.map(act => {
        const type = getActType(act);
        const key  = getActKey(act);
        if (type === "userMessaged" || type === "agentMessaged") {
          return <ChatBubble key={key} act={act} type={type} onMediaClick={onMediaClick}/>;
        }
        return <TimelineEvent key={key} act={act} onMediaClick={onMediaClick}/>;
      })}
    </>
  );
});

// ─── Interactive Plan View ────────────────────────────────────────────────────
// Lets the user review steps, annotate individual ones, compose a revision
// request via sendMessage, or approve the plan directly.
const PlanView = memo(({ activities, session, apiKey, onApprove, onSendFeedback, busy }) => {
  const [stepNotes, setStepNotes]     = useState({}); // stepId → note string
  const [activeNote, setActiveNote]   = useState(null); // stepId currently expanded
  const [globalNote, setGlobalNote]   = useState("");
  const [sending, setSending]         = useState(false);
  const [sent, setSent]               = useState(false);

  // Find the most recent planGenerated activity
  const planAct = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i];
    }
    return null;
  }, [activities]);

  const plan  = planAct?.planGenerated?.plan;
  const steps = plan?.steps || [];

  // Check if plan already approved in activity history (must be after the plan was generated)
  const approved = useMemo(() => {
    if (!planAct) return false;
    const planTs = new Date(planAct.createTime).getTime();
    return activities.some(a => a.planApproved && new Date(a.createTime).getTime() >= planTs);
  }, [activities, planAct]);

  const hasFeedback = globalNote.trim() || Object.values(stepNotes).some(n => n.trim());

  const buildFeedbackMessage = () => {
    const parts = ["Please revise the plan based on my feedback:"];
    const stepFeedback = steps
      .filter(st => stepNotes[st.id]?.trim())
      .map((st, i) => `Step ${i + 1} (${st.title}): ${stepNotes[st.id].trim()}`);
    if (stepFeedback.length) parts.push(...stepFeedback);
    if (globalNote.trim()) parts.push("Overall: " + globalNote.trim());
    return parts.join("\n");
  };

  const handleRequestRevision = async () => {
    if (!hasFeedback || sending) return;
    setSending(true);
    try {
      await onSendFeedback(buildFeedbackMessage());
      setStepNotes({});
      setGlobalNote("");
      setActiveNote(null);
      setSent(true);
      setTimeout(() => setSent(false), 3000);
    } finally { setSending(false); }
  };

  if (!plan) return (
    <div style={{textAlign:"center",padding:"50px 24px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>
      {session.state === "PLANNING" ? "Jules is generating a plan…" : "No plan available"}
    </div>
  );

  const pendingApproval = session.state === "AWAITING_PLAN_APPROVAL";
  const annotatedCount  = Object.values(stepNotes).filter(n=>n.trim()).length;

  return (
    <div style={{paddingBottom:16}}>
      {/* Plan header */}
      <div style={{
        marginBottom:14,padding:"10px 14px",borderRadius:7,
        background:approved?T.greenDim:pendingApproval?T.purpleDim:T.surfaceHi,
        border:`1px solid ${approved?T.green+"40":pendingApproval?T.purple+"40":T.border}`,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:approved||!pendingApproval?0:8}}>
          <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
            color:approved?T.green:pendingApproval?T.purple:T.muted,letterSpacing:"0.06em"}}>
            {approved?"✓ PLAN APPROVED":pendingApproval?"PLAN READY FOR REVIEW":"PLAN PREVIEW"}
          </div>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
            {steps.length} step{steps.length!==1?"s":""}
          </span>
        </div>
        {pendingApproval&&!approved&&(
          <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,color:T.muted,lineHeight:1.5}}>
            Review each step below. Tap a step to add feedback, then request a revision or approve.
          </div>
        )}
      </div>

      {/* Steps */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
        {steps.map((st, i) => {
          const note     = stepNotes[st.id] || "";
          const isOpen   = activeNote === st.id;
          const hasNote  = note.trim().length > 0;

          return (
            <div key={st.id||i} style={{
              background:T.surface,border:`1px solid ${hasNote?T.amber+"50":T.border}`,
              borderLeft:`2px solid ${hasNote?T.amber:T.purple+"60"}`,
              borderRadius:6,overflow:"hidden",transition:"border-color .15s",
            }}>
              {/* Step row */}
              <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px"}}>
                <div style={{
                  width:24,height:24,borderRadius:4,flexShrink:0,marginTop:1,
                  background:hasNote?T.amberDim:T.purpleDim,
                  border:`1px solid ${hasNote?T.amber+"50":T.purple+"40"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,
                  color:hasNote?T.amber:T.purple,
                }}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:15,fontWeight:500,
                    color:T.text,lineHeight:1.35,marginBottom:st.description?3:0}}>
                    {st.title}
                  </div>
                  {st.description&&(
                    <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,color:T.muted,lineHeight:1.45}}>
                      {st.description}
                    </div>
                  )}
                  {hasNote&&!isOpen&&(
                    <div style={{marginTop:5,padding:"4px 8px",borderRadius:4,
                      background:T.amberDim,border:`1px solid ${T.amber}30`,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,color:T.amber,lineHeight:1.4}}>
                      📝 {note}
                    </div>
                  )}
                </div>
                {pendingApproval&&!approved&&(
                  <button onClick={()=>setActiveNote(isOpen?null:st.id)} style={{
                    flexShrink:0,padding:"4px 8px",borderRadius:4,border:"none",cursor:"pointer",
                    background:isOpen?(hasNote?T.amberDim:T.purpleDim):"transparent",
                    outline:`1px solid ${isOpen?(hasNote?T.amber+"40":T.purple+"40"):T.border}`,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,
                    color:isOpen?(hasNote?T.amber:T.purple):T.muted,
                    transition:"all .12s",letterSpacing:"0.06em",
                  }}>{hasNote?"EDIT":"NOTE"}</button>
                )}
              </div>

              {/* Per-step feedback textarea */}
              {isOpen&&pendingApproval&&!approved&&(
                <div style={{padding:"0 12px 12px",borderTop:`1px solid ${T.border}`}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.amber,
                    letterSpacing:"0.08em",marginBottom:5,marginTop:8}}>FEEDBACK FOR STEP {i+1}</div>
                  <textarea
                    value={note}
                    onChange={e=>setStepNotes(prev=>({...prev,[st.id]:e.target.value}))}
                    placeholder={`What should change about this step? (e.g. "Use TypeScript instead of JS", "Skip this — not needed")`}
                    rows={2}
                    style={{
                      width:"100%",background:T.surfaceHi,border:`1px solid ${T.amber}40`,
                      borderRadius:5,padding:"8px 10px",color:T.text,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,lineHeight:1.4,
                      resize:"vertical",outline:"none",boxSizing:"border-box",
                    }}
                    autoFocus
                  />
                  <button onClick={()=>setActiveNote(null)} style={{
                    marginTop:5,padding:"4px 10px",borderRadius:4,border:`1px solid ${T.border}`,
                    background:"transparent",cursor:"pointer",color:T.muted,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                  }}>DONE</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Global feedback + actions — only when pending approval */}
      {pendingApproval&&!approved&&(
        <div style={{
          background:T.surface,border:`1px solid ${T.border}`,
          borderRadius:7,padding:"12px 14px",
        }}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted,
            letterSpacing:"0.08em",marginBottom:6}}>OVERALL FEEDBACK (optional)</div>
          <textarea
            value={globalNote}
            onChange={e=>setGlobalNote(e.target.value)}
            placeholder="Any overall comments before approving? (e.g. 'Make sure to run tests', 'Keep changes minimal')"
            rows={2}
            style={{
              width:"100%",background:T.surfaceHi,border:`1px solid ${T.border}`,
              borderRadius:5,padding:"8px 10px",color:T.text,
              fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,lineHeight:1.4,
              resize:"vertical",outline:"none",boxSizing:"border-box",
              transition:"border-color .18s",marginBottom:10,
            }}
          />

          {sent&&(
            <div style={{marginBottom:8,padding:"6px 10px",borderRadius:4,
              background:T.greenDim,border:`1px solid ${T.green}40`,
              fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.green}}>
              ✓ Revision request sent — Jules will update the plan
            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <Btn
              onClick={handleRequestRevision}
              disabled={!hasFeedback||sending||busy}
              color={T.amber} outline sm
              style={{flex:1}}
            >
              {sending?"SENDING…":`REVISE${annotatedCount>0?` (${annotatedCount} step${annotatedCount>1?"s":""})`:globalNote.trim()?" +note":""}`}
            </Btn>
            <Btn
              onClick={onApprove}
              disabled={busy||sending}
              color={T.purple} sm
              style={{flex:1}}
            >
              <Ic n="approve" s={11} c="#000"/>
              {busy?"APPROVING…":"APPROVE PLAN"}
            </Btn>
          </div>
          <div style={{marginTop:7,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,textAlign:"center",lineHeight:1.6}}>
            Revise → Jules rewrites the plan · Approve → Jules starts executing
          </div>
        </div>
      )}
    </div>
  );
});

// ─── Diff Viewer ──────────────────────────────────────────────────────────────
const DiffViewer = ({ patch }) => {
  if (!patch) return (
    <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>
      No diff available yet
    </div>
  );

  const lines = patch.split("\n");
  const groups = [];
  let currentGroup = null;

  lines.forEach((line, i) => {
    if (line.startsWith("--- ") || line.startsWith("diff --git")) {
      // New file group (skip standard git prefixes for a cleaner view later)
      return;
    }
    if (line.startsWith("+++ ")) {
      const file = line.slice(4).replace(/^b\//, "");
      currentGroup = { file, hunks: [] };
      groups.push(currentGroup);
      return;
    }
    if (!currentGroup) return;

    if (line.startsWith("@@")) {
      currentGroup.hunks.push({ header: line, lines: [] });
    } else if (currentGroup.hunks.length > 0) {
      currentGroup.hunks[currentGroup.hunks.length - 1].lines.push(line);
    }
  });

  return (
    <div style={{display:"flex", flexDirection:"column", gap:16}}>
      {groups.map((g, gi) => (
        <div key={gi} style={{background:"#040507", border:`1px solid ${T.border}`, borderRadius:8, overflow:"hidden"}}>
          {/* File Header */}
          <div style={{padding:"8px 12px", background:T.surface, borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", gap:8}}>
            <Ic n="code" s={14} c={T.green}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:13, fontWeight:700, color:T.text}}>{g.file}</span>
          </div>

          {/* Hunks */}
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:13, lineHeight:1.5}}>
            {g.hunks.map((h, hi) => (
              <div key={hi}>
                <div style={{padding:"4px 12px", background:"rgba(77,166,255,.05)", color:T.blue, fontSize:12, borderBottom:`1px solid ${T.border}40`}}>
                  {h.header}
                </div>
                {h.lines.map((line, li) => {
                  const isAdd = line.startsWith("+");
                  const isRem = line.startsWith("-");
                  const c = isAdd ? T.green : isRem ? T.red : T.muted;
                  const bg = isAdd ? "rgba(0,232,122,.05)" : isRem ? "rgba(255,68,85,.05)" : "transparent";
                  const symbol = isAdd ? "+" : isRem ? "-" : " ";
                  const content = (isAdd || isRem) ? line.slice(1) : line;

                  return (
                    <div key={li} style={{display:"flex", background:bg, minHeight:20, borderLeft:`2px solid ${isAdd?T.green+'40':isRem?T.red+'40':'transparent'}`}}>
                      <div style={{width:22, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", color:c, opacity:0.6, fontSize:12, userSelect:"none", fontWeight:700, fontFamily:"monospace"}}>
                        {symbol}
                      </div>
                      <div style={{padding:"2px 10px", color:isAdd?T.green:isRem?T.red:T.text, whiteSpace:"pre-wrap", wordBreak:"break-all", flex:1, opacity: (isAdd||isRem)?1:0.7}}>
                        {content || " "}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
};

const NS_KEY = "jac_ns_draft";
function loadDraft() {
  try { const v=localStorage.getItem(NS_KEY); return v?JSON.parse(v):null; } catch { return null; }
}
function saveDraft(d) {
  try { localStorage.setItem(NS_KEY, JSON.stringify(d)); } catch {}
}
function clearDraft() {
  try { localStorage.removeItem(NS_KEY); } catch {}
}

              border:`1px solid ${todayCount>=plan.daily?T.red+"40":T.border}`,

              color:todayCount>=plan.daily?T.red:T.muted,
            }}>
              {todayCount>=plan.daily
                ? `⛔ Daily limit reached (${plan.daily} tasks on ${plan.label} plan). Upgrade at jules.google.com or wait for reset.`
                : `📋 ${plan.label} plan · ${todayCount}/${plan.daily} tasks used today · ${plan.concurrent} concurrent max`
              }
            </div>
          )}

          <Btn onClick={handleCreate} disabled={!prompt.trim()||submitting||loadingSrc||(plan&&todayCount>=plan.daily)} style={{width:"100%"}}>
            {submitting?"SENDING…":"ASSIGN TO JULES →"}
          </Btn>
        </div>
      </div>
    </div>
  );
};

// ─── Main App ─────────────────────────────────────────────────────────────────
function JulesClient() {
  const [apiKey,setApiKey]     = useState(() => { try { return localStorage.getItem("jac_key")||""; } catch { return ""; } });
  const [sessions,setSessions] = useState([]);
  const [selected,setSelected] = useState(null);
  const [mobileScreen,setMobile]   = useState("list");
  const [desktopView,setDesktop]   = useState("empty");
  const [refreshing,setRefreshing] = useState(false);
  const [netSnap,setNetSnap]       = useState(NET.snapshot());
  const [pollInterval,setPollIntervalRaw] = useState(loadPollMs);
  const [actPollInterval,setActPollIntervalRaw] = useState(loadActPollMs);
  const [sessionLimit,setSessionLimitRaw] = useState(loadLimit);
  const [layoutMode,setLayoutModeRaw]     = useState(loadLayout);
  const [planId,setPlanIdRaw]      = useState(loadPlan);
  const [customDaily,setCustomDailyRaw] = useState(loadCustomDaily);
  const [todayCount,setTodayCount] = useState(loadTodayCount);

  const windowIsDesktop = useIsDesktop();
  const isDesktop = useMemo(() => {
    if (layoutMode === "mobile") return false;
    if (layoutMode === "desktop") return true;
    return windowIsDesktop;
  }, [layoutMode, windowIsDesktop]);

  const setPlanId = useCallback(id => { savePlan(id); setPlanIdRaw(id); }, []);
  const setCustomDaily = useCallback(v => { saveCustomDaily(v); setCustomDailyRaw(v); }, []);
  const plan = useMemo(() => {
    const p = PLANS.find(p=>p.id===planId)||PLANS[0];
    if (p.id === "custom") return { ...p, daily: customDaily };
    return p;
  }, [planId, customDaily]);

  useEffect(() => NET.subscribe(s=>setNetSnap(s)), []);
  useEffect(() => { pruneOldKeys(); }, []);

  const setPollInterval = useCallback(ms => {
    savePollMs(ms);
    setPollIntervalRaw(ms);
  }, []);

  const setActPollInterval = useCallback(ms => {
    saveActPollMs(ms);
    setActPollIntervalRaw(ms);
  }, []);

  const setSessionLimit = useCallback(v => {
    saveLimit(v);
    setSessionLimitRaw(v);
  }, []);

  const setLayoutMode = useCallback(v => {
    saveLayout(v);
    setLayoutModeRaw(v);
  }, []);

  const fetchSessions = useCallback(async (quiet=false) => {
    if (!apiKey) return;
    if (!quiet) setRefreshing(true);
    try {
      const d = await apiCall(apiKey, `/sessions?pageSize=${sessionLimit}`, { _label:"List sessions" });
      const raw = d.sessions || [];
      // Sort: Active first, then by latest update/create time
      const sorted = [...raw].sort((a, b) => {
        const aActive = ACTIVE_STATES.has(a.state);
        const bActive = ACTIVE_STATES.has(b.state);
        if (aActive && !bActive) return -1;
        if (!aActive && bActive) return 1;
        const aTime = new Date(a.updateTime || a.createTime).getTime();
        const bTime = new Date(b.updateTime || b.createTime).getTime();
        return bTime - aTime;
      });
      setSessions(sorted);
    } catch {}
    finally { if (!quiet) setRefreshing(false); }
  }, [apiKey, sessionLimit]);

  useEffect(() => { if (apiKey) fetchSessions(); }, [apiKey, fetchSessions]);
  const countdown = useAutoPoll(apiKey ? pollInterval : 0, useCallback(() => fetchSessions(true), [fetchSessions]));

  const handleSessionUpdate = useCallback(updated => {
    setSessions(prev => prev.map(s=>s.id===updated.id?updated:s));
  }, []);

  const handleDelete = useCallback(id => {
    setSessions(prev => prev.filter(s=>s.id!==id));
    setSelected(null);
    setDesktop("empty");
    setMobile("list");
  }, []);

  const handleSelect = useCallback(s => {
    setSelected(s);
    if (isDesktop) setDesktop("detail"); else setMobile("detail");
  }, [isDesktop]);

  const handleCreate = useCallback(s => {
    setSessions(prev => [s, ...prev]);
    setSelected(s);
    incTodayCount();
    setTodayCount(loadTodayCount());
    if (isDesktop) setDesktop("detail"); else setMobile("list");
  }, [isDesktop]);

  const saveKey = k => {
    try { localStorage.setItem("jac_key", k); } catch {}
    setApiKey(k);
  };

  if (!apiKey) {
    return (
      <Shell>
        <SetupScreen onSave={saveKey}/>
      </Shell>
    );
  }

  // ── Desktop layout: sidebar + main ──────────────────────────────────────────
  if (isDesktop) {
    return (
      <Shell desktop>
        {/* Sidebar */}
        <div style={{width:320,flexShrink:0,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
          <SessionList
            sessions={sessions} onSelect={handleSelect} onRefresh={()=>fetchSessions()}
            refreshing={refreshing} netSnap={netSnap} selectedId={selected?.id}
            isDesktop onNew={()=>setDesktop("new")} onNetwork={()=>setDesktop("network")}
            pollInterval={pollInterval} setPollInterval={setPollInterval}
            sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
            layoutMode={layoutMode} setLayoutMode={setLayoutMode}
            countdown={countdown}
            plan={plan} planId={planId} setPlanId={setPlanId} todayCount={todayCount}
            customDaily={customDaily} setCustomDaily={setCustomDaily}
          />
        </div>
        {/* Main panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",minWidth:0}}>
          {desktopView==="empty"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:32}}>
              <div style={{width:48,height:48,borderRadius:11,background:T.greenDim,border:`1px solid ${T.green}25`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:900,color:T.green}}>J</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted,textAlign:"center",lineHeight:2}}>
                SELECT A SESSION ←{"\u00A0"}{"\u00A0"}OR{"\u00A0"}{"\u00A0"}NEW ↖
              </div>
            </div>
          )}
          {desktopView==="detail"&&selected&&(
            <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
              onBack={()=>setDesktop("empty")} onDelete={handleDelete}
              onSessionUpdate={handleSessionUpdate} isDesktop
              pollInterval={actPollInterval} setPollInterval={setActPollInterval}/>
          )}
          {desktopView==="new"&&(
            <NewSession apiKey={apiKey} onBack={()=>setDesktop("empty")} onCreate={handleCreate} isDesktop plan={plan} todayCount={todayCount}/>
          )}
          {desktopView==="network"&&(
            <NetworkMonitor onBack={()=>setDesktop("empty")} isDesktop/>
          )}
        </div>
      </Shell>
    );
  }

  // ── Mobile layout: single panel + bottom nav ──────────────────────────────
  return (
    <Shell>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {mobileScreen==="list"&&(
          <SessionList sessions={sessions} onSelect={handleSelect} onRefresh={()=>fetchSessions()}
            refreshing={refreshing} netSnap={netSnap} selectedId={null} isDesktop={false}
            pollInterval={pollInterval} setPollInterval={setPollInterval}
            sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
            layoutMode={layoutMode} setLayoutMode={setLayoutMode}
            countdown={countdown}
            plan={plan} planId={planId} setPlanId={setPlanId} todayCount={todayCount}
            customDaily={customDaily} setCustomDaily={setCustomDaily}/>
        )}
        {mobileScreen==="detail"&&selected&&(
          <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
            onBack={()=>{ setMobile("list"); fetchSessions(true); }}
            onDelete={handleDelete} onSessionUpdate={handleSessionUpdate} isDesktop={false}
            pollInterval={actPollInterval} setPollInterval={setActPollInterval}/>
        )}
        {mobileScreen==="new"&&(
          <NewSession apiKey={apiKey} onBack={()=>setMobile("list")} onCreate={s=>{ setSessions(prev=>[s,...prev]); incTodayCount(); setTodayCount(loadTodayCount()); setMobile("list"); }} isDesktop={false} plan={plan} todayCount={todayCount}/>
        )}
        {mobileScreen==="network"&&(
          <NetworkMonitor onBack={()=>setMobile("list")} isDesktop={false}/>
        )}
      </div>
      <nav style={{display:"flex",borderTop:`1px solid ${T.border}`,background:T.surface,transform:"translateZ(0)",flexShrink:0}}>
        {[
          {id:"list",   n:"tasks", label:"SESSIONS"},
          {id:"new",    n:"plus",  label:"NEW"},
          {id:"network",n:"wifi",  label:"NET"},
        ].map(({id,n,label})=>{
          const isAct = mobileScreen===id||(mobileScreen==="detail"&&id==="list");
          const hasAlert = id==="list"&&sessions.some(s=>["AWAITING_PLAN_APPROVAL","AWAITING_USER_FEEDBACK"].includes(s.state));
          return (
            <button key={id} onClick={()=>setMobile(id)} style={{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{position:"relative"}}>
                <Ic n={n} s={22} c={isAct?T.green:T.muted}/>
                {hasAlert&&<div style={{position:"absolute",top:-2,right:-4,width:7,height:7,borderRadius:"50%",background:T.purple,border:`1.5px solid ${T.surface}`,animation:"dot 1.5s ease-in-out infinite"}}/>}
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:isAct?T.green:T.muted,fontWeight:isAct?700:400,letterSpacing:"0.07em"}}>{label}</span>
            </button>
          );
        })}
      </nav>
    </Shell>
  );
}

// ─── Shell ────────────────────────────────────────────────────────────────────
function Shell({ children, desktop=false }) {
  // Dismiss the pre-React splash screen on first paint
  useEffect(() => {
    const splash = document.getElementById("splash");
    if (!splash) return;
    // Fast-complete the progress bar then fade out
    const bar = document.getElementById("splash-bar");
    if (bar) { bar.style.animation = "none"; bar.style.width = "100%"; bar.style.transition = "width .18s ease"; }
    const hint = document.getElementById("splash-hint");
    if (hint) hint.textContent = "READY";
    const t = setTimeout(() => { splash.classList.add("hidden"); }, 180);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      width:"100%",background:T.bg,display:"flex",isolation:"isolate",
      fontFamily:"'IBM Plex Sans',sans-serif",overflow:"hidden",
      ...(desktop
        ? { minHeight:"100vh", flexDirection:"row" }
        : { maxWidth:430, height:"100dvh", margin:"0 auto", flexDirection:"column" }
      ),
    }}>
      <style>{`
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        select,input,textarea{color-scheme:dark;}
        option{background:${T.surface};color:${T.text};}
        @keyframes dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
        @keyframes spin{to{transform:rotate(360deg);}}
        ::selection{background:${T.greenDim};color:${T.green};}
        textarea::placeholder,input::placeholder{color:${T.muted};}
      `}</style>
      <PWABanner/>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JulesClient/>);
</script>
</body>
</html>
