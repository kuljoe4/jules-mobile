        {(!pri || pri.state === "closed") && b?.isNew && (
          <div style={{display:"flex", alignItems:"center", gap:4, color:T.blue, opacity:0.9}}>
            <Ic n="branch" s={10} c={T.blue}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:900}}>{b.working}{ahead>0?` +${ahead}`:''}</span>
          </div>
        )}
        {checks && (
          <div style={{display:"flex", alignItems:"center", gap:3, color:checks.state==="success"?T.brand:checks.state==="failure"?T.red:T.amber, opacity:0.9}}>
            <Ic n={checks.state==="success"?"check":checks.state==="failure"?"x":"refresh"} s={9} c={checks.state==="success"?T.brand:checks.state==="failure"?T.red:T.amber}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:900}}>{checks.label}</span>
          </div>
        )}
        {driftDetected && (
          <div style={{display:"flex", alignItems:"center", gap:3, color:T.amber, opacity:0.9}}>
            <Ic n="wifi" s={9} c={T.amber}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:900}}>STALE</span>
          </div>
        )}
        {hasFollowupDraft && (
          <div style={{
            display:"flex", alignItems:"center", gap:3, color:T.amberLight, opacity:0.95,
            background:`${T.amber}15`, padding:"1px 6px", borderRadius:4, border:`1px solid ${T.amber}30`
          }}>
            <Ic n="layers" s={9} c={T.amberLight}/>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:900}}>DRAFT MSG</span>
          </div>
        )}
        {isUnread && <div style={{width:4,height:4,borderRadius:"50%",background:T.indigo,animation:"dot 1s infinite"}}/>}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:0,marginLeft:26,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.dim,opacity:0.6}}>
        <div style={{
          display:"flex", alignItems:"center", gap:6,
          background: flash ? `${T.brand}25` : "transparent",
          padding: "2px 6px", margin: "-2px -6px", borderRadius: 4,
          transition: flash ? "none" : "background 5s cubic-bezier(0.4, 0, 0.2, 1)",
          color: flash ? T.brandLight : T.dim,
          fontWeight: flash ? 800 : 500,
        }}>
          <span style={highActivityStyle}>{activityStats.count} ITEMS</span>
          <span>·</span>
          <span style={highActivityStyle}>{fmtBytes(activityStats.size/1024)}</span>
        </div>
        <div style={{marginLeft:"auto"}}>
          {s.id?.slice(0,8)}
        </div>
      </div>
    </button>
  );
});

// ─── Session Detail ───────────────────────────────────────────────────────────
const SessionDetail = ({ session:initSession, apiKey, personas, onBack, onDelete, onSessionUpdate, onStatsUpdate, isDesktop, pollInterval, setPollInterval, isArchived, onArchive, onUnarchive, cacheLimit, activityLimit, allSessions = [], activitiesMap = {}, onDraftChange }) => {
  const [session,setSession]     = useState(initSession);
  const [activities,setActivities] = useState(() => {
    try {
      const cache = JSON.parse(localStorage.getItem(SESSION_CACHE_KEY)) || {};
      const entry = cache[initSession.id];
      if (entry) {
        entry.ts = Date.now();
        localStorage.setItem(SESSION_CACHE_KEY, JSON.stringify(cache));
        return entry.activities || [];
      }
    } catch {}
    return [];
  });
  const [isStale, setIsStale] = useState(true);
  const [isSyncing, setIsSyncing] = useState(false);
  const [syncPhase, setSyncProgress] = useState("IDLE"); // IDLE, CACHE, FETCH, SYNC, DONE
  const [syncStats, setSyncPhaseStats] = useState({ count: 0, pages: 0, bytes: 0, newItems: 0, newBytes: 0, loaded: 0, total: 0 });
  const [showAll,setShowAll]     = useState(false);
  const [tab,setTab]             = useState("activity");
  const [scrolledActivityId, setScrolledActivityId] = useState(null);

  const scrollToActivityInChat = (targetId, isOriginal) => {
    setTab("activity");
    setShowAll(true);
    if (isOriginal) {
      setHeaderPromptExpanded(true);
      setScrolledActivityId("original");
    } else {
      setScrolledActivityId(targetId);
    }

    setTimeout(() => {
      const element = document.getElementById(isOriginal ? "chat-original-prompt" : `chat-activity-${targetId}`);
      if (element) {
        element.scrollIntoView({ behavior: "smooth", block: "center" });

        element.style.transition = "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)";
        const originalBoxShadow = element.style.boxShadow || "none";
        const originalBorder = element.style.border || `1px solid ${T.border}`;

        element.style.boxShadow = `0 0 24px ${T.brand}cc, inset 0 0 12px ${T.brand}50`;
        element.style.border = `1px solid ${T.brand}`;

        setTimeout(() => {
          element.style.boxShadow = originalBoxShadow;
          element.style.border = originalBorder;
        }, 2500);
      }
    }, 150);
  };

  const [chatFilter, setChatFilter] = useState("ALL");
  const [msg,setMsg]             = useState(() => {
    try { return localStorage.getItem(`jac_draft_${initSession.id}`) || ""; }
    catch { return ""; }
  });
  const [selectedPersonas, setSelectedPersonas] = useState(new Set());
  const [showMenu, setShowMenu] = useState(false);
  const [busy,setBusy]           = useState(false);
  const [justUpdated, setJustUpdated] = useState(false);
  const [err,setErr]             = useState(null);
  const [activeMedia,setActiveMedia] = useState(null);
  const [replyingTo, setReplyingTo] = useState(null); // { act, sender }
  const [headerPromptExpanded, setHeaderPromptExpanded] = useState(false);
  const headerPromptRef = useRef(null);
  const [showDriftWarning, setShowDriftWarning] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [headerExpanded, setHeaderExpanded] = useState(true);
  const [composerVisible, setComposerVisible] = useState(true);
  const [composerMinimized, setComposerMinimized] = useState(true);
  const [expanded, setExpanded] = useState(false);
  const [showScroll, setShowScroll] = useState(false);
  const [scrollDirMode, setScrollDirMode] = useState("bottom"); // "top" or "bottom"
  const lastScrollY = useRef(0);
  const scrollDir = useRef(0); // 1 = down, -1 = up

  const contentRef = useRef(null);
  const composerRef = useRef(null);

  const handleScroll = useCallback(e => {
    const y = e.target.scrollTop;
    const h = e.target.scrollHeight;
    const vh = e.target.offsetHeight;
    const diff = y - lastScrollY.current;

    if (Math.abs(diff) > 5) {
      scrollDir.current = diff > 0 ? 1 : -1;
    }

    const isNearBottom = h - y - vh < 100;
    const canHeaderShrink = h - vh > 250; // Only allow shrinking if there's significant content

    // Scrolled state for visual transitions
    if (y > 10 !== scrolled) setScrolled(y > 10);

    // Visibility logic:
    if (isNearBottom) {
      setComposerVisible(true);
      setHeaderExpanded(true);
    } else if (y > 150 && canHeaderShrink) {
      if (scrollDir.current === 1) {
        setComposerVisible(false);
        setHeaderExpanded(false);
      } else if (scrollDir.current === -1) {
        setComposerVisible(true);
        setHeaderExpanded(true);
      }
    } else if (y < 50) {
      setComposerVisible(true);
      setHeaderExpanded(true);
    }

    const canScroll = h - vh > 200;
    setShowScroll(canScroll && (y > 100 || h - y - vh > 100));
    setScrollDirMode(y > (h - vh) / 2 ? "top" : "bottom");

    lastScrollY.current = y;
  }, [scrolled]);

  const completedSessionsMap = useMemo(() => {
    const map = new Map();
    allSessions.forEach(s => {
      if (s.state === "COMPLETED") {
        const repo = s.sourceContext?.source;
        if (repo) {
          if (!map.has(repo)) map.set(repo, []);
          map.get(repo).push(s);
        }
      }
    });
    return map;
  }, [allSessions]);

  const driftDetected = useMemo(() => {
    if (!session) return false;
    const repo = session.sourceContext?.source;
    if (!repo) return false;
    const currentStart = new Date(session.createTime).getTime();
    const repoCompletions = completedSessionsMap.get(repo) || [];

    return repoCompletions.some(s => {
      if (s.id === session.id) return false;
      const completionTime = new Date(s.updateTime || s.createTime).getTime();
      return completionTime > currentStart;
    });
  }, [session, completedSessionsMap]);

  useEffect(() => {
    if (driftDetected && !isArchived) setShowDriftWarning(true);
  }, [driftDetected, isArchived]);

  const txtRef       = useRef(null);
  const feedEndRef   = useRef(null);
  const actMapRef    = useRef(new Map());      // id → activity (dedup)
  const prevLenRef   = useRef(0);

  // ── Optimized activity loader: createTime cursor + Map dedup ──────────────
  // First load fetches all; subsequent loads fetch only new (createTime filter)
  const lastTsRef = useRef(null);
  const loadActivities = useCallback(async (sinceTs=null) => {
    setIsSyncing(true); setIsStale(true);
    setSyncProgress(sinceTs ? (busy ? "SYNC" : "FETCH") : "CACHE");
    setSyncPhaseStats({ count: 0, pages: 0, bytes: 0, newItems: 0, newBytes: 0, loaded: 0, total: 0 });
    let currentPages = 0;
    let currentCount = 0;
    let currentBytes = 0;
    let currentLoaded = 0;
    let currentTotal = 0;
    let newItems = 0;
    let newBytes = 0;

    try {
      let pageToken = null;
      let changed = false;
      let latestTs = lastTsRef.current;

      do {
        currentPages++;
        if (!sinceTs) setSyncProgress("FETCH");
        const pageSize = Math.min(activityLimit, 100);
        // The /activities API does not support createTime query parameter
        const qs = `pageSize=${pageSize}${pageToken ? `&pageToken=${pageToken}` : ""}`;

        const d = await apiCall(apiKey, `/sessions/${session.id}/activities?${qs}`, {
          _label:`Acts ${sinceTs?"Δ":"full"} ${session.id?.slice(0,6)}`,
          onProgress: ({ loaded, total }) => {
            currentLoaded = loaded;
            currentTotal = total;
            setSyncPhaseStats(prev => ({ ...prev, loaded: currentLoaded, total: currentTotal }));
          }
        });

        const incoming = d.activities || [];
        const batchRaw = JSON.stringify(incoming);
        const batchBytes = new TextEncoder().encode(batchRaw).length;

        currentCount += incoming.length;
        currentBytes += batchBytes;

        for (const act of incoming) {
          const k = getActKey(act);
          const existing = actMapRef.current.get(k);
          // Upsert: update if content changed or is new
          if (!existing || JSON.stringify(existing) !== JSON.stringify(act)) {
            const actSize = new TextEncoder().encode(JSON.stringify(act)).length;
            newItems++;
            newBytes += actSize;
            actMapRef.current.set(k, act);
            changed = true;
            if (!latestTs || act.createTime > latestTs) latestTs = act.createTime;
          }
        }
        setSyncPhaseStats({ count: currentCount, pages: currentPages, bytes: currentBytes, newItems, newBytes, loaded: currentLoaded, total: currentTotal });

        pageToken = d.nextPageToken;

        // Respect activityLimit
        if (actMapRef.current.size >= activityLimit) {
          pageToken = null;
        }

        // On incremental loads (sinceTs), we don't need to follow tokens as new
        // activities are added to the end of the history.
        if (sinceTs) break;

      } while (pageToken);

      if (latestTs) lastTsRef.current = latestTs;
      if (changed) {
        setSyncProgress("SYNC");
        let sorted = Array.from(actMapRef.current.values())
          .filter(a => !a._temp)
          .sort((a,b) => new Date(a.createTime) - new Date(b.createTime));

        // Enforce limit if we exceeded it during this load
        if (sorted.length > activityLimit) {
          sorted = sorted.slice(-activityLimit);
          // Sync map back
          actMapRef.current = new Map();
          sorted.forEach(a => actMapRef.current.set(getActKey(a), a));
        }
        setActivities(sorted);
        setJustUpdated(true);
        setTimeout(() => setJustUpdated(false), 3000);
        setIsStale(false);

        // Persist stats
        try {
          const rawData = JSON.stringify(sorted);
          const size = new TextEncoder().encode(rawData).length;
          const stats = { count: sorted.length, size };
          const allStats = JSON.parse(localStorage.getItem(ACT_STATS_KEY) || "{}");
          allStats[session.id] = stats;
          localStorage.setItem(ACT_STATS_KEY, JSON.stringify(allStats));
          onStatsUpdate?.(session.id, stats);
          window.dispatchEvent(new CustomEvent("jac_stats_updated", { detail: allStats }));
        } catch (e) { console.error("Failed to save stats", e); }
      }

      // Update Session Cache
      if (cacheLimit > 0) {
        try {
          const cache = JSON.parse(localStorage.getItem(SESSION_CACHE_KEY)) || {};
          cache[session.id] = { activities: Array.from(actMapRef.current.values()).filter(a => !a._temp).sort((a,b) => new Date(a.createTime) - new Date(b.createTime)).slice(-activityLimit), ts: Date.now() };
          // Strict LRU Strategy
          let keys = Object.keys(cache);
          if (keys.length > cacheLimit) {
            keys.sort((a, b) => (cache[a].ts || 0) - (cache[b].ts || 0));
            while (keys.length > cacheLimit) {
              delete cache[keys.shift()];
            }
          }
          localStorage.setItem(SESSION_CACHE_KEY, JSON.stringify(cache));
        } catch {}
      }
    } catch (err) {
      console.error("[LoadActivities] Error:", err);
    } finally {
      setIsSyncing(false); setIsStale(false);
      setSyncProgress("DONE");
      setTimeout(() => setSyncProgress("IDLE"), 2000);
    }
  }, [apiKey, session.id, activityLimit, cacheLimit]);

  const loadSession = useCallback(async () => {
    try {
      const d = await apiCall(apiKey, `/sessions/${session.id}`, { _label:`Session ${session.id?.slice(0,6)}` });
      setSession(d);
      onSessionUpdate?.(d);
    } catch {}
  }, [apiKey, session.id, onSessionUpdate]);

  // On mount (keyed by session.id, so fresh per-session)
  useEffect(() => {
    actMapRef.current = new Map();
    // Seed Map from initial activities (cached)
    activities.forEach(a => actMapRef.current.set(getActKey(a), a));
    lastTsRef.current = activities.length > 0 ? activities[activities.length-1].createTime : null;
    prevLenRef.current = 0;
    setShowAll(false);
    setErr(null);

    // If we have cached activities, report their stats immediately
    if (activities.length > 0) {
      try {
        const rawData = JSON.stringify(activities);
        const size = new TextEncoder().encode(rawData).length;
        onStatsUpdate?.(session.id, { count: activities.length, size });
      } catch {}
    }

    // Set stale immediately if we have cache, to trigger syncing cue
    if (activities.length > 0) setIsStale(true);

    loadActivities(null); // full load on first open
    loadSession();
  }, []); // intentional: component is keyed by session.id

  // Auto-scroll to bottom when new messages arrive
  useEffect(() => {
    const len = activities.length;
    if (len > prevLenRef.current && tab === "activity" && feedEndRef.current) {
      const el = contentRef.current;
      const isNearBottom = el ? (el.scrollHeight - el.scrollTop - el.offsetHeight < 150) : false;

      if (userSentRef.current || isNearBottom) {
        feedEndRef.current.scrollIntoView({ behavior: len - prevLenRef.current > 8 ? "instant" : "smooth" });
      }
    }
    userSentRef.current = false;
    prevLenRef.current = len;
  }, [activities, tab]);

  // Ensure non-activity tabs start at the top
  useEffect(() => {
    if (tab !== "activity" && contentRef.current) {
      contentRef.current.scrollTop = 0;
    }
  }, [tab]);

  const togglePersona = (id) => {
    const next = new Set(selectedPersonas);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedPersonas(next);
  };

  const handleExpandComposer = useCallback(() => {
    setComposerMinimized(false);
    setComposerVisible(true);
    setTimeout(() => { if (txtRef.current) txtRef.current.focus(); }, 50);
  }, []);

  // Persist draft follow-up message
  const draftRef = useRef(null);
  useEffect(() => {
    clearTimeout(draftRef.current);
    draftRef.current = setTimeout(() => {
      try {
        if (msg.trim()) {
          localStorage.setItem(`jac_draft_${session.id}`, msg);
          if (onDraftChange) onDraftChange(session.id, true);
        } else {
          localStorage.removeItem(`jac_draft_${session.id}`);
          if (onDraftChange) onDraftChange(session.id, false);
        }
      } catch {}
    }, 400);
    return () => clearTimeout(draftRef.current);
  }, [msg, session.id, onDraftChange]);

  const userSentRef = useRef(false);

  // ── Actions ─────────────────────────────────────────────────────────────────
  const handleSend = async () => {
    if (!msg.trim() || busy) return;
    userSentRef.current = true;
    let text = msg.trim();
    if (replyingTo) {
      let quoteText = "";
      const replyAct = replyingTo.act;
      if (replyAct.agentMessaged) {
        quoteText = replyAct.agentMessaged.agentMessage;
      } else if (replyAct.progressUpdated) {
        quoteText = replyAct.progressUpdated.description || replyAct.progressUpdated.title || "";
      } else if (replyAct.planGenerated) {
        quoteText = "Plan Generated";
      } else {
        quoteText = replyAct.description || "System Event";
      }

      // Limit quoteText length
      if (quoteText.length > 200) {
        quoteText = quoteText.substring(0, 197) + "...";
      }

      const headerLine = `> **Replying to ${replyingTo.sender || "JULES"}**: *"${quoteText.replace(/\n/g, " ")}"*`;
      text = `${headerLine}\n\n${text}`;
    }

    if (selectedPersonas.size > 0) {
      const personaPrompts = Array.from(selectedPersonas)
        .map(id => personas.find(p => p.id === id)?.prompt)
        .filter(Boolean);
      if (personaPrompts.length > 0) {
        const personaText = `(Persona: ${Array.from(selectedPersonas).map(id => personas.find(p => p.id === id)?.label).join(", ")})\n\n${personaPrompts.join("\n\n")}`;
        text = text ? `${text}\n\n${personaText}` : personaText;
      }
    }
    setMsg("");
    setComposerMinimized(true);
    setExpanded(false);
    setReplyingTo(null);
    setBusy(true); setErr(null);

    // Optimistic: add temp bubble immediately
    const tempKey = `_temp_${Date.now()}`;
    const tempAct = {
      id: tempKey,
      createTime: new Date().toISOString(),
      userMessaged: { userMessage: text },
      _temp: true
    };
    actMapRef.current.set(tempKey, tempAct);
    setActivities(prev => [...prev, tempAct]);

    try {
      await apiCall(apiKey, `/sessions/${session.id}:sendMessage`, {
        method: "POST",
        body: { prompt: text },
        _label: `Msg -> ${session.id?.slice(0,6)}`
      });
      // Success: clear local draft
      try {
        localStorage.removeItem(`jac_draft_${session.id}`);
        if (onDraftChange) onDraftChange(session.id, false);
      } catch (e) {}
      // Switch back to chat to show Jules' response
      setTab("activity");
      // Remove temp, fetch real activities with smart polling
      actMapRef.current.delete(tempKey);
      setTimeout(() => {
        loadActivities(lastTsRef.current);
        loadSession();
      }, 1200);
    } catch (err) {
      setErr(err.message);
      setMsg(text); // restore draft on error
      if (onDraftChange) onDraftChange(session.id, true);
      actMapRef.current.delete(tempKey);
      setActivities(prev => prev.filter(a => a.id !== tempKey));
    } finally {
      setBusy(false);
    }
  };

  const handleApprove = async () => {
    if (busy) return;
    let planTs = null;
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated) { planTs = activities[i].createTime; break; }
    }
    const alreadyApproved = activities.some(a => a.planApproved && (!planTs || a.createTime >= planTs));
    if (alreadyApproved) {
      setTab("activity");
      return;
    }

    setBusy(true); setErr(null);
    try {
      await apiCall(apiKey, `/sessions/${session.id}:approvePlan`, {
        method: "POST",
        body: {},
        _label: `Approve ${session.id?.slice(0,6)}`
      });
      await loadSession();
      await loadActivities(lastTsRef.current);
      setTab("activity");
    } catch (err) {
      const isAlready = err.message?.includes("400") && err.message.toLowerCase().includes("already approved");
      if (isAlready) {
        await loadSession();
        await loadActivities(lastTsRef.current);
        setTab("activity");
      } else {
        setErr(err.message);
      }
    } finally {
      setBusy(false);
    }
  };

  useEffect(() => {
    const el = contentRef.current;
    if (el) {
      const check = () => {
        const y = el.scrollTop;
        const h = el.scrollHeight;
        const vh = el.offsetHeight;
        const canScroll = h - vh > 200;
        setShowScroll(canScroll && (y > 100 || h - y - vh > 100));
        setScrollDirMode(y > (h - vh) / 2 ? "top" : "bottom");
      };
      const raf = requestAnimationFrame(check);
      window.addEventListener("resize", check);
      return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", check); };
    }
  }, [activities, tab]);

  // Used by PlanView to send revision requests
  const handleSendFeedback = useCallback(async (prompt, stayOnTab = false) => {
    let text = prompt;
    if (selectedPersonas.size > 0) {
      const personaPrompts = Array.from(selectedPersonas)
        .map(id => personas.find(p => p.id === id)?.prompt)
        .filter(Boolean);
      if (personaPrompts.length > 0) {
        const personaText = `(Persona: ${Array.from(selectedPersonas).map(id => personas.find(p => p.id === id)?.label).join(", ")})\n\n${personaPrompts.join("\n\n")}`;
        text = text ? `${text}\n\n${personaText}` : personaText;
      }
    }
    const tempKey = `_temp_${Date.now()}`;
    const tempAct = {
      id: tempKey,
      createTime: new Date().toISOString(),
      userMessaged: { userMessage: text },
      _temp: true
    };
    actMapRef.current.set(tempKey, tempAct);
    setActivities(prev => [...prev, tempAct]);
    try {
      await apiCall(apiKey, `/sessions/${session.id}:sendMessage`, {
        method: "POST",
        body: { prompt: text },
        _label: `Msg -> ${session.id?.slice(0,6)}`
      });
      actMapRef.current.delete(tempKey);
      setComposerMinimized(true);
      setExpanded(false);
      if (stayOnTab !== true) setTab("activity");
      setTimeout(() => {
        loadActivities(lastTsRef.current);
        loadSession();
      }, 1500);
    } catch (err) {
      setErr(err.message);
      actMapRef.current.delete(tempKey);
      setActivities(prev => prev.filter(a => a.id !== tempKey));
      throw err;
    }
  }, [apiKey, session.id, loadActivities, loadSession, selectedPersonas, personas, setTab]);

  const handleDelete = async () => {
    setBusy(true);
    try {
      await apiCall(apiKey, `/sessions/${session.id}`, { method:"DELETE", _label:`Delete ${session.id?.slice(0,6)}` });
      onDelete(session.id);
    } catch (err) { setErr(err.message); setBusy(false); }
  };

  const handleRefresh = async () => {
    setBusy(true); setErr(null);
    try {
      await Promise.all([loadSession(), loadActivities(null)]);
      setJustUpdated(true);
      setTimeout(() => setJustUpdated(false), 2000);
    } catch (err) { setErr(err.message); }
    finally { setBusy(false); }
  };

  const mediaArtifacts = useMemo(() =>
    activities.flatMap(a => (a.artifacts||[]).filter(x=>x.media?.data).map(x=>({...x.media,ts:a.createTime})))
  , [activities]);

  const activityStats = useMemo(() => {
    const count = activities.length;
    const rawData = JSON.stringify(activities);
    const size = new TextEncoder().encode(rawData).length;
    return { count, size };
  }, [activities]);

  const b = useMemo(() => getBranchInfo(session, activities), [session, activities]);
  const ahead = useMemo(() => getAheadCount(activities), [activities]);
  const checks = useMemo(() => getCheckStatus(activities), [activities]);

  const summary = session.outputs?.find(o=>o.sessionSummary)?.sessionSummary;
  const pri = useMemo(() => getPRInfo(session, activities), [session, activities]);
  const pr = pri;
  const isActuallyDone = useMemo(() => {
    if (ACTIVE_STATES.has(session.state)) return false;
    let lastComp = -1, lastUser = -1;
    for (let i = activities.length - 1; i >= 0; i--) {
      const type = getActType(activities[i]);
      if (lastComp === -1 && type === "sessionCompleted") lastComp = i;
      if (lastUser === -1 && type === "userMessaged") lastUser = i;
      if (lastComp !== -1 && lastUser !== -1) break;
    }
    return lastComp !== -1 && lastComp > lastUser;
  }, [activities, session.state]);
  const currentState = isActuallyDone ? "COMPLETED" : session.state;
  const isFinished = currentState === "COMPLETED" || currentState === "FAILED";
  const m       = STATUS_META[currentState] || STATUS_META.QUEUED;
  const repo    = session.sourceContext?.source?.replace("sources/github/","");
  const pct     = pctFromState(currentState);
  const canSend = true; // Always allow follow-up messages

  const effectiveInterval = (isFinished && !busy) ? 0 : pollInterval;
  const countdown = useAutoPoll(effectiveInterval, useCallback(() => Promise.all([loadSession(), loadActivities(lastTsRef.current)]), [loadSession, loadActivities]));

  const latestPlan = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i].planGenerated.plan;
    }
    return null;
  }, [activities]);

  const isApproved = useMemo(() => {
    let planTs = null;
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated) { planTs = activities[i].createTime; break; }
    }
    return activities.some(a => a.planApproved && (!planTs || a.createTime >= planTs));
  }, [activities]);

  // Auto-switch to PLAN tab when AWAITING_PLAN_APPROVAL
  useEffect(() => {
    if (currentState === "AWAITING_PLAN_APPROVAL" && latestPlan && !isApproved) setTab("plan");
  }, [currentState, latestPlan, isApproved]);

  const reviews = useMemo(() => {
    return activities.filter(a => a.progressUpdated && a.progressUpdated.title?.toLowerCase().includes("review"));
  }, [activities]);

  const TABS = [
    { id:"activity", label:"CHAT" },
    { id:"prompt",   label:"PROMPT" },
    ...(reviews.length > 0 ? [{ id: "reviews", label: "REVIEWS" }] : []),
    ...(latestPlan?[{ id:"plan", label:"PLAN" }]:[]),
    { id:"diff",     label:"DIFF" },
    ...(mediaArtifacts.length>0?[{ id:"media", label:"MEDIA" }]:[]),
  ];


  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0,position:"relative"}}>
      {/* ── Header ── */}
      <div style={{
        padding:scrolled?"8px 12px":"12px 16px 0",
        background:T.surface,
        flexShrink:0,
        transition:"padding .2s cubic-bezier(0.4, 0, 0.2, 1)",
        zIndex: 5,
        contain: "layout",
        position: "relative",
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:scrolled?0:6, minHeight:scrolled?24:44}}>
          {!isDesktop&&(
            <button onClick={onBack} aria-label="Go back" style={{background:"none",border:"none",cursor:"pointer",padding:3,display:"flex",flexShrink:0}}>
              <Ic n="back" s={18} c={T.text}/>
            </button>
          )}
          <div style={{flex:1,minWidth:0, position:"relative"}}>
            {/* Unified Syncing/Downloading Overlay */}
            {syncPhase !== "IDLE" ? (
              <div style={{
                display:"flex", alignItems:"center", gap:12, height: scrolled ? 24 : 44,
                animation: "fadeIn .3s cubic-bezier(0.4, 0, 0.2, 1)",
              }}>
                <div style={{
                  width:12, height:12, borderRadius:"50%",
                  background: syncPhase === "DONE" ? T.brand : T.amber,
                  animation: syncPhase === "DONE" ? "none" : (syncPhase === "CACHE" ? "dot 1s infinite" : "spin 1s linear infinite"),
                  boxShadow: `0 0 12px ${syncPhase === "DONE" ? T.brand : T.amber}60`
                }}/>
                <div style={{display:"flex", flexDirection:"column", gap:2}}>
                   <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize: scrolled ? 11 : 13, fontWeight: 900, color: syncPhase === "DONE" ? T.brand : T.amber, letterSpacing: "0.05em"}}>
                      {syncPhase === "CACHE" ? "RECOVERING FROM CACHE..." :
                       syncPhase === "FETCH" ? (syncStats.total > 0 ? `DOWNLOADING ASSETS ${Math.round((syncStats.loaded / syncStats.total) * 100)}%` : `FETCHING ${syncStats.count} ACTIVITY ITEMS...`) :
                       syncPhase === "SYNC" ? "SYNCHRONIZING..." :
                       syncPhase === "DONE" ? (syncStats.newItems > 0 ? "SYNCHRONIZATION COMPLETE" : "SESSION IS UP TO DATE") : "IDLE"}
                   </span>
                   <div style={{display:"flex", alignItems:"center", gap:8}}>
                     {syncPhase === "DONE" && syncStats.newItems > 0 && (
                       <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize: 9, fontWeight: 800, color: T.brandLight, opacity: 0.9}}>
                          +{syncStats.newItems} NEW · {fmtBytes(syncStats.newBytes/1024)}
                       </span>
                     )}
                     {syncPhase === "FETCH" && syncStats.total > 0 && (
                       <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize: 9, fontWeight: 800, color: T.dim}}>
                         {fmtBytes(syncStats.loaded/1024)} / {fmtBytes(syncStats.total/1024)}
                       </span>
                     )}
                   </div>
                </div>
              </div>
            ) : (
              <>
                <div style={{
                  fontFamily:"'IBM Plex Sans',sans-serif",
                  fontSize:scrolled?13:15,
                  fontWeight:700,
                  color:T.textHi,
                  lineHeight:1.3,
                  overflow:"hidden",
                  textOverflow:"ellipsis",
                  whiteSpace: scrolled ? "nowrap" : "normal",
                  display: "-webkit-box",
                  WebkitLineClamp:scrolled?1:2,
                  WebkitBoxOrient:"vertical",
                  transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)",
                  minHeight: scrolled ? 18 : 38,
                }}>
                  {session.title||session.prompt}
                </div>
                <div style={{display:"flex", alignItems:"center", gap:8, marginTop: 2, animation:"fadeIn .2s ease", height: (repo || (scrolled && !headerExpanded)) ? 14 : 0, overflow: "hidden", transition: "all .2s cubic-bezier(0.4, 0, 0.2, 1)"}}>
                   {repo && (
                     <div style={{display:"flex", alignItems:"center", gap:4, minWidth:0}}>
                       <Ic n="code" s={9} c={T.dim}/>
                       <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:8, color:T.dim, fontWeight:700, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{repo}</span>
                     </div>
                   )}
                   {scrolled && !headerExpanded && (
                     <>
                       {session.sourceContext?.source && (
                         <a href={b?.repoUrl ? `${b.repoUrl}/branches` : "#"} target="_blank" rel="noopener" style={{display:"flex", alignItems:"center", gap:3, color:T.blue, textDecoration:"none", flexShrink:0, borderBottom:`1px solid ${T.blue}40`}}>
                           <Ic n="branch" s={9} c={T.blue}/>
                           <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:8, fontWeight:900}}>{b?.working || "main"}</span>
                         </a>
                       )}
                       {isStale && !isFinished && <div style={{width:5, height:5, borderRadius:"50%", background:T.brand, animation:"pulse 2s infinite"}}/>}
                       {pr && (
                          <a href={pr.url} target="_blank" rel="noopener" style={{
                            background:pr.state==="merged"?T.purpleDim:pr.state==="closed"?T.dim:T.brandDim,
                            border:`1px solid ${pr.state==="merged"?T.purple:pr.state==="closed"?T.muted:T.brand}40`,
                            borderRadius:3, padding:"1px 4px", display:"flex", alignItems:"center", gap:3,
                            color:pr.state==="merged"?T.purple:pr.state==="closed"?T.muted:T.brand,
                            textDecoration:"none", fontFamily:"'JetBrains Mono',monospace", fontSize:8, fontWeight:900, flexShrink:0
                          }}>
                            <Ic n={pr.state==="merged"?"git_merge":"git_pull"} s={9} c={pr.state==="merged"?T.purple:pr.state==="closed"?T.muted:T.brand}/>
                            #{pr.number}
                          </a>
                        )}
                        {checks && (
                          <div style={{
                            background:checks.state==="success"?T.brandDim:checks.state==="failure"?T.redDim:T.amberDim,
                            border:`1px solid ${checks.state==="success"?T.brand:checks.state==="failure"?T.red:T.amber}40`,
                            borderRadius:3, padding:"1px 4px", display:"flex", alignItems:"center", gap:3,
                            color:checks.state==="success"?T.brandLight:checks.state==="failure"?T.red:T.amber,
                            fontFamily:"'JetBrains Mono',monospace", fontSize:8, fontWeight:900, flexShrink:0
                          }}>
                            <Ic n={checks.state==="success"?"check":checks.state==="failure"?"x":"refresh"} s={10} c={checks.state==="success"?T.brandLight:checks.state==="failure"?T.red:T.amber}/>
                          </div>
                        )}
                      </>
                   )}
                </div>
              </>
            )}
          </div>

          <div style={{
            display:"flex",gap:6,alignItems:"center",flexShrink:0,
            opacity: syncPhase !== "IDLE" ? 0 : 1,
            pointerEvents: syncPhase !== "IDLE" ? "none" : "auto",
            transition: "opacity .2s ease"
          }}>
            {driftDetected && (
              <span title="STALE BASE: Repository was updated since this session started" style={{
                display:"flex", alignItems:"center", gap:4, padding:"3px 8px", borderRadius:4,
                background:`${T.amber}15`, border:`1px solid ${T.amber}40`, color:T.amber,
                fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:800, letterSpacing:"0.05em"
              }}>
                <Ic n="wifi" s={11} c={T.amber}/>
                {!scrolled && "STALE"}
              </span>
            )}
            <Pill status={currentState} small hideLabel={!headerExpanded && scrolled}/>

            <div style={{position:"relative"}}>
              <button
                onClick={() => setShowMenu(!showMenu)}
                onMouseEnter={e => { e.currentTarget.style.background = T.border; e.currentTarget.style.borderColor = T.brand; }}
                onMouseLeave={e => { e.currentTarget.style.background = T.surfaceHi; e.currentTarget.style.borderColor = T.borderHi; }}
                onMouseDown={e => { e.currentTarget.style.transform = "scale(0.92)"; }}
                onMouseUp={e => { e.currentTarget.style.transform = "scale(1)"; }}
                style={{
                  background:T.surfaceHi, border:`1px solid ${T.borderHi}`,
                  borderRadius:4, cursor:"pointer", display:"flex", padding:4,
                  transition: "all .15s cubic-bezier(0.4, 0, 0.2, 1)",
                }}
              >
                <Ic n="more" s={14} c={showMenu ? T.brand : T.muted}/>
              </button>

              {showMenu && (
                <>
                  <Backdrop onClick={() => setShowMenu(false)}/>
                  <div style={{
                    position:"absolute", top:"100%", right:0, zIndex:101, marginTop:8,
                    background:T.surfaceHi, border:`1px solid ${T.borderHi}`,
                    borderRadius:8, width:180, boxShadow:"0 10px 32px rgba(0,0,0,0.6)",
                    overflow:"hidden", animation: "zoomIn 0.15s cubic-bezier(0.2, 0, 0.2, 1)"
                  }}>
                    <div style={{
                      padding:"10px 14px", borderBottom:`1px solid ${T.border}33`,
                      display:"flex", alignItems:"center", justifyContent:"space-between"
                    }}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:800, color:T.dim}}>ACTIONS</div>
                      {busy && <div style={{animation:"spin 1s linear infinite"}}><Ic n="refresh" s={10} c={T.brand}/></div>}
                    </div>
                    <button
                      onClick={() => {
                        setMsg("The repository has been updated. Please pull the latest changes from the base branch and rebase your current work to avoid conflicts.");
                        setComposerMinimized(false);
                        setComposerVisible(true);
                        setShowMenu(false);

const NS_KEY = "jac_ns_draft";
const REPO_STATS_KEY = "jac_repo_stats";
const LAST_SOURCE_KEY = "jac_last_source";
const LAST_BRANCHES_KEY = "jac_last_branches";
const ACT_MAP_KEY = "jac_act_map";
const ACT_STATS_KEY = "jac_act_stats";
const SESSION_CACHE_KEY = "jac_session_cache";

function cleanupActivityStats(validIds) {
  try {
    const stats = JSON.parse(localStorage.getItem(ACT_STATS_KEY) || "{}");
    const validSet = new Set(validIds);
    let changed = false;
    for (const id in stats) {
      if (!validSet.has(id)) {
        delete stats[id];
        changed = true;
      }
    }
    if (changed) {
      localStorage.setItem(ACT_STATS_KEY, JSON.stringify(stats));
      window.dispatchEvent(new CustomEvent("jac_stats_updated", { detail: stats }));
    }
  } catch {}
}

function loadDraft() {
  try { const v=localStorage.getItem(NS_KEY); return v?JSON.parse(v):null; } catch { return null; }
}
function loadRepoStats() {
  try { return JSON.parse(localStorage.getItem(REPO_STATS_KEY)) || {}; } catch { return {}; }
}
function incRepoStat(name) {
  if (!name) return;
  try {
    const stats = loadRepoStats();
    stats[name] = (stats[name] || 0) + 1;
    localStorage.setItem(REPO_STATS_KEY, JSON.stringify(stats));
  } catch {}
}
function loadLastSource() {
  try { return localStorage.getItem(LAST_SOURCE_KEY) || ""; } catch { return ""; }
}
function saveLastSource(name) {
  try { localStorage.setItem(LAST_SOURCE_KEY, name || ""); } catch {}
}
function loadLastBranches() {
  try { return JSON.parse(localStorage.getItem(LAST_BRANCHES_KEY)) || {}; } catch { return {}; }
}
function saveLastBranch(source, branch) {
  if (!source || !branch) return;
  try {
    const branches = loadLastBranches();
    branches[source] = branch;
    localStorage.setItem(LAST_BRANCHES_KEY, JSON.stringify(branches));
  } catch {}
}
function saveDraft(d) {
  try { localStorage.setItem(NS_KEY, JSON.stringify(d)); } catch {}
}
function clearDraft() {
  try { localStorage.removeItem(NS_KEY); } catch {}
}

const DRAFTS_BOX_KEY = "jac_drafts_box";
function loadDraftsBox() {
  try { return JSON.parse(localStorage.getItem(DRAFTS_BOX_KEY) || "[]"); } catch { return []; }
}
function saveDraftToBox(draft) {
  try {
    const drafts = loadDraftsBox();
    const newDraft = {
      ...draft,
      id: draft.id || "dr_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      createdAt: draft.createdAt || Date.now(),
      updatedAt: Date.now()
    };
    const idx = drafts.findIndex(d => d.id === newDraft.id);
    if (idx >= 0) drafts[idx] = newDraft;
    else drafts.unshift(newDraft);
    localStorage.setItem(DRAFTS_BOX_KEY, JSON.stringify(drafts));
    return newDraft;
  } catch (e) { return null; }
}
function deleteDraftFromBox(id) {
  try {
    const drafts = loadDraftsBox().filter(d => d.id !== id);
    localStorage.setItem(DRAFTS_BOX_KEY, JSON.stringify(drafts));
  } catch {}
}
function clearDraftsBox() {
  try { localStorage.removeItem(DRAFTS_BOX_KEY); } catch {}
}

const NewSession = ({ apiKey, personas, onBack, onCreate, isDesktop, plan, todayCount, allSessions = [], activitiesMap = {}, initialDraft = null, onDraftSaved = null }) => {
  const draft = useMemo(() => initialDraft || loadDraft(), [initialDraft]);
  const hasSavedOrSubmitted = useRef(false);
  const [sources,setSources]       = useState([]);
  const [loadingSrc,setLoadSrc]    = useState(true);
  const [source,setSource]         = useState(draft?.source ?? "");
  const [sourceSearch,setSourceSearch] = useState("");
  const [showSources,setShowSources] = useState(false);
  const [branch,setBranch]         = useState(draft?.branch ?? "");
  const [branches,setBranches]     = useState([]);   // [{displayName}] from Jules API
  const [showBranches,setShowBranches] = useState(false);
  const [defaultBranch,setDefault] = useState("");   // e.g. "main"
  const [prompt,setPrompt]         = useState(draft?.prompt ?? "");
  const [autoMode,setAutoMode]     = useState(draft?.autoMode ?? true);
  const [reqApproval,setReqApp]    = useState(draft?.reqApproval ?? false);
  const [selectedPersonas, setSelectedPersonas] = useState(new Set(draft?.selectedPersonas || []));
  const [submitting,setSub]        = useState(false);
  const [err,setErr]               = useState(null);
  const [savedFlash,setSavedFlash] = useState(false);
  const [expanded,setExpanded]     = useState(false);
  const [showConfirm,setShowConfirm] = useState(false);
  const [sourceInteracted, setSourceInteracted] = useState(false);


  // ── Derive branches whenever selected source changes ─────────────────────
  const srcObj = useMemo(() => sources.find(s => s.name === source) || null, [sources, source]);

  const getSourceDisplay = useCallback((s) => {
    if (!s) return "No repo (repoless)";
    return s.githubRepo ? `${s.githubRepo.owner}/${s.githubRepo.repo}` : s.id || s.name;
  }, []);

  useEffect(() => {
    if (srcObj) setSourceSearch(getSourceDisplay(srcObj));
    else if (source === "") setSourceSearch("No repo (repoless)");
  }, [srcObj, source, getSourceDisplay]);

  const filteredSources = useMemo(() => {
    const search = sourceSearch.toLowerCase();
    const isSelectedMatch = (srcObj && sourceSearch === getSourceDisplay(srcObj)) || (source === "" && sourceSearch === "No repo (repoless)");

    let base = [...sources];
    const stats = loadRepoStats();
    base.sort((a,b) => (stats[b.name]||0) - (stats[a.name]||0));

    const all = [...base, null]; // null represents "repoless"
    if (!sourceSearch || isSelectedMatch) return all;
    return all.filter(s => getSourceDisplay(s).toLowerCase().includes(search));
  }, [sources, sourceSearch, getSourceDisplay, srcObj, source]);

  useEffect(() => {
    if (!srcObj) { setBranches([]); setDefault(""); return; }
    const repo = srcObj.githubRepo;
    if (!repo) { setBranches([]); setDefault(""); return; }
    const bs   = (repo.branches || []).map(b => b.displayName).filter(Boolean);
    const def  = repo.defaultBranch?.displayName || bs[0] || "main";
    setBranches(bs);
    setDefault(def);
    if (!draft?.branch || draft?.source !== source) {
      const lastBranch = loadLastBranches()[source];
      setBranch(lastBranch || def);
    }
  }, [srcObj, source]);

  const filteredBranches = useMemo(() => {
    if (!branch || branches.includes(branch)) return branches;
    const s = branch.toLowerCase();
    return branches.filter(b => b.toLowerCase().includes(s));
  }, [branches, branch]);

  const togglePersona = (id) => {
    const next = new Set(selectedPersonas);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedPersonas(next);
  };

  useEffect(() => {
    if (!source && autoMode) setAutoMode(false);
  }, [source, autoMode]);

  const draftRef = useRef(null);
  useEffect(() => {
    clearTimeout(draftRef.current);
    draftRef.current = setTimeout(() => {
      saveDraft({ source, branch, prompt, autoMode, reqApproval, selectedPersonas: Array.from(selectedPersonas) });
    }, 400);
    return () => clearTimeout(draftRef.current);
  }, [source, branch, prompt, autoMode, reqApproval]);

  const stateRef = useRef({ source, branch, prompt, autoMode, reqApproval, selectedPersonas, defaultBranch, initialDraft });
  useEffect(() => {
    stateRef.current = { source, branch, prompt, autoMode, reqApproval, selectedPersonas, defaultBranch, initialDraft };
  }, [source, branch, prompt, autoMode, reqApproval, selectedPersonas, defaultBranch, initialDraft]);

  useEffect(() => {
    return () => {
      if (!hasSavedOrSubmitted.current) {
        const current = stateRef.current;
        if (current.prompt.trim()) {
          const d = {
            id: current.initialDraft?.id,
            source: current.source,
            branch: current.branch || current.defaultBranch || "main",
            prompt: current.prompt,
            autoMode: current.autoMode,
            reqApproval: current.reqApproval,
            selectedPersonas: Array.from(current.selectedPersonas),
            title: current.prompt.trim().split("\n")[0].slice(0, 50) + (current.prompt.trim().length > 50 ? "..." : "")
          };
          saveDraftToBox(d);
          clearDraft();
        }
      }
    };
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const d = await apiCall(apiKey, "/sources?pageSize=50", { _label:"List sources" });
        const s = d.sources || [];
        const stats = loadRepoStats();
        const sorted = [...s].sort((a,b) => (stats[b.name]||0) - (stats[a.name]||0));
        setSources(sorted);
        if (!draft?.source) {
          const last = loadLastSource();
          if (last && sorted.some(x => x.name === last)) setSource(last);
          else if (sorted.length > 0) setSource(sorted[0].name);
        }
      } catch (err) { setErr(err.message); }
      finally { setLoadSrc(false); }
    })();
  }, []);

  const handleClearDraft = () => {
    hasSavedOrSubmitted.current = true;
    clearDraft();
    setSource(""); setBranch(""); setPrompt("");
    setAutoMode(true); setReqApp(false); setSelectedPersonas(new Set());
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 1500);
    if (onDraftSaved) onDraftSaved();
  };

  const handleSaveToBox = () => {
    if (!prompt.trim()) return;
    hasSavedOrSubmitted.current = true;
    const d = {
      id: initialDraft?.id,
      source,
      branch: branch || defaultBranch || "main",
      prompt,
      autoMode,
      reqApproval,
      selectedPersonas: Array.from(selectedPersonas),
      title: prompt.trim().split("\n")[0].slice(0, 50) + (prompt.trim().length > 50 ? "..." : "")
    };
    saveDraftToBox(d);
    handleClearDraft();
    if (onDraftSaved) onDraftSaved();
  };

  const handleCreate = async () => {
    setSub(true); setErr(null); setShowConfirm(false);

    let finalPrompt = prompt.trim();
    if (selectedPersonas.size > 0) {
      const personaPrompts = Array.from(selectedPersonas)
        .map(id => personas.find(p => p.id === id)?.prompt)
        .filter(Boolean);
      if (personaPrompts.length > 0) {
        finalPrompt += "\n\n" + personaPrompts.join("\n\n");
      }
    }

    const body = {
      prompt: finalPrompt,
      ...(source&&{
        sourceContext:{ source, githubRepoContext:{ startingBranch:branch||defaultBranch||"main" } },
        ...(autoMode&&{automationMode:"AUTO_CREATE_PR"}),
      }),
      requirePlanApproval: reqApproval,
    };
    try {
      const d = await apiCall(apiKey, "/sessions", { method:"POST", body, _label:"Create session" });
      hasSavedOrSubmitted.current = true;
      clearDraft();
      if (source) {
        incRepoStat(source);
        saveLastSource(source);
        saveLastBranch(source, branch || defaultBranch || "main");
      }
      onCreate(d);
    } catch (err) { setErr(err.message); setSub(false); }
  };

  const payloadEst = (JSON.stringify({prompt,source,branch}).length/1024).toFixed(1);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0,position:"relative"}}>
      {showConfirm && (
        <Modal
          onClose={() => setShowConfirm(false)}
          icon="tasks"
          title="CONFIRM SESSION"
          subtitle="Ready to assign this task to Jules?"
          actions={
            <>
              <button
                onClick={() => setShowConfirm(false)}
                style={{
                  flex:1, padding:"14px", borderRadius:10, border:`1px solid ${T.border}`,
                  background:"transparent", color:T.muted, cursor:"pointer",
                  fontFamily:"'JetBrains Mono',monospace", fontSize:12, fontWeight:700,
                  transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)"
                }}
                onMouseEnter={e => e.currentTarget.style.background = T.surfaceHi}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}
              >CANCEL</button>
              <button
                onClick={handleCreate}
                disabled={submitting}
                style={{
                  flex:2, padding:"14px", borderRadius:10, border:"none",
                  background:T.brand, color:"#000", cursor:"pointer",
                  fontFamily:"'JetBrains Mono',monospace", fontSize:12, fontWeight:900,
                  boxShadow:`0 8px 24px ${T.brand}40`, transition:"transform .2s cubic-bezier(0.4, 0, 0.2, 1)"
                }}
                onMouseEnter={e => e.currentTarget.style.transform = "translateY(-2px)"}
                onMouseLeave={e => e.currentTarget.style.transform = "none"}
              >
                {submitting ? "STARTING..." : "START SESSION →"}
              </button>
            </>
          }
        >
          <div style={{display:"flex", flexDirection:"column", gap:16, marginBottom:28}}>
            <div style={{
              background:T.surfaceHi, borderRadius:10, padding:12,
              border: `1px solid ${T.border}`,
              transition: "all .2s cubic-bezier(0.4, 0, 0.2, 1)"
            }}>
              <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.brand, fontWeight:800, letterSpacing:"0.1em", marginBottom:6}}>TARGET REPOSITORY</div>
              <div style={{position:"relative"}}>
                <input
                  value={sourceSearch}
                  onChange={e=>{setSourceSearch(e.target.value); setShowSources(true); setSourceInteracted(true);}}
                  onFocus={()=>{setShowSources(true); setSourceInteracted(true);}}
                  placeholder="Search repositories..."
                  style={{
                    ...inputSt,
                    paddingRight:36, fontSize:13, padding: "8px 10px",
                    background: "transparent",
                    border: (!sourceInteracted && !showSources && !showBranches) ? `1px solid ${T.brand}` : `1px solid ${T.border}`,
                    boxShadow: (!sourceInteracted && !showSources && !showBranches) ? `0 0 15px ${T.brand}40` : "none",
                    animation: (!sourceInteracted && !showSources && !showBranches) ? "pulseRepo 1s infinite ease-in-out" : "none",
                  }}
                />
                <div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", display:"flex", alignItems:"center", pointerEvents:"none"}}>
                  <Ic n="code" s={14} c={showSources?T.brand:T.muted}/>
                </div>

                {showSources && (
                  <>
                    <Backdrop onClick={()=>{
                      setShowSources(false);
                      if (srcObj) setSourceSearch(getSourceDisplay(srcObj));
                      else if (source === "") setSourceSearch("No repo (repoless)");
                    }} zIndex={2100}/>
                    <div style={{
                      position:"absolute", bottom:"100%", left:0, right:0, zIndex:2101,
                      marginBottom:4, background:T.surfaceHi, border:`1px solid ${T.borderHi}`,
                      borderRadius:6, maxHeight:180, overflowY:"auto",
                      boxShadow:"0 -10px 25px rgba(0,0,0,0.5)",
                    }}>
                      {filteredSources.map((s, idx) => {
                        const sName = s === null ? "" : s.name;
                        const isSelected = sName === source;
                        return (
                          <button
                            key={s === null ? "_repoless" : s.name}
                            onClick={()=>{
                              setSource(sName);
                              setSourceSearch(getSourceDisplay(s));
                              setShowSources(false);
                              setSourceInteracted(true);
                            }}
                            style={{
                              width:"100%", padding:"10px 12px", background:"none", border:"none",
                              textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:8,
                              borderBottom:idx < filteredSources.length - 1 ? `1px solid ${T.border}` : "none",
                              transition:"background .1s cubic-bezier(0.4, 0, 0.2, 1)",
                            }}
                            onMouseEnter={e=>e.currentTarget.style.background=T.dim}
                            onMouseLeave={e=>e.currentTarget.style.background="none"}
                          >
                            <Ic n="code" s={12} c={isSelected?T.brand:T.muted}/>
                            <span style={{
                              flex:1, fontFamily:"'IBM Plex Sans',sans-serif", fontSize:14,
                              color:isSelected?T.brand:T.text, fontWeight:isSelected?600:400,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                            }}>{getSourceDisplay(s)}</span>
                          </button>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            </div>

            {source && (
              <div style={{background:T.surfaceHi, borderRadius:10, padding:12, border:`1px solid ${T.border}`}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.blue, fontWeight:800, letterSpacing:"0.1em", marginBottom:6}}>STARTING BRANCH</div>
                <div style={{position:"relative"}}>
                  <input
                    value={branch}
                    onChange={e=>{setBranch(e.target.value); setShowBranches(true);}}
                    onFocus={()=>setShowBranches(true)}
                    placeholder={defaultBranch || "main"}
                    style={{...inputSt, paddingRight:36, fontSize:13, padding: "8px 10px"}}
                  />
                  <div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", display:"flex", alignItems:"center", pointerEvents:"none"}}>
                    <Ic n="branch" s={14} c={showBranches?T.brand:T.muted}/>
                  </div>

                  {showBranches && (
                    <>
                      <Backdrop onClick={()=>{
                        setShowBranches(false);
                        setBranch(branch);
                      }} zIndex={2100}/>
                      <div style={{
                        position:"absolute", bottom:"100%", left:0, right:0, zIndex:2101,
                        marginBottom:4, background:T.surfaceHi, border:`1px solid ${T.borderHi}`,
                        borderRadius:6, maxHeight:150, overflowY:"auto",
                        boxShadow:"0 -10px 25px rgba(0,0,0,0.5)",
                      }}>
                        {filteredBranches.map(b => (
                          <button
                            key={b}
                            onClick={()=>{setBranch(b); setShowBranches(false);}}
                            style={{
                              width:"100%", padding:"10px 12px", background:"none", border:"none",
                              textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:8,
                              borderBottom:`1px solid ${T.border}33`, transition:"background .1s cubic-bezier(0.4, 0, 0.2, 1)",
                            }}
                            onMouseEnter={e=>e.currentTarget.style.background=T.dim}
                            onMouseLeave={e=>e.currentTarget.style.background="none"}
                          >
                            <Ic n="branch" s={12} c={b===branch?T.brand:T.muted}/>
                            <span style={{
                              flex:1, fontFamily:"'IBM Plex Sans',sans-serif", fontSize:14,
                              color:b===branch?T.brand:T.text, fontWeight:b===branch?600:400,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                            }}>{b}</span>
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}

            <div style={{background:T.surfaceHi, borderRadius:10, padding:16, border:`1px solid ${T.border}`}}>
              <ConflictRadar
                currentSource={source}
                currentBranch={branch || defaultBranch}
                currentPrompt={prompt}
                allSessions={allSessions}
                activitiesMap={activitiesMap}
              />
              <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.purple, fontWeight:800, letterSpacing:"0.1em", marginBottom:8, marginTop: 12}}>PROMPT SUMMARY</div>
              <div style={{fontFamily:"'IBM Plex Sans',sans-serif", fontSize:14, color:T.textDim, lineHeight:1.5, display:"-webkit-box", WebkitLineClamp:3, WebkitBoxOrient:"vertical", overflow:"hidden", marginBottom: selectedPersonas.size > 0 ? 12 : 0}}>
                {prompt}
              </div>
              {selectedPersonas.size > 0 && (
                <div style={{display:"flex", gap:4, flexWrap:"wrap", paddingTop:8, borderTop:`1px solid ${T.border}`}}>
                  {Array.from(selectedPersonas).map(id => {
                    const p = personas.find(x => x.id === id);
                    return p ? (
                      <span key={id} style={{fontSize:9, fontWeight:800, color:p.color, background:`${p.color}15`, padding:"2px 6px", borderRadius:4, border:`1px solid ${p.color}30`}}>
                        {p.label}
                      </span>
                    ) : null;
                  })}
                </div>
              )}
            </div>

            {(autoMode || reqApproval) && (
              <div style={{display:"flex", gap:10}}>
                {autoMode && (
                  <div style={{flex:1, display:"flex", alignItems:"center", gap:6, padding:"8px 12px", background:T.brandDim, border:`1px solid ${T.brand}30`, borderRadius:8}}>
                    <Ic n="check" s={12} c={T.brand}/>
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.brand, fontWeight:800}}>AUTO PR</span>
                  </div>
                )}
                {reqApproval && (
                  <div style={{flex:1, display:"flex", alignItems:"center", gap:6, padding:"8px 12px", background:T.purpleDim, border:`1px solid ${T.purple}30`, borderRadius:8}}>
                    <Ic n="plan" s={12} c={T.purple}/>
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.purple, fontWeight:800}}>PLAN REVIEW</span>
                  </div>
                )}
              </div>
            )}
          </div>
        </Modal>
      )}
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}33`,background:T.surface,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {!isDesktop&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex"}}><Ic n="back" s={18} c={T.text}/></button>}
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.text,letterSpacing:"0.05em",fontWeight:700,flex:1}}>NEW SESSION</div>
        {/* Draft indicator */}
        {draft&&(prompt||branch!=="main")&&!savedFlash&&(
          <button onClick={handleClearDraft} title="Clear saved draft" style={{
            display:"flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,
            background:T.amberDim,border:`1px solid ${T.amber}40`,cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.amber,letterSpacing:"0.07em",
          }}>
            <span style={{width:4,height:4,borderRadius:"50%",background:T.amber,flexShrink:0}}/>
            DRAFT
          </button>
        )}
        {savedFlash&&(
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.textDim,padding:"3px 9px"}}>CLEARED</span>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 20px",WebkitOverflowScrolling:"touch",minHeight:0}}>
        <div style={{maxWidth:560,margin:"0 auto"}}>
          {err&&<div style={{padding:"8px 12px",borderRadius:5,marginBottom:12,background:T.redDim,border:`1px solid ${T.red}40`,fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:T.red}}>{err}</div>}

          <Field label="TASK PROMPT *" style={{marginBottom:12}}>
            <div style={{ position: "relative" }}>
              <div style={{ position: "absolute", top: -18, right: 0, fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.textDim, opacity: 0.8 }}>
                {fmtChars(prompt.length)}
              </div>
              <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
                placeholder="Describe the coding task for Jules to execute…"
                rows={6} style={{
                  ...inputSt, resize:"vertical", lineHeight:1.5,
                  paddingBottom: 40,
                  ...(expanded ? {
                    position:"fixed", top:0, left:0, right:0, bottom:0, zIndex:1000,
                    margin:0, borderRadius:0, height:"100vh", padding:"60px 24px 80px"
                  } : {})
                }}/>
              <div style={{
                position:expanded?"fixed":"absolute", bottom:expanded?24:8, right:expanded?24:8, zIndex:1001,
                display:"flex", gap:8,
                padding: "2px 6px", borderRadius: 6,
                background: expanded ? T.surfaceHi : "rgba(11, 14, 20, 0.6)",
                backdropFilter: expanded ? "none" : "blur(4px)",
              }}>
                {prompt.trim() && (
                   <button onClick={()=>setPrompt("")} title="Clear Prompt" style={{background:"transparent", border:"none", padding:4, cursor:"pointer", display:"flex", alignItems:"center"}}>
                     <Ic n="x" s={14} c={T.red}/>
                   </button>
                )}
                <button onClick={()=>setExpanded(!expanded)} title={expanded?"Minimize":"Expand"} style={{background:"transparent", border:"none", padding:4, cursor:"pointer", display:"flex", alignItems:"center"}}>
                  <Ic n={expanded?"chevron_down":"expand"} s={14} c={T.brand}/>
                </button>
              </div>
            </div>
          </Field>

          <div style={{marginBottom:12}}>
            <div style={{marginBottom:8,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:"0.12em"}}>ROLES & FOCUS</div>
            <MultiPersonaPicker personas={personas} selectedIds={selectedPersonas} onToggle={togglePersona} style={{marginBottom:8}} />

            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[
                {label:"AUTO PR",    val:autoMode,   set:setAutoMode, hint:"Create PR when done", disabled:!source},
                {label:"APPROVE PLAN",val:reqApproval,set:setReqApp,  hint:"Review plan first"},
              ].map(opt=>(
                <button
                  key={opt.label}
                  onClick={()=>!opt.disabled&&opt.set(v=>!v)}
                  disabled={opt.disabled}
                  style={{
                    flex:"1 1 100px",padding:"8px",borderRadius:5,cursor:opt.disabled?"default":"pointer",
                    background:opt.val?T.brandDim:T.surfaceHi,
                    border:`1px solid ${opt.val?T.brand+"50":T.border}`,
                    display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                    opacity:opt.disabled?0.4:1,
                  }}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:opt.val?T.brand:T.muted,letterSpacing:"0.08em"}}>{opt.label}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.textDim}}>{opt.hint}</div>
                </button>
              ))}
            </div>
          </div>


          <div style={{padding:"8px 12px",borderRadius:5,marginBottom:8,background:T.brandDim,border:`1px solid ${T.brand}30`,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.brand,lineHeight:1.7}}>
            ⚡ PAYLOAD: ~{payloadEst}KB<span style={{color:T.textDim}}> · web baseline ~180KB</span>
          </div>

          {plan&&(
            <div style={{
              padding:"8px 12px",borderRadius:5,marginBottom:12,
              background:todayCount.total>=plan.daily?T.redDim:T.surfaceHi,
              border:`1px solid ${todayCount.total>=plan.daily?T.red+"40":T.border}`,
              fontFamily:"'JetBrains Mono',monospace",fontSize:11,lineHeight:1.7,
              color:todayCount.total>=plan.daily?T.red:T.muted,
            }}>
              {todayCount.total>=plan.daily
                ? `⛔ Daily limit reached (${plan.daily} tasks on ${plan.label} plan). Next recovery at ${fmtTime(todayCount.nextResetTs)} (in ${todayCount.resetIn}).`
                : (
                  <>
                    <div>📋 {plan.label} plan · {todayCount.total}/{plan.daily} tasks started · {todayCount.done} PRs created</div>
                    {todayCount.nextResetTs && <div style={{fontSize:11, color:T.amber, marginTop:4, fontWeight:700}}>Next slot recovered at {fmtTime(todayCount.nextResetTs)} ({todayCount.resetIn})</div>}
                  </>
                )
              }
            </div>
          )}

          <div style={{display:"flex", gap:10}}>
            <Btn onClick={handleSaveToBox} disabled={!prompt.trim()||submitting} outline style={{flex:1}}>
              <Ic n="archive" s={14} c={T.brand}/>
              SAVE DRAFT
            </Btn>
            <Btn onClick={() => setShowConfirm(true)} disabled={!prompt.trim()||submitting||loadingSrc||(plan&&todayCount.total>=plan.daily)} style={{flex:2}}>
              {submitting?"SENDING…":"ASSIGN TO JULES →"}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Drafts Box ───────────────────────────────────────────────────────────────
const DraftsBox = ({ onBack, isDesktop, onResume, onCreate, allSessions, activitiesMap, draftsMap = {}, onDraftChange, onSelectSession }) => {
  const [activeTab, setActiveTab] = useState("templates"); // "templates" or "followups"
  const [drafts, setDrafts] = useState(loadDraftsBox());

  const handleDelete = (id) => {
    if (!confirm("Delete this draft?")) return;
    deleteDraftFromBox(id);
    setDrafts(loadDraftsBox());
  };

  const handleClearAll = () => {
    if (!confirm("Clear all drafts?")) return;
    clearDraftsBox();
    setDrafts([]);
  };

  const followupSessions = useMemo(() => {
    return allSessions.filter(s => draftsMap[s.id]);
  }, [allSessions, draftsMap]);

  const handleDeleteFollowup = (id) => {
    if (!confirm("Delete this follow-up message draft?")) return;
    try {
      localStorage.removeItem("jac_draft_" + id);
      if (onDraftChange) onDraftChange(id, false);
    } catch (e) {}
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}33`,background:T.surface,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {!isDesktop&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex"}}><Ic n="back" s={18} c={T.text}/></button>}
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.text,letterSpacing:"0.05em",fontWeight:700,flex:1}}>DRAFTS BOX</div>
        {activeTab === "templates" && drafts.length > 0 && (
          <button onClick={handleClearAll} style={{background:"none", border:"none", cursor:"pointer", color:T.red, fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:700}}>CLEAR ALL</button>
        )}

const ConflictRadar = ({ currentSource, currentBranch, currentPrompt, allSessions, activitiesMap, currentSessionId, startTime, limit = 20 }) => {
  const collisions = useMemo(() => {
    if (!currentSource) return [];

    const currentFiles = new Set(getWorkingSet({ prompt: currentPrompt, id: currentSessionId }, activitiesMap[currentSessionId] || []));
    const results = [];
    const relevantSessions = allSessions
      .filter(s => s.id !== currentSessionId)
      .filter(s => s.sourceContext?.source === currentSource)
      .slice(0, limit);

    for (const s of relevantSessions) {
      const isCompleted = s.state === "COMPLETED";
      if (isCompleted) {
        if (!startTime) continue;
        const compTime = new Date(s.updateTime || s.createTime).getTime();
        if (compTime <= startTime) continue;
      }

      const acts = activitiesMap[s.id] || [];
      const sFiles = getWorkingSet(s, acts);
      const overlap = sFiles.filter(f => currentFiles.has(f));
      const sameBranch = currentBranch && s.sourceContext?.githubRepoContext?.startingBranch === currentBranch;

      if (overlap.length > 0 || sameBranch) {
        results.push({
          session: s,
          overlap,
          sameBranch,
          risk: overlap.length > 0 ? "HIGH" : "MEDIUM",
          isDrift: isCompleted
        });
      }
    }
    return results;
  }, [currentSource, currentBranch, currentPrompt, allSessions, activitiesMap, currentSessionId, startTime, limit]);

  if (collisions.length === 0) {
    if (!currentSource || !currentPrompt.trim()) return null;
    return (
      <div style={{
        marginTop: 12, padding: "8px 14px", background: "rgba(52, 211, 153, 0.05)",
        border: `1px solid rgba(52, 211, 153, 0.2)`, borderRadius: 10,
        display: "flex", alignItems: "center", gap: 8, animation: "fadeIn .3s ease"
      }}>
        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#34d399", boxShadow: "0 0 8px #34d399" }}/>
        <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, fontWeight: 800, color: "#34d399", letterSpacing: "0.05em" }}>
          NO CONFLICTS DETECTED · READY TO START
        </span>
      </div>
    );
  }

  return (
    <div style={{
      marginTop: 12, padding: 16, background: "rgba(251, 113, 133, 0.05)",
      border: `1px solid ${T.red}30`, borderRadius: 12,
      animation: "fadeIn .3s ease"
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <Ic n="wifi" s={16} c={T.red}/>
        <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 12, fontWeight: 900, color: T.red, letterSpacing: "0.05em" }}>
          CONFLICT RADAR
        </span>
        <div style={{ flex: 1, height: 1, background: `${T.red}20` }}/>
        <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 10, color: T.red, fontWeight: 700 }}>
          {collisions.length} ACTIVE RISKS
        </span>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {collisions.map((c, i) => (
          <div key={i} style={{
            background: T.surface, padding: 10, borderRadius: 8,
            border: `1px solid ${c.risk === "HIGH" ? T.red + "40" : T.amber + "40"}`,
            position: "relative", overflow: "hidden"
          }}>
            {c.risk === "HIGH" && <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: 3, background: T.red }}/>}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6, paddingLeft: c.risk === "HIGH" ? 6 : 0 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: "'IBM Plex Sans',sans-serif", fontSize: 13, fontWeight: 600, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.session.title || c.session.prompt}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}>
                  <Pill status={c.session.state} small hideLabel />
                  <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.dim }}>{fmtAgo(new Date(c.session.updateTime || c.session.createTime).getTime())}</span>
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                <div style={{
                  background: c.isDrift ? `${T.amber}15` : (c.risk === "HIGH" ? `${T.red}15` : `${T.amber}15`),
                  border: `1px solid ${c.isDrift ? T.amber : (c.risk === "HIGH" ? T.red : T.amber)}30`,
                  borderRadius: 4, padding: "2px 6px", fontFamily: "'JetBrains Mono',monospace",
                  fontSize: 8, color: c.isDrift ? T.amber : (c.risk === "HIGH" ? T.red : T.amber), fontWeight: 800
                }}>
                  {c.isDrift ? "DRIFT" : c.risk + " RISK"}
                </div>
                {c.sameBranch && (
                  <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 8, color: T.amber, fontWeight: 700, opacity: 0.8 }}>
                    SAME BASE
                  </div>
                )}
              </div>
            </div>

            {c.overlap.length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6, paddingLeft: c.risk === "HIGH" ? 6 : 0 }}>
                {c.overlap.map(f => (
                  <span key={f} style={{
                    fontFamily: "'JetBrains Mono',monospace", fontSize: 9, color: T.red,
                    background: `${T.red}10`, padding: "2px 6px", borderRadius: 4,
                    border: `1px solid ${T.red}20`
