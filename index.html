          ))}
        </div>
      </div>

      {/* ── Content ── */}
      <div ref={contentRef} onScroll={handleScroll} style={{flex:1,overflowY:"auto",padding:"14px 16px",paddingBottom:isDesktop?80:220,WebkitOverflowScrolling:"touch",minHeight:200,position:"relative"}}>
        {tab==="activity"&&(
          activities.length===0
          ?<div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>
            {ACTIVE_STATES.has(session.state)?"Waiting for activity…":"No activities yet"}
          </div>
          :<ActivityFeed activities={activities} showAll={showAll} onShowAll={()=>setShowAll(true)} onMediaClick={setActiveMedia}/>
        )}
        {tab==="plan"&&(
          <PlanView
            activities={activities}
            session={session}
            apiKey={apiKey}
            onApprove={handleApprove}
            onSendFeedback={handleSendFeedback}
            busy={busy}
          />
        )}
        {tab==="diff"&&<DiffViewer patch={diffArtifact?.unidiffPatch||null}/>}
        {tab==="media"&&(
          mediaArtifacts.length===0
          ?<div style={{textAlign:"center",padding:"40px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>No media artifacts</div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12}}>
            {mediaArtifacts.map((m,i)=>{
              const isVideo = (m.mimeType || "").includes("video") || (m.mimeType || "").includes("webm");
              return (
                <button
                  key={i}
                  onClick={() => setActiveMedia(m)}
                  style={{
                    background:T.surface, border:`1px solid ${T.border}`, borderRadius:8,
                    overflow:"hidden", cursor:"pointer", padding:0, textAlign:"left",
                    transition:"transform .15s, border-color .15s",
                  }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = T.green; e.currentTarget.style.transform = "translateY(-2px)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.transform = "none"; }}
                >
                  <div style={{ width:"100%", height:120, background:"#040507", display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {isVideo ? (
                      <video src={`data:${m.mimeType};base64,${m.data}`} muted autoPlay loop playsInline
                        style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                    ) : (
                      <img src={`data:${m.mimeType};base64,${m.data}`} alt={`artifact-${i}`}
                        style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                    )}
                  </div>
                  <div style={{ padding:"8px 10px" }}>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:T.text, fontWeight:700, marginBottom:2 }}>
                      {m.mimeType.split("/")[1]?.toUpperCase() || "IMAGE"}
                    </div>
                    <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.muted }}>
                      {fmtTime(new Date(m.ts).getTime())}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
        <div ref={feedEndRef}/>
      </div>

      {/* ── Media Lightbox ── */}
      <MediaModal media={activeMedia} onClose={() => setActiveMedia(null)}/>

      {/* ── Composer ── */}
      {canSend&&(
        <div style={{
          padding:"10px 16px 14px", borderTop:`1px solid ${T.border}`, background:T.surface,
          flexShrink:0, transition:"transform .3s cubic-bezier(0.4, 0, 0.2, 1), opacity .2s ease, visibility .3s",
          transform: (isDesktop || composerVisible) ? "translateY(0)" : "translateY(100%)",
          opacity: (isDesktop || composerVisible) ? 1 : 0,
          visibility: (isDesktop || composerVisible) ? "visible" : "hidden",
          position: isDesktop ? "relative" : "absolute",
          bottom: 0, left: 0, right: 0, zIndex: 10,
          boxShadow: isDesktop ? "none" : "0 -8px 24px rgba(0,0,0,0.4)",
        }}>
          <div style={{ display: "flex", flexDirection:"column", gap: 8, marginBottom: 8 }}>
            <MultiPersonaPicker selectedIds={selectedPersonas} onToggle={togglePersona} />
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end", marginTop:4}}>
            <textarea
              ref={txtRef}
              value={msg}
              onChange={e=>setMsg(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),handleSend())}
              placeholder="Message Jules or give new instructions…"
              rows={2}
              style={{
                flex:1,background:T.surfaceHi,
                border:`1px solid ${msg?T.green+"66":T.border}`,
                borderRadius:6,padding:"8px 10px",color:T.text,
                fontFamily:"'IBM Plex Sans',sans-serif",fontSize:15,lineHeight:1.4,
                resize:"none",outline:"none",transition:"border-color .2s",
                WebkitOverflowScrolling:"touch",
              }}
            />
            <button
              onClick={handleSend}
              disabled={!msg.trim()||busy}
              style={{
                width:38,height:38,flexShrink:0,borderRadius:6,border:"none",
                background:msg.trim()&&!busy?T.green:T.dim,
                cursor:msg.trim()&&!busy?"pointer":"default",
                display:"flex",alignItems:"center",justifyContent:"center",
                transition:"background .2s",
              }}
            >
              <Ic n="send" s={14} c={msg.trim()&&!busy?"#000":T.muted}/>
            </button>
          </div>
          <div style={{marginTop:4,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted}}>↵ send · shift+↵ newline</div>
        </div>
      )}

      {/* ── Refined Floating Scroll Actions ── */}
      <div style={{
        position:"absolute", right:16,
        bottom: (isDesktop || composerVisible) ? (isDesktop ? 100 : 220) : 20,
        display:"flex", flexDirection:"column", gap:12, zIndex:100, pointerEvents:"none",
        transition:"bottom .3s cubic-bezier(0.4, 0, 0.2, 1)",
      }}>
        <button
          onClick={() => contentRef.current?.scrollTo({ top: 0, behavior: "smooth" })}
          style={{
            width:40, height:40, borderRadius:"50%", background:T.surfaceHi,
            border:`1px solid ${T.borderHi}`, color:T.green, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 8px 24px rgba(0,0,0,0.5)", pointerEvents:"auto",
            opacity:showScrollTop?1:0, transform:showScrollTop?"scale(1)":"scale(0.8)",
            transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)",
            visibility:showScrollTop?"visible":"hidden",
            outline:"none",
          }}
          onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.1)"; e.currentTarget.style.borderColor = T.green; }}
          onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.borderColor = T.borderHi; }}
          title="Scroll to top"
        >
          <Ic n="chevron_up" s={24} c={T.green}/>
        </button>
        <button
          onClick={() => contentRef.current?.scrollTo({ top: contentRef.current.scrollHeight, behavior: "smooth" })}
          style={{
            width:40, height:40, borderRadius:"50%", background:T.surfaceHi,
            border:`1px solid ${T.borderHi}`, color:T.green, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:"0 8px 24px rgba(0,0,0,0.5)", pointerEvents:"auto",
            opacity:showScrollBottom?1:0, transform:showScrollBottom?"scale(1)":"scale(0.8)",
            transition:"all .2s cubic-bezier(0.4, 0, 0.2, 1)",
            visibility:showScrollBottom?"visible":"hidden",
            outline:"none",
          }}
          onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.1)"; e.currentTarget.style.borderColor = T.green; }}
          onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.borderColor = T.borderHi; }}
          title="Scroll to bottom"
        >
          <Ic n="chevron_down" s={24} c={T.green}/>
        </button>
      </div>
    </div>
  );
};

// ─── New Session ──────────────────────────────────────────────────────────────
// ─── NewSession draft persistence ────────────────────────────────────────────
const NS_KEY = "jac_ns_draft";
const REPO_STATS_KEY = "jac_repo_stats";
const LAST_SOURCE_KEY = "jac_last_source";

function loadDraft() {
  try { const v=localStorage.getItem(NS_KEY); return v?JSON.parse(v):null; } catch { return null; }
}
function loadRepoStats() {
  try { return JSON.parse(localStorage.getItem(REPO_STATS_KEY)) || {}; } catch { return {}; }
}
function incRepoStat(name) {
  if (!name) return;
  try {
    const stats = loadRepoStats();
    stats[name] = (stats[name] || 0) + 1;
    localStorage.setItem(REPO_STATS_KEY, JSON.stringify(stats));
  } catch {}
}
function loadLastSource() {
  try { return localStorage.getItem(LAST_SOURCE_KEY) || ""; } catch { return ""; }
}
function saveLastSource(name) {
  try { localStorage.setItem(LAST_SOURCE_KEY, name || ""); } catch {}
}
function saveDraft(d) {
  try { localStorage.setItem(NS_KEY, JSON.stringify(d)); } catch {}
}
function clearDraft() {
  try { localStorage.removeItem(NS_KEY); } catch {}
}

const NewSession = ({ apiKey, onBack, onCreate, isDesktop, plan, todayCount }) => {
  const draft = useMemo(() => loadDraft(), []);
  const [sources,setSources]       = useState([]);
  const [loadingSrc,setLoadSrc]    = useState(true);
  const [source,setSource]         = useState(draft?.source ?? "");
  const [sourceSearch,setSourceSearch] = useState("");
  const [showSources,setShowSources] = useState(false);
  const [branch,setBranch]         = useState(draft?.branch ?? "");
  const [branches,setBranches]     = useState([]);   // [{displayName}] from Jules API
  const [showBranches,setShowBranches] = useState(false);
  const [defaultBranch,setDefault] = useState("");   // e.g. "main"
  const [prompt,setPrompt]         = useState(draft?.prompt ?? "");
  const [title,setTitle]           = useState(draft?.title ?? "");
  const [autoMode,setAutoMode]     = useState(draft?.autoMode ?? true);
  const [reqApproval,setReqApp]    = useState(draft?.reqApproval ?? false);
  const [selectedPersonas, setSelectedPersonas] = useState(new Set(draft?.selectedPersonas || []));
  const [submitting,setSub]        = useState(false);
  const [err,setErr]               = useState(null);
  const [savedFlash,setSavedFlash] = useState(false);


  // ── Derive branches whenever selected source changes ─────────────────────
  // Jules API returns branches[] + defaultBranch inline on each source object
  const srcObj = useMemo(() => sources.find(s => s.name === source) || null, [sources, source]);

  const getSourceDisplay = useCallback((s) => {
    if (!s) return "No repo (repoless)";
    return s.githubRepo ? `${s.githubRepo.owner}/${s.githubRepo.repo}` : s.id || s.name;
  }, []);

  useEffect(() => {
    if (srcObj) setSourceSearch(getSourceDisplay(srcObj));
    else if (source === "") setSourceSearch("No repo (repoless)");
  }, [srcObj, source, getSourceDisplay]);

  const filteredSources = useMemo(() => {
    const search = sourceSearch.toLowerCase();
    const isSelectedMatch = (srcObj && sourceSearch === getSourceDisplay(srcObj)) || (source === "" && sourceSearch === "No repo (repoless)");

    let base = [...sources];
    const stats = loadRepoStats();
    base.sort((a,b) => (stats[b.name]||0) - (stats[a.name]||0));

    const all = [...base, null]; // null represents "repoless"
    if (!sourceSearch || isSelectedMatch) return all;
    return all.filter(s => getSourceDisplay(s).toLowerCase().includes(search));
  }, [sources, sourceSearch, getSourceDisplay, srcObj, source]);

  useEffect(() => {
    if (!srcObj) { setBranches([]); setDefault(""); return; }
    const repo = srcObj.githubRepo;
    if (!repo) { setBranches([]); setDefault(""); return; }
    const bs   = (repo.branches || []).map(b => b.displayName).filter(Boolean);
    const def  = repo.defaultBranch?.displayName || bs[0] || "main";
    setBranches(bs);
    setDefault(def);
    // Only auto-set branch if we don't have a saved draft branch for this source
    if (!draft?.branch || draft?.source !== source) setBranch(def);
  }, [srcObj, source]);

  const filteredBranches = useMemo(() => {
    if (!branch || branches.includes(branch)) return branches;
    const s = branch.toLowerCase();
    return branches.filter(b => b.toLowerCase().includes(s));
  }, [branches, branch]);

  const togglePersona = (id) => {
    const next = new Set(selectedPersonas);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedPersonas(next);
  };

  // Auto-disable AUTO PR for repoless sessions
  useEffect(() => {
    if (!source && autoMode) setAutoMode(false);
  }, [source, autoMode]);

  // Persist on every change (debounced 400ms)
  const draftRef = useRef(null);
  useEffect(() => {
    clearTimeout(draftRef.current);
    draftRef.current = setTimeout(() => {
      saveDraft({ source, branch, prompt, title, autoMode, reqApproval, selectedPersonas: Array.from(selectedPersonas) });
    }, 400);
    return () => clearTimeout(draftRef.current);
  }, [source, branch, prompt, title, autoMode, reqApproval]);

  useEffect(() => {
    (async () => {
      try {
        const d = await apiCall(apiKey, "/sources?pageSize=50", { _label:"List sources" });
        const s = d.sources || [];
        const stats = loadRepoStats();
        const sorted = [...s].sort((a,b) => (stats[b.name]||0) - (stats[a.name]||0));
        setSources(sorted);
        // Priority: Draft > Last Used > Top Ranked
        if (!draft?.source) {
          const last = loadLastSource();
          if (last && sorted.some(x => x.name === last)) setSource(last);
          else if (sorted.length > 0) setSource(sorted[0].name);
        }
      } catch(e) { setErr(e.message); }
      finally { setLoadSrc(false); }
    })();
  }, []);

  const handleClearDraft = () => {
    clearDraft();
    setSource(""); setBranch(""); setPrompt(""); setTitle("");
    setAutoMode(true); setReqApp(false); setSelectedPersonas(new Set());
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 1500);
  };

  const handleCreate = async () => {
    if (!prompt.trim()) return;
    setSub(true); setErr(null);

    let finalPrompt = prompt.trim();
    if (selectedPersonas.size > 0) {
      const personaPrompts = Array.from(selectedPersonas)
        .map(id => PERSONAS.find(p => p.id === id)?.prompt)
        .filter(Boolean);
      if (personaPrompts.length > 0) {
        finalPrompt += "\n\n" + personaPrompts.join("\n\n");
      }
    }

    const body = {
      prompt: finalPrompt,
      ...(title.trim()&&{title:title.trim()}),
      ...(source&&{
        sourceContext:{ source, githubRepoContext:{ startingBranch:branch||defaultBranch||"main" } },
        ...(autoMode&&{automationMode:"AUTO_CREATE_PR"}),
      }),
      requirePlanApproval: reqApproval,
    };
    try {
      const d = await apiCall(apiKey, "/sessions", { method:"POST", body, _label:"Create session" });
      clearDraft(); // clear after successful submit
      if (source) {
        incRepoStat(source);
        saveLastSource(source);
      }
      onCreate(d);
    } catch(e) { setErr(e.message); setSub(false); }
  };

  const payloadEst = (JSON.stringify({prompt,title,source,branch}).length/1024).toFixed(1);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {!isDesktop&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex"}}><Ic n="back" s={18} c={T.text}/></button>}
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.text,letterSpacing:"0.05em",fontWeight:700,flex:1}}>NEW SESSION</div>
        {/* Draft indicator */}
        {draft&&(prompt||title||branch!=="main")&&!savedFlash&&(
          <button onClick={handleClearDraft} title="Clear saved draft" style={{
            display:"flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,
            background:T.amberDim,border:`1px solid ${T.amber}40`,cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.amber,letterSpacing:"0.07em",
          }}>
            <span style={{width:4,height:4,borderRadius:"50%",background:T.amber,flexShrink:0}}/>
            DRAFT
          </button>
        )}
        {savedFlash&&(
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,padding:"3px 9px"}}>CLEARED</span>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"18px 24px",WebkitOverflowScrolling:"touch",minHeight:0}}>
        <div style={{maxWidth:560,margin:"0 auto"}}>
          {err&&<div style={{padding:"8px 12px",borderRadius:5,marginBottom:12,background:T.redDim,border:`1px solid ${T.red}40`,fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:T.red}}>{err}</div>}

          <Field label="REPOSITORY (SOURCE)">
            {loadingSrc
              ?<div style={{...inputSt,color:T.muted,fontSize:13}}>Loading sources…</div>
              :sources.length===0
              ?<div style={{padding:"10px 12px",borderRadius:6,background:T.amberDim,border:`1px solid ${T.amber}40`,fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,color:T.amber}}>
                No sources found. Connect a repo at <span style={{fontFamily:"'JetBrains Mono',monospace"}}>jules.google.com</span> first.
              </div>
              :<div style={{position:"relative"}}>
                <input
                  value={sourceSearch}
                  onChange={e=>{setSourceSearch(e.target.value); setShowSources(true);}}
                  onFocus={()=>setShowSources(true)}
                  placeholder="Search repositories..."
                  style={{...inputSt, paddingRight:36}}
                />
                <div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", display:"flex", alignItems:"center", pointerEvents:"none"}}>
                  <Ic n="code" s={14} c={showSources?T.green:T.muted}/>
                </div>

                {showSources && (
                  <>
                    <div
                      style={{position:"fixed", inset:0, zIndex:100}}
                      onClick={()=>{
                        setShowSources(false);
                        // Reset search text to current selection on close
                        if (srcObj) setSourceSearch(getSourceDisplay(srcObj));
                        else if (source === "") setSourceSearch("No repo (repoless)");
                      }}
                    />
                    <div style={{
                      position:"absolute", top:"100%", left:0, right:0, zIndex:101,
                      marginTop:4, background:T.surfaceHi, border:`1px solid ${T.borderHi}`,
                      borderRadius:6, maxHeight:200, overflowY:"auto",
                      boxShadow:"0 10px 25px rgba(0,0,0,0.5)",
                    }}>
                      {filteredSources.length === 0 && (
                        <div style={{padding:"12px", textAlign:"center", fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:T.muted}}>
                          NO RESULTS FOUND
                        </div>
                      )}
                      {filteredSources.map((s, idx) => {
                        const isRepoless = s === null;
                        const sName = isRepoless ? "" : s.name;
                        const isSelected = sName === source;
                        return (
                          <button
                            key={isRepoless ? "_repoless" : s.name}
                            onClick={()=>{setSource(sName); setSourceSearch(getSourceDisplay(s)); setShowSources(false);}}
                            style={{
                              width:"100%", padding:"10px 12px", background:"none", border:"none",
                              textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:8,
                              borderBottom:idx < filteredSources.length - 1 ? `1px solid ${T.border}` : "none",
                              transition:"background .1s",
                            }}
                            onMouseEnter={e=>e.currentTarget.style.background=T.dim}
                            onMouseLeave={e=>e.currentTarget.style.background="none"}
                          >
                            <Ic n="code" s={12} c={isSelected?T.green:T.muted}/>
                            <span style={{
                              flex:1, fontFamily:"'IBM Plex Sans',sans-serif", fontSize:15,
                              color:isSelected?T.green:T.text, fontWeight:isSelected?600:400,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                            }}>{getSourceDisplay(s)}</span>
                          </button>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            }
          </Field>

          {source&&(
            <Field label="STARTING BRANCH">
              <div style={{position:"relative"}}>
                <input
                  value={branch}
                  onChange={e=>{setBranch(e.target.value); setShowBranches(true);}}
                  onFocus={()=>setShowBranches(true)}
                  placeholder={defaultBranch || "main"}
                  style={{...inputSt, paddingRight:36}}
                />
                <div style={{position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", display:"flex", alignItems:"center", pointerEvents:"none"}}>
                  <Ic n="branch" s={14} c={showBranches?T.green:T.muted}/>
                </div>

                {showBranches && (
                  <>
                    <div
                      style={{position:"fixed", inset:0, zIndex:100}}
                      onClick={()=>{
                        setShowBranches(false);
                        setBranch(branch); // Trigger re-render/reset if needed
                      }}
                    />
                    <div style={{
                      position:"absolute", top:"100%", left:0, right:0, zIndex:101,
                      marginTop:4, background:T.surfaceHi, border:`1px solid ${T.borderHi}`,
                      borderRadius:6, maxHeight:200, overflowY:"auto",
                      boxShadow:"0 10px 25px rgba(0,0,0,0.5)",
                    }}>
                      {filteredBranches.length === 0 && (
                        <div style={{padding:"12px", textAlign:"center", fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:T.muted}}>
                          NO RESULTS FOUND
                        </div>
                      )}
                      {filteredBranches.map(b => (
                        <button
                          key={b}
                          onClick={()=>{setBranch(b); setShowBranches(false);}}
                          style={{
                            width:"100%", padding:"10px 12px", background:"none", border:"none",
                            textAlign:"left", cursor:"pointer", display:"flex", alignItems:"center", gap:8,
                            borderBottom:`1px solid ${T.border}`, transition:"background .1s",
                          }}
                          onMouseEnter={e=>e.currentTarget.style.background=T.dim}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}
                        >
                          <Ic n="branch" s={12} c={b===branch?T.green:T.muted}/>
                          <span style={{
                            flex:1, fontFamily:"'IBM Plex Sans',sans-serif", fontSize:15,
                            color:b===branch?T.green:T.text, fontWeight:b===branch?600:400,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                          }}>{b}</span>
                          {b===defaultBranch && (
                            <span style={{
                              fontFamily:"'JetBrains Mono',monospace", fontSize:10,
                              color:T.green, background:T.greenDim, padding:"1px 5px", borderRadius:3,
                            }}>DEFAULT</span>
                          )}
                        </button>
                      ))}
                    </div>
                  </>
                )}
              </div>
              <div style={{
                marginTop:5, display:"flex", gap:6, alignItems:"center",
                fontFamily:"'JetBrains Mono',monospace", fontSize:11, color:T.muted,
              }}>
                <span>{branches.length || 0} branch{branches.length!==1?"es":""}</span>
                {defaultBranch && <span>· default: <span style={{color:T.green}}>{defaultBranch}</span></span>}
                {branch !== defaultBranch && defaultBranch && (
                  <button onClick={()=>setBranch(defaultBranch)} style={{
                    marginLeft:4, padding:"1px 7px", borderRadius:3,
                    background:"transparent", border:`1px solid ${T.border}`,
                    color:T.muted, cursor:"pointer",
                    fontFamily:"'JetBrains Mono',monospace", fontSize:10,
                  }}>reset</button>
                )}
              </div>
            </Field>
          )}

          <Field label="TITLE (optional)">
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Auto-generated if blank" style={inputSt}/>
          </Field>

          <Field label="TASK PROMPT *">
            <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
              placeholder="Describe the coding task for Jules to execute…"
              rows={6} style={{...inputSt,resize:"vertical",lineHeight:1.5}}/>
          </Field>

          <div style={{marginBottom:16}}>
            <div style={{marginBottom:8,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted,fontWeight:700,letterSpacing:"0.12em"}}>ROLES & FOCUS</div>
            <MultiPersonaPicker selectedIds={selectedPersonas} onToggle={togglePersona} style={{marginBottom:12}} />

            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[
                {label:"AUTO PR",    val:autoMode,   set:setAutoMode, hint:"Create PR when done", disabled:!source},
                {label:"APPROVE PLAN",val:reqApproval,set:setReqApp,  hint:"Review plan first"},
              ].map(opt=>(
                <button
                  key={opt.label}
                  onClick={()=>!opt.disabled&&opt.set(v=>!v)}
                  disabled={opt.disabled}
                  style={{
                    flex:"1 1 100px",padding:"9px 8px",borderRadius:5,cursor:opt.disabled?"default":"pointer",
                    background:opt.val?T.greenDim:T.surfaceHi,
                    border:`1px solid ${opt.val?T.green+"50":T.border}`,
                    display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                    opacity:opt.disabled?0.4:1,
                  }}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:opt.val?T.green:T.muted,letterSpacing:"0.08em"}}>{opt.label}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted}}>{opt.hint}</div>
                </button>
              ))}
            </div>
          </div>

          <div style={{padding:"8px 12px",borderRadius:5,marginBottom:10,background:T.greenDim,border:`1px solid ${T.green}30`,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.green,lineHeight:1.7}}>
            ⚡ PAYLOAD: ~{payloadEst}KB<span style={{color:T.muted}}> · web baseline ~180KB</span>
          </div>

          {plan&&(
            <div style={{
              padding:"8px 12px",borderRadius:5,marginBottom:14,
              background:todayCount>=plan.daily?T.redDim:T.surfaceHi,
              border:`1px solid ${todayCount>=plan.daily?T.red+"40":T.border}`,
              fontFamily:"'JetBrains Mono',monospace",fontSize:11,lineHeight:1.7,
              color:todayCount>=plan.daily?T.red:T.muted,
            }}>
              {todayCount>=plan.daily
                ? `⛔ Daily limit reached (${plan.daily} tasks on ${plan.label} plan). Upgrade at jules.google.com or wait for reset.`
                : `📋 ${plan.label} plan · ${todayCount}/${plan.daily} tasks used today · ${plan.concurrent} concurrent max`
              }
            </div>
          )}

          <Btn onClick={handleCreate} disabled={!prompt.trim()||submitting||loadingSrc||(plan&&todayCount>=plan.daily)} style={{width:"100%"}}>
            {submitting?"SENDING…":"ASSIGN TO JULES →"}
          </Btn>
        </div>
      </div>
    </div>
  );
};

                  <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:24, fontWeight:900, color:T.text, marginBottom:16}}>{storage ? fmtBytes(storage.cache/1024) : "..."}<span style={{fontSize:10, color:T.dim, marginLeft:4, fontWeight:500}}>TOTAL</span></div>
                  <button onClick={clearCacheOnly} style={{
                    width:"100%", padding:"10px", borderRadius:8, background:`${T.blue}15`, border:`1px solid ${T.blue}30`,
                    color:T.blue, fontSize:10, fontWeight:800, fontFamily:"'JetBrains Mono',monospace", cursor:"pointer",
                    transition:"all .2s"
                  }} onMouseEnter={e=>e.currentTarget.style.background=`${T.blue}25`} onMouseLeave={e=>e.currentTarget.style.background=`${T.blue}15`}>CLEAR CACHE</button>

                <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:T.red, fontWeight:800, marginBottom:8, letterSpacing:"0.1em"}}>DANGER ZONE</div>
                <div style={{fontFamily:"'IBM Plex Sans',sans-serif", fontSize:13, color:T.muted, marginBottom:20, lineHeight:1.6}}>

                </div>
                <button onClick={resetApp} style={{
                  width:"100%", maxWidth:240, padding:"12px 20px", borderRadius:8,
                  background:T.red, border:"none",
                  color:"#000", fontFamily:"'JetBrains Mono',monospace", fontSize:12,
                  fontWeight:900, letterSpacing:"0.1em", cursor:"pointer",
                  boxShadow:`0 8px 24px ${T.red}40`, transition:"transform .2s"
                }} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.02)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>FULL SYSTEM RESET</button>
              </div>
            </div>
          )}

          <div style={{marginTop:60, paddingBottom:60, textAlign:"center"}}>
            <Btn onClick={onBack} outline sm style={{margin:"0 auto", borderColor:T.borderHi, color:T.muted}}>
              <Ic n="back" s={12} c={T.muted} />
              EXIT SETTINGS
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

const FILTER_LABELS = { AWAITING_PLAN_APPROVAL:"APPROVE", ALL:"ALL" };

const SessionList = ({ sessions, onSelect, onRefresh, refreshing, netSnap, selectedId, isDesktop, onNew, onNetwork, onSettings, pollInterval, sessionLimit, countdown, plan, todayCount, searchQuery, setSearchQuery, archivedIds, showArchived, setShowArchived }) => {
  const [filter,setFilter] = useState("ALL");
  const [scrolled, handleScroll] = useScrollThreshold();
  const [searchOpen, setSearchOpen] = useState(false);

  const baseFiltered = useMemo(() => {
    let list = sessions.filter(s => archivedIds.has(s.id) === showArchived);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s => (s.title||"").toLowerCase().includes(q) || (s.prompt||"").toLowerCase().includes(q) || (s.id||"").toLowerCase().includes(q));
    }
    return list;
  }, [sessions, archivedIds, showArchived, searchQuery]);

  const filtered = filter==="ALL" ? baseFiltered : baseFiltered.filter(s=>s.state===filter);
  const active   = sessions.filter(s=>ACTIVE_STATES.has(s.state)).length;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      <div style={{
        padding:scrolled?"8px 16px 8px":"12px 16px 0",
        background:T.surface,
        borderBottom:`1px solid ${T.border}`,
        flexShrink:0,
        transition:"all .25s cubic-bezier(0.4, 0, 0.2, 1)",
        zIndex: 5,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:scrolled?0:10}}>
          <div style={{
            width:scrolled?20:32,height:scrolled?20:32,borderRadius:6,background:T.green,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontFamily:"'JetBrains Mono',monospace",fontSize:scrolled?11:18,fontWeight:900,color:"#000",
            boxShadow:scrolled?"none":`0 0 12px ${T.green}40`,flexShrink:0,
            transition:"all .2s ease",
          }}>J</div>
          <div style={{minWidth:0, transition:"all .2s ease"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:scrolled?12:14,fontWeight:700,color:T.text}}>JULES</div>
            {!scrolled && (
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:active>0?T.amber:T.muted}}>
                {active>0?`⚡ ${active} ACTIVE`:"AGENT CLIENT"}
              </div>
            )}
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
            <button onClick={() => setSearchOpen(!searchOpen)} title="Search sessions" style={{
              width:30,height:30,borderRadius:5,
              background:searchOpen||searchQuery?T.blueDim:"transparent",
              border:`1px solid ${searchOpen||searchQuery?T.blue+"40":T.border}`,
              display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"
            }}>
              <Ic n="search" s={15} c={searchOpen||searchQuery?T.blue:T.muted}/>
            </button>
            {isDesktop&&(
              <button onClick={onNew} title="New Session" style={{width:30,height:30,borderRadius:5,background:T.greenDim,border:`1px solid ${T.green}40`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                <Ic n="plus" s={15} c={T.green}/>
              </button>
            )}
            <button onClick={onSettings} title="Settings" style={{width:30,height:30,borderRadius:5,background:T.surfaceHi,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              <Ic n="settings" s={15} c={T.muted}/>
            </button>
            <button onClick={onRefresh} disabled={refreshing} title="Refresh now" style={{background:"none",border:"none",cursor:refreshing?"default":"pointer",display:"flex",padding:3,animation:refreshing?"spin 1s linear infinite":"none",transformOrigin:"center"}}>
              <Ic n="refresh" s={15} c={refreshing?T.green:T.muted}/>
            </button>
          </div>
        </div>

        {/* ── Search Bar ── */}
        {(searchOpen || searchQuery) && (
          <div style={{
            height:scrolled?0:42, overflow:"hidden", opacity:scrolled?0:1,
            transition:"all .25s ease", marginBottom:scrolled?0:8,
            padding:scrolled?0:"4px 2px", pointerEvents:scrolled?"none":"auto",
          }}>
            <div style={{position:"relative", display:"flex", alignItems:"center"}}>
              <div style={{position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", pointerEvents:"none"}}>
                <Ic n="search" s={14} c={T.blue}/>
              </div>
              <input
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                placeholder="Search by title, prompt or ID..."
                style={{
                  ...inputSt, paddingLeft:34, paddingRight:34,
                  borderColor:T.blue+"40", background:T.surfaceHi,
                }}
                autoFocus
              />
              {searchQuery && (
                <button
                  onClick={() => setSearchQuery("")}
                  style={{
                    position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
                    background:"none", border:"none", cursor:"pointer", padding:4
                  }}
                >
                  <Ic n="x" s={14} c={T.muted}/>
                </button>
              )}
            </div>
          </div>
        )}


        {/* ── View Toggle (Active/Archive) ── */}
        {isDesktop && (
          <div style={{
            display:"flex", gap:4, alignItems:"center",
            height:scrolled?0:22, overflow:"hidden", opacity:scrolled?0:1,
            marginBottom:scrolled?0:8, padding:scrolled?0:"4px 2px",
            transition:"all .25s ease", pointerEvents:scrolled?"none":"auto",
          }}>
            <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:T.muted, letterSpacing:"0.08em", flexShrink:0, paddingRight:2}}>SESSIONS</span>
            <button onClick={() => setShowArchived(false)} style={{
              flexShrink:0, padding:"3px 9px", borderRadius:20, border:"none",
              background:!showArchived ? T.greenDim : "transparent",
              outline:`1px solid ${!showArchived ? T.green+"60" : T.border}`,
              color:!showArchived ? T.green : T.muted,
              fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:!showArchived?700:400,
              letterSpacing:"0.05em", cursor:"pointer", transition:"all .12s",
            }}>ACTIVE</button>
            <button onClick={() => setShowArchived(true)} style={{
              flexShrink:0, padding:"3px 9px", borderRadius:20, border:"none",
              background:showArchived ? T.purpleDim : "transparent",
              outline:`1px solid ${showArchived ? T.purple+"60" : T.border}`,
              color:showArchived ? T.purple : T.muted,
              fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:showArchived?700:400,
              letterSpacing:"0.05em", cursor:"pointer", transition:"all .12s",
            }}>ARCHIVED</button>
          </div>
        )}


        {/* ── Status filter pills ── */}
        <div style={{
          overflowX:"auto", padding:scrolled?0:"4px 2px 10px", scrollbarWidth:"none", WebkitOverflowScrolling:"touch",
          maxHeight:scrolled?0:60, opacity:scrolled?0:1, transition:"all .25s ease",
          pointerEvents:scrolled?"none":"auto",
        }}>
          <div style={{display:"flex",gap:5,minWidth:"max-content",padding:"4px 0"}}>
            {FILTERS.map(f => {
              const cnt = f==="ALL" ? sessions.length : sessions.filter(s=>s.state===f).length;
              if (cnt===0 && f!=="ALL") return null;
              const isAct = f===filter;
              const ac = STATUS_META[f]?.color || T.green;
              return (
                <button key={f} onClick={()=>setFilter(f)} style={{
                  flexShrink:0,padding:"4px 10px",borderRadius:20,border:"none",
                  background:isAct?`${ac}20`:"transparent",
                  outline:`1px solid ${isAct?`${ac}80`:T.border}`,
                  color:isAct?ac:T.muted,
                  fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:"0.06em",
                  cursor:"pointer",transition:"background .12s, color .12s",
                }}>
                  {FILTER_LABELS[f]||f} {cnt>0?cnt:""}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <div onScroll={handleScroll} style={{flex:1,overflowY:"auto",padding:"10px 12px",WebkitOverflowScrolling:"touch",minHeight:200}}>
        {refreshing&&sessions.length===0&&(
          <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>Loading sessions…</div>
        )}
        {!refreshing&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>
            {filter==="ALL"?"No sessions yet":"No sessions with this status"}
          </div>
        )}
        {filtered.map((s,i)=><SessionCard key={s.id||s.name} index={i+1} s={s} onPress={()=>onSelect(s)} isSelected={isDesktop&&s.id===selectedId}/>)}
      </div>
    </div>
  );
};

// ─── Main App ─────────────────────────────────────────────────────────────────
function JulesClient() {
  const [apiKey,setApiKey]     = useState(() => { try { return localStorage.getItem("jac_key")||""; } catch { return ""; } });
  const [sessions,setSessions] = useState([]);
  const [selected,setSelected] = useState(null);
  const [mobileScreen,setMobileRaw] = useState("list");
  const [lastSessionScreen, setLastSessionScreen] = useState("list");
  const [desktopView,setDesktop]   = useState("empty");

  const setMobile = useCallback(s => {
    setMobileRaw(s);
    if (s === "list" || s === "detail") setLastSessionScreen(s);
  }, []);
  const [refreshing,setRefreshing] = useState(false);
  const [netSnap,setNetSnap]       = useState(NET.snapshot());
  const [pollInterval,setPollIntervalRaw] = useState(loadPollMs);
  const [actPollInterval,setActPollIntervalRaw] = useState(loadActPollMs);
  const [sessionLimit,setSessionLimitRaw] = useState(loadLimit);
  const [planId,setPlanIdRaw]      = useState(loadPlan);
  const [customDaily,setCustomDailyRaw] = useState(loadCustomDaily);
  const [todayCount,setTodayCount] = useState(loadTodayCount);

  const [archivedIds, setArchivedIds] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("jac_archived") || "[]")); }
    catch { return new Set(); }
  });
  const [showArchived, setShowArchived] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");

  const isDesktop = useIsDesktop();

  const setPlanId = useCallback(id => { savePlan(id); setPlanIdRaw(id); }, []);
  const setCustomDaily = useCallback(v => { saveCustomDaily(v); setCustomDailyRaw(v); }, []);
  const plan = useMemo(() => {
    const p = PLANS.find(p=>p.id===planId)||PLANS[0];
    if (p.id === "custom") return { ...p, daily: customDaily };
    return p;
  }, [planId, customDaily]);

  useEffect(() => NET.subscribe(s=>setNetSnap(s)), []);
  useEffect(() => { pruneOldKeys(); }, []);

  useEffect(() => {
    try { localStorage.setItem("jac_archived", JSON.stringify(Array.from(archivedIds))); }
    catch {}
  }, [archivedIds]);

  const handleArchive = useCallback(id => {
    setArchivedIds(prev => {
      const next = new Set(prev);
      next.add(id);
      return next;
    });
  }, []);

  const handleUnarchive = useCallback(id => {
    setArchivedIds(prev => {
      const next = new Set(prev);
      next.delete(id);
      return next;
    });
  }, []);

  const setPollInterval = useCallback(ms => {
    savePollMs(ms);
    setPollIntervalRaw(ms);
  }, []);

  const setActPollInterval = useCallback(ms => {
    saveActPollMs(ms);
    setActPollIntervalRaw(ms);
  }, []);

  const setSessionLimit = useCallback(v => {
    saveLimit(v);
    setSessionLimitRaw(v);
  }, []);

  const fetchSessions = useCallback(async (quiet=false) => {
    if (!apiKey) return;
    if (!quiet) setRefreshing(true);
    try {
      const d = await apiCall(apiKey, `/sessions?pageSize=${sessionLimit}`, { _label:"List sessions" });
      const raw = d.sessions || [];
      // Sort: Active first, then by latest update/create time
      const sorted = [...raw].sort((a, b) => {
        const aActive = ACTIVE_STATES.has(a.state);
        const bActive = ACTIVE_STATES.has(b.state);
        if (aActive && !bActive) return -1;
        if (!aActive && bActive) return 1;
        const aTime = new Date(a.updateTime || a.createTime).getTime();
        const bTime = new Date(b.updateTime || b.createTime).getTime();
        return bTime - aTime;
      });
      setSessions(sorted);
    } catch {}
    finally { if (!quiet) setRefreshing(false); }
  }, [apiKey, sessionLimit]);

  useEffect(() => { if (apiKey) fetchSessions(); }, [apiKey, fetchSessions]);
  const countdown = useAutoPoll(apiKey ? pollInterval : 0, useCallback(() => fetchSessions(true), [fetchSessions]));

  const handleSessionUpdate = useCallback(updated => {
    setSessions(prev => prev.map(s=>s.id===updated.id?updated:s));
  }, []);

  const handleDelete = useCallback(id => {
    setSessions(prev => prev.filter(s=>s.id!==id));
    try { localStorage.removeItem(`jac_draft_${id}`); } catch {}
    setSelected(null);
    setDesktop("empty");
    setMobile("list");
  }, []);

  const handleSelect = useCallback(s => {
    setSelected(s);
    if (isDesktop) setDesktop("detail"); else setMobile("detail");
  }, [isDesktop]);

  const handleCreate = useCallback(s => {
    setSessions(prev => [s, ...prev]);
    setSelected(s);
    incTodayCount();
    setTodayCount(loadTodayCount());
    if (isDesktop) setDesktop("detail"); else setMobile("list");
  }, [isDesktop]);

  const saveKey = k => {
    try { localStorage.setItem("jac_key", k); } catch {}
    setApiKey(k);
  };

  if (!apiKey) {
    return (
      <Shell>
        <SetupScreen onSave={saveKey}/>
      </Shell>
    );
  }

  // ── Desktop layout: sidebar + main ──────────────────────────────────────────
  if (isDesktop) {
    return (
      <Shell desktop>
        {/* Sidebar */}
        <div style={{width:320,flexShrink:0,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
          <SessionList
            sessions={sessions} onSelect={handleSelect} onRefresh={()=>fetchSessions()}
            refreshing={refreshing} netSnap={netSnap} selectedId={selected?.id}
            isDesktop onNew={()=>setDesktop("new")} onNetwork={()=>setDesktop("network")}
            onSettings={()=>setDesktop("settings")}
            pollInterval={pollInterval}
            sessionLimit={sessionLimit}
            countdown={countdown}
            plan={plan} todayCount={todayCount}
            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
            archivedIds={archivedIds} showArchived={showArchived} setShowArchived={setShowArchived}
          />
        </div>
        {/* Main panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",minWidth:0}}>
          {desktopView==="empty"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:32}}>
              <div style={{width:48,height:48,borderRadius:11,background:T.greenDim,border:`1px solid ${T.green}25`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:900,color:T.green}}>J</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted,textAlign:"center",lineHeight:2}}>
                SELECT A SESSION ←{"\u00A0"}{"\u00A0"}OR{"\u00A0"}{"\u00A0"}NEW ↖
              </div>
            </div>
          )}
          {desktopView==="detail"&&selected&&(
            <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
              onBack={()=>setDesktop("empty")} onDelete={handleDelete}
              onSessionUpdate={handleSessionUpdate} isDesktop
              pollInterval={actPollInterval} setPollInterval={setActPollInterval}
              isArchived={archivedIds.has(selected.id)}
              onArchive={handleArchive} onUnarchive={handleUnarchive}/>
          )}
          {desktopView==="new"&&(
            <NewSession apiKey={apiKey} onBack={()=>setDesktop("empty")} onCreate={handleCreate} isDesktop plan={plan} todayCount={todayCount}/>
          )}
          {desktopView==="network"&&(
            <NetworkMonitor onBack={()=>setDesktop("empty")} isDesktop/>
          )}
          {desktopView==="settings"&&(
            <SettingsView onBack={()=>setDesktop("empty")} isDesktop
              pollInterval={pollInterval} setPollInterval={setPollInterval}
              actPollInterval={actPollInterval} setActPollInterval={setActPollInterval}
              sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
              planId={planId} setPlanId={setPlanId}
              customDaily={customDaily} setCustomDaily={setCustomDaily}
              plan={plan} todayCount={todayCount} />
          )}
        </div>
      </Shell>
    );
  }

  // ── Mobile layout: single panel + bottom nav ──────────────────────────────
  return (
    <Shell>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {mobileScreen==="list"&&(
          <SessionList sessions={sessions} onSelect={handleSelect} onRefresh={()=>fetchSessions()}
            refreshing={refreshing} netSnap={netSnap} selectedId={null} isDesktop={false}
            onSettings={()=>setMobile("settings")}
            pollInterval={pollInterval}
            sessionLimit={sessionLimit}
            countdown={countdown}
            plan={plan} todayCount={todayCount}
            searchQuery={searchQuery} setSearchQuery={setSearchQuery}
            archivedIds={archivedIds} showArchived={showArchived} setShowArchived={setShowArchived} />
        )}
        {mobileScreen==="detail"&&selected&&(
          <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
            onBack={()=>{ setMobile("list"); fetchSessions(true); }}
            onDelete={handleDelete} onSessionUpdate={handleSessionUpdate} isDesktop={false}
            pollInterval={actPollInterval} setPollInterval={setActPollInterval}
            isArchived={archivedIds.has(selected.id)}
            onArchive={handleArchive} onUnarchive={handleUnarchive}/>
        )}
        {mobileScreen==="new"&&(
          <NewSession apiKey={apiKey} onBack={()=>setMobile("list")} onCreate={s=>{ setSessions(prev=>[s,...prev]); incTodayCount(); setTodayCount(loadTodayCount()); setMobile("list"); }} isDesktop={false} plan={plan} todayCount={todayCount}/>
        )}
        {mobileScreen==="network"&&(
          <NetworkMonitor onBack={()=>setMobile("list")} isDesktop={false}/>
        )}
        {mobileScreen==="settings"&&(
          <SettingsView onBack={()=>setMobile("list")} isDesktop={false}
            pollInterval={pollInterval} setPollInterval={setPollInterval}
            actPollInterval={actPollInterval} setActPollInterval={setActPollInterval}
            sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
            planId={planId} setPlanId={setPlanId}
            customDaily={customDaily} setCustomDaily={setCustomDaily}
            plan={plan} todayCount={todayCount} />
        )}
      </div>
      <nav style={{display:"flex",borderTop:`1px solid ${T.border}`,background:T.surface,transform:"translateZ(0)",flexShrink:0}}>
        {[
          {id:"list",    n:"tasks", label:"SESSIONS", onClick:() => {
            const wasDetail = lastSessionScreen === "detail" && selected && !archivedIds.has(selected.id);
            setShowArchived(false);
            setMobile(wasDetail ? "detail" : "list");
          }},
          {id:"archive", n:"archive", label:"ARCHIVE", onClick:() => {
            const wasDetail = lastSessionScreen === "detail" && selected && archivedIds.has(selected.id);
            setShowArchived(true);
            setMobile(wasDetail ? "detail" : "list");
          }},
          {id:"new",     n:"plus",  label:"NEW", onClick:() => setMobile("new")},
          {id:"settings",n:"settings", label:"SETTINGS", onClick:() => setMobile("settings")},
        ].map(({id,n,label,onClick})=>{
          const isAct = (id === "list" && !showArchived && (mobileScreen === "list" || mobileScreen === "detail")) ||
                        (id === "archive" && showArchived && (mobileScreen === "list" || mobileScreen === "detail")) ||
                        (mobileScreen === id && id !== "list" && id !== "archive");

          const hasAlert = id==="list"&&sessions.some(s=>["AWAITING_PLAN_APPROVAL","AWAITING_USER_FEEDBACK"].includes(s.state));
          return (
            <button key={id} onClick={onClick} style={{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{position:"relative"}}>
                <Ic n={n} s={22} c={isAct?T.green:T.muted}/>
                {hasAlert&&<div style={{position:"absolute",top:-2,right:-4,width:7,height:7,borderRadius:"50%",background:T.purple,border:`1.5px solid ${T.surface}`,animation:"dot 1.5s ease-in-out infinite"}}/>}
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:isAct?T.green:T.muted,fontWeight:isAct?700:400,letterSpacing:"0.07em"}}>{label}</span>
            </button>
          );
        })}
      </nav>
    </Shell>
  );
}

// ─── Shell ────────────────────────────────────────────────────────────────────
function Shell({ children, desktop=false }) {
  // Dismiss the pre-React splash screen on first paint
  useEffect(() => {
    const splash = document.getElementById("splash");
    if (!splash) return;
    // Fast-complete the progress bar then fade out
    const bar = document.getElementById("splash-bar");
    if (bar) { bar.style.animation = "none"; bar.style.width = "100%"; bar.style.transition = "width .18s ease"; }
    const hint = document.getElementById("splash-hint");
    if (hint) hint.textContent = "READY";
    const t = setTimeout(() => { splash.classList.add("hidden"); }, 180);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      width:"100%",background:T.bg,display:"flex",isolation:"isolate",
      fontFamily:"'IBM Plex Sans',sans-serif",overflow:"hidden",
      ...(desktop
        ? { minHeight:"100vh", flexDirection:"row" }
        : { width:"100%", height:"100dvh", flexDirection:"column" }
      ),
    }}>
      <style>{`
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        select,input,textarea{color-scheme:dark;}
        option{background:${T.surface};color:${T.text};}
        @keyframes dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
        @keyframes spin{to{transform:rotate(360deg);}}
        ::selection{background:${T.greenDim};color:${T.green};}
        textarea::placeholder,input::placeholder{color:${T.muted};}
        @media screen and (max-width: 1023px) and (orientation: landscape) {
          body {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
          }
          body > #root { display: none; }
          body::after {
            content: "PLEASE ROTATE YOUR DEVICE TO PORTRAIT MODE";
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: ${T.green};
            padding: 40px;
            letter-spacing: 0.1em;
            line-height: 1.6;
          }
        }
      `}</style>
      <PWABanner/>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JulesClient/>);
</script>
</body>
</html>
