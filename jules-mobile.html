    <script>
    // ── PWA Bootstrap ──────────────────────────────────────────────────────────
    // Chrome PWA install requires:
    //   1. HTTPS (or localhost) — file:// will NOT work
    //   2. A web manifest reachable at the same origin
    //   3. A service worker registered at the same origin
    //
    // Strategy for a single-file PWA:
    //   • Manifest  → data: URI (Chrome accepts this for installability)
    //   • SW        → written to the page origin via a self-fetching trick:
    //                 the SW script is base64-encoded inside this file and
    //                 registered by fetching the HTML itself and rewriting it.
    //                 For true single-file, we use a same-origin fetch of this
    //                 file's own URL, serve the SW JS via a custom response
    //                 intercepted by a SharedWorker shim — but that's overkill.
    //                 Simplest working approach: write SW source to a data: URL
    //                 registered with `{scope:'/'}` which Chrome 89+ supports
    //                 when the page itself is on an HTTP origin.
    //
    // Expose globals so React can read install state.
    window.__pwa = { isFileProtocol: location.protocol === "file:", installPrompt: null, swOk: false };

    (function pwaSetup() {
      // ── 1. Manifest via data: URI (works on HTTP origins) ──────────────────
      const mkIcon = (size, rx) => {
        const fs = Math.floor(size * 0.625), y = Math.floor(size * 0.73);
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${rx}" fill="#07090c"/><text x="${size/2}" y="${y}" font-size="${fs}" text-anchor="middle" fill="#00e87a" font-weight="900" font-family="monospace">J</text></svg>`;
        return { src:"data:image/svg+xml;base64,"+btoa(svg), sizes:`${size}x${size}`, type:"image/svg+xml", purpose:"maskable any" };
      };
      const manifest = {
        name:"Jules Agent Client", short_name:"Jules",
        description:"Monitor and control Jules AI coding sessions",
        start_url: location.href.split("?")[0],
        scope: location.href.split("?")[0].replace(/[^/]*$/, ""),
        display:"standalone", background_color:"#07090c", theme_color:"#00e87a",
        orientation:"any", categories:["developer","productivity"],
        icons:[ mkIcon(192,24), mkIcon(512,64) ],
      };
      // data: URI — Chrome validates manifests here starting Chromium 93
      const manifestJSON = JSON.stringify(manifest);
      const manifestURI  = "data:application/manifest+json," + encodeURIComponent(manifestJSON);
      const lnk = document.createElement("link");
      lnk.rel = "manifest"; lnk.href = manifestURI;
      document.head.appendChild(lnk);

      // ── 2. Service Worker ──────────────────────────────────────────────────
      // SW registered from a blob: URL is rejected by Chrome's PWA checker.
      // Instead we write the SW source into a tiny JavaScript data: URL and
      // register it — Chrome 91+ allows data: SW registration when the page
      // is on a secure origin (https / localhost).
      if ("serviceWorker" in navigator && !window.__pwa.isFileProtocol) {
        const swSrc = [
          'const C="jules-v3";',
          'const PRE=["https://unpkg.com/react@18/umd/react.production.min.js","https://unpkg.com/react-dom@18/umd/react-dom.production.min.js","https://unpkg.com/@babel/standalone/babel.min.js"];',
          'self.addEventListener("install",e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll(PRE).catch(()=>{})));});',
          'self.addEventListener("activate",e=>e.waitUntil(clients.claim()));',
          'self.addEventListener("fetch",e=>{',
          '  const u=e.request.url;',
          '  if(u.includes("jules.googleapis.com"))return;',
          '  if(u.includes("unpkg.com")||u.includes("fonts.googleapis")||u.includes("fonts.gstatic")){',
          '    e.respondWith(caches.match(e.request).then(h=>h||fetch(e.request).then(r=>{',
          '      const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));return r;',
          '    })));',
          '  }',
          '});',
        ].join("");
        // data: URI SW — same-origin restriction bypassed on secure origins
        const swDataURI = "data:text/javascript;base64," + btoa(swSrc);
        navigator.serviceWorker.register(swDataURI, { scope: "/" })
          .then(() => { window.__pwa.swOk = true; })
          .catch(() => {
            // Fallback: blob URL (works for caching, not for install prompt)
            const blob = new Blob([swSrc], { type:"text/javascript" });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
          });
      }

      // ── 3. Capture install prompt ──────────────────────────────────────────
      window.addEventListener("beforeinstallprompt", e => {
        e.preventDefault();
        window.__pwa.installPrompt = e;
        // Notify React if it's already mounted
        window.dispatchEvent(new Event("pwa-installable"));
      });
      window.addEventListener("appinstalled", () => {
        window.__pwa.installPrompt = null;
        window.dispatchEvent(new Event("pwa-installed"));
      });
    })();
    </script>

<script>
(function(){
  var hint  = document.getElementById("splash-hint");
  var step  = document.getElementById("splash-step");
  var bar   = document.getElementById("splash-bar");
  var t0    = Date.now();

  function setMsg(h, s, pct) {
    if (hint) hint.textContent = h;
    if (step) step.textContent = s;
    if (bar && pct !== undefined) {
      bar.style.animation = "none";
      bar.style.transition = "width .3s cubic-bezier(.4,0,.2,1)";
      bar.style.width = pct + "%";
    }
  }
  function elapsed() { return ((Date.now()-t0)/1000).toFixed(1)+"s"; }

  // Expose for inline onload handlers below
  window.__splashMsg = setMsg;
  window.__splashElapsed = elapsed;

  setMsg("LOADING REACT…", "core library · " + elapsed(), 8);
})();
</script>

// ─── Network tracker ──────────────────────────────────────────────────────────
function makeNetTracker() {
  let total=0, saved=0, log=[];
  const subs=[];
  const notify = () => subs.forEach(f => f({ total, saved, log:[...log] }));
  return {
    record(label, bytes, savedBytes=0) {
      total+=bytes; saved+=savedBytes;
      log.unshift({ id:Math.random(), label, bytes, savedBytes, ts:Date.now() });
      if (log.length > 60) log.length = 60;
      notify();
    },
    subscribe(fn) { subs.push(fn); return () => { const i=subs.indexOf(fn); if(i>-1) subs.splice(i,1); }; },
    snapshot() { return { total, saved, log:[...log] }; },
  };
}
const NET = makeNetTracker();

async function apiCall(apiKey, path, opts={}) {
  const res = await fetch(`${BASE}${path}`, {
    ...opts,
    headers: { "x-goog-api-key":apiKey, "Content-Type":"application/json", ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const text = await res.text();
  NET.record(opts._label || path, new TextEncoder().encode(text).length / 1024);
  if (!res.ok) {
    let msg = text;
    try { msg = JSON.parse(text)?.error?.message || text; } catch {}
    throw new Error(`${res.status}: ${msg}`);
  }
  return text ? JSON.parse(text) : {};
}

// ─── PWA install hook ─────────────────────────────────────────────────────────
function usePWA() {
  const [canInstall, setCanInstall] = useState(() => !!window.__pwa?.installPrompt);
  const [installed,  setInstalled]  = useState(false);
  const [installing, setInstalling] = useState(false);

  useEffect(() => {
    const onReady   = () => setCanInstall(true);
    const onInstall = () => { setInstalled(true); setCanInstall(false); };
    window.addEventListener("pwa-installable", onReady);
    window.addEventListener("pwa-installed",   onInstall);
    return () => { window.removeEventListener("pwa-installable",onReady); window.removeEventListener("pwa-installed",onInstall); };
  }, []);

  const install = useCallback(async () => {
    const prompt = window.__pwa?.installPrompt;
    if (!prompt) return;
    setInstalling(true);
    try {
      prompt.prompt();
      const { outcome } = await prompt.userChoice;
      if (outcome === "accepted") { window.__pwa.installPrompt = null; setCanInstall(false); }
    } finally { setInstalling(false); }
  }, []);

  return { canInstall, installed, installing, install, isFile: window.__pwa?.isFileProtocol };
}

// ─── Timeline Event (non-message activities) ──────────────────────────────────
const TimelineEvent = memo(({ act }) => {
  const type = getActType(act);
  const IC_MAP = {
    planGenerated:{n:"plan",c:T.purple},
    planApproved:{n:"approve",c:T.green},
    progressUpdated:{n:"refresh",c:T.muted},
    sessionCompleted:{n:"check",c:T.green},
    sessionFailed:{n:"x",c:T.red},
    system:{n:"code",c:T.muted},
  };
  const ic  = IC_MAP[type] || IC_MAP.system;
  const time = fmtTime(new Date(act.createTime).getTime());

  let title = "", detail = null;
  switch (type) {
    case "planGenerated": {
      const plan = act.planGenerated?.plan;
      title = "Plan generated";
      detail = plan?.steps && (
        <div style={{marginTop:7}}>
          {plan.steps.map((st,i) => (
            <div key={st.id||i} style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}>
              <div style={{
                width:17,height:17,borderRadius:3,flexShrink:0,
                background:T.purpleDim,border:`1px solid ${T.purple}40`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.purple,
              }}>{i+1}</div>
              <div>
                <div style={{fontSize:12,color:T.text,fontWeight:500,lineHeight:1.35}}>{st.title}</div>
                {st.description&&<div style={{fontSize:11,color:T.muted,marginTop:1}}>{st.description}</div>}
              </div>
            </div>
          ))}
        </div>
      );
      break;
    }
    case "progressUpdated":
      title = act.progressUpdated?.title || "Progress";
      detail = act.progressUpdated?.description && (
        <div style={{fontSize:11,color:T.muted,marginTop:3,fontFamily:"'IBM Plex Sans',sans-serif",lineHeight:1.4}}>{act.progressUpdated.description}</div>
      );
      break;
    case "sessionCompleted": title = "Session completed"; break;
    case "sessionFailed":
      title = "Session failed";
      detail = act.sessionFailed?.reason && (
        <div style={{fontSize:11,color:T.red,marginTop:3,fontFamily:"'IBM Plex Sans',sans-serif"}}>{act.sessionFailed.reason}</div>
      );
      break;
    case "planApproved": title = "Plan approved"; break;
    default: title = act.description || "System event"; break;
  }

  return (
    <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"stretch"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0,flexShrink:0,width:18}}>
        <div style={{width:18,height:18,borderRadius:4,background:`${ic.c}15`,border:`1px solid ${ic.c}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Ic n={ic.n} s={10} c={ic.c}/>
        </div>
        {detail&&<div style={{width:1,flex:1,background:T.border,marginTop:3}}/>}
      </div>
      <div style={{flex:1,paddingBottom:detail?10:0,minWidth:0}}>
        <div style={{display:"flex",gap:8,alignItems:"center",height:18}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:ic.c,flex:1}}>{title}</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.muted,flexShrink:0}}>{time}</span>
        </div>
        {detail}
      </div>
    </div>
  );
});

// ─── Activity Feed ────────────────────────────────────────────────────────────
const COLLAPSE_THRESHOLD = 35;
const COLLAPSE_SHOW      = 25;

const ActivityFeed = memo(({ activities, showAll, onShowAll }) => {
  const collapse  = !showAll && activities.length > COLLAPSE_THRESHOLD;
  const visible   = collapse ? activities.slice(activities.length - COLLAPSE_SHOW) : activities;
  const hidden    = activities.length - visible.length;

  return (
    <>
      {collapse && (
        <button onClick={onShowAll} style={{
          display:"block",width:"100%",marginBottom:14,
          background:T.surfaceHi,border:`1px solid ${T.border}`,
          borderRadius:6,padding:"8px 12px",cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",fontSize:9,
          color:T.muted,textAlign:"center",letterSpacing:"0.08em",
        }}>
          ↑ SHOW {hidden} EARLIER {hidden===1?"EVENT":"EVENTS"}
        </button>
      )}
      {visible.map(act => {
        const type = getActType(act);
        const key  = getActKey(act);
        if (type === "userMessaged" || type === "agentMessaged") {
          return <ChatBubble key={key} act={act} type={type}/>;
        }
        return <TimelineEvent key={key} act={act}/>;
      })}
    </>
  );
});

// ─── Interactive Plan View ────────────────────────────────────────────────────
// Lets the user review steps, annotate individual ones, compose a revision
// request via sendMessage, or approve the plan directly.
const PlanView = memo(({ activities, session, apiKey, onApprove, onSendFeedback, busy }) => {
  const [stepNotes, setStepNotes]     = useState({}); // stepId → note string
  const [activeNote, setActiveNote]   = useState(null); // stepId currently expanded
  const [globalNote, setGlobalNote]   = useState("");
  const [sending, setSending]         = useState(false);
  const [sent, setSent]               = useState(false);

  // Find the most recent planGenerated activity
  const planAct = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i];
    }
    return null;
  }, [activities]);

  const plan  = planAct?.planGenerated?.plan;
  const steps = plan?.steps || [];

  // Check if plan already approved in activity history
  const approved = activities.some(a => a.planApproved);

  const hasFeedback = globalNote.trim() || Object.values(stepNotes).some(n => n.trim());

  const buildFeedbackMessage = () => {
    const parts = ["Please revise the plan based on my feedback:"];
    const stepFeedback = steps
      .filter(st => stepNotes[st.id]?.trim())
      .map((st, i) => `Step ${i + 1} (${st.title}): ${stepNotes[st.id].trim()}`);
    if (stepFeedback.length) parts.push(...stepFeedback);
    if (globalNote.trim()) parts.push("Overall: " + globalNote.trim());
    return parts.join("\n");
  };

  const handleRequestRevision = async () => {
    if (!hasFeedback || sending) return;
    setSending(true);
    try {
      await onSendFeedback(buildFeedbackMessage());
      setStepNotes({});
      setGlobalNote("");
      setActiveNote(null);
      setSent(true);
      setTimeout(() => setSent(false), 3000);
    } finally { setSending(false); }
  };

  if (!plan) return (
    <div style={{textAlign:"center",padding:"50px 24px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
      {session.state === "PLANNING" ? "Jules is generating a plan…" : "No plan available"}
    </div>
  );

  const pendingApproval = session.state === "AWAITING_PLAN_APPROVAL";
  const annotatedCount  = Object.values(stepNotes).filter(n=>n.trim()).length;

  return (
    <div style={{paddingBottom:16}}>
      {/* Plan header */}
      <div style={{
        marginBottom:14,padding:"10px 14px",borderRadius:7,
        background:approved?T.greenDim:pendingApproval?T.purpleDim:T.surfaceHi,
        border:`1px solid ${approved?T.green+"40":pendingApproval?T.purple+"40":T.border}`,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:approved||!pendingApproval?0:8}}>
          <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,
            color:approved?T.green:pendingApproval?T.purple:T.muted,letterSpacing:"0.06em"}}>
            {approved?"✓ PLAN APPROVED":pendingApproval?"PLAN READY FOR REVIEW":"PLAN PREVIEW"}
          </div>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted}}>
            {steps.length} step{steps.length!==1?"s":""}
          </span>
        </div>
        {pendingApproval&&!approved&&(
          <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,color:T.muted,lineHeight:1.5}}>
            Review each step below. Tap a step to add feedback, then request a revision or approve.
          </div>
        )}
      </div>

      {/* Steps */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
        {steps.map((st, i) => {
          const note     = stepNotes[st.id] || "";
          const isOpen   = activeNote === st.id;
          const hasNote  = note.trim().length > 0;

          return (
            <div key={st.id||i} style={{
              background:T.surface,border:`1px solid ${hasNote?T.amber+"50":T.border}`,
              borderLeft:`2px solid ${hasNote?T.amber:T.purple+"60"}`,
              borderRadius:6,overflow:"hidden",transition:"border-color .15s",
            }}>
              {/* Step row */}
              <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px"}}>
                <div style={{
                  width:20,height:20,borderRadius:4,flexShrink:0,marginTop:1,
                  background:hasNote?T.amberDim:T.purpleDim,
                  border:`1px solid ${hasNote?T.amber+"50":T.purple+"40"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:700,
                  color:hasNote?T.amber:T.purple,
                }}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,fontWeight:500,
                    color:T.text,lineHeight:1.35,marginBottom:st.description?3:0}}>
                    {st.title}
                  </div>
                  {st.description&&(
                    <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:11,color:T.muted,lineHeight:1.45}}>
                      {st.description}
                    </div>
                  )}
                  {hasNote&&!isOpen&&(
                    <div style={{marginTop:5,padding:"4px 8px",borderRadius:4,
                      background:T.amberDim,border:`1px solid ${T.amber}30`,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:11,color:T.amber,lineHeight:1.4}}>
                      📝 {note}
                    </div>
                  )}
                </div>
                {pendingApproval&&!approved&&(
                  <button onClick={()=>setActiveNote(isOpen?null:st.id)} style={{
                    flexShrink:0,padding:"4px 8px",borderRadius:4,border:"none",cursor:"pointer",
                    background:isOpen?(hasNote?T.amberDim:T.purpleDim):"transparent",
                    outline:`1px solid ${isOpen?(hasNote?T.amber+"40":T.purple+"40"):T.border}`,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:8,fontWeight:700,
                    color:isOpen?(hasNote?T.amber:T.purple):T.muted,
                    transition:"all .12s",letterSpacing:"0.06em",
                  }}>{hasNote?"EDIT":"NOTE"}</button>
                )}
              </div>

              {/* Per-step feedback textarea */}
              {isOpen&&pendingApproval&&!approved&&(
                <div style={{padding:"0 12px 12px",borderTop:`1px solid ${T.border}`}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.amber,
                    letterSpacing:"0.08em",marginBottom:5,marginTop:8}}>FEEDBACK FOR STEP {i+1}</div>
                  <textarea
                    value={note}
                    onChange={e=>setStepNotes(prev=>({...prev,[st.id]:e.target.value}))}
                    placeholder={`What should change about this step? (e.g. "Use TypeScript instead of JS", "Skip this — not needed")`}
                    rows={2}
                    style={{
                      width:"100%",background:T.surfaceHi,border:`1px solid ${T.amber}40`,
                      borderRadius:5,padding:"8px 10px",color:T.text,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,lineHeight:1.4,
                      resize:"vertical",outline:"none",boxSizing:"border-box",
                    }}
                    autoFocus
                  />
                  <button onClick={()=>setActiveNote(null)} style={{
                    marginTop:5,padding:"4px 10px",borderRadius:4,border:`1px solid ${T.border}`,
                    background:"transparent",cursor:"pointer",color:T.muted,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:9,
                  }}>DONE</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Global feedback + actions — only when pending approval */}
      {pendingApproval&&!approved&&(
        <div style={{
          background:T.surface,border:`1px solid ${T.border}`,
          borderRadius:7,padding:"12px 14px",
        }}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,
            letterSpacing:"0.08em",marginBottom:6}}>OVERALL FEEDBACK (optional)</div>
          <textarea
            value={globalNote}
            onChange={e=>setGlobalNote(e.target.value)}
            placeholder="Any overall comments before approving? (e.g. 'Make sure to run tests', 'Keep changes minimal')"
            rows={2}
            style={{
              width:"100%",background:T.surfaceHi,border:`1px solid ${T.border}`,
              borderRadius:5,padding:"8px 10px",color:T.text,
              fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,lineHeight:1.4,
              resize:"vertical",outline:"none",boxSizing:"border-box",
              transition:"border-color .18s",marginBottom:10,
            }}
          />

          {sent&&(
            <div style={{marginBottom:8,padding:"6px 10px",borderRadius:4,
              background:T.greenDim,border:`1px solid ${T.green}40`,
              fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.green}}>
              ✓ Revision request sent — Jules will update the plan
            </div>
          )}

          <div style={{display:"flex",gap:8}}>
            <Btn
              onClick={handleRequestRevision}
              disabled={!hasFeedback||sending||busy}
              color={T.amber} outline sm
              style={{flex:1}}
            >
              {sending?"SENDING…":`REVISE${annotatedCount>0?` (${annotatedCount} step${annotatedCount>1?"s":""})`:globalNote.trim()?" +note":""}`}
            </Btn>
            <Btn
              onClick={onApprove}
              disabled={busy||sending}
              color={T.purple} sm
              style={{flex:1}}
            >
              <Ic n="approve" s={11} c="#000"/>
              {busy?"APPROVING…":"APPROVE PLAN"}
            </Btn>
          </div>
          <div style={{marginTop:7,fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.muted,textAlign:"center",lineHeight:1.6}}>
            Revise → Jules rewrites the plan · Approve → Jules starts executing
          </div>
        </div>
      )}
    </div>
  );
});

// ─── Diff Viewer ──────────────────────────────────────────────────────────────
const DiffViewer = ({ patch }) => {
  if (!patch) return (
    <div style={{textAlign:"center",padding:"40px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
      No diff available yet
    </div>
  );
  return (
    <div style={{background:"#040507",border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden",fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>
      {patch.split("\n").map((line,i) => {
        const c = line.startsWith("+")&&!line.startsWith("+++")?T.green:line.startsWith("-")&&!line.startsWith("---")?T.red:line.startsWith("@@")?T.blue:T.muted;
        const bg = line.startsWith("+")&&!line.startsWith("+++")?"rgba(0,232,122,.06)":line.startsWith("-")&&!line.startsWith("---")?"rgba(255,68,85,.06)":"transparent";
        return (
          <div key={i} style={{padding:"1px 10px",color:c,background:bg,whiteSpace:"pre",overflowX:"auto"}}>{line||" "}</div>
        );
      })}
    </div>
  );
};

// ─── Session Card ─────────────────────────────────────────────────────────────
const SessionCard = memo(({ s, onPress, isSelected }) => {
  const pct  = pctFromState(s.state);
  const m    = STATUS_META[s.state] || STATUS_META.QUEUED;
  const repo = s.sourceContext?.githubRepoContext
    ? s.sourceContext.source?.replace("sources/github/","") : null;

  return (
    <button onClick={onPress} style={{
      width:"100%",background:isSelected?T.surfaceHi:T.surface,textAlign:"left",cursor:"pointer",
      border:`1px solid ${isSelected?T.green+"50":T.border}`,
      borderLeft:`2px solid ${isSelected?T.green:m.color}`,
      borderRadius:6,padding:"11px 13px",marginBottom:6,transition:"all .15s",
    }}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:7}}>
        <div style={{flex:1,minWidth:0}}>
          {repo&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,marginBottom:3,letterSpacing:"0.04em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{repo}</div>}
          <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,fontWeight:500,color:T.text,lineHeight:1.35,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{s.title||s.prompt}</div>
        </div>
        <Pill status={s.state} small/>
      </div>
      <Bar pct={pct} status={s.state}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted}}>
        <span>{fmtAgo(new Date(s.updateTime||s.createTime).getTime())}</span>
        {s.outputs?.find(o=>o.pullRequest)&&<span style={{color:T.blue}}>PR→</span>}
        <span style={{marginLeft:"auto",fontSize:8,color:T.dim,background:T.surfaceHi,padding:"1px 5px",borderRadius:2}}>{s.id?.slice(0,8)}</span>
      </div>
    </button>
  );
});

// ─── Session Detail ───────────────────────────────────────────────────────────
const SessionDetail = ({ session:initSession, apiKey, onBack, onDelete, onSessionUpdate, isDesktop, pollInterval }) => {
  const [session,setSession]     = useState(initSession);
  const [activities,setActivities] = useState([]);
  const [showAll,setShowAll]     = useState(false);
  const [tab,setTab]             = useState("activity");
  const [msg,setMsg]             = useState("");
  const [busy,setBusy]           = useState(false);
  const [err,setErr]             = useState(null);
  const pollRef      = useRef(null);
  const txtRef       = useRef(null);
  const feedEndRef   = useRef(null);
  const actMapRef    = useRef(new Map());      // id → activity (dedup)
  const prevLenRef   = useRef(0);

  // ── Optimized activity loader: createTime cursor + Map dedup ──────────────
  // First load fetches all; subsequent loads fetch only new (createTime filter)
  const lastTsRef = useRef(null);
  const loadActivities = useCallback(async (sinceTs=null) => {
    try {
      const qs = sinceTs
        ? `createTime=${encodeURIComponent(sinceTs)}&pageSize=50`
        : "pageSize=100";
      const d = await apiCall(apiKey, `/sessions/${session.id}/activities?${qs}`, { _label:`Acts ${sinceTs?"Δ":"full"} ${session.id?.slice(0,6)}` });
      const incoming = d.activities || [];
      let changed = false;
      let latestTs = lastTsRef.current;
      for (const act of incoming) {
        const k = getActKey(act);
        if (!actMapRef.current.has(k)) {
          actMapRef.current.set(k, act);
          changed = true;
          if (!latestTs || act.createTime > latestTs) latestTs = act.createTime;
        }
      }
      if (latestTs) lastTsRef.current = latestTs;
      if (changed) {
        const sorted = Array.from(actMapRef.current.values())
          .filter(a => !a._temp)
          .sort((a,b) => new Date(a.createTime) - new Date(b.createTime));
        setActivities(sorted);
      }
    } catch {}
  }, [apiKey, session.id]);

  const loadSession = useCallback(async () => {
    try {
      const d = await apiCall(apiKey, `/sessions/${session.id}`, { _label:`Session ${session.id?.slice(0,6)}` });
      setSession(d);
      onSessionUpdate?.(d);
    } catch {}
  }, [apiKey, session.id, onSessionUpdate]);

  // On mount (keyed by session.id, so fresh per-session)
  useEffect(() => {
    actMapRef.current = new Map();
    lastTsRef.current = null;
    prevLenRef.current = 0;
    setActivities([]);
    setShowAll(false);
    setErr(null);
    loadActivities(null); // full load on first open
    loadSession();
  }, []); // intentional: component is keyed by session.id

  // Respect global poll interval (0 = manual only)
  // Subsequent polls use createTime cursor — only fetches NEW activities
  useEffect(() => {
    clearInterval(pollRef.current);
    if (!pollInterval) return;
    pollRef.current = setInterval(() => {
      loadSession();
      loadActivities(lastTsRef.current); // incremental — only new since last fetch
    }, pollInterval);
    return () => clearInterval(pollRef.current);
  }, [session.state, pollInterval, loadActivities, loadSession]);

  // Auto-scroll to bottom when new messages arrive
  useEffect(() => {
    const len = activities.length;
    if (len > prevLenRef.current && tab === "activity" && feedEndRef.current) {
      feedEndRef.current.scrollIntoView({ behavior: len - prevLenRef.current > 8 ? "instant" : "smooth" });
    }
    prevLenRef.current = len;
  }, [activities, tab]);

  // ── Actions ─────────────────────────────────────────────────────────────────
  const handleSend = async () => {
    if (!msg.trim() || busy) return;
    const text = msg.trim();
    setMsg("");
    setBusy(true); setErr(null);

    // Optimistic: add temp bubble immediately
    const tempKey = `_temp_${Date.now()}`;
    const tempAct = { id:tempKey, createTime:new Date().toISOString(), userMessaged:{ userMessage:text }, _temp:true };
    actMapRef.current.set(tempKey, tempAct);
    setActivities(prev => [...prev, tempAct]);

    try {
      await apiCall(apiKey, `/sessions/${session.id}:sendMessage`, {
        method:"POST", body:{ prompt:text }, _label:`Message → ${session.id?.slice(0,6)}`,
      });
      // Remove temp, fetch real activities
      actMapRef.current.delete(tempKey);
      setTimeout(() => { loadActivities(); loadSession(); }, 1200);
    } catch(e) {
      setErr(e.message);
      setMsg(text);
      actMapRef.current.delete(tempKey);
      setActivities(prev => prev.filter(a => a.id !== tempKey));
    } finally { setBusy(false); }
  };

  const handleApprove = async () => {
    setBusy(true); setErr(null);
    try {
      await apiCall(apiKey, `/sessions/${session.id}:approvePlan`, { method:"POST", body:{}, _label:`Approve ${session.id?.slice(0,6)}` });
      await loadSession(); await loadActivities(lastTsRef.current);
    } catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  };

  // Used by PlanView to send revision requests
  const handleSendFeedback = useCallback(async (text) => {
    const tempKey = `_temp_${Date.now()}`;
    const tempAct = { id:tempKey, createTime:new Date().toISOString(), userMessaged:{ userMessage:text }, _temp:true };
    actMapRef.current.set(tempKey, tempAct);
    setActivities(prev => [...prev, tempAct]);
    try {
      await apiCall(apiKey, `/sessions/${session.id}:sendMessage`, {
        method:"POST", body:{ prompt:text }, _label:`Revise plan ${session.id?.slice(0,6)}`,
      });
      actMapRef.current.delete(tempKey);
      setTab("activity"); // switch back to chat to show Jules' response
      setTimeout(() => { loadActivities(lastTsRef.current); loadSession(); }, 1500);
    } catch(e) {
      setErr(e.message);
      actMapRef.current.delete(tempKey);
      setActivities(prev => prev.filter(a => a.id !== tempKey));
      throw e;
    }
  }, [apiKey, session.id, loadActivities, loadSession]);

  const handleDelete = async () => {
    setBusy(true);
    try {
      await apiCall(apiKey, `/sessions/${session.id}`, { method:"DELETE", _label:`Delete ${session.id?.slice(0,6)}` });
      onDelete(session.id);
    } catch(e) { setErr(e.message); setBusy(false); }
  };

  const handleRefresh = async () => {
    setBusy(true); setErr(null);
    try {
      await Promise.all([loadSession(), loadActivities(null)]);
    } catch(e) { setErr(e.message); }
    finally { setBusy(false); }
  };

  const diffArtifact = useMemo(() => {
    for (const a of activities) {
      if (a.artifacts) for (const art of a.artifacts) if (art.changeSet?.gitPatch?.unidiffPatch) return art.changeSet.gitPatch;
    }
    return null;
  }, [activities]);

  const bashOutputs = useMemo(() =>
    activities.flatMap(a => (a.artifacts||[]).filter(x=>x.bashOutput).map(x=>({...x.bashOutput,ts:a.createTime})))
  , [activities]);

  const mediaArtifacts = useMemo(() =>
    activities.flatMap(a => (a.artifacts||[]).filter(x=>x.media?.data).map(x=>({...x.media,ts:a.createTime})))
  , [activities]);

  const pr      = session.outputs?.find(o=>o.pullRequest)?.pullRequest;
  const m       = STATUS_META[session.state] || STATUS_META.QUEUED;
  const pct     = pctFromState(session.state);
  const canSend = !["COMPLETED","FAILED"].includes(session.state);

  const latestPlan = useMemo(() => {
    for (let i = activities.length - 1; i >= 0; i--) {
      if (activities[i].planGenerated?.plan) return activities[i].planGenerated.plan;
    }
    return null;
  }, [activities]);

  // Auto-switch to PLAN tab when AWAITING_PLAN_APPROVAL
  useEffect(() => {
    if (session.state === "AWAITING_PLAN_APPROVAL" && latestPlan) setTab("plan");
  }, [session.state, latestPlan]);

  const TABS = [
    { id:"activity", label:"CHAT" },
    ...(latestPlan?[{ id:"plan", label:"PLAN" }]:[]),
    { id:"diff",     label:"DIFF" },
    { id:"bash",     label:"BASH" },
    ...(mediaArtifacts.length>0?[{ id:"media", label:"MEDIA" }]:[]),
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      {/* ── Header ── */}
      <div style={{padding:"12px 16px 0",borderBottom:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          {!isDesktop&&(
            <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",padding:3,display:"flex",flexShrink:0}}>
              <Ic n="back" s={18} c={T.text}/>
            </button>
          )}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14,fontWeight:600,color:T.text,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
              {session.title||session.prompt}
            </div>
          </div>
          <Pill status={session.state} small/>
        </div>

        <Bar pct={pct} status={session.state}/>
        <div style={{display:"flex",gap:10,marginTop:5,marginBottom:10,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,flexWrap:"wrap"}}>
          <span>{session.id?.slice(0,10)}</span>
          {session.sourceContext?.source&&(
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              ⎇ {session.sourceContext.githubRepoContext?.startingBranch||"main"}
            </span>
          )}
          {session.url&&<a href={session.url} target="_blank" rel="noopener" style={{color:T.muted,textDecoration:"none",flexShrink:0,fontFamily:"'JetBrains Mono',monospace",fontSize:9}}>WEB↗</a>}
          {pr&&<a href={pr.url} target="_blank" rel="noopener" style={{color:T.blue,textDecoration:"none",flexShrink:0}}>PR↗</a>}
          <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
            <button onClick={handleRefresh} disabled={busy} style={{background:"none",border:"none",cursor:busy?"default":"pointer",display:"flex",padding:2,opacity:.6,animation:busy?"spin 1s linear infinite":"none"}}>
              <Ic n="refresh" s={13} c={T.muted}/>
            </button>
            <button onClick={handleDelete} disabled={busy} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",padding:2,opacity:.6}}>
              <Ic n="trash" s={13} c={T.red}/>
            </button>
          </div>
        </div>

        {session.state==="AWAITING_PLAN_APPROVAL"&&(
          <div style={{marginBottom:8,padding:"7px 10px",background:T.purpleDim,border:`1px solid ${T.purple}40`,borderRadius:5,display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setTab("plan")}>
            <span style={{width:6,height:6,borderRadius:"50%",background:T.purple,animation:"dot 1.2s ease-in-out infinite",flexShrink:0}}/>
            <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.purple,fontWeight:700}}>PLAN READY — tap to review & approve</div>
            <Ic n="plan" s={13} c={T.purple}/>
          </div>
        )}

        {session.state==="AWAITING_USER_FEEDBACK"&&(
          <div style={{marginBottom:10,padding:"8px 10px",background:T.amberDim,border:`1px solid ${T.amber}40`,borderRadius:5,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.amber}}>
            ⚡ Jules needs your input — reply below
          </div>
        )}

        {err&&<div style={{marginBottom:8,padding:"6px 10px",borderRadius:4,background:T.redDim,border:`1px solid ${T.red}40`,fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.red}}>{err}</div>}

        <div style={{display:"flex"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:"8px 0",background:"none",border:"none",
              borderBottom:`2px solid ${tab===t.id?T.green:"transparent"}`,
              color:tab===t.id?T.green:T.muted,cursor:"pointer",
              fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,letterSpacing:"0.07em",
              transition:"color .15s, border-color .15s",
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",WebkitOverflowScrolling:"touch",minHeight:0}}>
        {tab==="activity"&&(
          activities.length===0
          ?<div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
            {ACTIVE_STATES.has(session.state)?"Waiting for activity…":"No activities yet"}
          </div>
          :<ActivityFeed activities={activities} showAll={showAll} onShowAll={()=>setShowAll(true)}/>
        )}
        {tab==="plan"&&(
          <PlanView
            activities={activities}
            session={session}
            apiKey={apiKey}
            onApprove={handleApprove}
            onSendFeedback={handleSendFeedback}
            busy={busy}
          />
        )}
        {tab==="diff"&&<DiffViewer patch={diffArtifact?.unidiffPatch||null}/>}
        {tab==="bash"&&(
          bashOutputs.length===0
          ?<div style={{textAlign:"center",padding:"40px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>No bash output</div>
          :bashOutputs.map((b,i)=>(
            <div key={i} style={{marginBottom:12,background:"#040507",border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"5px 10px",background:T.surface,borderBottom:`1px solid ${T.border}`,display:"flex",gap:8,alignItems:"center"}}>
                <Ic n="terminal" s={11} c={T.muted}/>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.command}</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:b.exitCode===0?T.green:T.red,flexShrink:0}}>exit:{b.exitCode}</span>
              </div>
              <div style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.text,whiteSpace:"pre-wrap",lineHeight:1.5,maxHeight:300,overflowY:"auto"}}>{b.output}</div>
            </div>
          ))
        )}
        {tab==="media"&&(
          mediaArtifacts.length===0
          ?<div style={{textAlign:"center",padding:"40px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>No media artifacts</div>
          :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
            {mediaArtifacts.map((m,i)=>(
              <div key={i} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
                <img src={`data:${m.mimeType};base64,${m.data}`} alt={`artifact-${i}`}
                  style={{width:"100%",display:"block",maxHeight:200,objectFit:"contain",background:"#040507"}}/>
                <div style={{padding:"5px 8px",fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.muted}}>{m.mimeType} · {fmtTime(new Date(m.ts).getTime())}</div>
              </div>
            ))}
          </div>
        )}
        <div ref={feedEndRef}/>
      </div>

      {/* ── Composer ── */}
      {canSend&&(
        <div style={{padding:"10px 16px 14px",borderTop:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <textarea
              ref={txtRef}
              value={msg}
              onChange={e=>setMsg(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),handleSend())}
              placeholder="Message Jules or give new instructions…"
              rows={2}
              style={{
                flex:1,background:T.surfaceHi,
                border:`1px solid ${msg?T.green+"66":T.border}`,
                borderRadius:6,padding:"8px 10px",color:T.text,
                fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,lineHeight:1.4,
                resize:"none",outline:"none",transition:"border-color .2s",
                WebkitOverflowScrolling:"touch",
              }}
            />
            <button
              onClick={handleSend}
              disabled={!msg.trim()||busy}
              style={{
                width:38,height:38,flexShrink:0,borderRadius:6,border:"none",
                background:msg.trim()&&!busy?T.green:T.dim,
                cursor:msg.trim()&&!busy?"pointer":"default",
                display:"flex",alignItems:"center",justifyContent:"center",
                transition:"background .2s",
              }}
            >
              <Ic n="send" s={14} c={msg.trim()&&!busy?"#000":T.muted}/>
            </button>
          </div>
          <div style={{marginTop:4,fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.muted}}>↵ send · shift+↵ newline</div>
        </div>
      )}
    </div>
  );
};

// ─── New Session ──────────────────────────────────────────────────────────────
// ─── NewSession draft persistence ────────────────────────────────────────────
const NS_KEY = "jac_ns_draft";
function loadDraft() {
  try { const v=localStorage.getItem(NS_KEY); return v?JSON.parse(v):null; } catch { return null; }
}
function saveDraft(d) {
  try { localStorage.setItem(NS_KEY, JSON.stringify(d)); } catch {}
}
function clearDraft() {
  try { localStorage.removeItem(NS_KEY); } catch {}
}

const NewSession = ({ apiKey, onBack, onCreate, isDesktop, plan, todayCount }) => {
  const draft = useMemo(() => loadDraft(), []);
  const [sources,setSources]       = useState([]);
  const [loadingSrc,setLoadSrc]    = useState(true);
  const [source,setSource]         = useState(draft?.source ?? "");
  const [branch,setBranch]         = useState(draft?.branch ?? "");
  const [branches,setBranches]     = useState([]);   // [{displayName}] from Jules API
  const [defaultBranch,setDefault] = useState("");   // e.g. "main"
  const [prompt,setPrompt]         = useState(draft?.prompt ?? "");
  const [title,setTitle]           = useState(draft?.title ?? "");
  const [autoMode,setAutoMode]     = useState(draft?.autoMode ?? true);
  const [reqApproval,setReqApp]    = useState(draft?.reqApproval ?? false);
  const [submitting,setSub]        = useState(false);
  const [err,setErr]               = useState(null);
  const [savedFlash,setSavedFlash] = useState(false);

  // ── Derive branches whenever selected source changes ─────────────────────
  // Jules API returns branches[] + defaultBranch inline on each source object
  const srcObj = useMemo(() => sources.find(s => s.name === source) || null, [sources, source]);

  useEffect(() => {
    if (!srcObj) { setBranches([]); setDefault(""); return; }
    const repo = srcObj.githubRepo;
    if (!repo) { setBranches([]); setDefault(""); return; }
    const bs   = (repo.branches || []).map(b => b.displayName).filter(Boolean);
    const def  = repo.defaultBranch?.displayName || bs[0] || "main";
    setBranches(bs);
    setDefault(def);
    // Only auto-set branch if we don't have a saved draft branch for this source
    if (!draft?.branch || draft?.source !== source) setBranch(def);
  }, [srcObj, source]);

  // Persist on every change (debounced 400ms)
  const draftRef = useRef(null);
  useEffect(() => {
    clearTimeout(draftRef.current);
    draftRef.current = setTimeout(() => {
      saveDraft({ source, branch, prompt, title, autoMode, reqApproval });
    }, 400);
    return () => clearTimeout(draftRef.current);
  }, [source, branch, prompt, title, autoMode, reqApproval]);

  useEffect(() => {
    (async () => {
      try {
        const d = await apiCall(apiKey, "/sources?pageSize=50", { _label:"List sources" });
        const s = d.sources || [];
        setSources(s);
        // Only default to first source if no draft source saved
        if (s.length > 0 && !draft?.source) setSource(s[0].name);
      } catch(e) { setErr(e.message); }
      finally { setLoadSrc(false); }
    })();
  }, []);

  const handleClearDraft = () => {
    clearDraft();
    setSource(""); setBranch(""); setPrompt(""); setTitle("");
    setAutoMode(true); setReqApp(false);
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 1500);
  };

  const handleCreate = async () => {
    if (!prompt.trim()) return;
    setSub(true); setErr(null);
    const body = {
      prompt: prompt.trim(),
      ...(title.trim()&&{title:title.trim()}),
      ...(source&&{ sourceContext:{ source, githubRepoContext:{ startingBranch:branch||"main" } } }),
      requirePlanApproval: reqApproval,
      ...(autoMode&&{automationMode:"AUTO_CREATE_PR"}),
    };
    try {
      const d = await apiCall(apiKey, "/sessions", { method:"POST", body, _label:"Create session" });
      clearDraft(); // clear after successful submit
      onCreate(d);
    } catch(e) { setErr(e.message); setSub(false); }
  };

  const payloadEst = (JSON.stringify({prompt,title,source,branch}).length/1024).toFixed(1);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:0}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${T.border}`,background:T.surface,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        {!isDesktop&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex"}}><Ic n="back" s={18} c={T.text}/></button>}
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.text,letterSpacing:"0.05em",fontWeight:700,flex:1}}>NEW SESSION</div>
        {/* Draft indicator */}
        {draft&&(prompt||title||branch!=="main")&&!savedFlash&&(
          <button onClick={handleClearDraft} title="Clear saved draft" style={{
            display:"flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:20,
            background:T.amberDim,border:`1px solid ${T.amber}40`,cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.amber,letterSpacing:"0.07em",
          }}>

// ─── Main App ─────────────────────────────────────────────────────────────────
function JulesClient() {
  const [apiKey,setApiKey]     = useState(() => { try { return sessionStorage.getItem("jac_key")||""; } catch { return ""; } });
  const [sessions,setSessions] = useState([]);
  const [selected,setSelected] = useState(null);
  const [mobileScreen,setMobile]   = useState("list");
  const [desktopView,setDesktop]   = useState("empty");
  const [refreshing,setRefreshing] = useState(false);
  const [netSnap,setNetSnap]       = useState(NET.snapshot());
  const [pollInterval,setPollIntervalRaw] = useState(loadPollMs);
  const [sessionLimit,setSessionLimitRaw] = useState(loadLimit);
  const [countdown,setCountdown]   = useState(0);
  const [planId,setPlanIdRaw]      = useState(loadPlan);
  const [todayCount,setTodayCount] = useState(loadTodayCount);
  const pollRef      = useRef(null);
  const countdownRef = useRef(null);
  const nextRefAt    = useRef(0);
  const isDesktop    = useIsDesktop();

  const setPlanId = useCallback(id => { savePlan(id); setPlanIdRaw(id); }, []);
  const plan = useMemo(() => PLANS.find(p=>p.id===planId)||PLANS[0], [planId]);

  useEffect(() => NET.subscribe(s=>setNetSnap(s)), []);
  useEffect(() => { pruneOldKeys(); }, []);

  const setPollInterval = useCallback(ms => {
    savePollMs(ms);
    setPollIntervalRaw(ms);
  }, []);

  const setSessionLimit = useCallback(v => {
    saveLimit(v);
    setSessionLimitRaw(v);
  }, []);

  const fetchSessions = useCallback(async (quiet=false) => {
    if (!apiKey) return;
    if (!quiet) setRefreshing(true);
    try {
      const d = await apiCall(apiKey, `/sessions?pageSize=${sessionLimit}`, { _label:"List sessions" });
      setSessions(d.sessions||[]);
    } catch {}
    finally { if (!quiet) setRefreshing(false); }
  }, [apiKey, sessionLimit]);

  // Schedule auto-poll + countdown whenever apiKey or pollInterval changes
  useEffect(() => {
    clearInterval(pollRef.current);
    clearInterval(countdownRef.current);
    if (!apiKey) return;
    fetchSessions();
    if (pollInterval === 0) { setCountdown(0); return; }

    const schedule = () => {
      nextRefAt.current = Date.now() + pollInterval;
      setCountdown(Math.ceil(pollInterval / 1000));
      pollRef.current = setTimeout(async () => {
        await fetchSessions(true);
        schedule();
      }, pollInterval);
    };
    schedule();

    countdownRef.current = setInterval(() => {
      const remaining = Math.max(0, Math.ceil((nextRefAt.current - Date.now()) / 1000));
      setCountdown(remaining);
    }, 1000);

    return () => { clearTimeout(pollRef.current); clearInterval(countdownRef.current); };
  }, [apiKey, pollInterval, fetchSessions]);

  const handleSessionUpdate = useCallback(updated => {
    setSessions(prev => prev.map(s=>s.id===updated.id?updated:s));
  }, []);

  const handleDelete = useCallback(id => {
    setSessions(prev => prev.filter(s=>s.id!==id));
    setSelected(null);
    setDesktop("empty");
    setMobile("list");
  }, []);

  const handleSelect = useCallback(s => {
    setSelected(s);
    if (isDesktop) setDesktop("detail"); else setMobile("detail");
  }, [isDesktop]);

  const handleCreate = useCallback(s => {
    setSessions(prev => [s, ...prev]);
    setSelected(s);
    incTodayCount();
    setTodayCount(loadTodayCount());
    if (isDesktop) setDesktop("detail"); else setMobile("list");
  }, [isDesktop]);

  const saveKey = k => {
    try { sessionStorage.setItem("jac_key", k); } catch {}
    setApiKey(k);
  };

  if (!apiKey) {
    return (
      <Shell>
        <SetupScreen onSave={saveKey}/>
      </Shell>
    );
  }

  // ── Desktop layout: sidebar + main ──────────────────────────────────────────
  if (isDesktop) {
    return (
      <Shell desktop>
        {/* Sidebar */}
        <div style={{width:320,flexShrink:0,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
          <SessionList
            sessions={sessions} onSelect={handleSelect} onRefresh={()=>fetchSessions()}
            refreshing={refreshing} netSnap={netSnap} selectedId={selected?.id}
            isDesktop onNew={()=>setDesktop("new")} onNetwork={()=>setDesktop("network")}
            pollInterval={pollInterval} setPollInterval={setPollInterval}
            sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
            countdown={countdown}
            plan={plan} planId={planId} setPlanId={setPlanId} todayCount={todayCount}
          />
        </div>
        {/* Main panel */}
        <div style={{flex:1,display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",minWidth:0}}>
          {desktopView==="empty"&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:32}}>
              <div style={{width:48,height:48,borderRadius:11,background:T.greenDim,border:`1px solid ${T.green}25`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:900,color:T.green}}>J</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted,textAlign:"center",lineHeight:2}}>
                SELECT A SESSION ←{"\u00A0"}{"\u00A0"}OR{"\u00A0"}{"\u00A0"}NEW ↖
              </div>
            </div>
          )}
          {desktopView==="detail"&&selected&&(
            <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
              onBack={()=>setDesktop("empty")} onDelete={handleDelete}
              onSessionUpdate={handleSessionUpdate} isDesktop pollInterval={pollInterval}/>
          )}
          {desktopView==="new"&&(
            <NewSession apiKey={apiKey} onBack={()=>setDesktop("empty")} onCreate={handleCreate} isDesktop plan={plan} todayCount={todayCount}/>
          )}
          {desktopView==="network"&&(
            <NetworkMonitor onBack={()=>setDesktop("empty")} isDesktop/>
          )}
        </div>
      </Shell>
    );
  }

  // ── Mobile layout: single panel + bottom nav ──────────────────────────────
  return (
    <Shell>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {mobileScreen==="list"&&(
          <SessionList sessions={sessions} onSelect={handleSelect} onRefresh={()=>fetchSessions()}
            refreshing={refreshing} netSnap={netSnap} selectedId={null} isDesktop={false}
            pollInterval={pollInterval} setPollInterval={setPollInterval}
            sessionLimit={sessionLimit} setSessionLimit={setSessionLimit}
            countdown={countdown}
            plan={plan} planId={planId} setPlanId={setPlanId} todayCount={todayCount}/>
        )}
        {mobileScreen==="detail"&&selected&&(
          <SessionDetail key={selected.id} session={selected} apiKey={apiKey}
            onBack={()=>{ setMobile("list"); fetchSessions(true); }}
            onDelete={handleDelete} onSessionUpdate={handleSessionUpdate} isDesktop={false} pollInterval={pollInterval}/>
        )}
        {mobileScreen==="new"&&(
          <NewSession apiKey={apiKey} onBack={()=>setMobile("list")} onCreate={s=>{ setSessions(prev=>[s,...prev]); incTodayCount(); setTodayCount(loadTodayCount()); setMobile("list"); }} isDesktop={false} plan={plan} todayCount={todayCount}/>
        )}
        {mobileScreen==="network"&&(
          <NetworkMonitor onBack={()=>setMobile("list")} isDesktop={false}/>
        )}
      </div>
      <nav style={{display:"flex",borderTop:`1px solid ${T.border}`,background:T.surface,transform:"translateZ(0)",flexShrink:0}}>
        {[
          {id:"list",   n:"tasks", label:"SESSIONS"},
          {id:"new",    n:"plus",  label:"NEW"},
          {id:"network",n:"wifi",  label:"NET"},
        ].map(({id,n,label})=>{
          const isAct = mobileScreen===id||(mobileScreen==="detail"&&id==="list");
          const hasAlert = id==="list"&&sessions.some(s=>["AWAITING_PLAN_APPROVAL","AWAITING_USER_FEEDBACK"].includes(s.state));
          return (
            <button key={id} onClick={()=>setMobile(id)} style={{flex:1,padding:"11px 0 13px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{position:"relative"}}>
                <Ic n={n} s={19} c={isAct?T.green:T.muted}/>
                {hasAlert&&<div style={{position:"absolute",top:-2,right:-4,width:7,height:7,borderRadius:"50%",background:T.purple,border:`1.5px solid ${T.surface}`,animation:"dot 1.5s ease-in-out infinite"}}/>}
              </div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:isAct?T.green:T.muted,fontWeight:isAct?700:400,letterSpacing:"0.07em"}}>{label}</span>
            </button>
          );
        })}
      </nav>
    </Shell>
  );
}

// ─── Shell ────────────────────────────────────────────────────────────────────
function Shell({ children, desktop=false }) {
  // Dismiss the pre-React splash screen on first paint
  useEffect(() => {
    const splash = document.getElementById("splash");
    if (!splash) return;
    // Fast-complete the progress bar then fade out
    const bar = document.getElementById("splash-bar");
    if (bar) { bar.style.animation = "none"; bar.style.width = "100%"; bar.style.transition = "width .18s ease"; }
    const hint = document.getElementById("splash-hint");
    if (hint) hint.textContent = "READY";
    const t = setTimeout(() => { splash.classList.add("hidden"); }, 180);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      width:"100%",background:T.bg,display:"flex",isolation:"isolate",
      fontFamily:"'IBM Plex Sans',sans-serif",overflow:"hidden",
      ...(desktop
        ? { minHeight:"100vh", flexDirection:"row" }
        : { maxWidth:430, height:"100dvh", margin:"0 auto", flexDirection:"column" }
      ),
    }}>
      <style>{`
        ::-webkit-scrollbar{width:3px;height:3px;}
        ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        select,input,textarea{color-scheme:dark;}
        option{background:${T.surface};color:${T.text};}
        @keyframes dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
        @keyframes spin{to{transform:rotate(360deg);}}
        ::selection{background:${T.greenDim};color:${T.green};}
        textarea::placeholder,input::placeholder{color:${T.muted};}
      `}</style>
      <PWABanner/>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JulesClient/>);
</script>
</body>
</html>
