<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules Mobile</title>
    <!-- Load React and Babel for on-the-fly JSX transpilation -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; background:#07090c;">
    <div id="root"></div>

    <script type="text/babel">
        // Import hooks from the global React object
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- ORIGINAL CODE CONTENT ---
        const BASE = "https://jules.googleapis.com/v1alpha";
        const POLL_ACTIVE_MS = 8000;
        const POLL_IDLE_MS = 45000;
        const ACTIVE_STATES = new Set(["QUEUED","PLANNING","AWAITING_PLAN_APPROVAL","AWAITING_USER_FEEDBACK","IN_PROGRESS"]);

        const T = {
          bg:"#07090c", surface:"#0d1118", surfaceHi:"#131b24",
          border:"#182030", borderHi:"#243548",
          green:"#00e87a", greenDim:"rgba(0,232,122,.12)",
          amber:"#ffb400", amberDim:"rgba(255,180,0,.12)",
          red:"#ff4455", redDim:"rgba(255,68,85,.12)",
          blue:"#4da6ff", blueDim:"rgba(77,166,255,.12)",
          purple:"#b388ff", purpleDim:"rgba(179,136,255,.12)",
          text:"#c5d4e8", muted:"#4a5e76", dim:"#1e2d3d",
        };

        const STATUS_META = {
          QUEUED:                { label:"QUEUED",   color:T.muted,  bg:T.dim,        pulse:false },
          PLANNING:              { label:"PLANNING", color:T.amber,  bg:T.amberDim,   pulse:true  },
          AWAITING_PLAN_APPROVAL:{ label:"APPROVE",  color:T.purple, bg:T.purpleDim,  pulse:true  },
          AWAITING_USER_FEEDBACK:{ label:"INPUT",    color:T.amber,  bg:T.amberDim,   pulse:true  },
          IN_PROGRESS:           { label:"WORKING",  color:T.green,  bg:T.greenDim,   pulse:true  },
          PAUSED:                { label:"PAUSED",   color:T.muted,  bg:T.dim,        pulse:false },
          COMPLETED:             { label:"DONE",     color:T.green,  bg:T.greenDim,   pulse:false },
          FAILED:                { label:"FAILED",   color:T.red,    bg:T.redDim,     pulse:false },
        };

        function makeNetTracker() {
          let total=0, saved=0, log=[];
          const subs=[];
          const notify=()=>subs.forEach(f=>f({total,saved,log:[...log]}));
          return {
            record(label,bytes,savedBytes=0){
              total+=bytes; saved+=savedBytes;
              log.unshift({id:Math.random(),label,bytes,savedBytes,ts:Date.now()});
              if(log.length>60) log.length=60;
              notify();
            },
            subscribe(fn){ subs.push(fn); return ()=>{ const i=subs.indexOf(fn); if(i>-1)subs.splice(i,1); }; },
            snapshot(){ return {total,saved,log:[...log]}; },
          };
        }
        const NET = makeNetTracker();

        async function apiCall(apiKey, path, opts={}) {
          const url = `${BASE}${path}`;
          const res = await fetch(url, {
            ...opts,
            headers: {
              "x-goog-api-key": apiKey,
              "Content-Type": "application/json",
              ...(opts.headers||{}),
            },
            body: opts.body ? JSON.stringify(opts.body) : undefined,
          });
          const text = await res.text();
          const bytes = new TextEncoder().encode(text).length / 1024;
          NET.record(opts._label || path, bytes);
          if (!res.ok) {
            let msg = text;
            try { msg = JSON.parse(text)?.error?.message || text; } catch {}
            throw new Error(`${res.status}: ${msg}`);
          }
          return text ? JSON.parse(text) : {};
        }

        const fmtBytes = b => b<1?`${(b*1024).toFixed(0)}B`:b<1024?`${b.toFixed(1)}KB`:`${(b/1024).toFixed(2)}MB`;
        const fmtAgo = ts => {
          const d=Date.now()-ts;
          if(d<60000) return`${Math.floor(d/1000)}s ago`;
          if(d<3600000) return`${Math.floor(d/60000)}m ago`;
          if(d<86400000) return`${Math.floor(d/3600000)}h ago`;
          return`${Math.floor(d/86400000)}d ago`;
        };
        const fmtTime = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});

        const PATHS = {
          back:"M19 12H5m7-7l-7 7 7 7",
          send:"M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z",
          plus:"M12 4v16m8-8H4",
          tasks:"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2",
          wifi:"M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0",
          check:"M20 6L9 17l-5-5",
          x:"M18 6L6 18M6 6l12 12",
          refresh:"M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
          trash:"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6",
          key:"M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4",
          link:"M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71",
          code:"M9 9l-6 3 6 3M15 9l6 3-6 3M13 4l-2 16",
          terminal:"M4 17l6-6-6-6M12 19h8",
          plan:"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 12h6M9 16h4",
          approve:"M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z",
          repo:"M3 3h18v18H3zM9 3v18M15 8h3M15 12h3M15 16h3",
          branch:"M6 3v12M18 9a3 3 0 100-6 3 3 0 000 6zM6 21a3 3 0 100-6 3 3 0 000 6zM18 9a9 9 0 01-9 9",
          eye:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 100 6 3 3 0 000-6z",
          down:"M6 9l6 6 6-6",
        };
        const Ic = ({n,s=16,c=T.muted})=>(
          <svg width={s} height={s} viewBox="0 0 24 24" fill="none"
            stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
            <path d={PATHS[n]||""}/>
          </svg>
        );

        const Pill = ({status,small=false})=>{
          const m=STATUS_META[status]||STATUS_META.QUEUED;
          return(
            <span style={{
              display:"inline-flex",alignItems:"center",gap:4,
              padding:small?"2px 7px":"3px 9px",borderRadius:3,
              background:m.bg,border:`1px solid ${m.color}30`,
              fontFamily:"'JetBrains Mono',monospace",
              fontSize:small?9:10,fontWeight:700,letterSpacing:"0.07em",color:m.color,
              flexShrink:0,
            }}>
              {m.pulse&&<span style={{
                width:4,height:4,borderRadius:"50%",background:m.color,
                animation:"dot 1.2s ease-in-out infinite",flexShrink:0,
              }}/>}
              {m.label}
            </span>
          );
        };

        const Bar = ({pct,status})=>{
          const c=(STATUS_META[status]||STATUS_META.QUEUED).color;
          return(
            <div style={{height:2,background:T.border,borderRadius:2,overflow:"hidden"}}>
              <div style={{
                height:"100%",width:`${pct}%`,borderRadius:2,
                background:c,boxShadow:`0 0 5px ${c}70`,
                transition:"width .5s ease",
                transform:"translateZ(0)",
              }}/>
            </div>
          );
        };

        const Btn = ({children,onClick,color=T.green,disabled=false,outline=false,sm=false,style:s={}})=>(
          <button onClick={onClick} disabled={disabled} style={{
            background:outline?"transparent":(disabled?T.dim:color),
            border:`1px solid ${disabled?T.border:color+(outline?"66":"00")}`,
            borderRadius:5,cursor:disabled?"default":"pointer",
            padding:sm?"6px 12px":"10px 16px",
            color:disabled?T.muted:(outline?color:"#000"),
            fontFamily:"'JetBrains Mono',monospace",
            fontSize:sm?9:10,fontWeight:700,letterSpacing:"0.08em",
            transition:"opacity .15s",opacity:disabled?.5:1,
            display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            ...s,
          }}>{children}</button>
        );

        const Field = ({label,children,style:s={}})=>(
          <div style={{marginBottom:16,...s}}>
            <div style={{
              marginBottom:5,fontFamily:"'JetBrains Mono',monospace",
              fontSize:9,color:T.muted,letterSpacing:"0.1em",
            }}>{label}</div>
            {children}
          </div>
        );

        const inputSt = {
          width:"100%",background:T.surfaceHi,
          border:`1px solid ${T.border}`,borderRadius:6,
          padding:"10px 12px",color:T.text,
          fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,
          outline:"none",boxSizing:"border-box",transition:"border-color .18s",
        };

        const ActivityItem = ({act})=>{
          const type = act.planGenerated?"planGenerated":act.planApproved?"planApproved":
            act.userMessaged?"userMessaged":act.agentMessaged?"agentMessaged":
            act.progressUpdated?"progressUpdated":act.sessionCompleted?"sessionCompleted":
            act.sessionFailed?"sessionFailed":"system";

          const icons={
            planGenerated:{n:"plan",c:T.purple},
            planApproved:{n:"approve",c:T.green},
            userMessaged:{n:"send",c:T.blue},
            agentMessaged:{n:"terminal",c:T.amber},
            progressUpdated:{n:"refresh",c:T.muted},
            sessionCompleted:{n:"check",c:T.green},
            sessionFailed:{n:"x",c:T.red},
            system:{n:"code",c:T.muted},
          };
          const ic=icons[type]||icons.system;

          let title="",body=null;
          switch(type){
            case"planGenerated":
              const plan=act.planGenerated?.plan;
              title="Plan generated";
              body=plan?.steps&&(
                <div style={{marginTop:6}}>
                  {plan.steps.map((st,i)=>(
                    <div key={st.id||i} style={{
                      display:"flex",gap:8,marginBottom:5,alignItems:"flex-start",
                    }}>
                      <div style={{
                        width:16,height:16,borderRadius:3,flexShrink:0,
                        background:T.purpleDim,border:`1px solid ${T.purple}40`,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.purple,
                      }}>{i+1}</div>
                      <div>
                        <div style={{fontSize:12,color:T.text,fontWeight:500}}>{st.title}</div>
                        {st.description&&<div style={{fontSize:11,color:T.muted,marginTop:1}}>{st.description}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              );break;
            case"agentMessaged":
              title="Jules"; body=<div style={{fontSize:13,color:T.text,lineHeight:1.45,marginTop:3}}>{act.agentMessaged?.agentMessage}</div>;break;
            case"userMessaged":
              title="You"; body=<div style={{fontSize:13,color:T.muted,lineHeight:1.45,marginTop:3}}>{act.userMessaged?.userMessage}</div>;break;
            case"progressUpdated":
              title=act.progressUpdated?.title||"Progress";
              body=act.progressUpdated?.description&&<div style={{fontSize:12,color:T.muted,marginTop:2}}>{act.progressUpdated.description}</div>;break;
            case"sessionCompleted": title="Session completed"; break;
            case"sessionFailed": title="Session failed";
              body=act.sessionFailed?.reason&&<div style={{fontSize:12,color:T.red,marginTop:2}}>{act.sessionFailed.reason}</div>;break;
            case"planApproved": title="Plan approved"; break;
            default: title=act.description||"Event"; break;
          }

          return(
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <div style={{
                width:24,height:24,borderRadius:5,flexShrink:0,
                background:`${ic.c}15`,border:`1px solid ${ic.c}30`,
                display:"flex",alignItems:"center",justifyContent:"center",
                transform:"translateZ(0)",
              }}>
                <Ic n={ic.n} s={12} c={ic.c}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:2}}>
                  <span style={{
                    fontFamily:"'JetBrains Mono',monospace",
                    fontSize:10,fontWeight:700,color:ic.c,
                  }}>{title}</span>
                  <span style={{
                    fontFamily:"'JetBrains Mono',monospace",
                    fontSize:9,color:T.muted,
                  }}>{fmtTime(new Date(act.createTime).getTime())}</span>
                </div>
                {body}
              </div>
            </div>
          );
        };

        const DiffViewer = ({patch})=>{
          if(!patch) return <div style={{textAlign:"center",padding:"30px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>No diff yet</div>;
          return(
            <div style={{
              background:"#040507",border:`1px solid ${T.border}`,
              borderRadius:6,overflow:"hidden",
              fontFamily:"'JetBrains Mono',monospace",fontSize:11,
            }}>
              {patch.split("\n").map((line,i)=>{
                const c=line.startsWith("+")&&!line.startsWith("+++")?T.green:
                        line.startsWith("-")&&!line.startsWith("---")?T.red:
                        line.startsWith("@@")?T.blue:T.muted;
                const bg=line.startsWith("+")&&!line.startsWith("+++")?"rgba(0,232,122,.06)":
                         line.startsWith("-")&&!line.startsWith("---")?"rgba(255,68,85,.06)":"transparent";
                return(
                  <div key={i} style={{padding:"1px 10px",color:c,background:bg,whiteSpace:"pre",overflowX:"auto"}}>
                    {line||" "}
                  </div>
                );
              })}
            </div>
          );
        };

        const SetupScreen = ({onSave})=>{
          const [key,setKey]=useState("");
          const [testing,setTesting]=useState(false);
          const [err,setErr]=useState(null);

          const handleTest=async()=>{
            if(!key.trim()) return;
            setTesting(true); setErr(null);
            try{
              await apiCall(key.trim(),"/sources?pageSize=1",{_label:"Test auth"});
              onSave(key.trim());
            }catch(e){
              setErr(e.message);
            }finally{ setTesting(false); }
          };

          return(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px"}}>
              <div style={{
                width:44,height:44,borderRadius:10,background:T.green,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:900,color:"#000",
                marginBottom:16,
              }}>J</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>JULES MOBILE</div>
              <div style={{fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,color:T.muted,marginBottom:28,textAlign:"center",lineHeight:1.5}}>
                Enter your Jules API key from<br/>
                <span style={{color:T.blue}}>jules.google.com/settings → API</span>
              </div>

              <div style={{width:"100%",marginBottom:10}}>
                <input
                  type="password"
                  value={key}
                  onChange={e=>setKey(e.target.value)}
                  placeholder="AIza..."
                  style={{...inputSt,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}
                  onKeyDown={e=>e.key==="Enter"&&handleTest()}
                />
              </div>

              {err&&<div style={{
                width:"100%",padding:"8px 12px",borderRadius:5,marginBottom:10,
                background:T.redDim,border:`1px solid ${T.red}40`,
                fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.red,
              }}>{err}</div>}

              <Btn onClick={handleTest} disabled={!key.trim()||testing} style={{width:"100%"}}>
                <Ic n="key" s={12} c="#000"/>
                {testing?"CONNECTING...":"CONNECT"}
              </Btn>

              <div style={{
                marginTop:16,fontFamily:"'JetBrains Mono',monospace",
                fontSize:9,color:T.muted,textAlign:"center",lineHeight:1.6,
              }}>
                Key stored in memory only · Never persisted<br/>
                Install Jules GitHub app first via web UI
              </div>
            </div>
          );
        };

        const pctFromState = s=>({QUEUED:5,PLANNING:20,AWAITING_PLAN_APPROVAL:35,IN_PROGRESS:65,AWAITING_USER_FEEDBACK:60,COMPLETED:100,FAILED:30,PAUSED:50}[s]||0);

        const SessionCard = ({s,onPress})=>{
          const pct=pctFromState(s.state);
          const m=STATUS_META[s.state]||STATUS_META.QUEUED;
          const repo=s.sourceContext?.githubRepoContext?s.sourceContext.source?.replace("sources/github/",""):null;
          return(
            <button onClick={onPress} style={{
              width:"100%",background:T.surface,textAlign:"left",cursor:"pointer",
              border:`1px solid ${T.border}`,borderLeft:`2px solid ${m.color}`,
              borderRadius:6,padding:"12px 14px",marginBottom:8,
              transition:"border-color .15s",
            }}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
                <div style={{flex:1,minWidth:0}}>
                  {repo&&<div style={{
                    fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,
                    marginBottom:3,letterSpacing:"0.04em",overflow:"hidden",
                    textOverflow:"ellipsis",whiteSpace:"nowrap",
                  }}>{repo}</div>}
                  <div style={{
                    fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,fontWeight:500,
                    color:T.text,lineHeight:1.35,
                    overflow:"hidden",textOverflow:"ellipsis",
                    display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",
                  }}>{s.title||s.prompt}</div>
                </div>
                <Pill status={s.state} small/>
              </div>
              <Bar pct={pct} status={s.state}/>
              <div style={{
                display:"flex",alignItems:"center",gap:10,marginTop:7,
                fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,
              }}>
                <span>{fmtAgo(new Date(s.updateTime||s.createTime).getTime())}</span>
                {s.outputs?.find(o=>o.pullRequest)&&(
                  <span style={{color:T.blue}}>
                    PR→
                  </span>
                )}
                <span style={{
                  marginLeft:"auto",fontFamily:"'JetBrains Mono',monospace",
                  fontSize:8,color:T.dim,
                  background:T.surfaceHi,padding:"1px 5px",borderRadius:2,
                }}>{s.id?.slice(0,8)}</span>
              </div>
            </button>
          );
        };

        const SessionDetail = ({session:initSession,apiKey,onBack,onDelete,onSessionUpdate})=>{
          const [session,setSession]=useState(initSession);
          const [activities,setActivities]=useState([]);
          const [tab,setTab]=useState("activity");
          const [msg,setMsg]=useState("");
          const [busy,setBusy]=useState(false);
          const [err,setErr]=useState(null);
          const pollRef=useRef(null);
          const txtRef=useRef(null);

          const loadActivities=useCallback(async()=>{
            try{
              const d=await apiCall(apiKey,`/sessions/${session.id}/activities?pageSize=50`,{_label:`Activities ${session.id?.slice(0,6)}`});
              setActivities((d.activities||[]).slice().reverse());
            }catch{}
          },[apiKey,session.id]);

          const loadSession=useCallback(async()=>{
            try{
              const d=await apiCall(apiKey,`/sessions/${session.id}`,{_label:`Session ${session.id?.slice(0,6)}`});
              setSession(d);
              onSessionUpdate?.(d);
            }catch{}
          },[apiKey,session.id,onSessionUpdate]);

          useEffect(()=>{
            loadActivities();
            loadSession();
            const isActive=ACTIVE_STATES.has(session.state);
            const iv=setInterval(()=>{ loadSession(); loadActivities(); }, isActive?POLL_ACTIVE_MS:POLL_IDLE_MS);
            pollRef.current=iv;
            return()=>clearInterval(iv);
          },[session.id,session.state]);

          const handleSend=async()=>{
            if(!msg.trim()||busy) return;
            setBusy(true); setErr(null);
            try{
              await apiCall(apiKey,`/sessions/${session.id}:sendMessage`,{
                method:"POST",body:{prompt:msg.trim()},
                _label:`Message → ${session.id?.slice(0,6)}`,
              });
              setMsg("");
              setTimeout(()=>{ loadActivities(); loadSession(); },2000);
            }catch(e){ setErr(e.message); }
            finally{ setBusy(false); }
          };

          const handleApprove=async()=>{
            setBusy(true); setErr(null);
            try{
              await apiCall(apiKey,`/sessions/${session.id}:approvePlan`,{
                method:"POST",body:{},
                _label:`Approve plan ${session.id?.slice(0,6)}`,
              });
              await loadSession(); await loadActivities();
            }catch(e){ setErr(e.message); }
            finally{ setBusy(false); }
          };

          const handleDelete=async()=>{
            if(!window.confirm?.("Delete this session?") && false) return;
            setBusy(true);
            try{
              await apiCall(apiKey,`/sessions/${session.id}`,{method:"DELETE",_label:`Delete ${session.id?.slice(0,6)}`});
              onDelete(session.id);
            }catch(e){ setErr(e.message); setBusy(false); }
          };

          const diffArtifact=useMemo(()=>{
            for(const a of activities){
              if(a.artifacts){
                for(const art of a.artifacts){
                  if(art.changeSet?.gitPatch?.unidiffPatch) return art.changeSet.gitPatch;
                }
              }
            }return null;
          },[activities]);

          const bashOutputs=useMemo(()=>
            activities.flatMap(a=>(a.artifacts||[]).filter(x=>x.bashOutput).map(x=>({...x.bashOutput,ts:a.createTime})))
          ,[activities]);

          const pr=session.outputs?.find(o=>o.pullRequest)?.pullRequest;
          const m=STATUS_META[session.state]||STATUS_META.QUEUED;
          const pct=pctFromState(session.state);

          const TABS=[
            {id:"activity",label:"FEED"},
            {id:"diff",label:"DIFF"},
            {id:"bash",label:"BASH"},
          ];

          return(
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div style={{padding:"12px 16px 0",borderBottom:`1px solid ${T.border}`,background:T.surface}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",padding:3,display:"flex"}}>
                    <Ic n="back" s={18} c={T.text}/>
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{
                      fontFamily:"'IBM Plex Sans',sans-serif",
                      fontSize:14,fontWeight:600,color:T.text,lineHeight:1.3,
                      overflow:"hidden",textOverflow:"ellipsis",
                      display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",
                    }}>{session.title||session.prompt}</div>
                  </div>

                <Bar pct={pct} status={session.state}/>
                <div style={{
                  display:"flex",gap:10,marginTop:5,marginBottom:10,
                  fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,

                    <div style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.purple}}>

                    marginBottom:10,padding:"8px 10px",

                    ⚡ Jules needs your input — reply below

                {err&&<div style={{
                  marginBottom:8,padding:"6px 10px",borderRadius:4,
                  background:T.redDim,border:`1px solid ${T.red}40`,
                  fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.red,

                <div style={{display:"flex",marginTop:2}}>

                      flex:1,padding:"8px 0",background:"none",border:"none",
                      borderBottom:`2px solid ${tab===t.id?T.green:"transparent"}`,
                      color:tab===t.id?T.green:T.muted,cursor:"pointer",
                      fontFamily:"'JetBrains Mono',monospace",
                      fontSize:10,fontWeight:700,letterSpacing:"0.07em",

              </div>

              <div style={{flex:1,overflowY:"auto",padding:"14px 16px",WebkitOverflowScrolling:"touch"}}>

                    {ACTIVE_STATES.has(session.state)?"Loading activities...":"No activities"}
                  </div>
                  :activities.map(a=><ActivityItem key={a.id||a.name} act={a}/>)
                )}
                {tab==="diff"&&<DiffViewer patch={diffArtifact?.unidiffPatch||null}/>}
                {tab==="bash"&&(
                  bashOutputs.length===0
                  ?<div style={{textAlign:"center",padding:"40px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>No bash output</div>
                  :bashOutputs.map((b,i)=>(
                    <div key={i} style={{marginBottom:12,background:"#040507",border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
                      <div style={{
                        padding:"5px 10px",background:T.surface,
                        borderBottom:`1px solid ${T.border}`,
                        display:"flex",gap:8,alignItems:"center",
                      }}>
                        <Ic n="terminal" s={11} c={T.muted}/>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.muted,flex:1}}>
                          {b.command}
                        </span>
                        <span style={{
                          fontFamily:"'JetBrains Mono',monospace",fontSize:9,
                          color:b.exitCode===0?T.green:T.red,
                        }}>exit:{b.exitCode}</span>
                      </div>
                      <div style={{
                        padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",
                        fontSize:11,color:T.text,whiteSpace:"pre-wrap",lineHeight:1.5,
                      }}>{b.output}</div>
                    </div>
                  ))
                )}
              </div>

              {session.state!=="COMPLETED"&&session.state!=="FAILED"&&(
                <div style={{padding:"10px 16px 14px",borderTop:`1px solid ${T.border}`,background:T.surface}}>
                  <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                    <textarea
                      ref={txtRef}
                      value={msg}
                      onChange={e=>setMsg(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),handleSend())}
                      placeholder="Message Jules or give new instructions..."
                      rows={2}
                      style={{
                        flex:1,background:T.surfaceHi,
                        border:`1px solid ${msg?T.green+"66":T.border}`,
                        borderRadius:6,padding:"8px 10px",color:T.text,
                        fontFamily:"'IBM Plex Sans',sans-serif",fontSize:13,
                        lineHeight:1.4,resize:"none",outline:"none",
                        transition:"border-color .2s",WebkitOverflowScrolling:"touch",
                      }}
                    />
                    <button
                      onClick={handleSend}
                      disabled={!msg.trim()||busy}
                      style={{
                        width:36,height:36,flexShrink:0,borderRadius:6,border:"none",
                        background:msg.trim()&&!busy?T.green:T.dim,
                        cursor:msg.trim()&&!busy?"pointer":"default",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        transition:"background .2s",
                      }}
                    >
                      <Ic n="send" s={14} c={msg.trim()&&!busy?"#000":T.muted}/>
                    </button>
                  </div>
                  <div style={{
                    marginTop:4,fontFamily:"'JetBrains Mono',monospace",
                    fontSize:8,color:T.muted,
                  }}>↵ send · shift+↵ newline</div>
                </div>
              )}
            </div>
          );
        };

        const NewSession = ({apiKey,onBack,onCreate})=>{
          const [sources,setSources]=useState([]);
          const [loadingSrc,setLoadingSrc]=useState(true);
          const [source,setSource]=useState("");
          const [branch,setBranch]=useState("main");
          const [prompt,setPrompt]=useState("");
          const [title,setTitle]=useState("");
          const [autoMode,setAutoMode]=useState(true);
          const [requireApproval,setRequireApproval]=useState(false);
          const [submitting,setSubmitting]=useState(false);
          const [err,setErr]=useState(null);

          useEffect(()=>{
            (async()=>{
              try{
                const d=await apiCall(apiKey,"/sources?pageSize=50",{_label:"List sources"});
                const s=d.sources||[];
                setSources(s);
                if(s.length>0) setSource(s[0].name);
              }catch(e){ setErr(e.message); }
              finally{ setLoadingSrc(false); }
            })();
          },[apiKey]);

          const handleCreate=async()=>{
            if(!prompt.trim()) return;
            setSubmitting(true); setErr(null);
            const body={
              prompt:prompt.trim(),
              ...(title.trim()&&{title:title.trim()}),
              ...(source&&{
                sourceContext:{
                  source,
                  githubRepoContext:{startingBranch:branch||"main"},
                },
              }),
              requirePlanApproval:requireApproval,
              ...(autoMode&&{automationMode:"AUTO_CREATE_PR"}),
            };
            try{
              const d=await apiCall(apiKey,"/sessions",{method:"POST",body,_label:"Create session"});
              onCreate(d);
              onBack();
            }catch(e){ setErr(e.message); setSubmitting(false); }
          };

          const payloadEst=(JSON.stringify({prompt,title,source,branch}).length/1024).toFixed(1);

          return(
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div style={{
                padding:"12px 16px",borderBottom:`1px solid ${T.border}`,
                background:T.surface,display:"flex",alignItems:"center",gap:10,
              }}>
                <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex"}}>
                  <Ic n="back" s={18} c={T.text}/>
                </button>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.text,letterSpacing:"0.05em"}}>NEW SESSION</div>
              </div>

              <div style={{flex:1,overflowY:"auto",padding:"18px 16px",WebkitOverflowScrolling:"touch"}}>
                {err&&<div style={{
                  padding:"8px 12px",borderRadius:5,marginBottom:12,
                  background:T.redDim,border:`1px solid ${T.red}40`,
                  fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.red,
                }}>{err}</div>}

                <Field label="REPOSITORY (SOURCE)">
                  {loadingSrc
                    ?<div style={{...inputSt,color:T.muted,fontSize:11}}>Loading sources...</div>
                    :sources.length===0
                    ?<div style={{
                      padding:"10px 12px",borderRadius:6,background:T.amberDim,
                      border:`1px solid ${T.amber}40`,
                      fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,color:T.amber,
                    }}>
                      No sources found. Connect a repo at <span style={{fontFamily:"'JetBrains Mono',monospace"}}>jules.google.com</span> first.
                    </div>
                    :<select value={source} onChange={e=>setSource(e.target.value)} style={{...inputSt,cursor:"pointer"}}>
                      {sources.map(s=>(
                        <option key={s.name} value={s.name}>
                          {s.githubRepo?`${s.githubRepo.owner}/${s.githubRepo.repo}`:s.id||s.name}
                        </option>
                      ))}
                      <option value="">No repo (repoless)</option>
                    </select>
                  }
                </Field>

                {source&&(
                  <Field label="STARTING BRANCH">
                    <input value={branch} onChange={e=>setBranch(e.target.value)} placeholder="main"
                      style={inputSt}/>
                  </Field>
                )}

                <Field label="TITLE (optional)">
                  <input value={title} onChange={e=>setTitle(e.target.value)}
                    placeholder="Auto-generated if blank" style={inputSt}/>
                </Field>

                <Field label="TASK PROMPT *">
                  <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
                    placeholder="Describe the coding task for Jules to execute..."
                    rows={5}
                    style={{...inputSt,resize:"none",lineHeight:1.5}}/>
                </Field>

                <div style={{display:"flex",gap:10,marginBottom:16}}>
                  {[
                    {label:"AUTO PR",val:autoMode,set:setAutoMode,hint:"Create PR when done"},
                    {label:"APPROVE PLAN",val:requireApproval,set:setRequireApproval,hint:"Review plan first"},
                  ].map(opt=>(
                    <button key={opt.label} onClick={()=>opt.set(v=>!v)} style={{
                      flex:1,padding:"9px 8px",borderRadius:5,cursor:"pointer",
                      background:opt.val?T.greenDim:T.surfaceHi,
                      border:`1px solid ${opt.val?T.green+"50":T.border}`,
                      display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                    }}>
                      <div style={{
                        fontFamily:"'JetBrains Mono',monospace",
                        fontSize:9,fontWeight:700,color:opt.val?T.green:T.muted,
                        letterSpacing:"0.08em",
                      }}>{opt.label}</div>
                      <div style={{
                        fontFamily:"'JetBrains Mono',monospace",
                        fontSize:8,color:T.muted,
                      }}>{opt.hint}</div>
                    </button>
                  ))}
                </div>

                <div style={{
                  padding:"8px 12px",borderRadius:5,marginBottom:18,
                  background:T.greenDim,border:`1px solid ${T.green}30`,
                  fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.green,lineHeight:1.7,
                }}>
                  ⚡ PAYLOAD: ~{payloadEst}KB
                  <span style={{color:T.muted}}> · web baseline ~180KB</span>
                </div>

                <Btn onClick={handleCreate} disabled={!prompt.trim()||submitting||loadingSrc} style={{width:"100%"}}>
                  {submitting?"SENDING...":"ASSIGN TO JULES →"}
                </Btn>
              </div>
            </div>
          );
        };

        const NetworkMonitor = ({onBack})=>{
          const [snap,setSnap]=useState(NET.snapshot());
          useEffect(()=>NET.subscribe(s=>setSnap(s)),[]);

          const {total,saved,log}=snap;
          const webEst=total*9+2.4;
          const savedEst=webEst-total;
          const reduction=total>0?Math.round((savedEst/webEst)*100):0;

          return(
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div style={{
                padding:"12px 16px",borderBottom:`1px solid ${T.border}`,
                background:T.surface,display:"flex",alignItems:"center",gap:10,
              }}>
                <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex"}}>
                  <Ic n="back" s={18} c={T.text}/>
                </button>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.text,letterSpacing:"0.05em"}}>
                  NETWORK MONITOR
                </div>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:"16px",WebkitOverflowScrolling:"touch"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {[
                    {l:"TRANSFERRED",v:fmtBytes(total),c:T.green},
                    {l:"WEB EQUIV.",v:fmtBytes(webEst),c:T.amber},
                    {l:"REQUESTS",v:log.length,c:T.blue},
                    {l:"DATA SAVED",v:`${reduction}%`,c:T.purple},
                  ].map(s=>(
                    <div key={s.l} style={{
                      background:T.surface,border:`1px solid ${T.border}`,
                      borderRadius:6,padding:"12px 14px",
                    }}>
                      <div style={{
                        fontFamily:"'JetBrains Mono',monospace",
                        fontSize:8,color:T.muted,letterSpacing:"0.1em",marginBottom:4,
                      }}>{s.l}</div>
                      <div style={{
                        fontFamily:"'JetBrains Mono',monospace",
                        fontSize:22,fontWeight:700,color:s.c,
                      }}>{s.v}</div>
                    </div>
                  ))}
                </div>

                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:"14px",marginBottom:14}}>
                  <div style={{
                    display:"flex",justifyContent:"space-between",marginBottom:8,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted,
                  }}>
                    <span>SESSION USAGE</span>
                    <span style={{color:T.green}}>{fmtBytes(total)}</span>
                  </div>
                  <div style={{height:6,background:T.border,borderRadius:3,overflow:"hidden"}}>
                    <div style={{
                      height:"100%",
                      width:`${Math.min(100,(total/500)*100)}%`,
                      background:`linear-gradient(90deg,${T.green},${T.amber})`,
                      borderRadius:3,boxShadow:`0 0 8px ${T.green}60`,
                      transition:"width .4s ease",transform:"translateZ(0)",
                    }}/>
                  </div>
                  <div style={{
                    display:"flex",justifyContent:"space-between",marginTop:5,
                    fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:T.muted,
                  }}>
                    <span>0</span><span>500KB budget</span>
                  </div>
                </div>

                <div style={{
                  background:T.amberDim,border:`1px solid ${T.amber}30`,borderRadius:6,
                  padding:"12px 14px",marginBottom:16,
                  fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.amber,lineHeight:1.7,
                }}>
                  ⚡ WEB EQUIV. WOULD COST: {fmtBytes(webEst)}<br/>
                  <span style={{color:T.muted}}>
                    Diff-only payloads · smart polling · no JS bundle overhead<br/>
                    Polling interval: {POLL_ACTIVE_MS/1000}s active · {POLL_IDLE_MS/1000}s idle
                  </span>
                </div>

                <div style={{
                  fontFamily:"'JetBrains Mono',monospace",
                  fontSize:9,color:T.muted,letterSpacing:"0.08em",marginBottom:8,
                }}>REQUEST LOG</div>
                {log.length===0
                  ?<div style={{textAlign:"center",padding:"20px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>No requests yet</div>
                  :log.map(r=>(
                    <div key={r.id} style={{
                      display:"flex",gap:10,alignItems:"center",
                      padding:"8px 0",borderBottom:`1px solid ${T.border}`,
                    }}>
                      <div style={{width:5,height:5,borderRadius:"50%",background:T.green,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{
                          fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,color:T.text,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                        }}>{r.label}</div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.muted}}>{fmtAgo(r.ts)}</div>
                      </div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.green,flexShrink:0}}>
                        {fmtBytes(r.bytes)}
                      </div>
                    </div>
                  ))
                }
              </div>
            </div>
          );
        };

        const SessionList = ({sessions,onSelect,onRefresh,refreshing,netSnap})=>{
          const [filter,setFilter]=useState("ALL");
          const filtered=filter==="ALL"?sessions:sessions.filter(s=>s.state===filter);
          const active=sessions.filter(s=>ACTIVE_STATES.has(s.state)).length;

          return(
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div style={{padding:"12px 16px 0",background:T.surface,borderBottom:`1px solid ${T.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{
                    width:28,height:28,borderRadius:6,background:T.green,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontFamily:"'JetBrains Mono',monospace",fontSize:15,fontWeight:900,color:"#000",
                  }}>J</div>
                  <div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:T.text}}>JULES</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:active>0?T.amber:T.muted}}>
                      {active>0?`⚡ ${active} ACTIVE`:"AGENT CLIENT"}
                    </div>
                  </div>
                  <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{
                      padding:"3px 9px",borderRadius:20,
                      background:T.greenDim,border:`1px solid ${T.green}30`,
                      fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:T.green,
                      display:"flex",alignItems:"center",gap:4,
                    }}>
                      <span style={{width:4,height:4,borderRadius:"50%",background:T.green,animation:"dot 2s ease-in-out infinite"}}/>
                      {fmtBytes(netSnap.total)}
                    </div>
                    <button onClick={onRefresh} disabled={refreshing} style={{
                      background:"none",border:"none",cursor:refreshing?"default":"pointer",
                      display:"flex",padding:3,
                      animation:refreshing?"spin 1s linear infinite":"none",
                      transformOrigin:"center",
                    }}>
                      <Ic n="refresh" s={15} c={refreshing?T.green:T.muted}/>
                    </button>
                  </div>
                </div>

                <div style={{position:"relative",overflow:"hidden",marginBottom:0}}>
                  <div style={{
                    display:"flex",gap:6,
                    overflowX:"auto",paddingBottom:10,
                    scrollbarWidth:"none",
                    WebkitOverflowScrolling:"touch",
                    transform:"translateZ(0)",
                    willChange:"scroll-position",
                  }}>
                    {FILTERS.map(f=>{
                      const cnt=f==="ALL"?sessions.length:sessions.filter(s=>s.state===f).length;
                      const isActive=f===filter;
                      const meta=STATUS_META[f];
                      const ac=meta?.color||T.green;
                      return(
                        <button key={f} onClick={()=>setFilter(f)} style={{
                          flexShrink:0,padding:"4px 10px",borderRadius:20,border:"none",
                          background:isActive?`${ac}20`:"transparent",
                          outline:`1px solid ${isActive?`${ac}80`:T.border}`,
                          color:isActive?ac:T.muted,
                          fontFamily:"'JetBrains Mono',monospace",
                          fontSize:9,fontWeight:700,letterSpacing:"0.06em",
                          cursor:"pointer",
                          transition:"background .12s, color .12s, outline-color .12s",
                          transform:"translateZ(0)",
                        }}>
                          {FILTER_LABELS[f]||f} {cnt>0?cnt:""}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>

              <div style={{flex:1,overflowY:"auto",padding:"12px 14px",WebkitOverflowScrolling:"touch"}}>
                {refreshing&&sessions.length===0&&(
                  <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
                    Loading sessions...
                  </div>
                )}
                {!refreshing&&filtered.length===0&&(
                  <div style={{textAlign:"center",padding:"50px 0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.muted}}>
                    {filter==="ALL"?"No sessions yet":"No sessions with this status"}
                  </div>
                )}
                {filtered.map(s=><SessionCard key={s.id||s.name} s={s} onPress={()=>onSelect(s)}/>)}
              </div>
            </div>
          );
        };
        const FILTERS=["ALL","QUEUED","PLANNING","AWAITING_PLAN_APPROVAL","IN_PROGRESS","COMPLETED","FAILED"];
        const FILTER_LABELS={"AWAITING_PLAN_APPROVAL":"APPROVE","ALL":"ALL"};

        function JulesClient(){
          const [apiKey,setApiKey]=useState("");
          const [sessions,setSessions]=useState([]);
          const [selected,setSelected]=useState(null);
          const [screen,setScreen]=useState("list");
          const [refreshing,setRefreshing]=useState(false);
          const [netSnap,setNetSnap]=useState(NET.snapshot());
          const pollRef=useRef(null);

          useEffect(()=>NET.subscribe(s=>setNetSnap(s)),[]);

          const fetchSessions=useCallback(async(quiet=false)=>{
            if(!apiKey) return;
            if(!quiet) setRefreshing(true);
            try{
              const d=await apiCall(apiKey,"/sessions?pageSize=50",{_label:"List sessions"});
              setSessions(d.sessions||[]);
            }catch{}
            finally{ if(!quiet) setRefreshing(false); }
          },[apiKey]);

          useEffect(()=>{
            if(!apiKey) return;
            fetchSessions();
            const tick=()=>fetchSessions(true);
            pollRef.current=setInterval(tick, POLL_ACTIVE_MS);
            return()=>clearInterval(pollRef.current);
          },[apiKey]);

          useEffect(()=>{
            if(!apiKey) return;
            clearInterval(pollRef.current);
            const hasActive=sessions.some(s=>ACTIVE_STATES.has(s.state));
            pollRef.current=setInterval(()=>fetchSessions(true), hasActive?POLL_ACTIVE_MS:POLL_IDLE_MS);
            return()=>clearInterval(pollRef.current);
          },[sessions,apiKey]);

          const handleSessionUpdate=useCallback(updated=>{
            setSessions(prev=>prev.map(s=>s.id===updated.id?updated:s));
          },[]);

          const handleDelete=useCallback(id=>{
            setSessions(prev=>prev.filter(s=>s.id!==id));
            setScreen("list");
            setSelected(null);
          },[]);

          if(!apiKey){
            return(
              <Shell>
                <SetupScreen onSave={k=>{ setApiKey(k); setScreen("list"); }}/>
              </Shell>
            );
          }

          return(
            <Shell>
              <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                {screen==="list"&&(
                  <SessionList
                    sessions={sessions}
                    onSelect={s=>{ setSelected(s); setScreen("detail"); }}
                    onRefresh={()=>fetchSessions()}
                    refreshing={refreshing}
                    netSnap={netSnap}
                  />
                )}
                {screen==="detail"&&selected&&(
                  <SessionDetail
                    key={selected.id}
                    session={selected}
                    apiKey={apiKey}
                    onBack={()=>{ setScreen("list"); fetchSessions(true); }}
                    onDelete={handleDelete}
                    onSessionUpdate={handleSessionUpdate}
                  />
                )}
                {screen==="new"&&(
                  <NewSession
                    apiKey={apiKey}
                    onBack={()=>setScreen("list")}
                    onCreate={s=>{ setSessions(prev=>[s,...prev]); setScreen("list"); }}
                  />
                )}
                {screen==="network"&&(
                  <NetworkMonitor onBack={()=>setScreen("list")}/>
                )}
              </div>

              <nav style={{
                display:"flex",borderTop:`1px solid ${T.border}`,background:T.surface,
                transform:"translateZ(0)",willChange:"transform",
              }}>
                {[
                  {id:"list",  n:"tasks",label:"SESSIONS"},
                  {id:"new",   n:"plus", label:"NEW"},
                  {id:"network",n:"wifi",label:"NET"},
                ].map(({id,n,label})=>{
                  const isActive=screen===id||(screen==="detail"&&id==="list");
                  const hasAlert=id==="list"&&sessions.some(s=>s.state==="AWAITING_PLAN_APPROVAL"||s.state==="AWAITING_USER_FEEDBACK");
                  return(
                    <button key={id} onClick={()=>{ if(id==="new"||id==="network"||id==="list") setScreen(id); }}
                      style={{
                        flex:1,padding:"11px 0 13px",background:"none",border:"none",
                        cursor:"pointer",display:"flex",flexDirection:"column",
                        alignItems:"center",gap:4,
                      }}>
                      <div style={{position:"relative"}}>
                        <Ic n={n} s={19} c={isActive?T.green:T.muted}/>
                        {hasAlert&&<div style={{
                          position:"absolute",top:-2,right:-4,
                          width:7,height:7,borderRadius:"50%",
                          background:T.purple,border:`1.5px solid ${T.surface}`,
                          animation:"dot 1.5s ease-in-out infinite",
                        }}/>}
                      </div>
                      <span style={{
                        fontFamily:"'JetBrains Mono',monospace",fontSize:8,
                        color:isActive?T.green:T.muted,fontWeight:isActive?700:400,
                        letterSpacing:"0.07em",
                      }}>{label}</span>
                    </button>
                  );
                })}
              </nav>
            </Shell>
          );
        }

        function Shell({children}){
          return(
            <div style={{
              width:"100%",maxWidth:430,height:"100vh",maxHeight:780,
              margin:"0 auto",background:T.bg,
              display:"flex",flexDirection:"column",overflow:"hidden",
              fontFamily:"'IBM Plex Sans',sans-serif",
              isolation:"isolate",
            }}>
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
                *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
                ::-webkit-scrollbar{width:2px;height:2px;}
                ::-webkit-scrollbar-thumb{background:${T.dim};border-radius:2px;}
                ::-webkit-scrollbar-track{background:transparent;}
                select,input,textarea{color-scheme:dark;}
                option{background:${T.surface};color:${T.text};}
                @keyframes dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
                @keyframes spin{to{transform:rotate(360deg);}}
                ::selection{background:${T.greenDim};color:${T.green};}
              `}</style>
              {children}
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<JulesClient />);
    </script>
</body>
</html>
